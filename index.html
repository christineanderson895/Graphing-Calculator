// ════════════════════════════════════════════════════════

function makeTransformedAnimation(src, transformPoint, rotation) {
  return {
    id: Date.now() + Math.random(),
    letter: nextLetter(),
    color: src.color,
    kind: animKind(src),
    fillColor: animFillColor(src),
    outlineOpacity: animOutlineOpacity(src),
    fillOpacity: animFillOpacity(src),
    fillStyle: animFillStyle(src),
    visible: src.visible,
    thickness: src.thickness,
    rotation,
    anchors: src.anchors.map(transformPoint),
    segments: src.segments.map(s => s ? ({
      h0: transformPoint(s.h0),
      h1: transformPoint(s.h1),
      eccentricity: s.eccentricity,
      compiled: null,
      compiledRef: null,
    }) : null),
    anchorLocked: src.anchorLocked ? [...src.anchorLocked] : [],
    activeSegments: new Set(),
    inPlacementMode: false,
    reversePlacement: false,
    extensionAnchorIdx: null,
    extensionForward: true,
    extensionInsertAt: 0,
    tContinuation: null,
    expanded: false,
    expandedAnchors: new Set(),
    expandedArcs: new Set(),
  };
}

function sideActionTargetLeftMath(src, kind) {
  const bounds = objectMathBounds(src);
  const btn = selectionSideActionButtons(src).find(b => b.kind === kind);
  if (!bounds || !btn) return null;
  const gap = 6 * devicePixelRatio;
  const [targetLeft] = toMath(btn.x + btn.w + gap, 0);
  return { bounds, targetLeft };
}

function createSideActionCopy(src, kind) {
  if (!src || src.inPlacementMode) return;
  const placement = sideActionTargetLeftMath(src, kind);
  if (!placement) return;
  const { bounds, targetLeft } = placement;
  pushUndo();

  let transformPoint;
  let rotation = animRotation(src);
  if (kind === 'reflect') {
    const mirrorX = (bounds.right + targetLeft) * 0.5;
    transformPoint = pt => new Cx(2 * mirrorX - pt.re, pt.im);
    rotation = -rotation;
  } else {
    const dx = targetLeft - bounds.left;
    transformPoint = pt => new Cx(pt.re + dx, pt.im);
  }

  const anim = makeTransformedAnimation(src, transformPoint, rotation);
  animations.push(anim);
  recompileAnim(anim);

  selectedId = src.id;
  src.expanded = true;
  anim.expanded = false;
  anim.activeSegments = new Set();
  anim.expandedAnchors = new Set();
  anim.expandedArcs = new Set();
  sideActionHover = null;
  resizeHover = null;
  rotateHover = null;
  segmentHover = null;
  anchorHover = null;
  handleHover = null;
  plusHover = null;
  lockHover = null;
  renderAnimList(); draw(); updateCursor();
}

function softSnap(v) {
  const threshold = snapThreshold();
  if (threshold <= 0) return v;
  const n = Math.round(v);
  return Math.abs(v - n) <= threshold ? n : v;
}

function snapPointToLattice(pt, threshold = snapThreshold()) {
  if (threshold <= 0) return pt;
  const nearX = Math.round(pt.re), nearY = Math.round(pt.im);
  return new Cx(
    Math.abs(pt.re - nearX) <= threshold ? nearX : pt.re,
    Math.abs(pt.im - nearY) <= threshold ? nearY : pt.im
  );
}

function rotateMathPoint(pt, center, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  const dx = pt.re - center.re, dy = pt.im - center.im;
  return new Cx(center.re + dx * c - dy * s, center.im + dx * s + dy * c);
}

function primitiveCenter(anim) {
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  if (!p0) return null;
  const kind = animKind(anim);
  if (kind === 'circle' || kind === 'ellipse') return p0;
  if (!p1) return p0;
  return new Cx((p0.re + p1.re) * 0.5, (p0.im + p1.im) * 0.5);
}

function primitiveRectangleCorners(anim) {
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  if (!p0 || !p1) return [];
  const center = primitiveCenter(anim);
  const corners = [
    new Cx(p0.re, p0.im),
    new Cx(p1.re, p0.im),
    new Cx(p1.re, p1.im),
    new Cx(p0.re, p1.im),
  ];
  const rot = animRotation(anim);
  return rot ? corners.map(pt => rotateMathPoint(pt, center, rot)) : corners;
}

function samplePrimitiveBoundaryMath(anim, count = 96) {
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  if (!p0 || !p1) return [];
  const kind = animKind(anim);
  if (kind === 'line') return [p0, p1];
  if (kind === 'rectangle') return primitiveRectangleCorners(anim);
  const rot = animRotation(anim);
  if (kind === 'circle') {
    const radius = Math.hypot(p1.re - p0.re, p1.im - p0.im);
    return Array.from({ length: count }, (_, i) => {
      const a = Math.PI * 2 * i / count;
      return new Cx(p0.re + radius * Math.cos(a), p0.im + radius * Math.sin(a));
    });
  }
  if (kind === 'ellipse') {
    const rx = Math.abs(p1.re - p0.re), ry = Math.abs(p1.im - p0.im);
    return Array.from({ length: count }, (_, i) => {
      const a = Math.PI * 2 * i / count;
      const local = new Cx(p0.re + rx * Math.cos(a), p0.im + ry * Math.sin(a));
      return rot ? rotateMathPoint(local, p0, rot) : local;
    });
  }
  return [];
}

function updateCursor() {
  const placing = animations.some(a => a.inPlacementMode);
  if (placing) {
    canvas.style.cursor = 'none';
  } else if (resizeDrag) {
    canvas.style.cursor = resizeCursorForHandle(resizeDrag.handle);
  } else if (resizeHover) {
    canvas.style.cursor = resizeCursorForHandle(resizeHover.handle);
  } else if (rotateDrag) {
    canvas.style.cursor = 'grabbing';
  } else if (rotateHover) {
    canvas.style.cursor = 'grab';
  } else if (sideActionHover) {
    canvas.style.cursor = 'pointer';
  } else if (anchorHover || handleHover || plusHover) {
    canvas.style.cursor = 'crosshair';
  } else if (anchorDrag || handleDrag || curveDrag || dragging) {
    canvas.style.cursor = 'grabbing';
  } else if (segmentHover) {
    canvas.style.cursor = 'grab';
  } else {
    canvas.style.cursor = 'grab';
  }
}

function queryAnchorHover(mathX, mathY, thresholdPx = 7 * devicePixelRatio) {
  let best = null, bestDist = Infinity;
  const [cx, cy] = toCanvas(mathX, mathY);
  if (editModeAnimId) {
    const anim = animations.find(a => a.id === editModeAnimId);
    if (isPrimitiveAnim(anim)) return null;
    if (anim && anim.visible && !anim.inPlacementMode) {
      const { anchorSet } = getActiveHandleInfo(anim);
      for (const i of anchorSet) {
        const a = anim.anchors[i];
        if (!a) continue;
        const [ax, ay] = toCanvas(a.re, a.im);
        const d = Math.hypot(ax - cx, ay - cy);
        if (d <= thresholdPx && d < bestDist) { bestDist = d; best = { anim, anchorIdx: i }; }
      }
    }
  } else {
    for (const anim of animations) {
      if (!anim.visible || anim.inPlacementMode) continue;
      if (isPrimitiveAnim(anim)) continue;
      for (let i = 0; i < anim.anchors.length; i++) {
        const a = anim.anchors[i];
        if (!a) continue;
        const [ax, ay] = toCanvas(a.re, a.im);
        const d = Math.hypot(ax - cx, ay - cy);
        if (d <= thresholdPx && d < bestDist) { bestDist = d; best = { anim, anchorIdx: i }; }
      }
    }
  }
  return best;
}

function queryHandleHover(mathX, mathY, thresholdMath = 0.15) {
  if (!editModeAnimId) return null;
  const anim = animations.find(a => a.id === editModeAnimId);
  if (!anim) return null;
  if (isPrimitiveAnim(anim)) return null;
  const { handlePairs } = getActiveHandleInfo(anim);
  let best = null, bestDist = Infinity;
  for (const { segIdx, side } of handlePairs) {
    const h = anim.segments[segIdx][side];
    const d = Math.hypot(h.re - mathX, h.im - mathY);
    if (d < thresholdMath && d < bestDist) { bestDist = d; best = { anim, segIdx, side }; }
  }
  return best;
}


function distPointToSegmentPx(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq < 1e-9) return Math.hypot(px - ax, py - ay);
  const t = clamp(((px - ax) * dx + (py - ay) * dy) / lenSq, 0, 1);
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function primitiveHitDistance(anim, cx, cy) {
  if (!isPrimitiveAnim(anim) || anim.anchors.length < 2) return Infinity;
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  const [x0, y0] = toCanvas(p0.re, p0.im);
  const [x1, y1] = toCanvas(p1.re, p1.im);
  if (anim.kind === 'line') {
    return distPointToSegmentPx(cx, cy, x0, y0, x1, y1);
  }
  if (anim.kind === 'rectangle') {
    const pts = primitiveRectangleCorners(anim).map(pt => toCanvas(pt.re, pt.im));
    if (pts.length < 4) return Infinity;
    let best = Infinity;
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i], b = pts[(i + 1) % pts.length];
      best = Math.min(best, distPointToSegmentPx(cx, cy, a[0], a[1], b[0], b[1]));
    }
    return best;
  }
  if (anim.kind === 'circle') {
    const radius = Math.hypot(x1 - x0, y1 - y0);
    return Math.abs(Math.hypot(cx - x0, cy - y0) - radius);
  }
  if (anim.kind === 'ellipse') {
    const rx = Math.abs(x1 - x0), ry = Math.abs(y1 - y0);
    if (rx < 1e-6 && ry < 1e-6) return Math.hypot(cx - x0, cy - y0);
    const [mx, my] = toMath(cx, cy);
    const center = p0;
    const local = rotateMathPoint(new Cx(mx, my), center, -animRotation(anim));
    if (rx < 1e-6) {
      const a = rotateMathPoint(new Cx(center.re, center.im - Math.abs(p1.im - p0.im)), center, animRotation(anim));
      const b = rotateMathPoint(new Cx(center.re, center.im + Math.abs(p1.im - p0.im)), center, animRotation(anim));
      const [ax, ay] = toCanvas(a.re, a.im), [bx, by] = toCanvas(b.re, b.im);
      return distPointToSegmentPx(cx, cy, ax, ay, bx, by);
    }
    if (ry < 1e-6) {
      const a = rotateMathPoint(new Cx(center.re - Math.abs(p1.re - p0.re), center.im), center, animRotation(anim));
      const b = rotateMathPoint(new Cx(center.re + Math.abs(p1.re - p0.re), center.im), center, animRotation(anim));
      const [ax, ay] = toCanvas(a.re, a.im), [bx, by] = toCanvas(b.re, b.im);
      return distPointToSegmentPx(cx, cy, ax, ay, bx, by);
    }
    const angle = Math.atan2((local.im - center.im) / Math.abs(p1.im - p0.im), (local.re - center.re) / Math.abs(p1.re - p0.re));
    const boundaryLocal = new Cx(center.re + Math.abs(p1.re - p0.re) * Math.cos(angle), center.im + Math.abs(p1.im - p0.im) * Math.sin(angle));
    const boundary = rotateMathPoint(boundaryLocal, center, animRotation(anim));
    const [ex, ey] = toCanvas(boundary.re, boundary.im);
    return Math.hypot(cx - ex, cy - ey);
  }
  return Infinity;
}

function querySegmentHover(cx, cy) {
  const threshold = 8 * devicePixelRatio;
  let bestHit = null, bestDist = Infinity;
  for (const anim of animations) {
    if (!anim.visible || anim.inPlacementMode) continue;
    if (isPrimitiveAnim(anim)) {
      const dist = primitiveHitDistance(anim, cx, cy);
      if (dist < bestDist) {
        bestDist = dist;
        bestHit = { anim, segIdx: 0, primitive: true };
      }
      continue;
    }
    for (let segIdx = 0; segIdx < anim.segments.length; segIdx++) {
      const seg = anim.segments[segIdx];
      if (!seg || !seg.compiled) continue;
      const samples = sampleCompiledAdaptive(seg.compiled);
      const hit = polylineHitInfo(samples, cx, cy);
      if (hit.dist < bestDist) {
        bestDist = hit.dist;
        bestHit = { anim, segIdx };
      }
    }
  }
  return bestDist <= threshold ? bestHit : null;
}

function drawDot(anim) {
  const dpr = devicePixelRatio;
  const r = dotRadius(anim);
  const [x, y] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
  ctx.save();
  ctx.globalAlpha = animOutlineOpacity(anim);
  ctx.fillStyle = anim.color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function dotRadius(anim) {
  return (2 + anim.thickness * 0.5) * devicePixelRatio;
}

function getPlusPositions(anim) {
  if (anim.anchors.length === 0) return [];
  if (anim.segments.length === 0) {
    const dpr = devicePixelRatio;
    const [ax, ay] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
    return [{ end: 'A2', cx: ax, cy: ay - 22 * dpr, anchorIdx: 0, forward: true }];
  }
  const dpr = devicePixelRatio;
  const PLUS_DIST = 22 * dpr;
  const result = [];
  const activeCount = anim.activeSegments?.size || 0;
  const showBackward = activeCount === 0 || anim.activeSegments.has(0);
  const showForward = activeCount === 0 || anim.activeSegments.has(anim.segments.length - 1);

  if (showBackward && anim.segments[0]) {
    // Backward end: only for the first anchor of the whole chain
    const A0cp = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
    const h0cp = toCanvas(anim.segments[0].h0.re, anim.segments[0].h0.im);
    let dx0 = A0cp[0] - h0cp[0], dy0 = A0cp[1] - h0cp[1];
    if (Math.hypot(dx0, dy0) < 1e-9) {
      const A1cp = toCanvas(anim.anchors[1].re, anim.anchors[1].im);
      dx0 = A0cp[0] - A1cp[0]; dy0 = A0cp[1] - A1cp[1];
    }
    const l0 = Math.hypot(dx0, dy0) || 1;
    result.push({ end: 'A0', cx: A0cp[0] + (dx0/l0)*PLUS_DIST, cy: A0cp[1] + (dy0/l0)*PLUS_DIST, anchorIdx: 0, forward: false });
  }
  if (showForward && anim.segments[anim.segments.length - 1]) {
    // Forward end: only for the last anchor of the whole chain
    const lastSegIdx = anim.segments.length - 1;
    const A2cp = toCanvas(anim.anchors[lastSegIdx + 1].re, anim.anchors[lastSegIdx + 1].im);
    const h1cp = toCanvas(anim.segments[lastSegIdx].h1.re, anim.segments[lastSegIdx].h1.im);
    let dx1 = A2cp[0] - h1cp[0], dy1 = A2cp[1] - h1cp[1];
    if (Math.hypot(dx1, dy1) < 1e-9) {
      const A0cp2 = toCanvas(anim.anchors[lastSegIdx].re, anim.anchors[lastSegIdx].im);
      dx1 = A2cp[0] - A0cp2[0]; dy1 = A2cp[1] - A0cp2[1];
    }
    const l1 = Math.hypot(dx1, dy1) || 1;
    result.push({ end: 'A2', cx: A2cp[0] + (dx1/l1)*PLUS_DIST, cy: A2cp[1] + (dy1/l1)*PLUS_DIST, anchorIdx: lastSegIdx + 1, forward: true });
  }
  return result;
}

function queryPlusHover(cx, cy) {
  if (!editModeAnimId) return null;
  const anim = animations.find(a => a.id === editModeAnimId);
  if (isPrimitiveAnim(anim)) return null;
  if (!anim || anim.inPlacementMode || anim.anchors.length === 0) return null;
  const threshold = 14 * devicePixelRatio;
  for (const pp of getPlusPositions(anim)) {
    if (Math.hypot(cx - pp.cx, cy - pp.cy) < threshold)
      return { anim, end: pp.end, anchorIdx: pp.anchorIdx, forward: pp.forward };
  }
  return null;
}

function drawPlusSign(cx, cy, color, dpr, isHovered) {
  const arm = (isHovered ? 7 : 5) * dpr;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = (isHovered ? 2 : 1.5) * dpr;
  ctx.globalAlpha = isHovered ? 1 : 0.7;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - arm, cy); ctx.lineTo(cx + arm, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - arm); ctx.lineTo(cx, cy + arm); ctx.stroke();
  ctx.restore();
}

function getActiveHandleInfo(anim) {
  const active = anim.activeSegments;
  if (!active || active.size === 0) return { anchorSet: new Set(anim.anchors.map((_, i) => i)), handlePairs: [] };
  const anchorSet = new Set();
  const handleMap = new Map();
  for (const i of active) {
    if (i < 0 || i >= anim.segments.length || !anim.segments[i]) continue;
    anchorSet.add(i); anchorSet.add(i + 1);
    handleMap.set(`${i}-h0`, { segIdx: i, side: 'h0' });
    handleMap.set(`${i}-h1`, { segIdx: i, side: 'h1' });
    if (i > 0 && isAnchorLocked(anim, i) && !active.has(i - 1) && anim.segments[i - 1]) {
      handleMap.set(`${i-1}-h1`, { segIdx: i - 1, side: 'h1' });
    }
    if (i + 1 < anim.segments.length && isAnchorLocked(anim, i + 1) && !active.has(i + 1) && anim.segments[i + 1]) {
      handleMap.set(`${i+1}-h0`, { segIdx: i + 1, side: 'h0' });
      anchorSet.add(i + 2);
    }
  }
  return { anchorSet, handlePairs: [...handleMap.values()] };
}

function queryLockHover(cx, cy) {
  if (!editModeAnimId) return null;
  const anim = animations.find(a => a.id === editModeAnimId);
  if (isPrimitiveAnim(anim)) return null;
  if (!anim || anim.inPlacementMode || anim.anchors.length < 3) return null;
  const { anchorSet } = getActiveHandleInfo(anim);
  const threshold = 10 * devicePixelRatio;
  for (let i = 1; i < anim.anchors.length - 1; i++) {
    if (!anchorSet.has(i)) continue;
    const [ax, ay] = toCanvas(anim.anchors[i].re, anim.anchors[i].im);
    const ty = ay + 15 * devicePixelRatio;
    if (Math.hypot(cx - ax, cy - ty) < threshold) return { anim, anchorIdx: i };
  }
  return null;
}

function drawLockToggle(ax, ay, locked, isHovered, color, dpr) {
  const ty = ay + 15 * dpr;
  const r  = 5 * dpr;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth   = (isHovered ? 1.8 : 1.2) * dpr;
  ctx.globalAlpha = isHovered ? 0.9 : 0.5;
  ctx.lineCap = 'round';
  if (locked) {
    // ∩ arch — smooth, continuous joint
    ctx.beginPath();
    ctx.arc(ax, ty, r, Math.PI, 0, false);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ax - r, ty); ctx.lineTo(ax - r, ty + r * 0.5);
    ctx.moveTo(ax + r, ty); ctx.lineTo(ax + r, ty + r * 0.5);
    ctx.stroke();
  } else {
    // Λ peak — corner / free joint
    ctx.beginPath();
    ctx.moveTo(ax - r, ty + r * 0.5);
    ctx.lineTo(ax,     ty - r * 0.5);
    ctx.lineTo(ax + r, ty + r * 0.5);
    ctx.stroke();
  }
  ctx.restore();
}

function startExtendedPlacement(fromAnim, anchorIdx, forward) {
  pushUndo();
  exitEditMode();
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  fromAnim.inPlacementMode = true;
  fromAnim.extensionAnchorIdx = anchorIdx;
  fromAnim.extensionForward = forward;
  fromAnim.extensionInsertAt = forward ? anchorIdx + 1 : anchorIdx;
  fromAnim.reversePlacement = !forward;
  // Compute tContinuation — the tangent the new arc must honour at the extension anchor
  let tCont = new Cx(0, -1); // fallback for dots
  const segs = fromAnim.segments, anch = fromAnim.anchors;
  if (forward && segs.length > 0 && anchorIdx > 0) {
    // Outgoing tangent at anch[anchorIdx] from the segment that ends there
    const seg = segs[anchorIdx - 1];
    if (seg) tCont = tangentAtBezierEnd(anch[anchorIdx], seg.h1);
  } else if (!forward && segs.length > 0) {
    // Start tangent at anch[anchorIdx] from the segment that begins there
    const seg = segs[anchorIdx];
    if (seg) {
      const dx = seg.h0.re - anch[anchorIdx].re, dy = seg.h0.im - anch[anchorIdx].im;
      const L = Math.hypot(dx, dy);
      if (L > 1e-9) tCont = new Cx(dx/L, dy/L);
    }
  }
  fromAnim.tContinuation = tCont;
  fromAnim.expanded = true;
  selectedId = fromAnim.id;
  renderAnimList(); draw(); updateCursor();
}

function hitTestCurve(cx, cy) {
  const threshold = 10 * devicePixelRatio;
  let bestHit = null, bestDist = Infinity;
  for (const anim of animations) {
    if (!anim.visible || anim.inPlacementMode) continue;
    if (isPrimitiveAnim(anim)) {
      const dist = primitiveHitDistance(anim, cx, cy);
      if (dist < bestDist) { bestDist = dist; bestHit = { anim, segIdx: 0, primitive: true }; }
      continue;
    }
    for (let segIdx = 0; segIdx < anim.segments.length; segIdx++) {
      const seg = anim.segments[segIdx];
      if (!seg || !seg.compiled) continue;
      const samples = sampleCompiledAdaptive(seg.compiled);
      const hit = polylineHitInfo(samples, cx, cy);
      if (hit.dist < bestDist) { bestDist = hit.dist; bestHit = { anim, segIdx }; }
    }
  }
  return bestDist <= threshold ? bestHit : null;
}

// ── Placement click handler ──
// Invariant for fresh placement: segs.length = anchors.length - 2 (pending arc not yet stored).
// Extensions use a different invariant (immediate commit, splice-based).
function primitivePlacementClickHandler(anim, snapped) {
  if (!anim || !isPrimitiveAnim(anim)) return;
  if (anim.anchors.length === 0) {
    anim.anchors.push(snapped);
    renderAnimList(); draw(); updateCursor();
    return;
  }
  anim.anchors[1] = snapped;
  finalizePrimitivePlacement(anim);
}

function placementClickHandler(anim, snapped, mathX, mathY) {
  const anch = anim.anchors, segs = anim.segments;
  const n = anch.length;
  const isExtension = anim.extensionAnchorIdx != null;

  let nearIdx = -1;
  for (let i = 0; i < n; i++) {
    if (Math.hypot(anch[i].re - mathX, anch[i].im - mathY) < 0.1) { nearIdx = i; break; }
  }

  if (n === 0) { anch.push(snapped); anim.anchorLocked.push(true); renderAnimList(); draw(); return; }
  if (n === 1) {
    if (nearIdx === 0) { finalizePlacement(anim); return; }
    anch.push(snapped); anim.anchorLocked.push(true);
    rebuildFreshPlacementSegments(anim);
    renderAnimList(); draw(); return;
  }

  // Extension flow: splice-based, each click commits immediately
  if (isExtension) {
    const endIdx = anim.extensionForward ? anim.extensionInsertAt - 1 : anim.extensionInsertAt;
    if (nearIdx === endIdx) { finalizePlacement(anim); return; }
    const looping = nearIdx >= 0;
    const target = looping ? new Cx(anch[nearIdx].re, anch[nearIdx].im) : snapped;
    const src = anch[endIdx];
    const tOut = anim.extensionForward ? anim.tContinuation
      : reflectOverChord(anim.tContinuation, src, target);
    const cd = chordDir(src, target);
    const dotV = tOut.re*cd.re + tOut.im*cd.im;
    const tIn = new Cx(2*dotV*cd.re - tOut.re, 2*dotV*cd.im - tOut.im);
    const f = turnHandleFactor(src, target, tIn);
    const seg = bisectorArc(src, target, tOut, tIn, f);
    const aPos = anim.extensionInsertAt;
    const sPos = anim.extensionForward ? aPos - 1 : aPos;
    anch.splice(aPos, 0, target); anim.anchorLocked.splice(aPos, 0, true);
    segs.splice(sPos, 0, seg);
    if (anim.extensionForward) anim.extensionInsertAt++;
    anim.tContinuation = tIn;
    recompileAnim(anim);
    if (looping) { finalizePlacement(anim); return; }
    renderAnimList(); draw(); return;
  }

  // Fresh placement: rebuild the initial spline from the anchor sequence.
  const endIdx = n - 1;
  if (nearIdx === endIdx) {
    rebuildFreshPlacementSegments(anim);
    finalizePlacement(anim); return;
  }
  const looping = nearIdx >= 0;
  const target = looping ? new Cx(anch[nearIdx].re, anch[nearIdx].im) : snapped;

  if (n === 2) {
    anch.push(target); anim.anchorLocked.push(true);
    rebuildFreshPlacementSegments(anim);
    if (looping) { finalizePlacement(anim); return; }
    renderAnimList(); draw(); return;
  }

  // n >= 3
  anch.push(target); anim.anchorLocked.push(true);
  rebuildFreshPlacementSegments(anim);
  if (looping) {
    finalizePlacement(anim);
    return;
  }
  renderAnimList(); draw(); return;
}

canvas.addEventListener('mousedown', e => {
  if (openColorMenuAnimId !== null) { openColorMenuAnimId = null; renderAnimList(); }
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * devicePixelRatio;
  const cy = (e.clientY - rect.top)  * devicePixelRatio;
  const [mathX, mathY] = toMath(cx, cy);
  mouseDownClientX = e.clientX; mouseDownClientY = e.clientY;
  if (e.button === 2) {
    e.preventDefault();
    dragging = true;
    dragStartX  = e.clientX * devicePixelRatio;
    dragStartY  = e.clientY * devicePixelRatio;
    dragOriginX = originX; dragOriginY = originY;
    updateCursor();
    return;
  }
  if (e.button !== 0) return;

  // ── Placement mode ──
  const placingAnim = animations.find(a => a.inPlacementMode);
  if (placingAnim) {
    e.preventDefault();
    const snapped = new Cx(softSnap(mathX), softSnap(mathY));
    if (isPrimitiveAnim(placingAnim)) {
      primitivePlacementClickHandler(placingAnim, snapped);
      return;
    }
    placementClickHandler(placingAnim, snapped, mathX, mathY);
    return;
  }

  // Canvas side buttons: duplicate / reflect
  const sideAction = querySideActionButtonHover(cx, cy);
  if (sideAction) {
    e.preventDefault();
    createSideActionCopy(sideAction.anim, sideAction.kind);
    return;
  }

  const rh = queryResizeHandleHover(cx, cy);
  if (rh) {
    e.preventDefault();
    const bounds = objectMathBounds(rh.anim);
    if (!bounds) return;
    pushUndo();
    resizeDrag = {
      anim: rh.anim,
      handle: rh.handle,
      startMathX: mathX,
      startMathY: mathY,
      origKind: animKind(rh.anim),
      origRotation: animRotation(rh.anim),
      origBounds: { ...bounds },
      origAnchors: rh.anim.anchors.map(cloneCx),
      origSegs: rh.anim.segments.map(cloneResizeSeg),
    };
    selectedId = rh.anim.id;
    rh.anim.expanded = true;
    animations.forEach(a => {
      if (a.id !== rh.anim.id) {
        a.expanded = false;
        a.expandedArcs = new Set();
        a.expandedAnchors = new Set();
      }
    });
    updateCursor(); draw(); return;
  }

  // ── Rotation wheel drag ──
  const rw = queryRotationWheelHover(cx, cy);
  if (rw) {
    e.preventDefault();
    const center = rotationCenterForAnim(rw.anim);
    if (!center) return;
    pushUndo();
    rotateDrag = {
      anim: rw.anim,
      center,
      startAngle: Math.atan2(mathY - center.im, mathX - center.re),
      origRotation: animRotation(rw.anim),
      origAnchors: rw.anim.anchors.map(cloneCx),
      origSegs: rw.anim.segments.map(cloneResizeSeg),
    };
    selectedId = rw.anim.id;
    rw.anim.expanded = true;
    animations.forEach(a => {
      if (a.id !== rw.anim.id) {
        a.expanded = false;
        a.expandedArcs = new Set();
        a.expandedAnchors = new Set();
      }
    });
    updateCursor(); draw(); return;
  }

  const ph = queryPlusHover(cx, cy);
  if (ph) {
    e.preventDefault();
    startExtendedPlacement(ph.anim, ph.anchorIdx, ph.forward);
    return;
  }

  // ── Lock toggle click ──
  const lh = queryLockHover(cx, cy);
  if (lh) {
    e.preventDefault();
    pushUndo();
    setAnchorLocked(lh.anim, lh.anchorIdx, !isAnchorLocked(lh.anim, lh.anchorIdx));
    draw(); return;
  }

  // ── Anchor drag ──
  const ah = queryAnchorHover(mathX, mathY);
  if (ah) {
    e.preventDefault();
    pushUndo();
    const { anim, anchorIdx: idx } = ah;
    const origH0 = idx < anim.segments.length ? cloneCx(anim.segments[idx].h0) : null;
    const origH1 = idx > 0 && idx - 1 < anim.segments.length ? cloneCx(anim.segments[idx - 1].h1) : null;
    anchorDrag = {
      anim, anchorIdx: idx,
      startMathX: mathX, startMathY: mathY,
      origAnchor: cloneCx(anim.anchors[idx]),
      origH0, origH1,
    };
    if (editModeAnimId !== anim.id) enterEditMode(anim);
    anim.activeSegments = new Set();
    anim.expandedArcs = new Set();
    anim.expandedAnchors = new Set([idx]);
    updateCursor(); draw(); return;
  }

  // ── Handle drag (only in edit mode) ──
  // Use stale mousemove hover state so the curve body wins over nearby handles.
  if (handleHover) {
    e.preventDefault();
    pushUndo();
    const { anim, segIdx, side } = handleHover;
    const anchorIdx = side === 'h0' ? segIdx : segIdx + 1;
    handleDrag = { anim, segIdx, side, anchorIdx, origHandle: cloneCx(anim.segments[segIdx][side]) };
    updateCursor(); draw(); return;
  }

  // ── Segment hover ──
  if (segmentHover) {
    e.preventDefault();
    const hitAnim = segmentHover.anim;
    const hitSegIdx = segmentHover.segIdx;
    if (editModeAnimId !== hitAnim.id) {
      // First click selects the whole curve, not a specific arc
      enterEditMode(hitAnim, new Set());
      hitAnim.expanded = true;
      animations.forEach(a => {
        if (a.id !== hitAnim.id) {
          a.expanded = false;
          a.expandedArcs = new Set();
          a.expandedAnchors = new Set();
        }
      });
      hitAnim.expandedArcs = new Set();
      hitAnim.expandedAnchors = new Set();
      renderAnimList(); updateCursor();
      scrollToShowExpanded(hitAnim.id); return;
    }
    // Already in edit mode for this animation: a click/drag here works on one arc at a time
    hitAnim.activeSegments = new Set([hitSegIdx]);
    hitAnim.expandedArcs = new Set([hitSegIdx]);
    hitAnim.expandedAnchors = new Set();
    pushUndo();
    const snap = snapshotAnimations();
    curveDrag = {
      anim: hitAnim,
      segIdx: hitSegIdx,
      startMathX: mathX, startMathY: mathY,
      origAnchors: hitAnim.anchors.map(cloneCx),
      origSegs: hitAnim.segments.map(s => s ? ({ h0: cloneCx(s.h0), h1: cloneCx(s.h1) }) : null),
      preSnapshot: snap,
    };
    updateCursor(); draw(); return;
  }

  // ── Canvas background ──
  if (editModeAnimId !== null) {
    // Start rubber-band selection; tiny click handled in mouseup
    rubberBand = { startX: cx, startY: cy, curX: cx, curY: cy, ctrl: e.ctrlKey };
    e.preventDefault(); return;
  }
  selectedId = null;
  sideActionHover = null;
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  renderAnimList(); draw();
  updateCursor();
});

window.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * devicePixelRatio;
  const cy = (e.clientY - rect.top)  * devicePixelRatio;
  const [mathX, mathY] = toMath(cx, cy);

  // Placement preview
  if (animations.some(a => a.inPlacementMode)) {
    const onCanvas = cx >= 0 && cy >= 0 && cx <= canvas.width && cy <= canvas.height;
    placementPreviewPos = onCanvas ? new Cx(softSnap(mathX), softSnap(mathY)) : null;
    draw(); return;
  }

  if (resizeDrag) {
    const nextBounds = resizeBoundsForCursor(resizeDrag, mathX, mathY);
    applyResizeBounds(resizeDrag, nextBounds);
    const list = document.getElementById('anim-list');
    const scrollTop = list.scrollTop;
    renderAnimList();
    list.scrollTop = scrollTop;
    draw(); return;
  }

  if (rotateDrag) {
    const angle = Math.atan2(mathY - rotateDrag.center.im, mathX - rotateDrag.center.re);
    applyRotationDelta(rotateDrag, angle - rotateDrag.startAngle);
    const list = document.getElementById('anim-list');
    const scrollTop = list.scrollTop;
    renderAnimList();
    list.scrollTop = scrollTop;
    draw(); return;
  }

  if (handleDrag) {
    const { anim, segIdx, side, anchorIdx } = handleDrag;
    const snapped = snapPointToLattice(new Cx(mathX, mathY));
    anim.segments[segIdx][side] = snapped;
    swingOppositeHandle(anim, anchorIdx, side === 'h0');
    recompileAnim(anim);
    updateSidebarInputs(anim);
    draw(); return;
  }

  if (anchorDrag) {
    const { anim, anchorIdx, startMathX, startMathY, origAnchor, origH0, origH1 } = anchorDrag;
    const snapX = softSnap(origAnchor.re + (mathX - startMathX));
    const snapY = softSnap(origAnchor.im + (mathY - startMathY));
    const sdx = snapX - origAnchor.re, sdy = snapY - origAnchor.im;
    anim.anchors[anchorIdx] = new Cx(snapX, snapY);
    const isInterior = origH0 !== null && origH1 !== null;
    if (isInterior) {
      anim.segments[anchorIdx].h0 = new Cx(origH0.re + sdx, origH0.im + sdy);
      anim.segments[anchorIdx - 1].h1 = new Cx(origH1.re + sdx, origH1.im + sdy);
    }
    recompileAnim(anim);
    updateSidebarInputs(anim);
    draw(); return;
  }

  if (curveDrag) {
    const { anim, startMathX, startMathY, origAnchors, origSegs } = curveDrag;
    const dx = softSnap(mathX - startMathX), dy = softSnap(mathY - startMathY);
    anim.anchors.forEach((_, i) => { anim.anchors[i] = new Cx(origAnchors[i].re + dx, origAnchors[i].im + dy); });
    anim.segments.forEach((s, i) => {
      if (!s || !origSegs[i]) return;
      s.h0 = new Cx(origSegs[i].h0.re + dx, origSegs[i].h0.im + dy);
      s.h1 = new Cx(origSegs[i].h1.re + dx, origSegs[i].h1.im + dy);
    });
    recompileAnim(anim);
    updateSidebarInputs(anim);
    draw(); return;
  }

  if (rubberBand) {
    rubberBand.curX = cx; rubberBand.curY = cy;
    draw(); return;
  }

  if (dragging) {
    originX = dragOriginX + (e.clientX * devicePixelRatio - dragStartX);
    originY = dragOriginY + (e.clientY * devicePixelRatio - dragStartY);
    draw(); return;
  }

  // Hover detection
  if (currentMode === 'animations') {
    const newSideActionHover = querySideActionButtonHover(cx, cy);
    const newResizeHover  = newSideActionHover ? null : queryResizeHandleHover(cx, cy);
    const newRotationHover = (newSideActionHover || newResizeHover) ? null : queryRotationWheelHover(cx, cy);
    const newLockHover    = (newSideActionHover || newResizeHover || newRotationHover) ? null : queryLockHover(cx, cy);
    const newPlusHover    = (newSideActionHover || newResizeHover || newRotationHover || newLockHover) ? null : queryPlusHover(cx, cy);
    const newAnchorHover  = (newSideActionHover || newResizeHover || newRotationHover || newPlusHover || newLockHover) ? null : queryAnchorHover(mathX, mathY);
    const newHandleHover  = (newSideActionHover || newResizeHover || newRotationHover || newPlusHover || newAnchorHover || newLockHover) ? null : queryHandleHover(mathX, mathY);
    const newSegmentHover = (newSideActionHover || newResizeHover || newRotationHover || newPlusHover || newAnchorHover || newHandleHover || newLockHover) ? null : querySegmentHover(cx, cy);
    const sideActionChanged = (newSideActionHover?.anim !== sideActionHover?.anim) || (newSideActionHover?.kind !== sideActionHover?.kind);
    const resizeChanged = (newResizeHover?.anim !== resizeHover?.anim) || (newResizeHover?.handle !== resizeHover?.handle);
    const rotationChanged = newRotationHover?.anim !== rotateHover?.anim;
    const plusChanged = (newPlusHover?.anim !== plusHover?.anim) || (newPlusHover?.end !== plusHover?.end);
    const lockChanged = (newLockHover?.anim !== lockHover?.anim) || (newLockHover?.anchorIdx !== lockHover?.anchorIdx);
    const changed = sideActionChanged || resizeChanged || rotationChanged || plusChanged || lockChanged || (newAnchorHover !== anchorHover) || (newHandleHover !== handleHover) ||
      (newSegmentHover !== segmentHover &&
        !(newSegmentHover && segmentHover && newSegmentHover.anim === segmentHover.anim && newSegmentHover.segIdx === segmentHover.segIdx));
    sideActionHover = newSideActionHover;
    resizeHover  = newResizeHover;
    rotateHover  = newRotationHover;
    lockHover    = newLockHover;
    plusHover    = newPlusHover;
    anchorHover  = newAnchorHover;
    handleHover  = newHandleHover;
    segmentHover = newSegmentHover;
    if (changed) { updateCursor(); draw(); }
  }
});

window.addEventListener('mouseup', e => {
  if (resizeDrag) {
    resizeDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (rotateDrag) {
    rotateDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (handleDrag) {
    handleDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (anchorDrag) {
    anchorDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (rubberBand) {
    const isDrag = Math.hypot(e.clientX - mouseDownClientX, e.clientY - mouseDownClientY) > 5;
    if (!isDrag) {
      // Tiny click on background: exit edit mode
      rubberBand = null;
      exitEditMode();
      selectedId = null;
      sideActionHover = null;
      animations.forEach(a => {
        a.expanded = false;
        a.expandedArcs = new Set();
        a.expandedAnchors = new Set();
      });
      renderAnimList(); draw(); return;
    }
    // Complete rubber-band: select arcs with any anchor inside the rect
    const anim = animations.find(a => a.id === editModeAnimId);
    if (anim) {
      anim.expandedAnchors = new Set();
      const rx0 = Math.min(rubberBand.startX, rubberBand.curX);
      const rx1 = Math.max(rubberBand.startX, rubberBand.curX);
      const ry0 = Math.min(rubberBand.startY, rubberBand.curY);
      const ry1 = Math.max(rubberBand.startY, rubberBand.curY);
      const inRect = i => {
        const [ax, ay] = toCanvas(anim.anchors[i].re, anim.anchors[i].im);
        const [bx, by] = toCanvas(anim.anchors[i+1].re, anim.anchors[i+1].im);
        return (ax >= rx0 && ax <= rx1 && ay >= ry0 && ay <= ry1)
            || (bx >= rx0 && bx <= rx1 && by >= ry0 && by <= ry1);
      };
      if (rubberBand.ctrl) {
        for (let i = 0; i < anim.segments.length; i++) {
          if (!inRect(i)) continue;
          if (anim.activeSegments.has(i)) anim.activeSegments.delete(i);
          else anim.activeSegments.add(i);
        }
      } else {
        anim.activeSegments = new Set();
        for (let i = 0; i < anim.segments.length; i++) {
          if (inRect(i)) anim.activeSegments.add(i);
        }
      }
    }
    rubberBand = null;
    draw(); return;
  }

  if (curveDrag) {
    const wasTinyClick = Math.hypot(e.clientX - mouseDownClientX, e.clientY - mouseDownClientY) < 5;
    if (wasTinyClick) {
      // Restore pre-drag state then activate segment (already in edit mode)
      const { anim, segIdx, preSnapshot } = curveDrag;
      undoStack.pop(); // discard the snap we pushed
      undoStack.push(preSnapshot);
      const segIdxSave = segIdx ?? 0;
      curveDrag = null;
      anim.expanded = true;
      animations.forEach(a => {
        if (a.id !== anim.id) {
          a.expanded = false;
          a.expandedArcs = new Set();
          a.expandedAnchors = new Set();
        }
      });
      anim.expandedArcs = new Set([segIdxSave]);
      anim.expandedAnchors = new Set();
      anim.activeSegments = new Set([segIdxSave]);
      renderAnimList(); draw(); updateCursor();
      scrollToShowExpanded(anim.id); return;
    }
    curveDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (dragging && Math.hypot(e.clientX - mouseDownClientX, e.clientY - mouseDownClientY) < 5) {
    // Background click: already handled in mousedown
  }
  dragging = false;
  updateCursor();
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
});
canvas.addEventListener('auxclick', e => {
  if (e.button === 2) e.preventDefault();
});

canvas.addEventListener('mouseleave', () => {
  placementPreviewPos = null;
  rubberBand = null;
  if (anchorHover || handleHover || segmentHover || resizeHover || rotateHover || sideActionHover || plusHover || lockHover) {
    anchorHover = null; handleHover = null; segmentHover = null; resizeHover = null; rotateHover = null; sideActionHover = null; plusHover = null; lockHover = null;
    updateCursor(); draw();
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const mx = e.offsetX * devicePixelRatio;
  const my = e.offsetY * devicePixelRatio;
  originX = mx + (originX - mx) * factor;
  originY = my + (originY - my) * factor;
  scale *= factor;
  draw();
}, { passive: false });

document.addEventListener('click', e => {
  if (globalSettingsOpen && !(e.target.closest && e.target.closest('#global-settings'))) {
    setGlobalSettingsOpen(false);
  }
  if (e.target.closest && (e.target.closest('#canvas-wrap') || e.target.closest('#sidebar'))) return;
  if (openColorMenuAnimId !== null) { openColorMenuAnimId = null; renderAnimList(); }
  const placing = animations.find(a => a.inPlacementMode);
  if (placing && isPrimitiveAnim(placing)) cancelPlacement(placing);
  if (editModeAnimId !== null) exitEditMode();
  selectedId = null;
  sideActionHover = null;
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  renderAnimList(); draw();
});


// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — drawing
// ════════════════════════════════════════════════════════

function drawAnchorDot(canvasPt, color, r) {
  ctx.beginPath();
  ctx.arc(canvasPt[0], canvasPt[1], r, 0, Math.PI * 2);
  ctx.fillStyle = '#101020';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(canvasPt[0], canvasPt[1], r, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2 * devicePixelRatio;
  ctx.stroke();
}

function drawHandleDot(canvasPt, color, r) {
  ctx.beginPath();
  ctx.arc(canvasPt[0], canvasPt[1], r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawHandles(anim) {
  const dpr = devicePixelRatio;
  const { anchorSet, handlePairs } = getActiveHandleInfo(anim);
  if (anchorSet.size === 0) {
    // Dot in edit mode: ring highlight around the dot
    if (anim.anchors.length === 1 && anim.segments.length === 0) {
      const [x, y] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
      ctx.save();
      ctx.strokeStyle = anim.color; ctx.lineWidth = 1.5 * dpr; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(x, y, 9 * dpr, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
    // "+" signs (works for both dots and multi-arc with nothing selected)
    for (const pp of getPlusPositions(anim)) {
      const isHov = plusHover?.anim === anim && plusHover?.end === pp.end;
      drawPlusSign(pp.cx, pp.cy, CANVAS_TOOL_COLOR, dpr, isHov);
    }
    return;
  }
  // Dashed lines + handle dots
  for (const { segIdx, side } of handlePairs) {
    const anchorIdx = side === 'h0' ? segIdx : segIdx + 1;
    const Acp = toCanvas(anim.anchors[anchorIdx].re, anim.anchors[anchorIdx].im);
    const hcp = toCanvas(anim.segments[segIdx][side].re, anim.segments[segIdx][side].im);
    ctx.save();
    ctx.globalAlpha = 0.45; ctx.strokeStyle = anim.color;
    ctx.lineWidth = 1.2 * dpr; ctx.setLineDash([3*dpr, 3*dpr]);
    ctx.beginPath(); ctx.moveTo(Acp[0], Acp[1]); ctx.lineTo(hcp[0], hcp[1]); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    const isHov = handleHover?.anim === anim && handleHover?.segIdx === segIdx && handleHover?.side === side;
    drawHandleDot(hcp, anim.color, (isHov ? 5 : 3.5) * dpr);
  }
  // Anchor dots stay visible for the whole curve even when one arc is selected
  for (let i = 0; i < anim.anchors.length; i++) {
    if (i >= anim.anchors.length) continue;
    const isHov = anchorHover?.anim === anim && anchorHover?.anchorIdx === i;
    const isSelected = editModeAnimId === anim.id && anim.expandedAnchors?.has(i);
    drawAnchorDot(toCanvas(anim.anchors[i].re, anim.anchors[i].im), anim.color, (isHov || isSelected ? 7 : 5) * dpr);
  }
  // Lock toggles for visible interior anchors
  for (let i = 1; i < anim.anchors.length - 1; i++) {
    if (!anchorSet.has(i)) continue;
    const [ax, ay] = toCanvas(anim.anchors[i].re, anim.anchors[i].im);
    const locked = isAnchorLocked(anim, i);
    const isHov  = lockHover?.anim === anim && lockHover?.anchorIdx === i;
    drawLockToggle(ax, ay, locked, isHov, CANVAS_TOOL_COLOR, dpr);
  }
  // "+" signs beyond each endpoint
  for (const pp of getPlusPositions(anim)) {
    const isHov = plusHover?.anim === anim && plusHover?.end === pp.end;
    drawPlusSign(pp.cx, pp.cy, CANVAS_TOOL_COLOR, dpr, isHov);
  }
}

// Returns true when eccentricity ghost curves should be shown for this arc.
function isEccGhostActive(anim, segIdx) {
  if (eccentricitySliderActiveKey?.animId === anim.id && eccentricitySliderActiveKey?.segIdx === segIdx)
    return true;
  if (handleDrag?.anim === anim) {
    const isInterior = handleDrag.anchorIdx > 0 && handleDrag.anchorIdx < anim.anchors.length - 1;
    if (isInterior) return true;          // A1-adjacent handle: both arcs
    if (handleDrag.segIdx === segIdx) return true; // same-arc handle
  }
  if (anchorDrag?.anim === anim) {
    const isInterior = anchorDrag.anchorIdx > 0 && anchorDrag.anchorIdx < anim.anchors.length - 1;
    if (isInterior) return true;          // A1 drag: both arcs
  }
  return false;
}

function drawSegment(anim, segIdx) {
  const seg = anim.segments[segIdx];
  if (!seg || !seg.compiled) return;
  const dpr = devicePixelRatio;
  const cw = (1 + 5 * (anim.thickness / 10)) * dpr;
  const opacity = animOutlineOpacity(anim);
  if (isEccGhostActive(anim, segIdx) && seg.compiledRef) {
    seg.compiledRef.forEach(entry => {
      if (Math.abs(entry.eccentricity - seg.eccentricity) >= 1e-9)
        drawCompiledCurve(entry.fn, anim.color, cw * 0.18, 0.3 * opacity);
    });
    const sliderActive = eccentricitySliderActiveKey?.animId === anim.id
                      && eccentricitySliderActiveKey?.segIdx === segIdx;
    if (sliderActive) {
      ctx.save(); ctx.shadowBlur = 15 * dpr; ctx.shadowColor = anim.color;
      drawCompiledCurve(seg.compiled, anim.color, cw * 0.55, opacity);
      ctx.restore();
    } else {
      drawCompiledCurve(seg.compiled, anim.color, cw, opacity);
    }
  } else {
    drawCompiledCurve(seg.compiled, anim.color, cw, opacity);
  }
}

function primitiveStrokeWidth(anim, extra = 0) {
  return (1 + 5 * (anim.thickness / 10)) * devicePixelRatio + extra;
}

function fillStyleValue(color, style) {
  if (!color || style === 'solid') return color;
  const dpr = devicePixelRatio;
  const size = Math.max(8, Math.round(8 * dpr));
  const tile = document.createElement('canvas');
  tile.width = size;
  tile.height = size;
  const pctx = tile.getContext('2d');
  pctx.strokeStyle = color;
  pctx.lineWidth = Math.max(1, dpr);
  pctx.lineCap = 'square';

  const line = (x1, y1, x2, y2) => {
    pctx.beginPath();
    pctx.moveTo(x1, y1);
    pctx.lineTo(x2, y2);
    pctx.stroke();
  };
  const drawHorizontal = () => line(0, size * 0.5, size, size * 0.5);
  const drawVertical = () => line(size * 0.5, 0, size * 0.5, size);
  const drawDiagDown = () => {
    line(-size * 0.25, -size * 0.25, size * 1.25, size * 1.25);
    line(-size * 0.25, size * 0.75, size * 0.25, size * 1.25);
    line(size * 0.75, -size * 0.25, size * 1.25, size * 0.25);
  };
  const drawDiagUp = () => {
    line(-size * 0.25, size * 1.25, size * 1.25, -size * 0.25);
    line(-size * 0.25, size * 0.25, size * 0.25, -size * 0.25);
    line(size * 0.75, size * 1.25, size * 1.25, size * 0.75);
  };

  if (style === 'horizontal') drawHorizontal();
  else if (style === 'vertical') drawVertical();
  else if (style === 'diagDown') drawDiagDown();
  else if (style === 'diagUp') drawDiagUp();
  else if (style === 'cross') { drawHorizontal(); drawVertical(); }
  else if (style === 'diagCross') { drawDiagDown(); drawDiagUp(); }
  return ctx.createPattern(tile, 'repeat') || color;
}

function drawPrimitiveShape(kind, p0, p1, color, lineWidth, alpha = 1, dashed = false, rotation = 0, fillColor = null, outlineOpacity = 1, fillOpacity = 0.5, fillStyle = 'solid') {
  if (!p0 || !p1) return;
  const [x0, y0] = toCanvas(p0.re, p0.im);
  const [x1, y1] = toCanvas(p1.re, p1.im);
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = fillStyleValue(fillColor, fillStyle) || color;
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (dashed) ctx.setLineDash([4 * devicePixelRatio, 4 * devicePixelRatio]);
  const paint = () => {
    if (fillColor) {
      ctx.globalAlpha = alpha * fillOpacity;
      ctx.fill();
    }
    ctx.globalAlpha = alpha * outlineOpacity;
    ctx.stroke();
  };
  if (kind === 'line') {
    ctx.globalAlpha = alpha * outlineOpacity;
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
  } else if (kind === 'rectangle') {
    const center = new Cx((p0.re + p1.re) * 0.5, (p0.im + p1.im) * 0.5);
    const corners = [
      new Cx(p0.re, p0.im),
      new Cx(p1.re, p0.im),
      new Cx(p1.re, p1.im),
      new Cx(p0.re, p1.im),
    ].map(pt => rotation ? rotateMathPoint(pt, center, rotation) : pt);
    const pts = corners.map(pt => toCanvas(pt.re, pt.im));
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    paint();
  } else if (kind === 'circle') {
    const radius = Math.hypot(x1 - x0, y1 - y0);
    ctx.beginPath();
    ctx.arc(x0, y0, radius, 0, Math.PI * 2);
    paint();
  } else if (kind === 'ellipse') {
    const rx = Math.abs(x1 - x0), ry = Math.abs(y1 - y0);
    ctx.beginPath();
    ctx.ellipse(x0, y0, rx, ry, -rotation, 0, Math.PI * 2);
    paint();
  }
  ctx.restore();
}

function drawPrimitive(anim, extraWidth = 0, alpha = 1) {
  if (!isPrimitiveAnim(anim) || anim.anchors.length < 2) return;
  const fillColor = extraWidth === 0 && alpha >= 1 ? animFillColor(anim) : null;
  drawPrimitiveShape(
    anim.kind,
    anim.anchors[0],
    anim.anchors[1],
    anim.color,
    primitiveStrokeWidth(anim, extraWidth),
    alpha,
    false,
    animRotation(anim),
    fillColor,
    animOutlineOpacity(anim),
    animFillOpacity(anim),
    animFillStyle(anim)
  );
}

function drawPrimitivePlacement(anim, previewPoint) {
  const dpr = devicePixelRatio;
  const cw = primitiveStrokeWidth(anim);
  for (const anchor of anim.anchors) {
    drawAnchorDot(toCanvas(anchor.re, anchor.im), anim.color, 5 * dpr);
  }
  if (!previewPoint) return;
  const [px, py] = toCanvas(previewPoint.re, previewPoint.im);
  if (anim.anchors.length === 0) {
    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.strokeStyle = anim.color;
    ctx.lineWidth = 2 * dpr;
    ctx.beginPath();
    ctx.arc(px, py, 6 * dpr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    return;
  }
  drawPrimitiveShape(anim.kind, anim.anchors[0], previewPoint, anim.color, cw, 0.7, false, 0);
  if (anim.kind === 'circle') {
    const center = anim.anchors[0];
    const [cx, cy] = toCanvas(center.re, center.im);
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = anim.color;
    ctx.lineWidth = 1.2 * dpr;
    ctx.setLineDash([4 * dpr, 4 * dpr]);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(px, py);
    ctx.stroke();
    ctx.restore();
  }
  drawAnchorDot([px, py], anim.color, 5 * dpr);
}

function previewAnchorActivationDistance(anchors) {
  if (!anchors || anchors.length < 3) return 0;
  const last = anchors[anchors.length - 1];
  const prev = anchors[anchors.length - 2];
  const prevLen = Math.hypot(last.re - prev.re, last.im - prev.im);
  return Math.max(0.35, Math.min(1.25, prevLen * 0.25));
}

function drawTentativeFreeformExtension(anchors, segs, previewPoint, color, cw, dpr) {
  if (!previewPoint || !previewPoint.ok || !previewPoint.ok() || anchors.length === 0) return;
  const start = anchors[anchors.length - 1];
  const L = Math.hypot(previewPoint.re - start.re, previewPoint.im - start.im);
  if (L < 1e-7) return;

  let tOut = chordDir(start, previewPoint);
  const lastSeg = segs[segs.length - 1];
  if (lastSeg) tOut = tangentAtBezierEnd(start, lastSeg.h1);

  const pending = buildPendingPlacementArc(start, previewPoint, tOut, null);
  recompileSegmentRaw(pending.seg, start, previewPoint);
  ctx.save();
  ctx.globalAlpha = 0.32;
  ctx.setLineDash([4 * dpr, 4 * dpr]);
  drawCompiledCurve(pending.seg.compiled, color, cw, 1);
  ctx.restore();
}

function drawFreshFreeformPlacement(anim, previewPoint, cw, dpr) {
  const anchors = anim.anchors.map(cloneCx);
  const hasPreview = previewPoint && previewPoint.ok && previewPoint.ok();
  const last = anchors[anchors.length - 1];
  const previewDist = hasPreview && last ? Math.hypot(previewPoint.re - last.re, previewPoint.im - last.im) : Infinity;
  const includePreview = hasPreview && (!last || previewDist >= previewAnchorActivationDistance(anchors));
  const points = includePreview ? anchors.concat([cloneCx(previewPoint)]) : anchors;
  const segs = computeFreshPlacementSegments(points);
  const solidCount = Math.max(0, anchors.length - 1);

  for (let i = 0; i < segs.length; i++) {
    const seg = segs[i];
    const start = points[i], end = points[i + 1];
    if (!seg || !start || !end) continue;
    recompileSegmentRaw(seg, start, end);
    ctx.save();
    if (i >= solidCount) {
      ctx.globalAlpha = 0.4;
      ctx.setLineDash([4 * dpr, 4 * dpr]);
    } else {
      ctx.globalAlpha = 0.85;
    }
    drawCompiledCurve(seg.compiled, anim.color, cw, 1);
    ctx.restore();
  }

  for (const anchor of anchors)
    drawAnchorDot(toCanvas(anchor.re, anchor.im), anim.color, 5 * dpr);

  if (hasPreview) {
    if (!includePreview) drawTentativeFreeformExtension(anchors, segs, previewPoint, anim.color, cw, dpr);
    const [hx, hy] = toCanvas(previewPoint.re, previewPoint.im);
    ctx.beginPath(); ctx.arc(hx, hy, 6 * dpr, 0, Math.PI * 2);
    ctx.strokeStyle = anim.color; ctx.lineWidth = 2 * dpr;
    ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;
  }
}

function includeCanvasPoint(bounds, pt) {
  if (!pt || !isFinite(pt[0]) || !isFinite(pt[1])) return bounds;
  if (!bounds) return { left: pt[0], right: pt[0], top: pt[1], bottom: pt[1] };
  bounds.left = Math.min(bounds.left, pt[0]);
  bounds.right = Math.max(bounds.right, pt[0]);
  bounds.top = Math.min(bounds.top, pt[1]);
  bounds.bottom = Math.max(bounds.bottom, pt[1]);
  return bounds;
}

function selectedObjectCanvasBounds(anim) {
  if (!anim || !anim.visible || anim.inPlacementMode) return null;

  if (isPrimitiveAnim(anim)) {
    if (anim.anchors.length < 2) return null;
    let bounds = null;
    for (const pt of samplePrimitiveBoundaryMath(anim)) {
      bounds = includeCanvasPoint(bounds, toCanvas(pt.re, pt.im));
    }
    return bounds;
  }

  if (anim.anchors.length === 1 && anim.segments.length === 0) {
    const [x, y] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
    const r = dotRadius(anim);
    return { left: x - r, right: x + r, top: y - r, bottom: y + r };
  }

  let bounds = null;
  for (const seg of anim.segments) {
    if (!seg || !seg.compiled) continue;
    for (const pt of sampleCompiledAdaptive(seg.compiled)) {
      bounds = includeCanvasPoint(bounds, pt);
    }
  }
  if (!bounds) {
    for (const anchor of anim.anchors) bounds = includeCanvasPoint(bounds, toCanvas(anchor.re, anchor.im));
  }
  return bounds;
}

function includeMathPoint(bounds, pt) {
  if (!pt || !pt.ok || !pt.ok()) return bounds;
  if (!bounds) return { left: pt.re, right: pt.re, bottom: pt.im, top: pt.im };
  bounds.left = Math.min(bounds.left, pt.re);
  bounds.right = Math.max(bounds.right, pt.re);
  bounds.bottom = Math.min(bounds.bottom, pt.im);
  bounds.top = Math.max(bounds.top, pt.im);
  return bounds;
}

function objectMathBounds(anim) {
  if (!anim || !anim.visible || anim.inPlacementMode) return null;

  if (isPrimitiveAnim(anim)) {
    let bounds = null;
    for (const pt of samplePrimitiveBoundaryMath(anim)) bounds = includeMathPoint(bounds, pt);
    return bounds;
  }

  if (isDotAnim(anim)) {
    const center = anim.anchors[0];
    const r = dotRadius(anim) / Math.max(scale, 1e-9);
    return { left: center.re - r, right: center.re + r, bottom: center.im - r, top: center.im + r };
  }

  let bounds = null;
  for (const seg of anim.segments) {
    if (!seg || !seg.compiled) continue;
    for (const pt of sampleCompiledAdaptive(seg.compiled)) {
      const [mx, my] = toMath(pt[0], pt[1]);
      bounds = includeMathPoint(bounds, new Cx(mx, my));
    }
  }
  if (!bounds) {
    for (const anchor of anim.anchors) bounds = includeMathPoint(bounds, anchor);
  }
  return bounds;
}

function selectionFrameMetrics(anim) {
  const bounds = selectedObjectCanvasBounds(anim);
  if (!bounds) return null;
  const dpr = devicePixelRatio;
  const lineWidth = isPrimitiveAnim(anim) ? primitiveStrokeWidth(anim) : (1 + 5 * (anim.thickness / 10)) * dpr;
  const pad = 10 * dpr + lineWidth * 0.5;
  const x = bounds.left - pad;
  const y = bounds.top - pad;
  const w = Math.max(1, bounds.right - bounds.left + pad * 2);
  const h = Math.max(1, bounds.bottom - bounds.top + pad * 2);
  const outerPad = 4 * dpr;
  return {
    x, y, w, h,
    outerX: x - outerPad,
    outerY: y - outerPad,
    outerW: w + outerPad * 2,
    outerH: h + outerPad * 2,
    outerPad,
    extend: 5 * dpr,
  };
}

function selectionRotationWheel(anim) {
  const f = selectionFrameMetrics(anim);
  if (!f) return null;
  const cx = f.x + f.w * 0.5;
  const cy = f.y + f.h * 0.5;
  const r = Math.max(0, Math.min(f.w, f.h) * 0.25);
  return { cx, cy, r, frame: f };
}

function selectionSideActionButtons(anim) {
  const f = selectionFrameMetrics(anim);
  if (!f) return [];
  const dpr = devicePixelRatio;
  const w = 38 * dpr;
  const h = 22 * dpr;
  const gap = 5 * dpr;
  const rightEdge = f.outerX + f.outerW + f.extend;
  const topEdge = f.outerY - f.extend;
  const x = rightEdge + 7 * dpr;
  const y = topEdge + 12 * dpr;
  return [
    { kind: 'duplicate', x, y, w, h },
    { kind: 'reflect', x, y: y + h + gap, w, h },
  ];
}

function pointInRect(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

function querySideActionButtonHover(cx, cy) {
  const anim = animations.find(a => a.id === selectedId);
  if (!anim || !anim.visible || anim.inPlacementMode) return null;
  for (const btn of selectionSideActionButtons(anim)) {
    if (pointInRect(cx, cy, btn)) return { anim, kind: btn.kind };
  }
  return null;
}

function selectionResizeSegments(anim) {
  const f = selectionFrameMetrics(anim);
  if (!f) return [];
  const { x, y, w, h, outerX, outerY, outerW, outerH, extend } = f;
  return [
    { handle: 'nw', from: [x, y], to: [outerX - extend, outerY - extend] },
    { handle: 'ne', from: [x + w, y], to: [outerX + outerW + extend, outerY - extend] },
    { handle: 'se', from: [x + w, y + h], to: [outerX + outerW + extend, outerY + outerH + extend] },
    { handle: 'sw', from: [x, y + h], to: [outerX - extend, outerY + outerH + extend] },
    { handle: 'n', from: [x + w * 0.5, y], to: [outerX + outerW * 0.5, outerY - extend] },
    { handle: 'e', from: [x + w, y + h * 0.5], to: [outerX + outerW + extend, outerY + outerH * 0.5] },
    { handle: 's', from: [x + w * 0.5, y + h], to: [outerX + outerW * 0.5, outerY + outerH + extend] },
    { handle: 'w', from: [x, y + h * 0.5], to: [outerX - extend, outerY + outerH * 0.5] },
  ];
}

function resizeCursorForHandle(handle) {
  if (handle === 'n' || handle === 's') return 'ns-resize';
  if (handle === 'e' || handle === 'w') return 'ew-resize';
  if (handle === 'nw' || handle === 'se') return 'nwse-resize';
  if (handle === 'ne' || handle === 'sw') return 'nesw-resize';
  return 'grab';
}

function queryResizeHandleHover(cx, cy) {
  const anim = animations.find(a => a.id === selectedId);
  if (!anim || !anim.visible || anim.inPlacementMode || isDotAnim(anim)) return null;
  const threshold = 8 * devicePixelRatio;
  let best = null, bestDist = Infinity;
  for (const seg of selectionResizeSegments(anim)) {
    const dist = distPointToSegmentPx(cx, cy, seg.from[0], seg.from[1], seg.to[0], seg.to[1]);
    if (dist <= threshold && dist < bestDist) {
      bestDist = dist;
      best = { anim, handle: seg.handle };
    }
  }
  return best;
}

function queryRotationWheelHover(cx, cy) {
  const anim = animations.find(a => a.id === selectedId);
  if (!anim || !anim.visible || anim.inPlacementMode || isDotAnim(anim)) return null;
  const wheel = selectionRotationWheel(anim);
  if (!wheel || wheel.r < 4 * devicePixelRatio) return null;
  const threshold = 8 * devicePixelRatio;
  const d = Math.hypot(cx - wheel.cx, cy - wheel.cy);
  return Math.abs(d - wheel.r) <= threshold ? { anim } : null;
}

function cloneResizeSeg(seg) {
  return seg ? { h0: cloneCx(seg.h0), h1: cloneCx(seg.h1), eccentricity: seg.eccentricity } : null;
}

function transformPointInBounds(pt, fromBounds, toBounds) {
  const w0 = fromBounds.right - fromBounds.left;
  const h0 = fromBounds.top - fromBounds.bottom;
  const re = Math.abs(w0) < 1e-9
    ? fromBounds.left
    : toBounds.left + (pt.re - fromBounds.left) * (toBounds.right - toBounds.left) / w0;
  const im = Math.abs(h0) < 1e-9
    ? fromBounds.bottom
    : toBounds.bottom + (pt.im - fromBounds.bottom) * (toBounds.top - toBounds.bottom) / h0;
  return new Cx(re, im);
}

function boundsFromEdges(ax, bx, ay, by) {
  return {
    left: Math.min(ax, bx),
    right: Math.max(ax, bx),
    bottom: Math.min(ay, by),
    top: Math.max(ay, by),
  };
}

function resizeBoundsForCursor(drag, mathX, mathY) {
  const b = drag.origBounds;
  const dx = mathX - drag.startMathX;
  const dy = mathY - drag.startMathY;
  const h = drag.handle;

  if (h.length === 1) {
    const next = { ...b };
    if (h === 'e') next.right = Math.max(next.left, softSnap(b.right + dx));
    if (h === 'w') next.left = Math.min(next.right, softSnap(b.left + dx));
    if (h === 'n') next.top = Math.max(next.bottom, softSnap(b.top + dy));
    if (h === 's') next.bottom = Math.min(next.top, softSnap(b.bottom + dy));
    return next;
  }

  const movingEast = h.includes('e');
  const movingNorth = h.includes('n');
  const fixedX = movingEast ? b.left : b.right;
  const fixedY = movingNorth ? b.bottom : b.top;
  const origX = movingEast ? b.right : b.left;
  const origY = movingNorth ? b.top : b.bottom;
  const candX = softSnap(origX + dx);
  const candY = softSnap(origY + dy);
  const origW = Math.abs(origX - fixedX);
  const origH = Math.abs(origY - fixedY);
  const signX = Math.sign(origX - fixedX) || 1;
  const signY = Math.sign(origY - fixedY) || 1;

  let scaleFactor = 0;
  if (origW < 1e-9 && origH < 1e-9) {
    scaleFactor = 0;
  } else if (origW < 1e-9) {
    scaleFactor = Math.max(0, signY * (candY - fixedY) / origH);
  } else if (origH < 1e-9) {
    scaleFactor = Math.max(0, signX * (candX - fixedX) / origW);
  } else {
    const sx = signX * (candX - fixedX) / origW;
    const sy = signY * (candY - fixedY) / origH;
    const relX = Math.abs((candX - origX) / origW);
    const relY = Math.abs((candY - origY) / origH);
    scaleFactor = Math.max(0, relX >= relY ? sx : sy);
  }

  const nextX = fixedX + signX * origW * scaleFactor;
  const nextY = fixedY + signY * origH * scaleFactor;
  return boundsFromEdges(fixedX, nextX, fixedY, nextY);
}

function applyResizeBounds(drag, nextBounds) {
  const { anim, origKind, origBounds, origAnchors, origSegs } = drag;

  if (origKind === 'circle' || origKind === 'ellipse') {
    const cx = (nextBounds.left + nextBounds.right) * 0.5;
    const cy = (nextBounds.bottom + nextBounds.top) * 0.5;
    const rx = Math.max(0, (nextBounds.right - nextBounds.left) * 0.5);
    const ry = Math.max(0, (nextBounds.top - nextBounds.bottom) * 0.5);
    const isCircle = Math.abs(rx - ry) <= 1e-7;
    anim.kind = isCircle ? 'circle' : 'ellipse';
    anim.rotation = drag.origRotation ?? animRotation(anim);
    anim.anchors[0] = new Cx(cx, cy);
    anim.anchors[1] = isCircle ? new Cx(cx + rx, cy) : new Cx(cx + rx, cy + ry);
    return;
  }

  anim.kind = origKind;
  anim.rotation = drag.origRotation ?? animRotation(anim);
  anim.anchors = origAnchors.map(pt => transformPointInBounds(pt, origBounds, nextBounds));
  anim.segments = origSegs.map(seg => seg ? ({
    h0: transformPointInBounds(seg.h0, origBounds, nextBounds),
    h1: transformPointInBounds(seg.h1, origBounds, nextBounds),
    eccentricity: seg.eccentricity,
    compiled: null,
    compiledRef: null,
  }) : null);
  if (!isPrimitiveAnim(anim)) recompileAnim(anim);
}

function rotationCenterForAnim(anim) {
  const bounds = selectedObjectCanvasBounds(anim);
  if (!bounds) return null;
  const [mx, my] = toMath((bounds.left + bounds.right) * 0.5, (bounds.top + bounds.bottom) * 0.5);
  return new Cx(mx, my);
}

function applyRotationDelta(drag, delta) {
  const { anim, center, origRotation, origAnchors, origSegs } = drag;
  const kind = animKind(anim);
  if (isPrimitiveAnim(anim) && (kind === 'rectangle' || kind === 'circle' || kind === 'ellipse')) {
    anim.rotation = origRotation + delta;
    return;
  }

  anim.rotation = origRotation;
  anim.anchors = origAnchors.map(pt => rotateMathPoint(pt, center, delta));
  if (!isPrimitiveAnim(anim)) {
    anim.segments = origSegs.map(seg => seg ? ({
      h0: rotateMathPoint(seg.h0, center, delta),
      h1: rotateMathPoint(seg.h1, center, delta),
      eccentricity: seg.eccentricity,
      compiled: null,
      compiledRef: null,
    }) : null);
    recompileAnim(anim);
  }
}

function drawSelectionSideActionButton(btn, active) {
  const dpr = devicePixelRatio;
  const midX = btn.x + btn.w * 0.5;
  const midY = btn.y + btn.h * 0.5;
  const cellL = btn.x + btn.w * 0.25;
  const cellR = btn.x + btn.w * 0.75;

  ctx.save();
  ctx.fillStyle = '#11111b';
  ctx.globalAlpha = active ? 0.92 : 0.78;
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);

  ctx.globalAlpha = active ? 0.78 : 0.56;
  ctx.strokeStyle = active ? CANVAS_TOOL_COLOR : CANVAS_CONTROL_IDLE_COLOR;
  ctx.lineWidth = (active ? 1.4 : 1) * dpr;
  ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);

  ctx.globalAlpha = active ? 0.62 : 0.4;
  ctx.beginPath();
  ctx.moveTo(midX, btn.y + 3 * dpr);
  ctx.lineTo(midX, btn.y + btn.h - 3 * dpr);
  ctx.stroke();

  ctx.globalAlpha = active ? 0.9 : 0.7;
  ctx.fillStyle = active ? CANVAS_TOOL_COLOR : CANVAS_CONTROL_IDLE_COLOR;
  ctx.font = `700 ${12 * dpr}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('R', cellL, midY + 0.5 * dpr);
  if (btn.kind === 'reflect') {
    ctx.translate(cellR, midY + 0.5 * dpr);
    ctx.scale(-1, 1);
    ctx.fillText('R', 0, 0);
  } else {
    ctx.fillText('R', cellR, midY + 0.5 * dpr);
  }
  ctx.restore();
}

function drawSelectionSideActionButtons(anim) {
  for (const btn of selectionSideActionButtons(anim)) {
    const active = sideActionHover?.anim === anim && sideActionHover?.kind === btn.kind;
    drawSelectionSideActionButton(btn, active);
  }
}

function drawSelectedObjectBounds(anim) {
  if (selectedId !== anim.id && editModeAnimId !== anim.id) return;
  const frame = selectionFrameMetrics(anim);
  if (!frame) return;

  const dpr = devicePixelRatio;
  const { x, y, w, h, outerX, outerY, outerW, outerH, extend } = frame;

  ctx.save();
  ctx.fillStyle = CANVAS_TOOL_COLOR;
  ctx.globalAlpha = 0.05;
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = CANVAS_TOOL_COLOR;
  ctx.lineWidth = 1.25 * dpr;
  ctx.globalAlpha = 0.48;
  ctx.shadowBlur = 8 * dpr;
  ctx.shadowColor = CANVAS_TOOL_COLOR;
  ctx.strokeRect(x, y, w, h);

  ctx.lineWidth = 0.9 * dpr;
  ctx.globalAlpha = 0.26;
  ctx.strokeRect(outerX, outerY, outerW, outerH);

  ctx.lineWidth = 2 * dpr;
  ctx.globalAlpha = 0.3;
  ctx.strokeRect(outerX - extend, outerY - extend, outerW + extend * 2, outerH + extend * 2);

  const midX = x + w * 0.5;
  const midY = y + h * 0.5;
  ctx.shadowBlur = 0;
  ctx.lineWidth = 2 * dpr;
  ctx.globalAlpha = 0.32;
  ctx.beginPath();
  ctx.moveTo(x, midY);
  ctx.lineTo(x + w, midY);
  ctx.moveTo(midX, y);
  ctx.lineTo(midX, y + h);
  ctx.stroke();

  const wheel = selectionRotationWheel(anim);
  const wheelActive = rotateDrag?.anim === anim || rotateHover?.anim === anim;
  if (wheel && wheel.r > 0) {
    ctx.strokeStyle = wheelActive ? CANVAS_TOOL_COLOR : CANVAS_CONTROL_IDLE_COLOR;
    ctx.lineWidth = (wheelActive ? 2.4 : 1.4) * dpr;
    ctx.globalAlpha = wheelActive ? 0.62 : 0.48;
    ctx.shadowBlur = wheelActive ? 6 * dpr : 0;
    ctx.shadowColor = CANVAS_TOOL_COLOR;
    ctx.beginPath();
    ctx.arc(wheel.cx, wheel.cy, wheel.r, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
  ctx.strokeStyle = (resizeDrag?.anim === anim || resizeHover?.anim === anim) ? CANVAS_TOOL_COLOR : CANVAS_CONTROL_IDLE_COLOR;
  ctx.beginPath();
  for (const seg of selectionResizeSegments(anim)) {
    ctx.moveTo(seg.from[0], seg.from[1]);
    ctx.lineTo(seg.to[0], seg.to[1]);
  }
  ctx.lineWidth = 1.8 * dpr;
  ctx.globalAlpha = (resizeDrag?.anim === anim || resizeHover?.anim === anim) ? 0.62 : 0.52;
  ctx.stroke();
  drawSelectionSideActionButtons(anim);
  ctx.restore();
}

function drawAnimations() {
  drawGrid();
  const dpr = devicePixelRatio;

  // Hover glow under hovered segment
  if (segmentHover && segmentHover.anim.visible) {
    if (isPrimitiveAnim(segmentHover.anim)) {
      drawPrimitive(segmentHover.anim, 8 * dpr, 0.22);
    } else {
      const seg = segmentHover.anim.segments[segmentHover.segIdx];
      if (seg && seg.compiled) {
        const cw = (1 + 5 * (segmentHover.anim.thickness / 10)) * dpr;
        drawCompiledCurve(seg.compiled, segmentHover.anim.color, cw + 8 * dpr, 0.22);
      }
    }
  }

  // Selected-arc glow
  for (const anim of animations) {
    if (!anim.visible || editModeAnimId !== anim.id) continue;
    if (isPrimitiveAnim(anim)) {
      drawPrimitive(anim, 6 * dpr, 0.16);
      continue;
    }
    if (!anim.activeSegments || anim.activeSegments.size !== 1) continue;
    const [segIdx] = [...anim.activeSegments];
    const seg = anim.segments[segIdx];
    if (!seg || !seg.compiled) continue;
    const cw = (1 + 5 * (anim.thickness / 10)) * dpr;
    drawCompiledCurve(seg.compiled, anim.color, cw + 6 * dpr, 0.16);
  }

  for (const anim of animations) {
    if (!anim.visible) continue;

    const inEditMode = (editModeAnimId === anim.id);

    if (anim.inPlacementMode) {
      if (isPrimitiveAnim(anim)) {
        drawPrimitivePlacement(anim, placementPreviewPos);
        continue;
      }
      const n = anim.anchors.length;
      const hasPreview = placementPreviewPos && placementPreviewPos.ok();
      const cw = (1 + 5 * (anim.thickness / 10)) * dpr;
      const isExt = anim.extensionAnchorIdx != null;

      if (!isExt) {
        drawFreshFreeformPlacement(anim, placementPreviewPos, cw, dpr);
        continue;
      }

      // Draw all committed arcs and anchor dots
      for (let i = 0; i < anim.segments.length; i++) drawSegment(anim, i);
      for (const anchor of anim.anchors)
        drawAnchorDot(toCanvas(anchor.re, anchor.im), anim.color, 5 * dpr);

      if (hasPreview) {
        const cursor = placementPreviewPos;
        const [hx, hy] = toCanvas(cursor.re, cursor.im);

        if (n === 0) {
          ctx.beginPath(); ctx.arc(hx, hy, 6*dpr, 0, Math.PI*2);
          ctx.strokeStyle = anim.color; ctx.lineWidth = 2*dpr;
          ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;

        } else if (n === 1) {
          const [ax, ay] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
          ctx.save(); ctx.globalAlpha = 0.5; ctx.strokeStyle = anim.color;
          ctx.lineWidth = cw; ctx.setLineDash([4*dpr, 4*dpr]);
          ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(hx, hy); ctx.stroke();
          ctx.setLineDash([]); ctx.restore();
          ctx.beginPath(); ctx.arc(hx, hy, 6*dpr, 0, Math.PI*2);
          ctx.strokeStyle = anim.color; ctx.lineWidth = 2*dpr;
          ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;

        } else if (isExt) {
          // Extension: preview arc from current end anchor to cursor
          const endIdx = anim.extensionForward
            ? anim.extensionInsertAt - 1 : anim.extensionInsertAt;
          const src = anim.anchors[endIdx];
          if (src && anim.tContinuation) {
            const tOut = anim.extensionForward ? anim.tContinuation
              : reflectOverChord(anim.tContinuation, src, cursor);
            const cd = chordDir(src, cursor);
            const dotV = tOut.re*cd.re + tOut.im*cd.im;
            const tIn = new Cx(2*dotV*cd.re - tOut.re, 2*dotV*cd.im - tOut.im);
            const f = turnHandleFactor(src, cursor, tIn);
            const prevSeg = bisectorArc(src, cursor, tOut, tIn, f);
            recompileSegmentRaw(prevSeg, src, cursor);
            ctx.save(); ctx.globalAlpha = 0.4; ctx.setLineDash([4*dpr, 4*dpr]);
            drawCompiledCurve(prevSeg.compiled, anim.color, cw, 1);
            ctx.setLineDash([]); ctx.restore();
          }
          ctx.beginPath(); ctx.arc(hx, hy, 6*dpr, 0, Math.PI*2);
          ctx.strokeStyle = anim.color; ctx.lineWidth = 2*dpr;
          ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;

        } else {
          // Fresh placement, n >= 2: pending arc (solid) + preview next arc (dashed)
          const p_prev = anim.anchors[n-2], p_end = anim.anchors[n-1];

          // The pending arc starts as a free end, then smoothly admits the next point.
          const pending = buildPendingPlacementArc(p_prev, p_end, anim.tContinuation, cursor);
          const t_end = pending.tIn;
          const pendSeg = pending.seg;
          recompileSegmentRaw(pendSeg, p_prev, p_end);
          ctx.save(); ctx.globalAlpha = 0.85;
          drawCompiledCurve(pendSeg.compiled, anim.color, cw, 1);
          ctx.restore();

          // Preview arc P_{n-1}→cursor: symmetric (reflect t_end over chord)
          const cd = chordDir(p_end, cursor);
          const dotV = t_end.re*cd.re + t_end.im*cd.im;
          const t_cursor = new Cx(2*dotV*cd.re - t_end.re, 2*dotV*cd.im - t_end.im);
          const f_prev = turnHandleFactor(p_end, cursor, t_cursor);
          const prevSeg = bisectorArc(p_end, cursor, t_end, t_cursor, f_prev);
          recompileSegmentRaw(prevSeg, p_end, cursor);
          ctx.save(); ctx.globalAlpha = 0.4; ctx.setLineDash([4*dpr, 4*dpr]);
          drawCompiledCurve(prevSeg.compiled, anim.color, cw, 1);
          ctx.setLineDash([]); ctx.restore();

          ctx.beginPath(); ctx.arc(hx, hy, 6*dpr, 0, Math.PI*2);
          ctx.strokeStyle = anim.color; ctx.lineWidth = 2*dpr;
          ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;
        }
      }
      continue;
    }

    if (isPrimitiveAnim(anim)) {
      drawPrimitive(anim);
      drawSelectedObjectBounds(anim);
      continue;
    }
    if (anim.anchors.length === 1 && anim.segments.length === 0) drawDot(anim);
    for (let i = 0; i < anim.segments.length; i++) drawSegment(anim, i);
    drawSelectedObjectBounds(anim);
    if (inEditMode) drawHandles(anim);
  }

  // Rubber-band selection rectangle
  if (rubberBand) {
    const dpr = devicePixelRatio;
    const x0 = Math.min(rubberBand.startX, rubberBand.curX);
    const y0 = Math.min(rubberBand.startY, rubberBand.curY);
    const w  = Math.abs(rubberBand.curX - rubberBand.startX);
    const h  = Math.abs(rubberBand.curY - rubberBand.startY);
    if (w > 2 || h > 2) {
      ctx.save();
      ctx.strokeStyle = '#cba6f7'; ctx.lineWidth = 1 * dpr;
      ctx.setLineDash([4*dpr, 4*dpr]); ctx.globalAlpha = 0.7;
      ctx.strokeRect(x0, y0, w, h);
      ctx.fillStyle = '#cba6f7'; ctx.globalAlpha = 0.07;
      ctx.fillRect(x0, y0, w, h);
      ctx.restore();
    }
  }
}  // end drawAnimations

// Called during anchor/handle drag to keep inputs current
function updateSidebarInputs(anim) {
  const row = document.querySelector(`[data-anim-id="${anim.id}"]`);
  if (!row) return;
  anim.anchors.forEach((anchor, i) => {
    row.querySelectorAll(`[data-anchor-loc="${i}"]`).forEach(inp => {
      if (document.activeElement !== inp) inp.value = formatCx(anchor);
    });
  });
  anim.segments.forEach((seg, i) => {
    if (!seg) return;
    const h0inp = row.querySelector(`[data-seg-h0="${i}"]`);
    const h1inp = row.querySelector(`[data-seg-h1="${i}"]`);
    if (h0inp && document.activeElement !== h0inp) h0inp.value = formatCx(seg.h0);
    if (h1inp && document.activeElement !== h1inp) h1inp.value = formatCx(seg.h1);
  });
}

const SVG_NS = 'http://www.w3.org/2000/svg';

function makeSvgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [key, val] of Object.entries(attrs)) el.setAttribute(key, val);
  return el;
}

function objectIconKind(anim) {
  return isPrimitiveAnim(anim) ? anim.kind : 'freeform';
}

function makeObjectIcon(kind, className = 'anim-kind-icon') {
  const svg = makeSvgEl('svg', { viewBox: '0 0 24 24', class: className, 'aria-hidden': 'true' });
  if (kind === 'line') {
    svg.append(
      makeSvgEl('line', { x1: 6, y1: 18, x2: 18, y2: 6 }),
      makeSvgEl('circle', { cx: 6, cy: 18, r: 1.7 }),
      makeSvgEl('circle', { cx: 18, cy: 6, r: 1.7 })
    );
  } else if (kind === 'rectangle') {
    svg.appendChild(makeSvgEl('rect', { x: 5, y: 6, width: 14, height: 12, rx: 0 }));
  } else if (kind === 'circle') {
    svg.appendChild(makeSvgEl('circle', { cx: 12, cy: 12, r: 7 }));
  } else if (kind === 'ellipse') {
    svg.appendChild(makeSvgEl('ellipse', { cx: 12, cy: 12, rx: 7, ry: 5 }));
  } else {
    svg.appendChild(makeSvgEl('path', { d: 'M4 15.5c2.6-7.2 5.6 6.1 8.7-1.7 1.3-3.3 3.5-4.5 7-3.2' }));
  }
  return svg;
}

function makeVisibilityIcon(visible) {

      makeSvgEl('path', { d: 'M14.1 17.2a8.6 8.6 0 0 1-2.1.3C6.7 17.5 3.5 12 3.5 12a15 15 0 0 1 3-3.4' })
    );
