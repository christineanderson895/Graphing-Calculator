  const wheelWrap = document.createElement('div');
  wheelWrap.className = 'hue-wheel-wrap';
  const hueWheel = document.createElement('canvas');
  hueWheel.className = 'hue-wheel';
  hueWheel.setAttribute('aria-label', 'Hue');
  hueWheel.setAttribute('role', 'slider');
  hueWheel.tabIndex = 0;
  let hueDragActive = false;
  let lightnessControl = null;
  let saturationControl = null;
  function setHueFromPointer(e, fromClick = false) {
    const next = wheelPointToHuePercent(hueWheel, e.clientX, e.clientY);
    if (huePercentDistance(state.huePercent, next) <= 0.05) {
      if (fromClick && options.forceActiveHueClick) applyColor(true);
      return;
    }
    state.huePercent = next;
    applyColor(fromClick);
  }
  hueWheel.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    hueDragActive = true;
    hueWheel.setPointerCapture?.(e.pointerId);
    if (options.withUndo) pushUndo();
    setHueFromPointer(e, true);
  });
  hueWheel.addEventListener('pointermove', e => {
    if (!hueDragActive) return;
    e.preventDefault();
    setHueFromPointer(e, false);
  });
  const endHueDrag = e => {
    hueDragActive = false;
    hueWheel.releasePointerCapture?.(e.pointerId);
  };
  hueWheel.addEventListener('pointerup', endHueDrag);
  hueWheel.addEventListener('pointercancel', endHueDrag);
  hueWheel.addEventListener('keydown', e => {
    if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight' && e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
    e.preventDefault();
    if (options.withUndo) pushUndo();
    const delta = e.key === 'ArrowLeft' || e.key === 'ArrowDown' ? -1 : 1;
    state.huePercent = Math.round((state.huePercent + delta + 101) % 101);
    applyColor(false);
  });
  wheelWrap.appendChild(hueWheel);
  parent.appendChild(wheelWrap);

  const previewRow = document.createElement('div');
  previewRow.className = 'color-preview-row';
  const preview = document.createElement('div');
  preview.className = 'color-preview-box';
  const previewValue = document.createElement('div');
  previewValue.className = 'color-preview-value';
  previewRow.append(preview, previewValue);
  parent.appendChild(previewRow);

  lightnessControl = appendColorSliderControl(parent, 'Lightness', state.lightness, value => {
    state.lightness = Math.round(value);
    applyColor(false);
  }, { withUndo: !!options.withUndo, colorTrack: lightnessSliderTrack(huePercentToAngle(state.huePercent), state.saturation) });
  saturationControl = appendColorSliderControl(parent, 'Saturation', state.saturation, value => {
    state.saturation = Math.round(value);
    applyColor(false);
  }, { withUndo: !!options.withUndo, colorTrack: saturationSliderTrack(huePercentToAngle(state.huePercent), state.lightness) });

  function currentHex() {
    return hslToHex(huePercentToAngle(state.huePercent), state.saturation, state.lightness);
  }

  function refresh() {
    const hex = currentHex();
    const hue = huePercentToAngle(state.huePercent);
    drawHueWheel(hueWheel, state.huePercent);
    hueWheel.setAttribute('aria-valuemin', '0');
    hueWheel.setAttribute('aria-valuemax', '100');
    hueWheel.setAttribute('aria-valuenow', String(Math.round(state.huePercent)));
    hueWheel.setAttribute('aria-valuetext', `${Math.round(hue)} degrees`);
    lightnessControl?.setTrack(lightnessSliderTrack(hue, state.saturation));
    saturationControl?.setTrack(saturationSliderTrack(hue, state.lightness));
    preview.style.background = hex;
    previewValue.textContent = hex.toUpperCase();
    options.onPreviewChange?.(hex);
  }

  function applyColor(fromHueClick) {
    const hex = currentHex();
    refresh();
    onChange(hex, { fromHueClick });
  }

  refresh();
  requestAnimationFrame(() => drawHueWheel(hueWheel, state.huePercent));
}

let _gradIconId = 0;

function makeFillStyleIcon(style) {
  const svg = makeSvgEl('svg', { viewBox: '0 0 24 24', 'aria-hidden': 'true' });
  const rect = makeSvgEl('rect', { x: 4, y: 4, width: 16, height: 16, rx: 0 });
  if (style === 'solid') {
    rect.setAttribute('style', 'fill:currentColor;stroke:currentColor;');
    svg.appendChild(rect);
    return svg;
  }
  if (style === 'gradient') {
    const uid = 'gfi' + (++_gradIconId);
    const defs = makeSvgEl('defs');
    const grad = makeSvgEl('linearGradient', { id: uid, x1: '0%', y1: '50%', x2: '100%', y2: '50%' });
    grad.appendChild(makeSvgEl('stop', { offset: '0%', style: 'stop-color:currentColor;stop-opacity:1' }));
    grad.appendChild(makeSvgEl('stop', { offset: '100%', style: 'stop-color:currentColor;stop-opacity:0' }));
    defs.appendChild(grad); svg.appendChild(defs);
    rect.setAttribute('style', `fill:url(#${uid});stroke:currentColor;`);
    svg.appendChild(rect);
    return svg;
  }
  svg.appendChild(rect);
  const addLine = (x1, y1, x2, y2) => svg.appendChild(makeSvgEl('line', { x1, y1, x2, y2 }));
  if (style === 'circular') {
    svg.appendChild(makeSvgEl('circle', { cx: 12, cy: 12, r: 3 }));
    svg.appendChild(makeSvgEl('circle', { cx: 12, cy: 12, r: 6 }));
    svg.appendChild(makeSvgEl('circle', { cx: 12, cy: 12, r: 9 }));
    return svg;
  }
  if (style === 'radial') {
    addLine(12, 12, 12, 5); addLine(12, 12, 19, 12);
    addLine(12, 12, 12, 19); addLine(12, 12, 5, 12);
    addLine(12, 12, 17, 7); addLine(12, 12, 17, 17);
    addLine(12, 12, 7, 17); addLine(12, 12, 7, 7);
    svg.appendChild(makeSvgEl('circle', { cx: 12, cy: 12, r: 1.4, style: 'fill:currentColor;stroke:none;' }));
    return svg;
  }
  if (style === 'horizontal' || style === 'cross') {
    addLine(5, 8, 19, 8); addLine(5, 12, 19, 12); addLine(5, 16, 19, 16);
  }
  if (style === 'vertical' || style === 'cross') {
    addLine(8, 5, 8, 19); addLine(12, 5, 12, 19); addLine(16, 5, 16, 19);
  }
  if (style === 'diagDown' || style === 'diagCross') {
    addLine(4, 7, 17, 20); addLine(4, 13, 11, 20); addLine(10, 4, 20, 14);
  }
  if (style === 'diagUp' || style === 'diagCross') {
    addLine(4, 17, 17, 4); addLine(4, 11, 11, 4); addLine(10, 20, 20, 10);
  }
  return svg;
}

function appendSliderRow(parent, labelText, min, max, step, value, formatValue, onInput, disabled = false, options = {}) {
  const row = document.createElement('div');
  row.className = 'tree-slider-row';
  row.style.padding = '2px 0';
  const label = document.createElement('label');
  label.textContent = labelText;
  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = min;
  slider.max = max;
  slider.step = step;
  slider.value = value;
  slider.disabled = disabled;
  if (options.colorTrack) setRangeTrack(slider, options.colorTrack);
  const valSpan = document.createElement('span');
  valSpan.className = 'tree-slider-val';
  valSpan.textContent = formatValue(value);
  slider.addEventListener('mousedown', () => { if (!slider.disabled) pushUndo(); });
  slider.addEventListener('touchstart', () => { if (!slider.disabled) pushUndo(); }, { passive: true });
  slider.addEventListener('input', () => {
    onInput(slider.value);
    valSpan.textContent = formatValue(slider.value);
    draw();
  });
  row.append(label, slider, valSpan);
  parent.appendChild(row);
  return {
    slider,
    setTrack(track) {
      setRangeTrack(slider, track);
    },
    setValue(nextValue) {
      slider.value = nextValue;
      valSpan.textContent = formatValue(slider.value);
    },
  };
}

function appendColorExpansion(parent, anim) {
  if (colorEditTarget === 'fill' && !canFillAnim(anim)) colorEditTarget = 'outline';
  const fillEnabled = canFillAnim(anim);
  const isOutline = colorEditTarget === 'outline';
  const fillActive = fillEnabled && !!animFillColor(anim);

  const root = document.createElement('div');
  root.className = 'color-expansion';
  root.addEventListener('mousedown', e => e.stopPropagation());
  root.addEventListener('click', e => e.stopPropagation());

  // ── Tab bar ──
  const tabBar = document.createElement('div');
  tabBar.className = 'color-tab-bar';

  const outlineTab = document.createElement('button');
  outlineTab.type = 'button';
  outlineTab.className = 'color-tab' + (isOutline ? ' active' : '');
  outlineTab.textContent = 'Outline';
  outlineTab.addEventListener('click', e => {
    e.stopPropagation();
    colorEditTarget = 'outline';
    openColorMenuAnimId = anim.id;
    renderAnimList();
  });

  const fillTab = document.createElement('button');
  fillTab.type = 'button';
  fillTab.className = 'color-tab' + (!isOutline ? ' active' : '');
  fillTab.textContent = 'Fill';
  fillTab.disabled = !fillEnabled;
  fillTab.addEventListener('click', e => {
    e.stopPropagation();
    if (!fillEnabled) return;
    colorEditTarget = 'fill';
    openColorMenuAnimId = anim.id;
    renderAnimList();
  });

  tabBar.append(outlineTab, fillTab);
  root.appendChild(tabBar);

  // ── Tab content panel ──
  const panel = document.createElement('div');
  panel.className = 'color-tab-content' + (!isOutline ? ' fill-active' : '');

  if (isOutline) {
    appendSliderRow(panel, 'Thickness', 1, 10, 1, anim.thickness ?? 2, v => `${Math.round(v)}`, v => {
      anim.thickness = parseInt(v, 10);
    });
  } else {
    const styleRow = document.createElement('div');
    styleRow.className = 'fill-style-row';
    if (!fillActive) styleRow.style.opacity = '0.45';
    FILL_STYLES.forEach(({ key, title }) => {
      const btn = document.createElement('button');
      btn.className = 'fill-style-btn' + (animFillStyle(anim) === key ? ' active' : '');
      btn.title = title;
      btn.disabled = !fillActive;
      btn.appendChild(makeFillStyleIcon(key));
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (!fillActive) return;
        if (animFillStyle(anim) !== key) {
          pushUndo();
          anim.fillStyle = key;
          if (key === 'gradient') ensureGradientDefaults(anim);
          saveProject();
          renderAnimList(); draw();
        }
      });
      styleRow.appendChild(btn);
    });
    panel.appendChild(styleRow);
  }

  const isGradientFill = !isOutline && animFillStyle(anim) === 'gradient';
  if (isGradientFill) ensureGradientDefaults(anim);

  const DROPPER_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l1.5-4.5L15.5 6l3 3L8 20.5z"/><path d="M18.5 6l1.5-1.5c.8-.8.8-2.2 0-3s-2.2-.8-3 0L15.5 3"/></svg>`;

  function appendDropperBtn(targetPanel, targetKey) {
    const isActive = eyedropperTarget === targetKey && eyedropperAnimId === anim.id;
    const btn = document.createElement('button');
    btn.className = 'eyedropper-btn' + (isActive ? ' active' : '');
    btn.title = isActive ? 'Click a canvas to sample color (Escape to cancel)' : 'Pick color from canvas';
    btn.innerHTML = DROPPER_SVG + (isActive ? ' Sampling…' : ' Sample color');
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (isActive) { deactivateEyedropper(); } else {
        eyedropperTarget = targetKey;
        eyedropperAnimId = anim.id;
        updateCursor();
      }
      renderAnimList();
    });
    targetPanel.appendChild(btn);
  }

  if (isGradientFill) {
    // ── Color 1 / Color 2 sub-tabs ──
    const stopTabBar = document.createElement('div');
    stopTabBar.className = 'gradient-stop-tab-bar';
    [1, 2].forEach(tab => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'gradient-stop-tab' + (gradientColorTab === tab ? ' active' : '');
      btn.textContent = `Color ${tab}`;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        gradientColorTab = tab;
        openColorMenuAnimId = anim.id;
        renderAnimList();
      });
      stopTabBar.appendChild(btn);
    });
    panel.appendChild(stopTabBar);

    if (gradientColorTab === 1) {
      const c1 = animFillColor(anim) || anim.color;
      let c1Preview = normalizeColorString(c1) || c1;
      let c1Opacity = null;
      appendHslColorPicker(panel, c1, (color, meta = {}) => {
        if (fillEnabled && !sameColor(animFillColor(anim), color)) {
          anim.fillColor = color;
          if (!anim.fillStyle) anim.fillStyle = 'solid';
        }
        saveProject();
        if (meta.fromHueClick) renderAnimList();
        draw();
      }, {
        withUndo: true,
        fallbackHue: colorToHsl(anim.color).h,
        onPreviewChange(hex) { c1Preview = hex; c1Opacity?.setTrack(opacitySliderTrack(hex)); },
      });
      c1Opacity = appendSliderRow(panel, 'Opacity', 0, 100, 1, Math.round(animFillOpacity(anim) * 100), v => `${Math.round(v)}%`, v => {
        if (!animFillColor(anim) && fillEnabled) { anim.fillColor = c1; if (!anim.fillStyle) anim.fillStyle = 'solid'; }
        anim.fillOpacity = clamp(parseFloat(v) / 100, 0, 1);
        saveProject();
      }, !fillEnabled, { colorTrack: opacitySliderTrack(c1Preview) });
      appendDropperBtn(panel, 'fill');
    } else {
      const c2Init = anim.gradientToColor || animFillColor(anim) || anim.color;
      let c2Preview = normalizeColorString(c2Init) || c2Init;
      let c2Opacity = null;
      appendHslColorPicker(panel, c2Init, (color, meta = {}) => {
        if (!sameColor(anim.gradientToColor, color)) anim.gradientToColor = color;
        saveProject();
        if (meta.fromHueClick) renderAnimList();
        draw();
      }, {
        withUndo: true,
        fallbackHue: colorToHsl(animFillColor(anim) || anim.color).h,
        onPreviewChange(hex) { c2Preview = hex; c2Opacity?.setTrack(opacitySliderTrack(hex)); },
      });
      const toOpacityVal = anim.gradientToOpacity ?? 0;
      c2Opacity = appendSliderRow(panel, 'Opacity', 0, 100, 1, Math.round(toOpacityVal * 100), v => `${Math.round(v)}%`, v => {
        anim.gradientToOpacity = clamp(parseFloat(v) / 100, 0, 1);
        saveProject();
      }, false, { colorTrack: opacitySliderTrack(c2Preview) });
      appendDropperBtn(panel, 'gradientTo');
    }
  } else {
    // ── Single color picker (outline or non-gradient fill) ──
    const activeColor = !isOutline ? (animFillColor(anim) || anim.color) : anim.color;
    let opacityPreviewColor = normalizeColorString(activeColor) || activeColor;
    let opacityControl = null;
    appendHslColorPicker(panel, activeColor, (color, meta = {}) => {
      if (!isOutline && fillEnabled) {
        if (!sameColor(animFillColor(anim), color)) {
          anim.fillColor = color;
          if (!anim.fillStyle) anim.fillStyle = 'solid';
        }
      } else if (!sameColor(anim.color, color)) {
        anim.color = color;
      }
      saveProject();
      if (meta.fromHueClick) renderAnimList();
      draw();
    }, {
      withUndo: true,
      fallbackHue: colorToHsl(anim.color).h,
      onPreviewChange(hex) {
        opacityPreviewColor = hex;
        opacityControl?.setTrack(opacitySliderTrack(hex));
      },
    });
    if (isOutline) {
      opacityControl = appendSliderRow(panel, 'Opacity', 0, 100, 1, Math.round(animOutlineOpacity(anim) * 100), v => `${Math.round(v)}%`, v => {
        anim.outlineOpacity = clamp(parseFloat(v) / 100, 0, 1);
        saveProject();
      }, false, { colorTrack: opacitySliderTrack(opacityPreviewColor) });
    } else {
      opacityControl = appendSliderRow(panel, 'Opacity', 0, 100, 1, Math.round(animFillOpacity(anim) * 100), v => `${Math.round(v)}%`, v => {
        if (!animFillColor(anim) && fillEnabled) {
          anim.fillColor = activeColor;
          if (!anim.fillStyle) anim.fillStyle = 'solid';
        }
        anim.fillOpacity = clamp(parseFloat(v) / 100, 0, 1);
        saveProject();
      }, !fillEnabled, { colorTrack: opacitySliderTrack(opacityPreviewColor) });
    }
    appendDropperBtn(panel, colorEditTarget);
  }

  root.appendChild(panel);
  parent.appendChild(root);
}

function renderAnimThumbnail(anim, canvasEl, size = 48) {
  const dpr = window.devicePixelRatio || 1;
  const PX = size * dpr;
  canvasEl.width = PX; canvasEl.height = PX;
  const tctx = canvasEl.getContext('2d');
  tctx.clearRect(0, 0, PX, PX);
  const color = anim.color || '#cdd6f4';

  // Collect math-space sample points
  const mathPts = [];
  const addPt = (re, im) => { if (isFinite(re) && isFinite(im)) mathPts.push([re, im]); };

  if (isTextAnim(anim)) {
    const lines = textLines(anim);
    const hasText = lines.some(line => line.trim().length > 0);
    const displayLines = hasText ? lines : ['T'];
    const basePx = hasText ? Math.max(1, anim.fontSize ?? 36) : 36;
    const baseLineHeight = basePx * 1.2;
    tctx.save();
    tctx.font = `${hasText ? 600 : 700} ${basePx}px ${hasText ? 'sans-serif' : 'Georgia, serif'}`;
    let textW = 1;
    for (const line of displayLines) textW = Math.max(textW, tctx.measureText(line || ' ').width);
    const textH = Math.max(baseLineHeight, displayLines.length * baseLineHeight);
    const pad = 5 * dpr;
    const fit = Math.min((PX - 2 * pad) / textW, (PX - 2 * pad) / textH);
    const fontPx = Math.max(4 * dpr, basePx * fit);
    const lineHeight = baseLineHeight * fit;
    tctx.font = `${hasText ? 600 : 700} ${fontPx}px ${hasText ? 'sans-serif' : 'Georgia, serif'}`;
    tctx.textAlign = 'center';
    tctx.textBaseline = 'middle';
    tctx.lineJoin = 'round';
    tctx.lineCap = 'round';
    tctx.translate(PX / 2, PX / 2);
    tctx.rotate(-animRotation(anim));
    tctx.transform(1, textShearY(anim), textShearX(anim), 1, 0, 0);
    tctx.scale(textScaleX(anim), textScaleY(anim));
    const startY = -(displayLines.length - 1) * lineHeight * 0.5;
    const lineWidth = Math.max(0.45 * dpr, (anim.thickness ?? 1) * fit);
    if (animOutlineOpacity(anim) > 0) {
      tctx.strokeStyle = color;
      tctx.lineWidth = lineWidth;
      tctx.globalAlpha = hasText ? animOutlineOpacity(anim) : 0.8;
      displayLines.forEach((line, i) => tctx.strokeText(line || ' ', 0, startY + i * lineHeight));
    }
    const fillCol = animFillColor(anim);
    tctx.fillStyle = fillCol || color;
    tctx.globalAlpha = fillCol ? animFillOpacity(anim) : (hasText ? animOutlineOpacity(anim) : 0.8);
    displayLines.forEach((line, i) => tctx.fillText(line || ' ', 0, startY + i * lineHeight));
    tctx.restore();
    return;
  }
  if (isPrimitiveAnim(anim)) {
    anim.anchors.forEach(a => { if (a) addPt(a.re, a.im); });
    const p0 = anim.anchors[0], p1 = anim.anchors[1];
    if (anim.kind === 'circle' && p0 && p1) {
      const r = Math.hypot(p1.re - p0.re, p1.im - p0.im);
      for (let i = 0; i <= 32; i++) { const a = (i / 32) * Math.PI * 2; addPt(p0.re + r * Math.cos(a), p0.im + r * Math.sin(a)); }
    } else if (anim.kind === 'ellipse' && p0 && p1) {
      const rx = Math.abs(p1.re - p0.re), ry = Math.abs(p1.im - p0.im);
      for (let i = 0; i <= 32; i++) { const a = (i / 32) * Math.PI * 2; addPt(p0.re + rx * Math.cos(a), p0.im + ry * Math.sin(a)); }
    }
  } else {
    anim.anchors.forEach(a => { if (a) addPt(a.re, a.im); });
    for (const seg of anim.segments) {
      if (!seg || !seg.compiled) continue;
      for (let i = 0; i <= 24; i++) {
        try { const pt = seg.compiled(0, i / 24, {}); if (pt) addPt(pt.re, pt.im); } catch (_) {}
      }
    }
  }

  if (mathPts.length === 0) return;

  // Bounding box + transform
  let minRe = Infinity, maxRe = -Infinity, minIm = Infinity, maxIm = -Infinity;
  for (const [re, im] of mathPts) {
    if (re < minRe) minRe = re; if (re > maxRe) maxRe = re;
    if (im < minIm) minIm = im; if (im > maxIm) maxIm = im;
  }
  const pad = 5 * dpr;
  const rangeRe = maxRe - minRe || 1, rangeIm = maxIm - minIm || 1;
  const drawW = PX - 2 * pad, drawH = PX - 2 * pad;
  const ts = Math.min(drawW / rangeRe, drawH / rangeIm);
  const ox = pad + (drawW - rangeRe * ts) / 2;
  const oy = pad + (drawH - rangeIm * ts) / 2;
  const T = (re, im) => [ox + (re - minRe) * ts, PX - oy - (im - minIm) * ts];

  const fillCol = animFillColor(anim);
  const fillAlpha = fillCol ? animFillOpacity(anim) : 0;
  tctx.strokeStyle = color;
  tctx.lineWidth = 1.5 * dpr; tctx.lineCap = 'round'; tctx.lineJoin = 'round';

  if (isPrimitiveAnim(anim)) {
    const p0 = anim.anchors[0], p1 = anim.anchors[1];
    if (!p0 || !p1) return;
    tctx.beginPath();
    if (anim.kind === 'line') {
      const [x0,y0] = T(p0.re, p0.im), [x1,y1] = T(p1.re, p1.im);
      tctx.moveTo(x0,y0); tctx.lineTo(x1,y1);
      tctx.globalAlpha = 0.9; tctx.stroke();
    } else if (anim.kind === 'rectangle') {
      const [x0,y0] = T(Math.min(p0.re,p1.re), Math.max(p0.im,p1.im));
      const [x1,y1] = T(Math.max(p0.re,p1.re), Math.min(p0.im,p1.im));
      tctx.rect(x0, y0, x1-x0, y1-y0);
      if (fillCol) { tctx.fillStyle = fillCol; tctx.globalAlpha = fillAlpha; tctx.fill(); }
      tctx.globalAlpha = 0.9; tctx.stroke();
    } else if (anim.kind === 'circle') {
      const r = Math.hypot(p1.re-p0.re, p1.im-p0.im);
      const [cx,cy] = T(p0.re, p0.im);
      tctx.arc(cx, cy, r * ts, 0, Math.PI*2);
      if (fillCol) { tctx.fillStyle = fillCol; tctx.globalAlpha = fillAlpha; tctx.fill(); }
      tctx.globalAlpha = 0.9; tctx.stroke();
    } else if (anim.kind === 'ellipse') {
      const [cx,cy] = T(p0.re, p0.im);
      tctx.ellipse(cx, cy, Math.abs(p1.re-p0.re)*ts, Math.abs(p1.im-p0.im)*ts, 0, 0, Math.PI*2);
      if (fillCol) { tctx.fillStyle = fillCol; tctx.globalAlpha = fillAlpha; tctx.fill(); }
      tctx.globalAlpha = 0.9; tctx.stroke();
    }
  } else if (anim.anchors.length === 1 && anim.segments.length === 0) {
    const [x,y] = T(anim.anchors[0].re, anim.anchors[0].im);
    tctx.beginPath(); tctx.arc(x, y, 3.5 * dpr, 0, Math.PI*2);
    tctx.globalAlpha = 0.9; tctx.fillStyle = color; tctx.fill();
  } else {
    const loop = findLoopRange(anim);
    if (fillCol && canFillAnim(anim)) {
      tctx.beginPath();
      let started = false;
      let componentOpen = false;
      const addThumbFillSeg = seg => {
        if (!seg || !seg.compiled) return;
        for (let i = 0; i <= 32; i++) {
          try {
            const pt = seg.compiled(0, i / 32, {});
            if (!pt) continue;
            const [x,y] = T(pt.re, pt.im);
            if (!componentOpen) {
              tctx.moveTo(x,y);
              componentOpen = true;
              started = true;
            } else {
              tctx.lineTo(x,y);
            }
          } catch (_) {}
        }
      };
      if (loop && anim.closed) {
        for (let si = loop.loopStart; si < loop.loopEnd; si++) addThumbFillSeg(anim.segments[si]);
        if (componentOpen) tctx.closePath();
      } else {
        for (const seg of anim.segments) {
          if (!seg || !seg.compiled) {
            if (componentOpen) {
              tctx.closePath();
              componentOpen = false;
            }
            continue;
          }
          addThumbFillSeg(seg);
        }
        if (componentOpen) tctx.closePath();
      }
      if (started) {
        tctx.fillStyle = fillCol; tctx.globalAlpha = fillAlpha;
        try { tctx.fill('evenodd'); } catch (_) { tctx.fill(); }
      }
    }
    tctx.globalAlpha = 0.9;
    for (const seg of anim.segments) {
      if (!seg || !seg.compiled || seg.visible === false) continue;
      tctx.beginPath(); let first = true;
      for (let i = 0; i <= 32; i++) {
        try {
          const pt = seg.compiled(0, i / 32, {});
          if (!pt) continue;
          const [x,y] = T(pt.re, pt.im);
          if (first) { tctx.moveTo(x,y); first = false; } else tctx.lineTo(x,y);
        } catch (_) {}
      }
      tctx.stroke();
    }
    if (anim.segments.length === 0 && anim.anchors.length > 1) {
      tctx.beginPath(); tctx.setLineDash([3*dpr, 3*dpr]);
      anim.anchors.forEach((a, i) => {
        const [x,y] = T(a.re, a.im);
        i === 0 ? tctx.moveTo(x,y) : tctx.lineTo(x,y);
      });
      tctx.globalAlpha = 0.9; tctx.stroke(); tctx.setLineDash([]);
    }
  }
}

function objectTileBlockForIndex(index) {
  const anim = animations[index];
  if (!anim) return null;
  const gid = objectGroupId(anim);
  const members = gid == null ? [anim] : allDescendantAnims(gid);
  const memberIds = new Set(members.map(a => a.id));
  const ordered = animations.filter(a => memberIds.has(a.id));
  const indices = ordered.map(a => animations.indexOf(a)).filter(i => i >= 0);
  return {
    groupId: gid,
    animIds: ordered.map(a => a.id),
    fromIndex: Math.min(...indices),
    toIndex: Math.max(...indices),
  };
}

function objectTileInsertionIndexFromEvent(e) {
  const tilesEl = document.getElementById('object-tiles');
  // Include both animation tiles (data-index) and group tiles (data-group-id)
  let wrap = e.target.closest && e.target.closest('.obj-tile-wrap');
  const allWraps = [...tilesEl.querySelectorAll('.obj-tile-wrap')];
  if (!wrap || !tilesEl.contains(wrap)) {
    if (!allWraps.length) return animations.length;
    const firstRect = allWraps[0].getBoundingClientRect();
    const lastRect = allWraps[allWraps.length - 1].getBoundingClientRect();
    if (e.clientY < firstRect.top) return 0;
    if (e.clientY > lastRect.bottom) return animations.length;
    let best = allWraps[0], bestDist = Infinity;
    for (const candidate of allWraps) {
      const rect = candidate.getBoundingClientRect();
      const cx = rect.left + rect.width * 0.5;
      const cy = rect.top + rect.height * 0.5;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      if (dist < bestDist) { best = candidate; bestDist = dist; }
    }
    wrap = best;
  }
  const rect = wrap.getBoundingClientRect();
  const after = e.clientX >= rect.left + rect.width * 0.5;
  if (wrap.dataset.groupId) {
    // Group tile — insertion goes before or after all descendant animations
    const gid = parseFloat(wrap.dataset.groupId);
    const indices = allDescendantAnims(gid)
      .map(a => animations.indexOf(a)).filter(i => i >= 0);
    if (!indices.length) return after ? animations.length : 0;
    return after ? Math.max(...indices) + 1 : Math.min(...indices);
  }
  const idx = parseInt(wrap.dataset.index, 10);
  if (!isFinite(idx)) return animations.length;
  const anim = animations[idx];
  const gid = objectGroupId(anim);
  const movingIds = new Set(objectTileDrag?.animIds || []);
  if (gid != null && !groupMembers(gid).some(member => movingIds.has(member.id))) {
    const indices = animations
      .map((candidate, candidateIdx) => objectGroupId(candidate) === gid ? candidateIdx : -1)
      .filter(candidateIdx => candidateIdx >= 0);
    if (indices.length) return after ? Math.max(...indices) + 1 : Math.min(...indices);
  }
  return clamp(idx + (after ? 1 : 0), 0, animations.length);
}

function updateObjectTileDropCue(insertionIndex) {
  clearObjectTileDropCues();
  const allWraps = [...document.querySelectorAll('#object-tiles .obj-tile-wrap')];
  if (!allWraps.length) return;
  // Build the animation-index range each tile represents
  const ranges = allWraps.map(wrap => {
    if (wrap.dataset.groupId) {
      const gid = parseFloat(wrap.dataset.groupId);
      const idxs = allDescendantAnims(gid).map(a => animations.indexOf(a)).filter(i => i >= 0);
      return { wrap, first: idxs.length ? Math.min(...idxs) : Infinity, last: idxs.length ? Math.max(...idxs) : -1 };
    }
    const idx = parseInt(wrap.dataset.index, 10);
    return { wrap, first: idx, last: idx };
  });
  if (objectTileDrag?.animIds) {
    const movingIds = new Set(objectTileDrag.animIds);
    const movingIndices = animations
      .map((anim, animIdx) => movingIds.has(anim.id) ? animIdx : -1)
      .filter(animIdx => animIdx >= 0);
    if (movingIndices.length) {
      const first = Math.min(...movingIndices);
      const last = Math.max(...movingIndices);
      if (insertionIndex >= first && insertionIndex <= last + 1) return;
    }
  }
  for (const { wrap, first } of ranges) {
    if (insertionIndex <= first) { wrap.classList.add('drop-before'); return; }
  }
  allWraps[allWraps.length - 1].classList.add('drop-after');
}

function moveAnimationInStack(fromIndex, insertionIndex, sourceAnimIds = null) {
  if (fromIndex < 0 || fromIndex >= animations.length) return false;
  const sourceIds = new Set(sourceAnimIds && sourceAnimIds.length ? sourceAnimIds : [animations[fromIndex].id]);
  const moving = animations.filter(anim => sourceIds.has(anim.id));
  if (!moving.length) return false;
  const movingIndices = animations
    .map((anim, idx) => sourceIds.has(anim.id) ? idx : -1)
    .filter(idx => idx >= 0);
  const firstIndex = Math.min(...movingIndices);
  const lastIndex = Math.max(...movingIndices);
  let toIndex = clamp(Math.round(insertionIndex), 0, animations.length);
  if (toIndex >= firstIndex && toIndex <= lastIndex + 1) return false;

  const tilesEl = document.getElementById('object-tiles');
  const tileScrollTop = tilesEl ? tilesEl.scrollTop : 0;
  pushUndo();
  const insertionInRemaining = animations.slice(0, toIndex).filter(anim => !sourceIds.has(anim.id)).length;
  const remaining = animations.filter(anim => !sourceIds.has(anim.id));
  animations = remaining.slice(0, insertionInRemaining).concat(moving, remaining.slice(insertionInRemaining));
  renumberAnimationsByStackOrder();
  clearObjectTileDropCues();
  renderAnimList();
  const nextTilesEl = document.getElementById('object-tiles');
  if (nextTilesEl && selectedId == null && editModeAnimId == null) {
    nextTilesEl.scrollTop = tileScrollTop;
    updateTilesMoreIndicator();
  }
  draw();
  updateCursor();
  return true;
}

function renderGroupMosaicThumbnail(groupId, canvasEl, size = 48) {
  const dpr = window.devicePixelRatio || 1;
  const PX = size * dpr;
  canvasEl.width = PX; canvasEl.height = PX;
  const tctx = canvasEl.getContext('2d');
  tctx.fillStyle = '#1e1e2e';
  tctx.fillRect(0, 0, PX, PX);
  const leaves = allDescendantAnims(groupId).filter(a => a.visible && !a.inPlacementMode);
  if (!leaves.length) {
    tctx.strokeStyle = '#585b70';
    tctx.lineWidth = dpr;
    tctx.strokeRect(PX * 0.2, PX * 0.2, PX * 0.6, PX * 0.6);
    return;
  }
  const bounds = animsMathBounds(leaves);
  if (!bounds) return;
  const mw = Math.max(bounds.maxX - bounds.minX, 0.01);
  const mh = Math.max(bounds.maxY - bounds.minY, 0.01);
  const thumbScale = Math.min(PX / (mw * 1.1), PX / (mh * 1.1));
  const cx = (bounds.minX + bounds.maxX) / 2;
  const cy = (bounds.minY + bounds.maxY) / 2;
  const thumbOriginX = PX / 2 - cx * thumbScale;
  const thumbOriginY = PX / 2 + cy * thumbScale;
  const [sC, sCt, sOX, sOY, sSc, sIsObj, sSelId, sEditId] =
    [canvas, ctx, originX, originY, scale, isObjViewport, selectedId, editModeAnimId];
  canvas = canvasEl; ctx = tctx;
  originX = thumbOriginX; originY = thumbOriginY; scale = thumbScale;
  isObjViewport = false; selectedId = null; editModeAnimId = null;
  try {
    for (const anim of leaves) drawCommittedAnimation(anim);
  } finally {
    canvas = sC; ctx = sCt; originX = sOX; originY = sOY; scale = sSc;
    isObjViewport = sIsObj; selectedId = sSelId; editModeAnimId = sEditId;
  }
}

function renderGroupTileBackdrops(tilesEl) {
  tilesEl.querySelectorAll('.obj-group-backdrop').forEach(el => el.remove());
  const wraps = [...tilesEl.querySelectorAll('.obj-tile-wrap[data-index]')];
  const segments = [];
  let current = null;
  const focusedGid = focusedGroupMemberGroupId();
  for (const wrap of wraps) {
    const idx = Number(wrap.dataset.index);
    const anim = animations[idx];
    const gid = objectGroupId(anim);
    if (gid == null || gid === focusedGid || groupMembers(gid).length < 2) {
      current = null;
      continue;
    }
    const row = Math.floor(idx / 5);
    if (current && current.groupId === gid && current.row === row && current.lastIndex === idx - 1) {
      current.wraps.push(wrap);
      current.lastIndex = idx;
    } else {
      current = { groupId: gid, row, wraps: [wrap], lastIndex: idx };
      segments.push(current);
    }
  }

  for (const segment of segments) {
    const left = Math.min(...segment.wraps.map(wrap => wrap.offsetLeft));
    const top = Math.min(...segment.wraps.map(wrap => wrap.offsetTop));
    const right = Math.max(...segment.wraps.map(wrap => wrap.offsetLeft + wrap.offsetWidth));
    const bottom = Math.max(...segment.wraps.map(wrap => wrap.offsetTop + wrap.offsetHeight));
    const padX = 5;
    const padY = 4;
    const backdrop = document.createElement('div');
    const members = groupMembers(segment.groupId);
    const isCandidate = groupSelectionMode && members.some(member => groupCandidateIds.has(member.id));
    backdrop.className = 'obj-group-backdrop'
      + (isGroupSelectionActive() && selectedGroupId === segment.groupId ? ' selected' : '')
      + (isCandidate ? ' candidate' : '');
    const x = Math.max(0, left - padX);
    const y = Math.max(0, top - padY);
    backdrop.style.left = `${x}px`;
    backdrop.style.top = `${y}px`;
    backdrop.style.width = `${right - left + (left - x) + padX}px`;
    backdrop.style.height = `${bottom - top + (top - y) + padY}px`;
    tilesEl.appendChild(backdrop);
  }
}

function renderGroupDetail(detailEl, groupId) {
  const items = directChildItems(groupId);
  if (!items.length) { selectedGroupId = null; setView('tiles'); return; }
  setView('detail');
  detailEl.dataset.groupId = String(groupId);

  const header = document.createElement('div');
  header.className = 'detail-header';
  const leftGroup = document.createElement('div');
  leftGroup.className = 'detail-header-left';

  const currentName = groupName(groupId);
  const groupNumber = groupHierarchicalNumber(groupId);
  const displayText = currentName || `Group ${groupNumber}`;

  const nameSpan = document.createElement('span');
  nameSpan.className = 'detail-num' + (currentName ? '' : ' group-name-placeholder');
  nameSpan.textContent = displayText;
  nameSpan.title = 'Click to rename this group';
  nameSpan.style.cursor = 'pointer';
  nameSpan.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'text';
    input.value = groupName(groupId);
    input.placeholder = `Group ${groupNumber}`;
    input.style.cssText = 'font:inherit;background:transparent;border:none;border-bottom:1px solid #89b4fa;outline:none;color:#cdd6f4;width:120px;';
    nameSpan.replaceWith(input);
    input.focus();
    input.select();
    let cancelled = false;
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { input.blur(); }
      else if (e.key === 'Escape') { cancelled = true; input.blur(); }
    });
    input.addEventListener('blur', () => {
      if (cancelled) { renderAnimList(); return; }
      const newName = input.value.trim();
      const grp = groups.find(grp => grp.id === groupId);
      if (grp && grp.name !== newName) { pushUndo(); grp.name = newName; saveProject(); }
      renderAnimList();
    });
  });
  leftGroup.append(nameSpan);

  const rightGroup = document.createElement('div');
  rightGroup.className = 'detail-header-right';

  const isHidden = isGroupEffectivelyHidden(groupId);
  const visBtn = document.createElement('button');
  visBtn.className = 'anim-icon-btn anim-vis-btn' + (isHidden ? ' is-hidden' : '');
  visBtn.title = isHidden ? 'Show group' : 'Hide group';
  visBtn.appendChild(makeVisibilityIcon(!isHidden));
  visBtn.addEventListener('click', e => {
    e.stopPropagation();
    pushUndo();
    const grp = groups.find(grp => grp.id === groupId);
    if (grp) grp.hidden = !grp.hidden;
    saveProject();
    renderAnimList(); draw();
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'anim-icon-btn anim-delete-btn';
  delBtn.title = 'Delete group';
  delBtn.textContent = '×';
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    deleteGroup(groupId);
  });
  rightGroup.append(visBtn, delBtn);
  header.append(leftGroup, rightGroup);
  detailEl.appendChild(header);

  const tilesContainer = document.createElement('div');
  tilesContainer.className = 'detail-group-tiles';
  for (const { type, item } of items) {
    const tile = document.createElement('button');
    tile.className = 'detail-group-tile';
    const thumbCanvas = document.createElement('canvas');
    thumbCanvas.draggable = false;
    tile.appendChild(thumbCanvas);

    if (type === 'group') {
      const childGroup = item;
      tile.classList.add('obj-group-mosaic-tile');
      tile.title = groupName(childGroup.id) || 'Group';
      renderGroupMosaicThumbnail(childGroup.id, thumbCanvas, 64);
      const icon = document.createElement('span');
      icon.className = 'obj-group-mosaic-icon';
      icon.textContent = 'G';
      tile.appendChild(icon);
      tile.addEventListener('click', e => {
        e.stopPropagation();
        openColorMenuAnimId = null;
        selectGroup(childGroup.id);
        renderAnimList(); draw(); updateCursor();
      });
    } else {
      const member = item;
      const isSelected = selectedId === member.id || editModeAnimId === member.id;
      if (isSelected) tile.classList.add('selected');
      tile.title = objectLabel(member);
      renderAnimThumbnail(member, thumbCanvas, 64);
      tile.addEventListener('click', e => {
        e.stopPropagation();
        openColorMenuAnimId = null;
        drillSelectObject(member);
        renderAnimList(); draw(); updateCursor();
      });
    }
    tilesContainer.appendChild(tile);
  }
  detailEl.appendChild(tilesContainer);

  const ungroupBtn = document.createElement('button');
  ungroupBtn.className = 'group-objects-btn-inner';
  ungroupBtn.textContent = 'Ungroup';
  ungroupBtn.addEventListener('click', e => { e.stopPropagation(); ungroup(groupId); });
  detailEl.appendChild(ungroupBtn);

  updateToolPanel();
}

function updateGroupObjectsButton() {
  const btn = document.getElementById('group-objects-btn');
  if (!btn) return;
  btn.className = '';
  btn.disabled = false;
  const groupActive = isGroupSelectionActive();
  const objectDetailOpen = (selectedId != null || editModeAnimId != null) && !groupActive;
  const shouldShow = !activeLineToolOptionsAnim() && !groupActive && (groupSelectionMode || !objectDetailOpen);

    if (groupCandidateIds.size + groupGroupCandidateIds.size >= 2) {

  if (animations.filter(a => !a.inPlacementMode).length < 2) btn.disabled = true;
}

function rootTileLabelForGroup(groupId) {
  const rootId = groupPathFromRoot(groupId)[0] ?? groupId;
  const idx = directChildItems(null).findIndex(it => it.type === 'group' && it.item.id === rootId);
  return idx >= 0 ? String(idx + 1) : '';
}

function appendTrayPartition(tilesEl) {
  const partition = document.createElement('div');
  partition.className = 'obj-tray-partition';
  partition.setAttribute('aria-hidden', 'true');
  tilesEl.appendChild(partition);
}

function appendTrayLabel(tile, label) {
  if (!label) return;
  const labelEl = document.createElement('span');
  labelEl.className = 'obj-tile-label';
  labelEl.textContent = label;
  tile.appendChild(labelEl);
}

function configureGroupTileDrag(wrap, groupId) {
  wrap.draggable = true;
  wrap.addEventListener('dragstart', e => {
    const descendants = allDescendantAnims(groupId);
    if (!descendants.length) { e.preventDefault(); return; }
    const animIds = descendants.map(a => a.id);
    const indices = descendants.map(a => animations.indexOf(a)).filter(i => i >= 0);
    const fromIndex = indices.length ? Math.min(...indices) : 0;
    const primaryAnim = animations[fromIndex];
    objectTileDrag = {
      animId: primaryAnim?.id ?? descendants[0].id,
      animIds,
      fromIndex,
      insertionIndex: fromIndex,
    };
    suppressTileClickUntil = Date.now() + 250;
    if (e.dataTransfer) {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(groupId));
    }
    requestAnimationFrame(() => wrap.classList.add('dragging'));
  });
  wrap.addEventListener('dragend', () => {
    const dragIds = objectTileDrag?.animIds;
    objectTileDrag = null;
    suppressTileClickUntil = Date.now() + 250;
    wrap.classList.remove('dragging');
    if (dragIds) setObjectTileDragVisual(dragIds, false);
    clearObjectTileDropCues();
  });
}

function configureAnimTileDrag(wrap, anim) {
  const idx = animations.indexOf(anim);
  wrap.draggable = !anim.inPlacementMode;
  wrap.addEventListener('dragstart', e => {
    if (anim.inPlacementMode) { e.preventDefault(); return; }
    const block = objectTileBlockForIndex(idx);
    objectTileDrag = {
      animId: anim.id,
      animIds: block?.animIds || [anim.id],
      fromIndex: block?.fromIndex ?? idx,
      insertionIndex: idx,
    };
    suppressTileClickUntil = Date.now() + 250;
    if (e.dataTransfer) {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(anim.id));
    }
    requestAnimationFrame(() => setObjectTileDragVisual(objectTileDrag?.animIds || [anim.id], true));
  });
  wrap.addEventListener('dragend', () => {
    const dragIds = objectTileDrag?.animIds || [anim.id];
    objectTileDrag = null;
    suppressTileClickUntil = Date.now() + 250;
    setObjectTileDragVisual(dragIds, false);
    clearObjectTileDropCues();
  });
}

function appendGroupTrayTile(tilesEl, group, { label = '', path = false, child = true } = {}) {
  const isGroupSel = isGroupSelectionActive() && selectedGroupId === group.id;
  const isGroupCandidate = groupSelectionMode && groupGroupCandidateIds.has(group.id);
  const wrap = document.createElement('div');
  wrap.className = 'obj-tile-wrap' +
    (path ? ' tray-path' : '') +
    (child ? ' tray-child' : '') +
    (isGroupSel ? ' group-selected' : '') +
    (isGroupCandidate ? ' group-candidate' : '');
  wrap.dataset.groupId = group.id;

  const tile = document.createElement('button');
  tile.className = 'obj-tile obj-group-mosaic-tile' + (isGroupEffectivelyHidden(group.id) ? ' obj-tile-hidden' : '') + (isGroupSel ? ' selected' : '');
  tile.title = groupName(group.id) || 'Group';
  appendTrayLabel(tile, label);
  const thumbCanvas = document.createElement('canvas');
  thumbCanvas.draggable = false;
  tile.appendChild(thumbCanvas);
  renderGroupMosaicThumbnail(group.id, thumbCanvas);
  const icon = document.createElement('span');
  icon.className = 'obj-group-mosaic-icon';
  icon.textContent = 'G';
  tile.appendChild(icon);
  tile.addEventListener('click', () => {
    if (Date.now() < suppressTileClickUntil) return;
    openColorMenuAnimId = null;
    if (groupSelectionMode && child) {
      if (groupGroupCandidateIds.has(group.id)) groupGroupCandidateIds.delete(group.id);
      else groupGroupCandidateIds.add(group.id);
      renderAnimList(); updateGroupObjectsButton();
      return;
    }
    selectGroup(group.id);
    renderAnimList(); draw(); updateCursor();
  });
  wrap.appendChild(tile);
  if (child && !path) configureGroupTileDrag(wrap, group.id);
  tilesEl.appendChild(wrap);
  return wrap;
}

function appendAnimTrayTile(tilesEl, anim, { label = '', child = true } = {}) {
  const idx = animations.indexOf(anim);
  if (!anim.activeSegments) anim.activeSegments = new Set();
  if (!anim.expandedArcs) anim.expandedArcs = new Set();
  if (!anim.expandedAnchors) anim.expandedAnchors = new Set();
  const isMultiSelected = isMultiSelectionActive() && multiSelectedIds.has(anim.id);
  const isSelected = selectedId === anim.id || editModeAnimId === anim.id || isMultiSelected;
  const groupCandidate = groupSelectionMode && groupCandidateIds.has(anim.id);
  const wrap = document.createElement('div');
  wrap.className = 'obj-tile-wrap tray-child' + (groupCandidate ? ' group-candidate' : '');
  wrap.dataset.animId = anim.id;
  wrap.dataset.index = idx;

  const tile = document.createElement('button');
  tile.className = 'obj-tile' + (!isAnimEffectivelyVisible(anim) ? ' obj-tile-hidden' : '') + (isSelected ? ' selected' : '');
  tile.title = objectLabel(anim);
  tile.dataset.animId = anim.id;
  appendTrayLabel(tile, label);
  const thumbCanvas = document.createElement('canvas');
  thumbCanvas.draggable = false;
  tile.appendChild(thumbCanvas);
  renderAnimThumbnail(anim, thumbCanvas);
  tile.addEventListener('click', () => {
    if (Date.now() < suppressTileClickUntil) return;
    openColorMenuAnimId = null;
    if (anim.inPlacementMode) { selectedId = anim.id; renderAnimList(); return; }
    if (groupSelectionMode) {
      toggleGroupCandidate(anim);
      renderAnimList(); draw(); updateCursor();
      return;
    }
    if (isMultiSelectionActive() && multiSelectedIds.has(anim.id)) {
      drillSelectObject(anim);
      renderAnimList(); draw(); updateCursor();
      return;
    }
    const alreadySelected = selectedId === anim.id || editModeAnimId === anim.id;
    if (alreadySelected) {
      if (anim.activeSegments && anim.activeSegments.size > 0) {
        anim.activeSegments = new Set();
        anim.expandedArcs = new Set();
      } else {
        tilesDrillPath = [];
        selectedId = null;
        exitEditMode();
      }
      renderAnimList(); draw(); updateCursor();
      return;
    }
    drillSelectObject(anim);
    renderAnimList(); draw(); updateCursor();
  });
  wrap.appendChild(tile);
  if (child) configureAnimTileDrag(wrap, anim);
  tilesEl.appendChild(wrap);
  return wrap;
}

function renderObjectTray(detailAnim) {
  const tilesEl = document.getElementById('object-tiles');
  const breadcrumbEl = document.getElementById('tiles-breadcrumb');
  if (breadcrumbEl) {
    breadcrumbEl.innerHTML = '';
    breadcrumbEl.style.display = 'none';
  }
  tilesEl.innerHTML = '';
  tilesEl.style.height = '';
  tilesEl.scrollTop = 0;
  const lineOptionsAnim = activeLineToolOptionsAnim();
  tilesEl.classList.toggle('line-tool-options-host', !!lineOptionsAnim);
  if (lineOptionsAnim) {
    renderLineToolOptions(tilesEl);
    updateTilesMoreIndicator();
    return;
  }

  const path = activeTrayGroupPath(detailAnim);
  const childGroupId = path.length ? path[path.length - 1] : null;
  const displayItems = directChildItems(childGroupId);
  if (childGroupId === null) {
    animations.filter(a => a.inPlacementMode).forEach(a => {
      if (!displayItems.some(it => it.type === 'anim' && it.item.id === a.id))
        displayItems.unshift({ type: 'anim', item: a, pos: -1 });
    });
  }

  for (let i = 0; i < path.length; i++) {
    const g = groups.find(grp => grp.id === path[i]);
    if (!g) continue;
    appendGroupTrayTile(tilesEl, g, {
      label: i === 0 ? rootTileLabelForGroup(g.id) : '',
      path: true,
      child: false,
    });
    appendTrayPartition(tilesEl);
  }

  if (!displayItems.length && !path.length) {
    const hint = document.createElement('p');
    hint.className = 'placement-hint';
    hint.textContent = 'Select a tool to create an object.';
    tilesEl.appendChild(hint);
  }

  displayItems.forEach(({ type, item }, tileIdx) => {
    const label = childGroupId === null ? String(tileIdx + 1) : '';
    if (type === 'group') appendGroupTrayTile(tilesEl, item, { label, path: false, child: true });
    else appendAnimTrayTile(tilesEl, item, { label, child: true });
  });

  const selectedTile = tilesEl.querySelector('.obj-tile.selected');
  if (selectedTile) selectedTile.scrollIntoView({ block: 'nearest', inline: 'nearest' });
  updateTilesMoreIndicator();
}

  colorBtn.style.backgroundColor = anim.color || '#cdd6f4';

    openColorMenuAnimId = openColorMenuAnimId === anim.id ? null : anim.id;

  const visBtn = document.createElement('button');
  visBtn.className = 'anim-icon-btn anim-vis-btn' + (!anim.visible ? ' is-hidden' : '');
  visBtn.title = anim.visible ? 'Hide object' : 'Show object';

    e.stopPropagation();
    pushUndo();

  const deleteBtn = document.createElement('button');

  rightGroup.append(colorBtn, visBtn, deleteBtn);
  header.appendChild(rightGroup);
  detailEl.appendChild(header);

  if (openColorMenuAnimId === anim.id) {
    const colorPanel = buildColorEditor(anim);
    detailEl.appendChild(colorPanel);
  }

  if (isTextAnim(anim)) renderTextDetail(detailEl, anim);
  else renderCurveDetail(detailEl, anim);
  updateToolPanel();
}

let _tilesVisibleRows = 1;

function setView(view) {
  const wrapper = document.getElementById('object-tiles-wrapper');
  const detail = document.getElementById('object-detail');
  wrapper.style.display = 'flex';
  if (view === 'detail') {
    if (detail.style.display !== 'none') return;
    detail.style.display = 'block';
    detail.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => { detail.style.opacity = '1'; }));
  } else {
    if (detail.style.display === 'none') return;
    detail.style.display = 'none';
    wrapper.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => { wrapper.style.opacity = '1'; }));
  }
}

function updateTilesMoreIndicator() {
  const tilesEl = document.getElementById('object-tiles');
  const aboveEl = document.getElementById('tiles-more-above');
  const belowEl = document.getElementById('tiles-more');
  if (tilesEl.classList.contains('line-tool-options-host')) {
    aboveEl.style.display = 'none';
    belowEl.style.display = 'none';
    return;
  }
  const count = directChildItems(currentDrillGroupId()).length;
  if (count <= _tilesVisibleRows * 5) { aboveEl.style.display = 'none'; belowEl.style.display = 'none'; return; }
  const rowH = 72; // 67px tile-wrap + 5px gap
  const rowsScrolled = Math.round(tilesEl.scrollTop / rowH);
  const hiddenAbove = rowsScrolled * 5;
  const hiddenBelow = Math.max(0, count - (rowsScrolled + _tilesVisibleRows) * 5);
  aboveEl.style.display = hiddenAbove > 0 ? 'block' : 'none';
  if (hiddenAbove > 0) aboveEl.textContent = `▲ +${hiddenAbove} more`;
  belowEl.style.display = hiddenBelow > 0 ? 'block' : 'none';
  if (hiddenBelow > 0) belowEl.textContent = `▼ +${hiddenBelow} more`;
}

function updateTilesMoreIndicator() {
  const tilesEl = document.getElementById('object-tiles');
  const wrapper = document.getElementById('object-tiles-wrapper');
  const aboveEl = document.getElementById('tiles-more-above');
  const belowEl = document.getElementById('tiles-more');
  if (aboveEl) aboveEl.style.display = 'none';
  if (belowEl) belowEl.style.display = 'none';
  if (!tilesEl || !wrapper) return;
  const maxScroll = Math.max(0, tilesEl.scrollWidth - tilesEl.clientWidth);
  wrapper.classList.toggle('can-scroll-left', tilesEl.scrollLeft > 1);
  wrapper.classList.toggle('can-scroll-right', tilesEl.scrollLeft < maxScroll - 1);
}

function isScrollbarPointerEvent(el, e) {
  if (!el) return false;
  const rect = el.getBoundingClientRect();
  const gutter = 18;
  const onVerticalScrollbar = el.scrollHeight > el.clientHeight && e.clientX >= rect.right - gutter;
  const onHorizontalScrollbar = el.scrollWidth > el.clientWidth && e.clientY >= rect.bottom - gutter;
  return onVerticalScrollbar || onHorizontalScrollbar;
}

// ── Object window helpers ──

function getObjWindowAnims() {
  if (tilesDrillPath.length > 0 && editModeAnimId === null && selectedId === null) {
    return allDescendantAnims(currentDrillGroupId()).filter(a => a.visible && !a.inPlacementMode);
  }
  if (multiSelectedIds.size > 0) {
    return [...multiSelectedIds].map(id => animations.find(a => a.id === id)).filter(Boolean);
  }
  if (selectedGroupId != null) return allDescendantAnims(selectedGroupId);
  if (selectedId != null) {
    const a = animations.find(x => x.id === selectedId);
    return a ? [a] : [];
  }
  return [];
}

function animsMathBounds(anims) {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  const expand = pt => {
    minX = Math.min(minX, pt.re); maxX = Math.max(maxX, pt.re);
    minY = Math.min(minY, pt.im); maxY = Math.max(maxY, pt.im);
  };
  for (const anim of anims) {
    if (isPrimitiveAnim(anim)) {
      for (const pt of samplePrimitiveBoundaryMath(anim)) expand(pt);
    } else {
      for (const a of (anim.anchors || [])) { if (a && a.ok()) expand(a); }
      for (const s of (anim.segments || [])) {
        if (!s) continue;
        for (const h of [s.h0, s.h1]) { if (h && h.ok()) expand(h); }
      }
    }
  }
  return isFinite(minX) ? { minX, maxX, minY, maxY } : null;
}

function fitObjWindow() {
  if (!AUX_WINDOWS_ENABLED) return;
  if (suppressNextFitObjWindow) { suppressNextFitObjWindow = false; return; }
  const anims = getObjWindowAnims();
  if (!anims.length || !objCanvas.width || !objCanvas.height) return;
  const bounds = animsMathBounds(anims);
  if (!bounds) return;
  const W = objCanvas.width, H = objCanvas.height;
  const mw = Math.max(bounds.maxX - bounds.minX, 0.5);
  const mh = Math.max(bounds.maxY - bounds.minY, 0.5);
  const newScale = Math.max(1e-6, Math.min(Math.max(1, W) / (mw * 1.1), Math.max(1, H) / (mh * 1.1)));
  const cx = (bounds.minX + bounds.maxX) / 2;
  const cy = (bounds.minY + bounds.maxY) / 2;
  objOriginX = W / 2 - cx * newScale;
  objOriginY = H / 2 + cy * newScale;
  objScale = newScale;
  document.getElementById('object-recenter-btn').classList.toggle('visible', anims.length > 0);
}

function drawObjectWindow() {
  if (!AUX_WINDOWS_ENABLED) return;
  if (!objCanvas.width || !objCanvas.height) return;
  const hasSelection = getObjWindowAnims().length > 0;
  const savedSBIF = suppressBlockersInFill;
  suppressBlockersInFill = true;
  withObjViewport(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#05050f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (!hasSelection) return;
    drawGrid();
    suppressSelectionOverlays = true;
    for (const anim of animations) {
      if (anim.visible && !anim.inPlacementMode) drawCommittedAnimation(anim);
    }
    suppressSelectionOverlays = false;
  });
  suppressBlockersInFill = savedSBIF;
  document.getElementById('object-recenter-btn').classList.toggle('visible', hasSelection);
}

function getIsolationAnims() {
  if (!AUX_WINDOWS_ENABLED) return [];
  const animId = editModeAnimId ?? selectedId;
  if (animId !== null) {
    const a = animations.find(x => x.id === animId);
    return a ? [a] : [];
  }
  if (selectedGroupId !== null) {
    return allDescendantAnims(selectedGroupId).filter(a => a.visible && !a.inPlacementMode);
  }
  if (multiSelectedIds.size > 0) {
    return [...multiSelectedIds].map(id => animations.find(a => a.id === id)).filter(Boolean);
  }
  return [];
}

function fitIsolationWindow() {
  if (!AUX_WINDOWS_ENABLED) return;
  const anims = getIsolationAnims();
  if (!anims.length || !isolCanvas.width || !isolCanvas.height) return;
  const bounds = animsMathBounds(anims);
  if (!bounds) return;
  const W = isolCanvas.width, H = isolCanvas.height;
  const dpr = devicePixelRatio;
  const mw = Math.max(bounds.maxX - bounds.minX, 0.5);
  const mh = Math.max(bounds.maxY - bounds.minY, 0.5);
  // Reserve right-side space for side-action buttons (7 gap + 38 width + 8 frame extend = 53 px)
  const btnRight = W > 80 * dpr ? Math.min(53 * dpr, W * 0.35) : 0;
  const usableW = Math.max(1, W - btnRight);
  const newScale = Math.max(1e-6, Math.min(usableW / (mw * 1.1), H / (mh * 1.1)));
  const cx = (bounds.minX + bounds.maxX) / 2;
  const cy = (bounds.minY + bounds.maxY) / 2;
  // Shift center left by half the button clearance so buttons don't clip the right edge
  isolOriginX = W / 2 - cx * newScale - btnRight / 2;
  isolOriginY = H / 2 + cy * newScale;
  isolScale = newScale;
  document.getElementById('isolation-recenter-btn').classList.toggle('visible', anims.length > 0);
}

function drawIsolationWindow() {
  if (!AUX_WINDOWS_ENABLED) return;
  if (!isolCanvas.width || !isolCanvas.height) return;
  const anims = getIsolationAnims();
  isolationAnimIds = new Set(anims.map(a => a.id));
  const savedSBIF = suppressBlockersInFill;
  suppressBlockersInFill = true;
  withIsolViewport(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#05050f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (!anims.length) return;
    drawGrid();
    for (const anim of anims) {
      if (anim.visible && !anim.inPlacementMode) drawCommittedAnimation(anim);
    }
    drawSelectedGroupBounds();
    drawSelectedMultiSelectionBounds();
  });
  suppressBlockersInFill = savedSBIF;
  document.getElementById('isolation-recenter-btn').classList.toggle('visible', anims.length > 0);
}
