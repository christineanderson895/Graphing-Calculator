<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graphing Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      font-family: sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
    }

    /* ── Corner fold ── */
    #corner-fold {
      position: fixed;
      top: 0; left: 0;
      width: 44px; height: 44px;
      cursor: pointer;
      z-index: 300;
    }
    #corner-fold::before {
      content: '';
      display: block;
      width: 0; height: 0;
      border-top: 44px solid #3c3c58;
      border-right: 44px solid transparent;
      transition: border-top-color 0.2s;
    }
    #corner-fold:hover::before  { border-top-color: #5a5a80; }
    #corner-fold.graphs-mode::before { border-top-color: #4a2e68; }
    #corner-fold:hover.graphs-mode::before { border-top-color: #7a50a8; }

    /* ── Fold tooltip ── */
    #fold-tooltip {
      position: fixed;
      top: 48px; left: 4px;
      background: #313244;
      color: #cdd6f4;
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      z-index: 400;
      border: 1px solid #45475a;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #181825;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #313244;
      position: relative;
    }

    /* ── Animations panel ── */
    #animations-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      padding-top: 44px;
    }

    #anim-list {
      flex: 1; overflow-y: auto;
      padding: 8px;
      display: flex; flex-direction: column;
      gap: 5px; min-height: 0;
    }

    #anim-tool-panel {
      margin: 0 8px 6px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 44px);
      justify-content: center;
      gap: 8px;
      border: 2px solid #585b70;
      border-radius: 8px;
      background: #1e1e2e;
      box-shadow: inset 0 1px 0 rgba(205,214,244,0.06), 0 0 0 1px rgba(0,0,0,0.28);
      flex-shrink: 0;
    }
    .tool-btn {
      height: 34px;
      width: 44px;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .tool-btn svg {
      width: 26px;
      height: 26px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tool-btn:hover { background: #45475a; border-color: #89b4fa; }
    .tool-btn.active {
      background: #cba6f7;
      border-color: #cba6f7;
      color: #181825;
      box-shadow: 0 0 0 1px rgba(203,166,247,0.28);
    }
    .tool-btn:focus-visible {
      outline: 2px solid #89b4fa;
      outline-offset: 2px;
    }

    /* ── Animation rows ── */
    .anim-row {
      border: 1px solid #313244;
      border-radius: 8px;
      position: relative;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, margin-bottom 0.25s ease;
      background: #1e1e2e;
    }
    .anim-row.selected { border-color: #cba6f7; background: #1e1e30; }
    .anim-row.in-edit { border-color: #89b4fa; background: #1e2030; }
    .anim-row.is-hidden { background: #191927; }

    .anim-header {
      display: flex; align-items: center;
      gap: 8px; padding: 7px 7px 7px 14px; cursor: pointer;
      min-height: 42px;
    }
    .anim-label {
      flex: 1; min-width: 0;
      display: flex; align-items: center; gap: 8px;
      font-family: monospace; font-size: 0.82rem;
      color: #cdd6f4; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .anim-letter {
      min-width: 22px;
      flex-shrink: 0;
      font-weight: 600;
      font-size: 1.32rem;
      line-height: 1;
    }
    .anim-kind-icon {
      width: 25px;
      height: 25px;
      flex-shrink: 0;
      color: #bac2de;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .anim-row.in-edit .anim-kind-icon { color: #cdd6f4; }
    .anim-row.is-hidden .anim-kind-icon,
    .anim-row.is-hidden .anim-letter {
      opacity: 0.45;
    }

    .anim-actions {
      display: grid;
      grid-template-columns: repeat(3, 30px);
      align-items: center;
      justify-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .anim-color-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #cdd6f4;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transform: translateX(-2px);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.45);
    }
    .anim-row.is-hidden .anim-color-btn {
      opacity: 0.34;
      border-color: #6c7086;
    }
    .anim-icon-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: #a6adc8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .anim-icon-btn:hover {
      background: #313244;
      color: #cdd6f4;
    }
    .anim-icon-btn svg {
      width: 26px;
      height: 26px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .anim-vis-btn svg {
      width: 28px;
      height: 28px;
    }
    .anim-vis-btn.is-hidden {
      color: #f38ba8;
    }

    /* ── Delete button ── */
    .anim-delete-btn {
      font-size: 1.78rem;
      font-weight: 700;
      line-height: 1;
    }
    .anim-delete-btn:hover { color: #f38ba8; background: #2a1e2e; }
    .color-expansion {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 6px;
    }
    .color-section {
      border: 1px solid #313244;
      border-radius: 6px;
      background: #181825;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .color-section.disabled {
      opacity: 0.48;
    }
    .color-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 24px;
      color: #cdd6f4;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .color-target-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #585b70;
      background: #11111b;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.45);
    }
    .color-target-swatch.active {
      border-color: #cdd6f4;
      box-shadow: 0 0 0 2px rgba(205,214,244,0.18);
    }
    .color-target-swatch:disabled {
      cursor: default;
    }
    .color-controls-dim {
      opacity: 0.5;
    }
    .color-menu-section {
      display: grid;
      grid-template-columns: repeat(7, 22px);
      gap: 7px;
    }
    .color-menu-label {
      grid-column: 1 / -1;
      font-size: 0.66rem;
      line-height: 1;
      color: #a6adc8;
      padding: 0 1px 1px;
      letter-spacing: 0;
    }
    .color-swatch-option {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.45);
      position: relative;
    }
    .color-swatch-option.active {
      border-color: #cdd6f4;
    }
    .color-swatch-option.no-fill {
      background: #11111b;
      border-color: #45475a;
    }
    .color-swatch-option.no-fill.active {
      border-color: #cdd6f4;
    }
    .fill-style-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .fill-style-btn {
      height: 24px;
      border: 1px solid #45475a;
      border-radius: 4px;
      background: #11111b;
      color: #a6adc8;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .fill-style-btn.active {
      border-color: #cdd6f4;
      color: #cdd6f4;
      background: #313244;
    }
    .fill-style-btn:disabled {
      cursor: default;
    }
    .fill-style-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Accordion ── */
    .anim-accordion {
      max-height: 0; overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .anim-accordion.open {
      max-height: 1100px;
    }
    .anim-accordion-inner {
      padding: 5px 6px 6px;
      display: flex; flex-direction: column; gap: 2px;
      border-top: 1px solid #313244;
    }

    /* ── Placement hint ── */
    .placement-hint {
      font-size: 0.7rem; color: #6c7086;
      padding: 4px 6px; font-style: italic;
    }

    /* ── Tree items ── */
    .tree-item { display: flex; flex-direction: column; }
    .tree-item.arc-item {
      border-radius: 4px;
      margin: 2px 0 4px 2px;
      padding: 2px 0 4px;
    }
    .tree-item-header {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 5px; cursor: pointer; border-radius: 4px;
      font-size: 0.73rem; color: #a6adc8; user-select: none;
      transition: background 0.1s;
    }
    .tree-item-header:hover { background: #313244; }
    .tree-item-header.arc-row {
      margin-left: 0;
      border-bottom: 1px solid #313244;
      border-radius: 4px 4px 0 0;
      padding-bottom: 4px;
      color: #9399b2;
    }
    .tree-item-header.arc-row:hover { background: transparent; }
    .tree-item.arc-item.is-selected .tree-item-header.arc-row,
    .tree-item.arc-item.is-selected .arc-control-row label,
    .tree-item.arc-item.is-selected .arc-slider-row label {
      color: #cdd6f4;
    }
    .tree-item.arc-item.is-selected .arc-control-value,
    .tree-item.arc-item.is-selected .tree-slider-val {
      color: #f5f7ff;
    }
    .tree-item-header.anchor-row {
      gap: 7px;
      padding-right: 7px;
      font-size: 0.8rem;
    }
    .anchor-row-label { flex-shrink: 0; }
    .anchor-inline-lock {
      width: 23px; height: 23px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: #a6adc8;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }
    .anchor-inline-lock:hover {
      border-color: #45475a;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    .anchor-inline-lock.unlocked { color: #f38ba8; }
    .anchor-inline-lock svg {
      width: 19px; height: 19px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .anchor-coords {
      color: #cdd6f4;
      font-family: monospace;
      font-size: 0.8rem;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tree-arrow {
      font-size: 0.55rem; width: 10px; flex-shrink: 0;
      display: inline-block;
      transition: transform 0.15s;
    }
    .tree-arrow.open { transform: rotate(90deg); }
    .tree-item-body {
      padding: 3px 6px 3px 18px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .tree-item-body.arc-body { padding: 2px 3px 4px 4px; gap: 4px; }
    .tree-input-row {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.7rem; color: #a6adc8;
      padding: 4px 6px;
    }
    .tree-input-row label { white-space: nowrap; min-width: 62px; }
    .tree-input-row input {
      flex: 1; min-width: 0;
      background: #313244; border: 1px solid #45475a;
      border-radius: 4px; color: #cdd6f4;
      font-size: 0.7rem; font-family: monospace;
      padding: 2px 5px; outline: none;
      transition: border-color 0.15s;
    }
    .tree-input-row input:focus { border-color: #cba6f7; }
    .tree-input-row input.error { border-color: #f38ba8; }
    .tree-slider-row {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.7rem; color: #a6adc8;
      padding: 4px 6px;
    }
    .tree-slider-row label { white-space: nowrap; min-width: 62px; }
    .tree-slider-row input[type=range] { flex: 1; accent-color: #cba6f7; cursor: pointer; }
    .tree-slider-val {
      width: 34px; text-align: right; flex-shrink: 0;
      font-variant-numeric: tabular-nums; font-size: 0.7rem;
    }
    .arc-control-row {
      align-items: center;
      gap: 3px;
      padding: 4px 2px;
    }
    .arc-control-row label {
      min-width: 0;
      white-space: nowrap;
      font-size: 0.64rem;
      line-height: 1;
    }
    .arc-control-value {
      flex: 1;
      min-width: 0;
      color: #cdd6f4;
      font-family: monospace;
      font-size: 0.64rem;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .arc-slider-row {
      gap: 6px;
      padding: 4px 2px 5px;
    }
    .arc-slider-row label {
      flex: 0 0 62px;
      font-size: 0.63rem;
    }
    .arc-slider-row input[type=range] { flex: 1; min-width: 52px; }
    .arc-slider-row .tree-slider-val { width: 38px; padding-right: 2px; }

    /*
    Future playback controls, disabled for now.

    #anim-controls {
      margin: 6px 8px 8px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      background:
        linear-gradient(#181825, #181825) padding-box,
        linear-gradient(135deg, #cba6f7, #89b4fa) border-box;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(203,166,247,0.06);
      display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
    }
    #anim-playback { display: flex; align-items: center; gap: 6px; }
    .play-btn {
      background: #313244; border: 1px solid #45475a;
      border-radius: 6px; color: #cdd6f4; cursor: pointer;
      font-size: 0.95rem; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
    }
    .play-btn:hover { background: #45475a; border-color: #cba6f7; }
    .play-btn.active { background: #cba6f7; color: #181825; border-color: #cba6f7; }
    .local-btn {
      background: #313244; border: 1px solid #45475a;
      border-radius: 4px; color: #cdd6f4; cursor: pointer;
      font-size: 0.7rem; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
      padding: 0;
    }
    .local-btn:hover { background: #45475a; border-color: #cba6f7; }
    .local-btn.active { background: #cba6f7; color: #181825; border-color: #cba6f7; }
    .anim-dur-lbl { font-size: 0.8rem; color: #a6adc8; }
    #anim-duration {
      width: 46px; background: #313244; border: 1px solid #45475a;
      border-radius: 4px; color: #cdd6f4; font-size: 0.8rem;
      padding: 3px 6px; outline: none; text-align: right;
    }
    #anim-duration:focus { border-color: #cba6f7; }
    #anim-scrubber-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: #a6adc8;
    }
    #anim-scrubber { flex: 1; accent-color: #cba6f7; cursor: pointer; }
    #anim-t-display {
      width: 38px; text-align: right;
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }
    */

    /* ── Graphs panel ── */
    #graphs-panel {
      display: none;
      flex-direction: column;
      flex: 1; overflow: hidden; min-height: 0;
      padding-top: 44px;
    }
    #graphs-header {
      display: flex; align-items: center;
      padding: 0 12px;
      height: 38px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    #graphs-header span {
      font-size: 0.82rem; font-weight: 600;
      color: #a6adc8; letter-spacing: 0.05em;
    }
    #function-list {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px; min-height: 0;
    }
    .fn-row { display: flex; align-items: center; gap: 6px; }
    .fn-color {
      width: 14px; height: 14px; border-radius: 50%;
      flex-shrink: 0; cursor: pointer; border: 2px solid transparent;
    }
    .fn-input {
      flex: 1; background: #313244; border: 1px solid #45475a;
      border-radius: 6px; padding: 7px 10px; color: #cdd6f4;
      font-size: 0.9rem; font-family: monospace; outline: none;
      transition: border-color 0.15s;
    }
    .fn-input:focus { border-color: #cba6f7; }
    .fn-input.error { border-color: #f38ba8; }
    .fn-remove {
      background: none; border: none; color: #a6adc8; cursor: pointer;
      font-size: 1.1rem; padding: 2px 4px; border-radius: 4px; transition: color 0.15s;
    }
    .fn-remove:hover { color: #f38ba8; }
    .fn-type {
      background: #313244; border: 1px solid #45475a; border-radius: 4px;
      color: #cdd6f4; font-size: 0.75rem; padding: 3px 5px; cursor: pointer; outline: none;
    }
    #add-fn {
      margin: 8px; padding: 8px;
      background: #313244; border: 1px dashed #45475a; border-radius: 6px;
      color: #a6adc8; cursor: pointer; font-size: 0.85rem;
      transition: all 0.15s; flex-shrink: 0;
    }
    #add-fn:hover { border-color: #cba6f7; color: #cba6f7; }
    #graphs-controls {
      padding: 10px; border-top: 1px solid #313244;
      display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
    }
    .ctrl-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: #a6adc8;
    }
    .ctrl-row input[type=range] { flex: 1; accent-color: #cba6f7; }

    /* Global settings */
    #global-settings {
      position: relative;
      flex-shrink: 0;
      margin: 0 8px 8px;
      min-height: 38px;
      display: flex;
      align-items: center;
    }
    #global-settings-btn {
      width: 38px;
      height: 38px;
      border: 1px solid #45475a;
      border-radius: 7px;
      background: #1e1e2e;
      color: #cdd6f4;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    #global-settings-btn:hover,
    #global-settings.open #global-settings-btn {
      background: #313244;
      border-color: #89b4fa;
      color: #f5f7ff;
    }
    #global-settings-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #global-settings-menu {
      position: absolute;
      left: 0;
      bottom: 44px;
      width: 264px;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
      background: #181825;
      border: 1px solid #585b70;
      border-radius: 8px;
      box-shadow: 0 12px 26px rgba(0,0,0,0.38), inset 0 1px 0 rgba(205,214,244,0.05);
      z-index: 250;
    }
    #global-settings.open #global-settings-menu { display: flex; }
    .settings-title {
      font-size: 0.76rem;
      color: #cdd6f4;
      font-weight: 600;
      padding: 0 2px 2px;
    }
    .settings-row {
      display: grid;
      grid-template-columns: 104px 1fr 36px;
      align-items: center;
      gap: 8px;
      color: #a6adc8;
      font-size: 0.7rem;
    }
    .settings-row label { white-space: nowrap; }
    .settings-row input[type=range] {
      min-width: 0;
      accent-color: #cba6f7;
      cursor: pointer;
    }
    .settings-value {
      color: #cdd6f4;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    /* ── Canvas ── */
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>

<div id="corner-fold"></div>

<script>
// ════════════════════════════════════════════════════════
// SHARED
// ════════════════════════════════════════════════════════

const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');

let originX = 0, originY = 0;
let scale = 60;
let dragging = false, dragStartX, dragStartY, dragOriginX, dragOriginY;
let currentMode = 'animations';
let mouseDownClientX = 0, mouseDownClientY = 0;

const CANVAS_TOOL_COLOR = '#cdd6f4';
const CANVAS_CONTROL_IDLE_COLOR = '#e1e4ec';

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

const GLOBAL_SETTINGS_KEY = 'animatorGlobalSettings.v1';
const SNAP_STRENGTH_VALUES = [0, 1, 2, 5, 10, 20, 50, 100];
const DEFAULT_GLOBAL_SETTINGS = {
  defaultThickness: 4,
  gridStrength: 50,
  axisStrength: 50,
  snapStrength: 10,
};

function nearestSnapStrength(v) {
  return SNAP_STRENGTH_VALUES.reduce((best, cand) =>
    Math.abs(cand - v) < Math.abs(best - v) ? cand : best,
    SNAP_STRENGTH_VALUES[0]
  );
}

function snapStrengthIndex(v) {
  return Math.max(0, SNAP_STRENGTH_VALUES.indexOf(nearestSnapStrength(v)));
}

function normalizeGlobalSettings(raw = {}) {
  const rawSnapStrength = raw.snapToGrid === false
    ? 0
    : raw.snapStrength ?? DEFAULT_GLOBAL_SETTINGS.snapStrength;
  return {
    defaultThickness: Math.round(clamp(Number(raw.defaultThickness ?? DEFAULT_GLOBAL_SETTINGS.defaultThickness), 1, 10)),
    gridStrength: Math.round(clamp(Number(raw.gridStrength ?? DEFAULT_GLOBAL_SETTINGS.gridStrength), 0, 100) / 5) * 5,
    axisStrength: Math.round(clamp(Number(raw.axisStrength ?? DEFAULT_GLOBAL_SETTINGS.axisStrength), 0, 100) / 5) * 5,
    snapStrength: nearestSnapStrength(Number(rawSnapStrength)),
  };
}

function loadGlobalSettings() {
  try {
    const saved = localStorage.getItem(GLOBAL_SETTINGS_KEY);
    return normalizeGlobalSettings(saved ? JSON.parse(saved) : DEFAULT_GLOBAL_SETTINGS);
  } catch {
    return normalizeGlobalSettings(DEFAULT_GLOBAL_SETTINGS);
  }
}

function saveGlobalSettings() {
  try { localStorage.setItem(GLOBAL_SETTINGS_KEY, JSON.stringify(globalSettings)); } catch {}
}

let globalSettings = loadGlobalSettings();

function colorFromStrength(strength, base, max) {
  const pct = clamp(strength, 0, 100);
  if (pct <= 0) return 'rgba(0,0,0,0)';
  if (pct <= 50) {
    const a = pct / 50;
    return `rgba(${base[0]},${base[1]},${base[2]},${a.toFixed(3)})`;
  }
  const t = (pct - 50) / 50;
  const r = Math.round(base[0] + (max[0] - base[0]) * t);
  const g = Math.round(base[1] + (max[1] - base[1]) * t);
  const b = Math.round(base[2] + (max[2] - base[2]) * t);
  return `rgb(${r},${g},${b})`;
}

function gridStrokeColor() {
  return colorFromStrength(globalSettings.gridStrength, [49, 50, 68], [69, 71, 90]);
}

function axisStrokeColor() {
  return colorFromStrength(globalSettings.axisStrength, [88, 91, 112], [127, 132, 156]);
}

function axisTextColor() {
  return colorFromStrength(globalSettings.axisStrength, [108, 112, 134], [147, 153, 178]);
}

function currentSnapStrength() {
  return globalSettings.snapStrength;
}

function snapThreshold() {
  return currentSnapStrength() / 200;
}

function resize() {
  const wrap = canvas.parentElement;
  canvas.width  = wrap.clientWidth  * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  canvas.style.width  = wrap.clientWidth  + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  if (originX === 0 && originY === 0) {
    originX = canvas.width  / 2;
    originY = canvas.height / 2;
  }
  draw();
}
window.addEventListener('resize', resize);

function toCanvas(mathX, mathY) {
  return [originX + mathX * scale, originY - mathY * scale];
}
function toMath(cx, cy) {
  return [(cx - originX) / scale, (originY - cy) / scale];
}

function drawGrid() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);
  const step   = scale;
  const startX = Math.floor(-originX / step) * step + originX;
  const startY = Math.floor(-originY / step) * step + originY;
  ctx.lineWidth = 1;
  ctx.strokeStyle = gridStrokeColor();
  for (let x = startX; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = startY; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle = axisStrokeColor();
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(originX, 0); ctx.lineTo(originX, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(W, originY); ctx.stroke();
  ctx.fillStyle = axisTextColor();
  ctx.font = `${11 * devicePixelRatio}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  const mathLeft  = Math.ceil(toMath(0,0)[0]);
  const mathRight = Math.floor(toMath(W,0)[0]);
  for (let n = mathLeft; n <= mathRight; n++) {
    if (n === 0) continue;
    const [cx] = toCanvas(n, 0);
    ctx.fillText(n, cx, originY + 4);
  }
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  const mathTop    = Math.ceil(toMath(0,0)[1]);
  const mathBottom = Math.floor(toMath(0,H)[1]);
  for (let n = mathBottom; n <= mathTop; n++) {
    if (n === 0) continue;
    const [, cy] = toCanvas(0, n);
    ctx.fillText(n, originX - 6, cy);
  }
}


// ════════════════════════════════════════════════════════
// GRAPHS MODE
// ════════════════════════════════════════════════════════

function makeEval(expr) {
  const src = expr
    .replace(/\^/g,      '**')
    .replace(/\bsin\b/g,  'Math.sin')
    .replace(/\bcos\b/g,  'Math.cos')
    .replace(/\btan\b/g,  'Math.tan')
    .replace(/\bsqrt\b/g, 'Math.sqrt')
    .replace(/\babs\b/g,  'Math.abs')
    .replace(/\blog\b/g,  'Math.log10')
    .replace(/\bln\b/g,   'Math.log')
    .replace(/\bexp\b/g,  'Math.exp')
    .replace(/\bpi\b/g,   'Math.PI')
    .replace(/\be\b/g,    'Math.E')
    .replace(/\bfloor\b/g,'Math.floor')
    .replace(/\bceil\b/g, 'Math.ceil');
  // eslint-disable-next-line no-new-func
  return new Function('x','theta','t',`"use strict"; try { return ${src}; } catch(e) { return NaN; }`);
}

const GRAPH_COLORS = ['#f38ba8','#a6e3a1','#89b4fa','#fab387','#f9e2af','#cba6f7','#89dceb','#94e2d5'];
let functions = [];
let graphColorIdx = 0;

function addFunction(expr = '', type = 'cartesian') {
  const color = GRAPH_COLORS[graphColorIdx++ % GRAPH_COLORS.length];
  const f = { id: Date.now() + Math.random(), expr, type, color,
               compiled: null, compiledX: null, compiledY: null, error: false };
  functions.push(f);
  renderFunctionList();
  return f;
}

function compileFunction(f) {
  f.error = false;
  try {
    if (f.type === 'parametric') {
      const parts = f.expr.split(',');
      if (parts.length < 2) throw new Error('need two expressions');
      f.compiledX = makeEval(parts[0].trim());
      f.compiledY = makeEval(parts[1].trim());
      f.compiled  = true;
    } else {
      f.compiled = makeEval(f.expr);
    }
  } catch(e) { f.error = true; f.compiled = null; }
}

function renderFunctionList() {
  const list = document.getElementById('function-list');
  list.innerHTML = '';
  for (const f of functions) {
    const row = document.createElement('div');
    row.className = 'fn-row';
    const dot = document.createElement('div');
    dot.className = 'fn-color'; dot.style.background = f.color;
    const typeSelect = document.createElement('select');
    typeSelect.className = 'fn-type';
    ['cartesian','polar','parametric'].forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t[0].toUpperCase();
      if (t === f.type) opt.selected = true;
      typeSelect.appendChild(opt);
    });
    typeSelect.title = 'Function type';
    typeSelect.addEventListener('change', () => {
      f.type = typeSelect.value; compileFunction(f);
      input.classList.toggle('error', f.error); draw();
    });
    const input = document.createElement('input');
    input.className = 'fn-input' + (f.error ? ' error' : '');
    input.type = 'text'; input.value = f.expr;
    input.placeholder = f.type === 'polar' ? 'r = f(theta)' : f.type === 'parametric' ? 'x(t), y(t)' : 'y = f(x)';
    input.addEventListener('input', () => {
      f.expr = input.value; compileFunction(f);
      input.classList.toggle('error', f.error && f.expr.trim() !== ''); draw();
    });
    const rm = document.createElement('button');
    rm.className = 'fn-remove'; rm.textContent = '×';
    rm.addEventListener('click', () => { functions = functions.filter(x => x.id !== f.id); renderFunctionList(); draw(); });
    row.append(dot, typeSelect, input, rm);
    list.appendChild(row);
  }
}

document.getElementById('add-fn').addEventListener('click', () => addFunction('', 'cartesian'));

const thetaStepInput = document.getElementById('theta-step');
const thetaStepVal   = document.getElementById('theta-step-val');
thetaStepInput.addEventListener('input', () => {
  thetaStepVal.textContent = parseFloat(thetaStepInput.value).toFixed(3); draw();
});

function plotCartesian(fn, color) {
  const W = canvas.width, step = 1 / devicePixelRatio;
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2 * devicePixelRatio;
  let first = true, prevPy = null;
  for (let px = 0; px <= W; px += step) {
    const y = fn((px - originX) / scale, 0, 0);
    if (!isFinite(y)) { first = true; prevPy = null; continue; }
    const py = originY - y * scale;
    if (prevPy !== null && ((py < 0 && prevPy > canvas.height) || (py > canvas.height && prevPy < 0))) first = true;
    if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
    prevPy = py;
  }
  ctx.stroke();
}

function plotPolar(fn, color, thetaStep) {
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2 * devicePixelRatio;
  let first = true;
  for (let theta = 0; theta <= Math.PI * 2 + thetaStep; theta += thetaStep) {
    const r = fn(0, theta, theta);
    if (!isFinite(r)) { first = true; continue; }
    const [px, py] = toCanvas(r * Math.cos(theta), r * Math.sin(theta));
    if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
  }
  ctx.stroke();
}

function plotParametric(fnX, fnY, color) {
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2 * devicePixelRatio;
  const steps = 2000, tMin = -20, tMax = 20;
  let first = true;
  for (let i = 0; i <= steps; i++) {
    const t = tMin + (tMax - tMin) * i / steps;
    const x = fnX(0,0,t), y = fnY(0,0,t);
    if (!isFinite(x) || !isFinite(y)) { first = true; continue; }
    const [px, py] = toCanvas(x, y);
    if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
  }
  ctx.stroke();
}

function drawGraphs() {
  drawGrid();
  const thetaStep = parseFloat(thetaStepInput.value);
  for (const f of functions) {
    if (!f.compiled || f.error) continue;
    try {
      if      (f.type === 'cartesian')  plotCartesian(f.compiled, f.color);
      else if (f.type === 'polar')      plotPolar(f.compiled, f.color, thetaStep);
      else if (f.type === 'parametric') plotParametric(f.compiledX, f.compiledY, f.color);
    } catch(e) {}
  }
}


// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — complex number engine
// ════════════════════════════════════════════════════════

class Cx {
  constructor(re = 0, im = 0) { this.re = re; this.im = im; }
  add(b) { return new Cx(this.re + b.re, this.im + b.im); }
  sub(b) { return new Cx(this.re - b.re, this.im - b.im); }
  mul(b) { return new Cx(this.re*b.re - this.im*b.im, this.re*b.im + this.im*b.re); }
  div(b) {
    const d = b.re*b.re + b.im*b.im;
    if (d === 0) return new Cx(NaN, NaN);
    return new Cx((this.re*b.re + this.im*b.im)/d, (this.im*b.re - this.re*b.im)/d);
  }
  pow(b) {
    if (this.re === 0 && this.im === 0) return b.re > 0 ? new Cx(0,0) : new Cx(NaN,NaN);
    const r   = Math.sqrt(this.re*this.re + this.im*this.im);
    const lnA = new Cx(Math.log(r), argW(this));
    const p   = b.mul(lnA);
    const eR  = Math.exp(p.re);
    return new Cx(eR * Math.cos(p.im), eR * Math.sin(p.im));
  }
  neg() { return new Cx(-this.re, -this.im); }
  ok()  { return isFinite(this.re) && isFinite(this.im); }
}

function argW(z) {
  if (z.im === 0 && z.re > 0) return 2 * Math.PI;
  const a = Math.atan2(z.im, z.re);
  return a > 0 ? a : a + 2 * Math.PI;
}

function animTokenize(expr) {
  const toks = [];
  let i = 0;
  while (i < expr.length) {
    if (/\s/.test(expr[i])) { i++; continue; }
    if (/\d/.test(expr[i]) || (expr[i] === '.' && /\d/.test(expr[i+1] !== undefined ? expr[i+1] : ''))) {
      let j = i;
      while (j < expr.length && /[\d.]/.test(expr[j])) j++;
      toks.push({t:'num', v: parseFloat(expr.slice(i,j))}); i = j;
    } else if (/[a-zA-Z]/.test(expr[i])) {
      toks.push({t:'id', v: expr[i++]});
    } else {
      const ch = expr[i++];
      if      (ch==='+') toks.push({t:'+'});
      else if (ch==='-') toks.push({t:'-'});
      else if (ch==='*') toks.push({t:'*'});
      else if (ch==='/') toks.push({t:'/'});
      else if (ch==='^') toks.push({t:'^'});
      else if (ch==='(') toks.push({t:'('});
      else if (ch===')') toks.push({t:')'});
    }
  }
  return toks;
}

function animParse(toks) {
  let p = 0;
  const peek = () => toks[p];
  const next = () => toks[p++];
  function expr() {
    let L = term();
    while (peek() && (peek().t==='+' || peek().t==='-')) {
      const op = next().t; L = {n:'op', op, L, R: term()};
    }
    return L;
  }
  function term() {
    let L = unary();
    while (peek()) {
      const t = peek().t;
      if (t==='*' || t==='/') { const op=next().t; L={n:'op',op,L,R:unary()}; }
      else if (t==='num' || t==='id' || t==='(') { L={n:'op',op:'*',L,R:unary()}; }
      else break;
    }
    return L;
  }
  function unary() {
    if (peek() && peek().t==='-') { next(); return {n:'neg', arg: power()}; }
    return power();
  }
  function power() {
    const base = atom();
    if (peek() && peek().t==='^') { next(); return {n:'op',op:'^',L:base,R:unary()}; }
    return base;
  }
  function atom() {
    const tok = peek();
    if (!tok) throw new Error('Unexpected end');
    if (tok.t === 'num') { next(); return {n:'num', v: tok.v}; }
    if (tok.t === 'id') {
      next(); const name = tok.v;
      if (peek() && peek().t === '(') {
        next(); let depth = 1;
        while (p < toks.length && depth > 0) {
          if (toks[p].t==='(') depth++;
          else if (toks[p].t===')') depth--;
          p++;
        }
        if (/^[A-Z]$/.test(name)) return {n:'ref', name};
        throw new Error(`Unknown function: ${name}`);
      }
      if (name === 'i') return {n:'i'};
      if (name === 't') return {n:'t'};
      if (name === 'u') return {n:'u'};
      if (/^[A-Z]$/.test(name)) return {n:'ref', name};
      throw new Error(`Unknown identifier: ${name}`);
    }
    if (tok.t === '(') {
      next(); const node = expr();
      if (!peek() || peek().t !== ')') throw new Error('Expected )');
      next(); return node;
    }
    throw new Error(`Unexpected token: ${tok.t}`);
  }
  const ast = expr();
  if (p < toks.length) throw new Error('Unexpected extra tokens');
  return ast;
}

function evalAST(node, t, u, aCtx) {
  switch (node.n) {
    case 'num': return new Cx(node.v, 0);
    case 'i':   return new Cx(0, 1);
    case 't':   return new Cx(t, 0);
    case 'u':   return new Cx(u, 0);
    case 'ref': { const fn = aCtx[node.name]; if (!fn) throw new Error(`Undefined: ${node.name}`); return fn(u); }
    case 'neg': return evalAST(node.arg, t, u, aCtx).neg();
    case 'op': {
      const L = evalAST(node.L, t, u, aCtx);
      const R = evalAST(node.R, t, u, aCtx);
      if (node.op==='+') return L.add(R);
      if (node.op==='-') return L.sub(R);
      if (node.op==='*') return L.mul(R);
      if (node.op==='/') return L.div(R);
      if (node.op==='^') return L.pow(R);
      throw new Error(`Unknown op: ${node.op}`);
    }
    default: throw new Error(`Unknown node: ${node.n}`);
  }
}

function astUsesU(node) {
  if (!node) return false;
  if (node.n === 'u') return true;
  if (node.n === 'neg') return astUsesU(node.arg);
  if (node.n === 'op') return astUsesU(node.L) || astUsesU(node.R);
  return false;
}

function compileAnimExpr(expr) {
  const ast = animParse(animTokenize(expr));
  const fn = (t, u, aCtx) => evalAST(ast, t, u, aCtx);
  fn.usesU = astUsesU(ast);
  return fn;
}

function parseCx(str) {
  try {
    const fn = compileAnimExpr(str.trim() || '0');
    const v = fn(0, 0, {});
    return (v && v.ok()) ? v : null;
  } catch(e) { return null; }
}

function formatCx(cx) {
  function fmtN(v) { return Number.isInteger(v) ? String(v) : parseFloat(v.toFixed(3)).toString(); }
  function fmtIm(v) { return v === 1 ? 'i' : v === -1 ? '-i' : `${fmtN(v)}i`; }
  const { re, im } = cx;
  if (im === 0) return fmtN(re);
  if (re === 0) return fmtIm(im);
  return `${fmtN(re)}${im > 0 ? '+' : ''}${fmtIm(im)}`;
}

function formatCxHundredths(cx) {
  function fmtN(v) {
    const r = Math.round(v * 100) / 100;
    return Number.isInteger(r) ? String(r) : r.toFixed(2);
  }
  function fmtIm(v) {
    const r = Math.round(v * 100) / 100;
    return r === 1 ? 'i' : r === -1 ? '-i' : `${fmtN(r)}i`;
  }
  const { re, im } = cx;
  if (im === 0) return fmtN(re);
  if (re === 0) return fmtIm(im);
  return `${fmtN(re)}${im > 0 ? '+' : ''}${fmtIm(im)}`;
}

function formatNumberHundredths(v) {
  const r = Math.round(v * 100) / 100;
  return Number.isInteger(r) ? String(r) : r.toFixed(2);
}

function formatCoordPairHundredths(cx) {
  return `(${formatNumberHundredths(cx.re)}, ${formatNumberHundredths(cx.im)})`;
}

function sameCx(a, b) {
  return !!a && !!b && Math.abs(a.re - b.re) < 1e-9 && Math.abs(a.im - b.im) < 1e-9;
}

function cloneCx(p) { return new Cx(p.re, p.im); }
function clonePts(pts) { return (pts || []).map(p => new Cx(p.re, p.im)); }

function collapseCtrlPts(pts) {
  const out = clonePts(pts || []);
  while (out.length > 1 && sameCx(out[out.length - 1], out[out.length - 2])) out.pop();
  return out;
}

function evalBezierPoint(ctrlPts, u) {
  const pts = clonePts(ctrlPts || []);
  if (pts.length === 0) return new Cx(NaN, NaN);
  if (pts.length === 1) return pts[0];
  const uu = Math.max(0, Math.min(1, u));
  for (let level = pts.length - 1; level > 0; level--) {
    for (let i = 0; i < level; i++) {
      pts[i] = new Cx(
        pts[i].re + (pts[i + 1].re - pts[i].re) * uu,
        pts[i].im + (pts[i + 1].im - pts[i].im) * uu
      );
    }
  }
  return pts[0];
}

function buildBezierFn(ctrlPts) {
  const collapsed = collapseCtrlPts(ctrlPts || []);
  const fn = (_t, u) => evalBezierPoint(collapsed, u);
  fn.usesU = collapsed.length > 1;
  fn.degree = Math.max(0, collapsed.length - 1);
  fn.basePts = collapsed;
  return fn;
}

function midpointCx(a, b) {
  return new Cx((a.re + b.re) * 0.5, (a.im + b.im) * 0.5);
}

function buildCompositeBezierFn(ctrlPts) {
  const pts = clonePts(ctrlPts || []);
  if (pts.length < 4) return null;
  const [p0, p1, p2, p3] = pts;
  if (![p0, p1, p2, p3].every(p => p && p.ok && p.ok())) return null;
  const m01 = midpointCx(p0, p1);
  const m12 = midpointCx(p1, p2);
  const m23 = midpointCx(p2, p3);
  const first = [p0, m01, p1, m12];
  const second = [m12, p2, m23, p3];
  const fn = (_t, u) => {
    const s = Math.max(0, Math.min(1, u));
    if (s <= 0.5) return evalBezierPoint(first, s * 2);
    return evalBezierPoint(second, (s - 0.5) * 2);
  };
  fn.usesU = true;
  fn.degree = 3;
  fn.basePts = pts;
  fn.curveKind = 'composite';
  return fn;
}

function buildPolygonFn(pts) {
  const N = pts.length - 1;
  if (N <= 0) return null;
  const cpts = clonePts(pts);
  const fn = (_t, u) => {
    const s = Math.max(0, Math.min(1, u)) * N;
    const k = Math.min(Math.floor(s), N - 1);
    const frac = s - k;
    const a = cpts[k], b = cpts[k + 1];
    return new Cx(a.re + (b.re - a.re) * frac, a.im + (b.im - a.im) * frac);
  };
  fn.usesU = true;
  return fn;
}

function buildShiftedCompositeBezierFn(ctrlPts, alpha) {
  const pts = clonePts(ctrlPts || []);
  if (pts.length < 4) return null;
  const [p0, p1, p2, p3] = pts;
  if (![p0, p1, p2, p3].every(p => p && p.ok && p.ok())) return null;
  const s = Math.max(0, Math.min(1, alpha));
  const m01 = midpointCx(p0, p1);
  const m12 = midpointCx(p1, p2);
  const m23 = midpointCx(p2, p3);
  const q01 = new Cx(m01.re + (p1.re - m01.re) * s, m01.im + (p1.im - m01.im) * s);
  const q23 = new Cx(m23.re + (p2.re - m23.re) * s, m23.im + (p2.im - m23.im) * s);
  const first = [p0, q01, p1, m12];
  const second = [m12, p2, q23, p3];
  const fn = (_t, u) => {
    const t = Math.max(0, Math.min(1, u));
    if (t <= 0.5) return evalBezierPoint(first, t * 2);
    return evalBezierPoint(second, (t - 0.5) * 2);
  };
  fn.usesU = true;
  fn.degree = 3;
  fn.basePts = pts;
  fn.curveKind = 'shiftedComposite';
  return fn;
}

function buildRepeatedDegreeCompositeBezierFn(ctrlPts, degree) {
  const pts = clonePts(ctrlPts || []);
  if (pts.length < 4) return null;
  const [p0, p1, p2, p3] = pts;
  if (![p0, p1, p2, p3].every(p => p && p.ok && p.ok())) return null;
  const d = Math.max(3, Math.round(degree));
  const m12 = midpointCx(p1, p2);
  const first = [p0];
  const second = [m12];
  for (let i = 0; i < d - 1; i++) { first.push(p1); second.push(p2); }
  first.push(m12);
  second.push(p3);
  const fn = (_t, u) => {
    const t = Math.max(0, Math.min(1, u));
    if (t <= 0.5) return evalBezierPoint(first, t * 2);
    return evalBezierPoint(second, (t - 0.5) * 2);
  };
  fn.usesU = true;
  fn.degree = d;
  fn.basePts = pts;
  fn.curveKind = 'repeatedComposite';
  return fn;
}

function buildSingleEccentricityFn(pts, e, bezier, spiral, composite) {
  if (!bezier) return null;
  if (pts.length < 4) return bezier;
  const [p0, p1, p2, p3] = pts;
  const polygon = buildPolygonFn(pts);
  const ce = Math.max(0, Math.min(3, e));
  let fn;
  if (ce <= 1) {
    const sp1 = new Cx(p0.re + ce*(p1.re-p0.re), p0.im + ce*(p1.im-p0.im));
    const sp2 = new Cx(p3.re - ce*(p3.re-p2.re), p3.im - ce*(p3.im-p2.im));
    fn = buildBezierFn([p0, sp1, sp2, p3]);
  } else if (ce <= 2) {
    const alpha = ce - 1;
    const hi = composite || bezier;
    fn = (_t, u, ctx) => {
      const v1 = bezier(_t, u, ctx), v2 = hi(_t, u, ctx);
      if (!v1 || !v1.ok() || !v2 || !v2.ok()) return new Cx(NaN, NaN);
      return new Cx(v1.re + (v2.re - v1.re) * alpha, v1.im + (v2.im - v1.im) * alpha);
    };
  } else if (ce <= 2.5) {
    fn = buildShiftedCompositeBezierFn(pts, (ce - 2) * 2) || composite || bezier;
  } else if (ce <= 2.8) {
    const alpha = (ce - 2.5) / 0.3;
    const lo = buildShiftedCompositeBezierFn(pts, 1) || composite || bezier;
    const hi = buildRepeatedDegreeCompositeBezierFn(pts, 4) || lo;
    fn = (_t, u, ctx) => {
      const v1 = lo(_t, u, ctx), v2 = hi(_t, u, ctx);
      if (!v1 || !v1.ok() || !v2 || !v2.ok()) return new Cx(NaN, NaN);
      return new Cx(v1.re + (v2.re - v1.re) * alpha, v1.im + (v2.im - v1.im) * alpha);
    };
  } else if (ce <= 2.9) {
    const alpha = (ce - 2.8) / 0.1;
    const lo = buildRepeatedDegreeCompositeBezierFn(pts, 4) || composite || bezier;
    const hi = buildRepeatedDegreeCompositeBezierFn(pts, 5) || lo;
    fn = (_t, u, ctx) => {
      const v1 = lo(_t, u, ctx), v2 = hi(_t, u, ctx);
      if (!v1 || !v1.ok() || !v2 || !v2.ok()) return new Cx(NaN, NaN);
      return new Cx(v1.re + (v2.re - v1.re) * alpha, v1.im + (v2.im - v1.im) * alpha);
    };
  } else {
    const alpha = (ce - 2.9) / 0.1;
    const lo = buildRepeatedDegreeCompositeBezierFn(pts, 5) || composite || bezier;
    const hi = polygon || lo;
    fn = (_t, u, ctx) => {
      const v1 = lo(_t, u, ctx), v2 = hi(_t, u, ctx);
      if (!v1 || !v1.ok() || !v2 || !v2.ok()) return new Cx(NaN, NaN);
      return new Cx(v1.re + (v2.re - v1.re) * alpha, v1.im + (v2.im - v1.im) * alpha);
    };
  }
  fn.usesU = true;
  return fn;
}

function eccentricityToPercent(e) {
  const ce = Math.max(0, Math.min(3, typeof e === 'number' ? e : 1));
  if (ce <= 1) return ce * 50;
  if (ce <= 2) return 50 + (ce - 1) * 25;
  return 75 + (ce - 2) * 25;
}

function percentToEccentricity(pct) {
  const cp = Math.max(0, Math.min(100, typeof pct === 'number' ? pct : 50));
  if (cp <= 50) return cp / 50;
  if (cp <= 75) return 1 + (cp - 50) / 25;
  return 2 + (cp - 75) / 25;
}

// Hit-detection utilities
function compiledCanvasPoint(compiled, u) {
  try {
    const v = compiled(0, u, {});
    return (v && v.ok()) ? toCanvas(v.re, v.im) : null;
  } catch (_err) { return null; }
}

function pointLineDeviation(pt, a, b) {
  if (!pt || !a || !b) return Infinity;
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const len = Math.hypot(dx, dy);
  if (len < 1e-9) return Math.hypot(pt[0] - a[0], pt[1] - a[1]);
  return Math.abs(dy * pt[0] - dx * pt[1] + b[0] * a[1] - b[1] * a[0]) / len;
}

function pointSegmentDistance(px, py, a, b) {
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const len2 = dx * dx + dy * dy;
  if (len2 < 1e-9) return Math.hypot(px - a[0], py - a[1]);
  const t = clamp(((px - a[0]) * dx + (py - a[1]) * dy) / len2, 0, 1);
  return Math.hypot(px - a[0] - dx * t, py - a[1] - dy * t);
}

function sampleCompiledAdaptive(compiled, tolerancePx = 0.7 * devicePixelRatio, maxDepth = 9) {
  if (!compiled) return [];
  const cacheKey = [tolerancePx.toFixed(3), maxDepth, scale.toFixed(4), originX.toFixed(2), originY.toFixed(2), devicePixelRatio].join('|');
  if (!compiled._sampleCache) compiled._sampleCache = {};
  if (compiled._sampleCache[cacheKey]) return compiled._sampleCache[cacheKey];
  const p0 = compiledCanvasPoint(compiled, 0);
  const p1 = compiledCanvasPoint(compiled, 1);
  if (!p0 || !p1) return [];
  const samples = [p0];
  function recurse(u0, a, u1, b, depth) {
    if (depth <= 0) { samples.push(b); return; }
    const um = (u0 + u1) * 0.5;
    const ul = (2 * u0 + u1) / 3, ur = (u0 + 2 * u1) / 3;
    const pm = compiledCanvasPoint(compiled, um);
    const pl = compiledCanvasPoint(compiled, ul);
    const pr = compiledCanvasPoint(compiled, ur);
    if (!pm || !pl || !pr) { samples.push(b); return; }
    const maxDev = Math.max(pointLineDeviation(pl, a, b), pointLineDeviation(pm, a, b), pointLineDeviation(pr, a, b));
    if (maxDev <= tolerancePx) { samples.push(b); return; }
    recurse(u0, a, um, pm, depth - 1);
    recurse(um, pm, u1, b, depth - 1);
  }
  recurse(0, p0, 1, p1, maxDepth);
  compiled._sampleCache[cacheKey] = samples;
  return samples;
}

function polylineHitInfo(samples, cx, cy) {
  if (!samples || samples.length === 0) return { dist: Infinity, u: 0 };
  if (samples.length === 1) return { dist: Math.hypot(cx - samples[0][0], cy - samples[0][1]), u: 0 };
  let bestDist = Infinity, bestU = 0;
  const segCount = samples.length - 1;
  for (let i = 0; i < segCount; i++) {
    const dist = pointSegmentDistance(cx, cy, samples[i], samples[i + 1]);
    if (dist < bestDist) { bestDist = dist; bestU = (i + 0.5) / segCount; }
  }
  return { dist: bestDist, u: bestU };
}

function strokePath(pts, color, lineWidth) {
  ctx.beginPath();
  ctx.strokeStyle = color; ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  let first = true;
  for (const pt of pts) {
    if (!pt) { first = true; continue; }
    if (first) { ctx.moveTo(pt[0], pt[1]); first = false; } else ctx.lineTo(pt[0], pt[1]);
  }
  ctx.stroke();
}

function drawCompiledCurve(compiled, color, lineWidth, alpha) {
  if (!compiled) return;
  const STEPS = 240;
  const samples = [];
  for (let i = 0; i <= STEPS; i++) {
    const v = compiled(0, i / STEPS, {});
    samples.push((v && v.ok()) ? toCanvas(v.re, v.im) : null);
  }
  ctx.save();
  ctx.globalAlpha = alpha;
  strokePath(samples, color, lineWidth);
  ctx.restore();
}

function lerpCx(a, b, t) {
  return new Cx(a.re + (b.re - a.re) * t, a.im + (b.im - a.im) * t);
}

function deCasteljauSplit(pts, t) {
  const [p0, p1, p2, p3] = pts;
  const q0 = lerpCx(p0, p1, t), q1 = lerpCx(p1, p2, t), q2 = lerpCx(p2, p3, t);
  const r0 = lerpCx(q0, q1, t), r1 = lerpCx(q1, q2, t);
  const s0 = lerpCx(r0, r1, t);
  return [[p0, q0, r0, s0], [s0, r1, q2, p3]];
}

function computeInitialHandles(anchors) {
  const n = anchors.length;
  if (n < 2) return [];

  const makeSeg = (h0, h1) => ({ h0, h1, eccentricity: 1, compiled: null, compiledRef: null });

  if (n === 2) {
    const [A0, A1] = anchors;
    return [makeSeg(lerpCx(A0, A1, 1/3), lerpCx(A0, A1, 2/3))];
  }

  if (n === 3) {
    const [A0, A1, A2] = anchors;
    const d01 = Math.hypot(A1.re - A0.re, A1.im - A0.im);
    const d12 = Math.hypot(A2.re - A1.re, A2.im - A1.im);
    const t1 = (d01 + d12) > 1e-9 ? d01 / (d01 + d12) : 0.5;
    const denom = 2 * t1 * (1 - t1);
    let Q;
    if (denom < 1e-9) {
      Q = lerpCx(A0, A2, 0.5);
    } else {
      Q = new Cx(
        (A1.re - (1-t1)*(1-t1)*A0.re - t1*t1*A2.re) / denom,
        (A1.im - (1-t1)*(1-t1)*A0.im - t1*t1*A2.im) / denom
      );
    }
    const C1 = new Cx((A0.re + 2*Q.re) / 3, (A0.im + 2*Q.im) / 3);
    const C2 = new Cx((2*Q.re + A2.re) / 3, (2*Q.im + A2.im) / 3);
    const [left, right] = deCasteljauSplit([A0, C1, C2, A2], t1);
    return [makeSeg(left[1], left[2]), makeSeg(right[1], right[2])];
  }

  if (n === 4) {
    const [A0, A1, A2, A3] = anchors;
    const d01 = Math.hypot(A1.re-A0.re, A1.im-A0.im);
    const d12 = Math.hypot(A2.re-A1.re, A2.im-A1.im);
    const d23 = Math.hypot(A3.re-A2.re, A3.im-A2.im);
    const D = d01 + d12 + d23;
    const t1 = D > 1e-9 ? d01 / D : 1/3;
    const t2 = D > 1e-9 ? (d01 + d12) / D : 2/3;
    const a1 = 3*t1*(1-t1)*(1-t1), b1 = 3*t1*t1*(1-t1);
    const a2 = 3*t2*(1-t2)*(1-t2), b2 = 3*t2*t2*(1-t2);
    const det = a1*b2 - a2*b1;
    let P1, P2;
    if (Math.abs(det) < 1e-9) {
      P1 = lerpCx(A0, A3, 1/3);
      P2 = lerpCx(A0, A3, 2/3);
    } else {
      const r1 = new Cx(A1.re - Math.pow(1-t1,3)*A0.re - t1*t1*t1*A3.re,
                        A1.im - Math.pow(1-t1,3)*A0.im - t1*t1*t1*A3.im);
      const r2 = new Cx(A2.re - Math.pow(1-t2,3)*A0.re - t2*t2*t2*A3.re,
                        A2.im - Math.pow(1-t2,3)*A0.im - t2*t2*t2*A3.im);
      P1 = new Cx((r1.re*b2 - r2.re*b1) / det, (r1.im*b2 - r2.im*b1) / det);
      P2 = new Cx((r2.re*a1 - r1.re*a2) / det, (r2.im*a1 - r1.im*a2) / det);
    }
    const [left, right1] = deCasteljauSplit([A0, P1, P2, A3], t1);
    const t2p = (t1 < 1 - 1e-9) ? (t2 - t1) / (1 - t1) : 0.5;
    const [mid, last] = deCasteljauSplit(right1, t2p);
    return [makeSeg(left[1], left[2]), makeSeg(mid[1], mid[2]), makeSeg(last[1], last[2])];
  }

  return [];

function buildInterpolatingPreviewFn(anchors) {
  const n = anchors.length;
  if (n < 2) return null;
  if (n === 2) return buildBezierFn(anchors);
  if (n === 3) {
    const [A0, A1, A2] = anchors;
    const d01 = Math.hypot(A1.re-A0.re, A1.im-A0.im);
    const d12 = Math.hypot(A2.re-A1.re, A2.im-A1.im);
    const t1 = (d01+d12) > 1e-9 ? d01/(d01+d12) : 0.5;
    const denom = 2*t1*(1-t1);
    if (denom < 1e-9) return buildBezierFn([A0, A2]);

      (A1.re - (1-t1)*(1-t1)*A0.re - t1*t1*A2.re) / denom,
      (A1.im - (1-t1)*(1-t1)*A0.im - t1*t1*A2.im) / denom
    );
    return buildBezierFn([A0, new Cx((A0.re+2*Q.re)/3,(A0.im+2*Q.im)/3),

  if (n === 4) {
    const [A0, A1, A2, A3] = anchors;
    const d01 = Math.hypot(A1.re-A0.re, A1.im-A0.im);
    const d12 = Math.hypot(A2.re-A1.re, A2.im-A1.im);
    const d23 = Math.hypot(A3.re-A2.re, A3.im-A2.im);
    const D = d01+d12+d23;
    const t1 = D>1e-9 ? d01/D : 1/3, t2 = D>1e-9 ? (d01+d12)/D : 2/3;
    const a1=3*t1*(1-t1)*(1-t1), b1=3*t1*t1*(1-t1);
    const a2=3*t2*(1-t2)*(1-t2), b2=3*t2*t2*(1-t2);
    const det = a1*b2 - a2*b1;
    if (Math.abs(det) < 1e-9) return buildInterpolatingPreviewFn([A0, A1, A2]);

    const r2 = new Cx(A2.re-Math.pow(1-t2,3)*A0.re-t2*t2*t2*A3.re, A2.im-Math.pow(1-t2,3)*A0.im-t2*t2*t2*A3.im);
    const P1 = new Cx((r1.re*b2-r2.re*b1)/det, (r1.im*b2-r2.im*b1)/det);

    return buildBezierFn([A0, P1, P2, A3]);
  }
  return null;
}


function computeFiveCandidates(p0, p1) {
  const dx = p1.re - p0.re, dy = p1.im - p0.im;

  return [
    makeCandidate( // 0: Straight
      new Cx(p0.re + dRe*L/3,               p0.im + dIm*L/3),
      new Cx(p1.re - dRe*L/3,               p1.im - dIm*L/3)
    ),
    makeCandidate( // 1: Up large
      new Cx(p0.re + nRe*L/2,               p0.im + nIm*L/2),
      new Cx(p1.re + nRe*L/2,               p1.im + nIm*L/2)
    ),
    makeCandidate( // 2: Up gentle
      new Cx(p0.re + dRe*L/4 + nRe*L/4,    p0.im + dIm*L/4 + nIm*L/4),
      new Cx(p1.re - dRe*L/4 + nRe*L/4,    p1.im - dIm*L/4 + nIm*L/4)
    ),
    makeCandidate( // 3: Down gentle
      new Cx(p0.re + dRe*L/4 - nRe*L/4,    p0.im + dIm*L/4 - nIm*L/4),
      new Cx(p1.re - dRe*L/4 - nRe*L/4,    p1.im - dIm*L/4 - nIm*L/4)
    ),
    makeCandidate( // 4: Down large
      new Cx(p0.re - nRe*L/2,               p0.im - nIm*L/2),
      new Cx(p1.re - nRe*L/2,               p1.im - nIm*L/2)
    ),
  ];
}

// Angle bisector tangent at p1, given neighbors p0 and p2.
// Returns the unit vector bisecting the angle between chords p0→p1 and p1→p2.
function bisectorTangent(p0, p1, p2) {
  const ux = p1.re-p0.re, uy = p1.im-p0.im;
  const vx = p2.re-p1.re, vy = p2.im-p1.im;
  const Lu = Math.hypot(ux,uy), Lv = Math.hypot(vx,vy);
  if (Lu < 1e-9) { const l = Lv||1; return new Cx(vx/l, vy/l); }
  if (Lv < 1e-9) return new Cx(ux/Lu, uy/Lu);
  const sx = ux/Lu + vx/Lv, sy = uy/Lu + vy/Lv;
  const Ls = Math.hypot(sx, sy);
  if (Ls < 1e-9) return new Cx(-uy/Lu, ux/Lu); // U-turn: perpendicular to chord
  return new Cx(sx/Ls, sy/Ls);
}

// Handle-length factor: f = angle(chord p0→p1, tangent t) / 90°, clamped to [1/3, 1].
// Minimum 1/3 avoids degenerate zero-length handles when tangent is parallel to chord.
function turnHandleFactor(p0, p1, t) {
  const dx = p1.re-p0.re, dy = p1.im-p0.im;
  const L = Math.hypot(dx, dy);
  if (L < 1e-9) return 0;
  const dot = Math.min(1, Math.max(-1, (dx/L)*t.re + (dy/L)*t.im));
  return Math.max(1/3, Math.acos(dot) / (Math.PI / 2));
}

// Unit direction vector from p0 to p1.
function chordDir(p0, p1) {
  const dx = p1.re-p0.re, dy = p1.im-p0.im;
  const L = Math.hypot(dx, dy);
  return L < 1e-9 ? new Cx(1, 0) : new Cx(dx/L, dy/L);
}

// Build a segment from p0 to p1 with bisector-derived handles.
// tOut: outgoing unit tangent at p0. tIn: outgoing unit tangent at p1 (pointing away from arc).
// f: handle factor; both handles get length f × |p0p1|.
// f0: handle factor at p0 end; f1: handle factor at p1 end (may differ for interior arcs).
function bisectorArc(p0, p1, tOut, tIn, f0, f1) {
  if (f1 === undefined) f1 = f0; // backward compat for symmetric arcs
  const L = Math.hypot(p1.re-p0.re, p1.im-p0.im);
  return makeSeg(
    new Cx(p0.re + tOut.re*f0*L, p0.im + tOut.im*f0*L),
    new Cx(p1.re - tIn.re*f1*L,  p1.im - tIn.im*f1*L)
  );
}

// Reflect unit vector t over the chord direction from p1 to p2 (kept for extension flow).
function reflectOverChord(t, p1, p2) {
  const dx = p2.re-p1.re, dy = p2.im-p1.im;
  const L = Math.hypot(dx, dy);
  if (L < 1e-9) return t;
  const dRe = dx/L, dIm = dy/L;
  const dot2 = 2*(t.re*dRe + t.im*dIm);
  return new Cx(dot2*dRe - t.re, dot2*dIm - t.im);
}

function smoothstep01(x) {
  const t = Math.max(0, Math.min(1, x));
  return t * t * (3 - 2 * t);
}

function blendUnitTangents(a, b, weight) {
  const w = Math.max(0, Math.min(1, weight));
  if (w <= 0) return new Cx(a.re, a.im);
  if (w >= 1) return new Cx(b.re, b.im);
  const a0 = Math.atan2(a.im, a.re);
  const a1 = Math.atan2(b.im, b.re);
  const d = Math.atan2(Math.sin(a1 - a0), Math.cos(a1 - a0));
  const angle = a0 + d * w;
  return new Cx(Math.cos(angle), Math.sin(angle));
}

function prospectivePointWeight(p0, p1, nextPoint) {
  if (!nextPoint) return 0;
  const nextDist = Math.hypot(nextPoint.re - p1.re, nextPoint.im - p1.im);
  if (nextDist < 1e-9) return 0;
  const chordLen = Math.hypot(p1.re - p0.re, p1.im - p0.im);
  const influenceRadius = Math.max(0.35, chordLen * 0.75);
  return smoothstep01(nextDist / influenceRadius);
}

function buildPendingPlacementArc(p0, p1, tContinuation, nextPoint) {
  let tOut, tIn;
  if (tContinuation) {
    tOut = tContinuation;
    const freeEnd = reflectOverChord(tOut, p0, p1);
    const nextEnd = nextPoint ? bisectorTangent(p0, p1, nextPoint) : freeEnd;
    tIn = blendUnitTangents(freeEnd, nextEnd, prospectivePointWeight(p0, p1, nextPoint));
  } else if (nextPoint) {
    tIn = bisectorTangent(p0, p1, nextPoint);
    tOut = reflectOverChord(tIn, p0, p1);
  } else {
    tOut = chordDir(p0, p1);
    tIn = reflectOverChord(tOut, p0, p1);
  }
  const f0 = turnHandleFactor(p0, p1, tOut);
  const f1 = turnHandleFactor(p0, p1, tIn);
  return { seg: bisectorArc(p0, p1, tOut, tIn, f0, f1), tOut, tIn };
}

// Outgoing tangent at the end of a cubic Bézier (used by startExtendedPlacement).
function tangentAtBezierEnd(anchor, h1) {
  const dx = anchor.re - h1.re, dy = anchor.im - h1.im;
  const L = Math.hypot(dx, dy);
  return L < 1e-9 ? new Cx(1, 0) : new Cx(dx/L, dy/L);
}

// Build a new segment object (with handles) for placement.
function makeSeg(h0, h1) {
  return { h0, h1, eccentricity: 1, compiled: null, compiledRef: null };
}

function cleanSplinePoints(points) {
  const out = [];
  for (const p of points || []) {
    if (!p || !p.ok || !p.ok()) continue;
    const prev = out[out.length - 1];
    if (!prev || Math.hypot(p.re - prev.re, p.im - prev.im) > 1e-7)
      out.push(new Cx(p.re, p.im));
  }
  return out;
}

function computeThreeAnchorPlacementSegments(pts) {
  const first = buildPendingPlacementArc(pts[0], pts[1], null, pts[2]);
  const second = buildPendingPlacementArc(pts[1], pts[2], first.tIn, null);
  return [first.seg, second.seg];
}

function blendPoint(a, b, weight) {
  const w = Math.max(0, Math.min(1, weight));
  return new Cx(a.re + (b.re - a.re) * w, a.im + (b.im - a.im) * w);
}

function constrainedFourAnchorPlacementSegments(pts) {
  const base = computeThreeAnchorPlacementSegments(pts.slice(0, 3));
  const candidate = computeInitialHandles(pts);
  if (candidate.length < 3 || base.length < 2) return candidate.length ? candidate : base;

  const tangentShift = 0.18;
  const seg0 = makeSeg(
    blendPoint(base[0].h0, candidate[0].h0, tangentShift),
    blendPoint(base[0].h1, candidate[0].h1, tangentShift)
  );
  const seg1 = makeSeg(
    blendPoint(base[1].h0, candidate[1].h0, tangentShift),
    blendPoint(base[1].h1, candidate[1].h1, 0.45)
  );

  const tOut = tangentAtBezierEnd(pts[2], seg1.h1);
  const pending = buildPendingPlacementArc(pts[2], pts[3], tOut, null);
  return [seg0, seg1, pending.seg];
}

function fourPointWindowStability(pts) {
  const ds = [
    Math.hypot(pts[1].re - pts[0].re, pts[1].im - pts[0].im),
    Math.hypot(pts[2].re - pts[1].re, pts[2].im - pts[1].im),
    Math.hypot(pts[3].re - pts[2].re, pts[3].im - pts[2].im),
  ];
  const maxD = Math.max(...ds);
  if (maxD < 1e-9) return 1;
  const minD = Math.min(...ds);
  return smoothstep01((minD / maxD) / 0.25);
}

function alignInteriorTangents(segs, pts) {
  for (let i = 1; i < pts.length - 1; i++) {
    const prev = segs[i - 1], next = segs[i];
    const anchor = pts[i];
    if (!prev || !next) continue;
    const prevV = new Cx(anchor.re - prev.h1.re, anchor.im - prev.h1.im);
    const nextV = new Cx(next.h0.re - anchor.re, next.h0.im - anchor.im);
    const prevLen = Math.hypot(prevV.re, prevV.im);
    const nextLen = Math.hypot(nextV.re, nextV.im);
    if (prevLen < 1e-9 || nextLen < 1e-9) continue;
    let sx = prevV.re / prevLen + nextV.re / nextLen;
    let sy = prevV.im / prevLen + nextV.im / nextLen;
    let L = Math.hypot(sx, sy);
    if (L < 1e-9) {
      const chord = chordDir(pts[i - 1], pts[i + 1]);
      sx = chord.re; sy = chord.im; L = 1;
    }
    const ux = sx / L, uy = sy / L;
    prev.h1 = new Cx(anchor.re - ux * prevLen, anchor.im - uy * prevLen);
    next.h0 = new Cx(anchor.re + ux * nextLen, anchor.im + uy * nextLen);
  }
  return segs;
}

function computeFreshPlacementSegments(points) {
  const pts = cleanSplinePoints(points);
  if (pts.length < 2) return [];
  if (pts.length === 2)
    return [makeSeg(lerpCx(pts[0], pts[1], 1 / 3), lerpCx(pts[0], pts[1], 2 / 3))];
  if (pts.length === 3) return computeThreeAnchorPlacementSegments(pts);
  if (pts.length === 4) return constrainedFourAnchorPlacementSegments(pts);

  const accum = Array.from({ length: pts.length - 1 }, () => ({ w: 0, h0re: 0, h0im: 0, h1re: 0, h1im: 0 }));
  const arcWeights = [0.45, 1, 0.45];
  for (let start = 0; start <= pts.length - 4; start++) {
    const windowPts = pts.slice(start, start + 4);
    const windowSegs = constrainedFourAnchorPlacementSegments(windowPts);
    const stability = fourPointWindowStability(windowPts);
    for (let j = 0; j < windowSegs.length; j++) {
      const seg = windowSegs[j];
      const acc = accum[start + j];
      const w = arcWeights[j] * stability;
      acc.w += w;
      acc.h0re += seg.h0.re * w;
      acc.h0im += seg.h0.im * w;
      acc.h1re += seg.h1.re * w;
      acc.h1im += seg.h1.im * w;
    }
  }
  const segs = accum.map((acc, i) => {
    if (acc.w <= 1e-9)
      return makeSeg(lerpCx(pts[i], pts[i + 1], 1 / 3), lerpCx(pts[i], pts[i + 1], 2 / 3));
    return makeSeg(
      new Cx(acc.h0re / acc.w, acc.h0im / acc.w),
      new Cx(acc.h1re / acc.w, acc.h1im / acc.w)
    );
  });
  return alignInteriorTangents(segs, pts);
}

function rebuildFreshPlacementSegments(anim) {
  anim.segments = computeFreshPlacementSegments(anim.anchors);
  anim.tContinuation = null;
  recompileAnim(anim);
}

// Commit a pending arc with independent handle lengths at each end.
function _commitPendingArc(anim, nextPoint) {
  const anch = anim.anchors, n = anch.length;
  const p_prev = anch[n-2], p_end = anch[n-1];
  const pending = buildPendingPlacementArc(p_prev, p_end, anim.tContinuation, nextPoint);
  anim.segments.push(pending.seg);
  anim.tContinuation = pending.tIn;
}

const ANIM_COLORS = ['#f38ba8','#89b4fa','#a6e3a1','#fab387','#cba6f7','#f9e2af','#89dceb','#94e2d5'];
const PRIMITIVE_KINDS = new Set(['line', 'rectangle', 'circle', 'ellipse']);
const FILL_STYLES = [
  { key: 'solid', title: 'Solid' },
  { key: 'horizontal', title: 'Horizontal lines' },
  { key: 'vertical', title: 'Vertical lines' },
  { key: 'diagDown', title: 'Diagonal lines' },
  { key: 'diagUp', title: 'Diagonal lines' },
  { key: 'cross', title: 'Horizontal and vertical crosshatch' },

];
let animations   = [];
let animColorIdx = 0;
// Future playback state, disabled for now.

let anchorHover  = null; // {anim, anchorIdx} | null

// Undo / redo
let undoStack = [], redoStack = [];
const MAX_UNDO = 50;

function snapshotAnimations() {
  return animations.map(a => ({
    id: a.id, letter: a.letter, color: a.color, kind: animKind(a),
    fillColor: a.fillColor ?? null,
    outlineOpacity: a.outlineOpacity ?? 1,
    fillOpacity: a.fillOpacity ?? 0.5,
    fillStyle: a.fillStyle || 'solid',
    visible: a.visible, thickness: a.thickness, rotation: a.rotation ?? 0,
    anchors: a.anchors.map(p => new Cx(p.re, p.im)),
    segments: a.segments.map(s => s ? ({
      h0: new Cx(s.h0.re, s.h0.im),
      h1: new Cx(s.h1.re, s.h1.im),
      eccentricity: s.eccentricity,
    }) : null),
    anchorLocked: [...(a.anchorLocked ?? [])],
    activeSegments: [...(a.activeSegments ?? [])],
    inPlacementMode: a.inPlacementMode,
    reversePlacement: a.reversePlacement ?? false,
    extensionAnchorIdx: a.extensionAnchorIdx ?? null,
    extensionForward: a.extensionForward ?? true,
    extensionInsertAt: a.extensionInsertAt ?? 0,
    tContinuation: a.tContinuation ? { re: a.tContinuation.re, im: a.tContinuation.im } : null,
    expanded: a.expanded,
    expandedAnchors: [...(a.expandedAnchors ?? [])],
    expandedArcs: [...(a.expandedArcs ?? [])],
  }));
}

function pushUndo(preSnapshot) {
  undoStack.push(preSnapshot !== undefined ? preSnapshot : snapshotAnimations());
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
}

function restoreSnapshot(snap) {
  selectedId = null; editModeAnimId = null;
  eccentricitySliderActiveKey = null;
  openColorMenuAnimId = null;
  colorEditTarget = 'outline';
  sideActionHover = null;
  animations = snap.map(s => {
    const anim = {
      id: s.id, letter: s.letter, color: s.color, kind: s.kind || 'freeform',
      fillColor: s.fillColor ?? null,
      outlineOpacity: s.outlineOpacity ?? 1,
      fillOpacity: s.fillOpacity ?? 0.5,
      fillStyle: s.fillStyle || 'solid',
      visible: s.visible, thickness: s.thickness, rotation: s.rotation ?? 0,
      anchors: s.anchors.map(p => new Cx(p.re, p.im)),
      segments: s.segments.map(sg => sg ? ({
        h0: new Cx(sg.h0.re, sg.h0.im),
        h1: new Cx(sg.h1.re, sg.h1.im),
        eccentricity: sg.eccentricity ?? 1,
        compiled: null, compiledRef: null,
      }) : null),
      anchorLocked: s.anchorLocked ? [...s.anchorLocked] : [],
      activeSegments: new Set(s.activeSegments ?? []),
      inPlacementMode: s.inPlacementMode,
      reversePlacement: s.reversePlacement ?? false,
      extensionAnchorIdx: s.extensionAnchorIdx ?? null,
      extensionForward: s.extensionForward ?? true,
      extensionInsertAt: s.extensionInsertAt ?? 0,
      tContinuation: s.tContinuation ? new Cx(s.tContinuation.re, s.tContinuation.im) : null,
      expanded: s.expanded,
      expandedAnchors: new Set(s.expandedAnchors ?? []),
      expandedArcs: new Set(s.expandedArcs ?? []),
    };
    if (!anim.inPlacementMode) recompileAnim(anim);
    return anim;
  });
  renderAnimList(); draw();
}

function undo() { if (!undoStack.length) return; redoStack.push(snapshotAnimations()); restoreSnapshot(undoStack.pop()); }
function redo() { if (!redoStack.length) return; undoStack.push(snapshotAnimations()); restoreSnapshot(redoStack.pop()); }

function isTypingTarget(el) {
  if (!el) return false;
  return el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable;
}

function animKind(anim) {
  return anim?.kind || 'freeform';
}

function isPrimitiveAnim(anim) {
  return PRIMITIVE_KINDS.has(animKind(anim));
}

function animRotation(anim) {
  return isFinite(anim?.rotation) ? anim.rotation : 0;
}

function animFillColor(anim) {
  return anim?.fillColor || null;
}

function animOutlineOpacity(anim) {
  return isFinite(anim?.outlineOpacity) ? clamp(anim.outlineOpacity, 0, 1) : 1;
}

function animFillOpacity(anim) {
  return isFinite(anim?.fillOpacity) ? clamp(anim.fillOpacity, 0, 1) : 0.5;
}

function animFillStyle(anim) {
  return anim?.fillStyle || 'solid';
}

function canFillAnim(anim) {
  return !!anim && isPrimitiveAnim(anim) && animKind(anim) !== 'line';
}

function isDotAnim(anim) {
  return !!anim && !isPrimitiveAnim(anim) && anim.anchors.length === 1 && anim.segments.length === 0;
}

function isAnchorLocked(anim, anchorIdx) {
  return anim?.anchorLocked?.[anchorIdx] !== false;
}

function alignAnchorHandlesOnLock(anim, anchorIdx) {
  if (!anim || isPrimitiveAnim(anim)) return;
  if (anchorIdx <= 0 || anchorIdx >= anim.anchors.length - 1) return;
  if (!anim.segments[anchorIdx - 1] || !anim.segments[anchorIdx]) return;
  swingOppositeHandle(anim, anchorIdx, true);
}

function setAnchorLocked(anim, anchorIdx, locked) {
  if (!anim.anchorLocked) anim.anchorLocked = [];
  anim.anchorLocked[anchorIdx] = !!locked;
  if (locked) {
    alignAnchorHandlesOnLock(anim, anchorIdx);
    recompileAnim(anim);
  }
}

function activePlacementTool() {
  const placing = animations.find(a => a.inPlacementMode);
  return placing ? animKind(placing) : null;
}

function updateToolPanel() {
  const activeTool = activePlacementTool();
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.classList.toggle('active', activeTool !== null && btn.dataset.tool === activeTool);
  });
}

function neutralizeToolPanel() {
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.classList.remove('active');
    btn.blur();
  });
}

function clearAnimationInteractionState(id) {
  placementPreviewPos = null;
  rubberBand = null;
  if (anchorDrag?.anim?.id === id) anchorDrag = null;
  if (handleDrag?.anim?.id === id) handleDrag = null;
  if (curveDrag?.anim?.id === id) curveDrag = null;
  if (resizeDrag?.anim?.id === id) resizeDrag = null;
  if (rotateDrag?.anim?.id === id) rotateDrag = null;
  if (segmentHover?.anim?.id === id) segmentHover = null;
  if (anchorHover?.anim?.id === id) anchorHover = null;
  if (handleHover?.anim?.id === id) handleHover = null;
  if (resizeHover?.anim?.id === id) resizeHover = null;
  if (rotateHover?.anim?.id === id) rotateHover = null;
  if (sideActionHover?.anim?.id === id) sideActionHover = null;
  if (plusHover?.anim?.id === id) plusHover = null;
  if (lockHover?.anim?.id === id) lockHover = null;
  if (openColorMenuAnimId === id) openColorMenuAnimId = null;
  if (eccentricitySliderActiveKey?.animId === id) eccentricitySliderActiveKey = null;
}

function deleteAnimation(id) {
  const anim = animations.find(a => a.id === id);
  if (!anim) return;
  pushUndo();
  clearAnimationInteractionState(id);
  editModeAnimId = null;
  selectedId = null;
  animations = animations.filter(a => a.id !== id);
  animations.forEach(a => {
    a.expanded = false;
    a.inPlacementMode = false;
    a.activeSegments = new Set();
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  renderAnimList(); neutralizeToolPanel(); draw(); updateCursor();
}

document.addEventListener('keydown', e => {
  if (isTypingTarget(document.activeElement)) return;
  if (e.key === 'Escape') {
    e.preventDefault();
    const placing = animations.find(a => a.inPlacementMode);
    if (placing) {
      if (isPrimitiveAnim(placing) || placing.anchors.length === 0) {
        cancelPlacement(placing);
      } else {
        finalizePlacement(placing);
      }
      return;
    }
    if (editModeAnimId !== null) {
      exitEditMode();
      selectedId = null;
      animations.forEach(a => {
        a.expanded = false;
        a.expandedArcs = new Set();
        a.expandedAnchors = new Set();
      });
      renderAnimList(); draw();
      return;
    }
    return;
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId != null) {
    e.preventDefault();
    const anim = animations.find(a => a.id === selectedId);
    if (anim && editModeAnimId === anim.id && anim.activeSegments.size === 1) {
      const segIdx = [...anim.activeSegments][0];
      if (anim.segments[segIdx]) { deleteArc(anim, segIdx); return; }
    }
    deleteAnimation(selectedId);
    return;
  }
  if (e.ctrlKey && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey && e.key === 'y') || (e.ctrlKey && e.shiftKey && (e.key === 'z' || e.key === 'Z'))) { e.preventDefault(); redo(); }
  if (e.ctrlKey && (e.key === 'd' || e.key === 'D')) { e.preventDefault(); duplicateAnimation(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); originX -= scale; draw(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); originX += scale; draw(); }
  if (e.key === 'ArrowUp')    { e.preventDefault(); originY -= scale; draw(); }
  if (e.key === 'ArrowDown')  { e.preventDefault(); originY += scale; draw(); }
});


// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — compilation & handle logic
// ════════════════════════════════════════════════════════

function recompileSegment(anim, i) {
  const seg = anim.segments[i];
  if (!seg) return;
  const A0 = anim.anchors[i], A1 = anim.anchors[i + 1];
  const pts = [A0, seg.h0, seg.h1, A1];
  const bezier    = buildBezierFn(pts);
  const composite = buildCompositeBezierFn(pts);
  seg.compiled = buildSingleEccentricityFn(pts, seg.eccentricity, bezier, null, composite);
  const previewEccs = Array.from({length: 21}, (_, j) => percentToEccentricity(j * 5));
  seg.compiledRef = previewEccs.map(e => ({
    eccentricity: e,
    fn: buildSingleEccentricityFn(pts, e, bezier, null, composite),
  }));
}

function recompileAnim(anim) {
  for (let i = 0; i < anim.segments.length; i++) recompileSegment(anim, i);
}

function recompileSegmentRaw(seg, A0, A1) {
  const pts = [A0, seg.h0, seg.h1, A1];
  const bezier = buildBezierFn(pts);
  const composite = buildCompositeBezierFn(pts);
  seg.compiled = buildSingleEccentricityFn(pts, seg.eccentricity, bezier, null, composite);
}

function swingOppositeHandle(anim, anchorIdx, movedWasOutgoing) {
  if (anim.segments.length < 2) return;
  if (anchorIdx <= 0 || anchorIdx >= anim.anchors.length - 1) return;
  if (!isAnchorLocked(anim, anchorIdx)) return;
  if (!anim.segments[anchorIdx] || !anim.segments[anchorIdx - 1]) return; // gap: no coupling
  const anchor = anim.anchors[anchorIdx];
  let movedHandle, oppSegIdx, oppSide;
  if (movedWasOutgoing) {
    movedHandle = anim.segments[anchorIdx].h0;
    oppSegIdx = anchorIdx - 1; oppSide = 'h1';
  } else {
    movedHandle = anim.segments[anchorIdx - 1].h1;
    oppSegIdx = anchorIdx; oppSide = 'h0';
  }
  const opp = anim.segments[oppSegIdx][oppSide];
  const dx = movedHandle.re - anchor.re, dy = movedHandle.im - anchor.im;
  const len = Math.hypot(dx, dy);
  if (len < 1e-9) return;
  const oppLen = Math.hypot(opp.re - anchor.re, opp.im - anchor.im);
  anim.segments[oppSegIdx][oppSide] = new Cx(anchor.re - dx/len*oppLen, anchor.im - dy/len*oppLen);
}

function enterEditMode(anim, activeSegs) {
  openColorMenuAnimId = null;
  editModeAnimId = anim.id;
  selectedId = anim.id;
  animations.forEach(a => { a.expanded = a.id === anim.id; });
  anim.activeSegments = activeSegs !== undefined
    ? activeSegs
    : new Set();
  if (!anim.expandedAnchors) anim.expandedAnchors = new Set();
  anim.expandedAnchors.clear();
  if (!anim.expandedArcs) anim.expandedArcs = new Set();
  if (anim.activeSegments.size === 0) anim.expandedArcs.clear();
  renderAnimList();
  draw();
}

function exitEditMode() {
  editModeAnimId = null;
  openColorMenuAnimId = null;
  eccentricitySliderActiveKey = null;
  resizeHover = null;
  resizeDrag = null;
  rotateHover = null;
  rotateDrag = null;
  sideActionHover = null;
  plusHover = null;
  lockHover = null;
  rubberBand = null;
  renderAnimList();
  draw();
}

function compactAnim(anim) {
  while (anim.segments.length > 0 && !anim.segments[0]) {
    anim.segments.shift(); anim.anchors.shift(); anim.anchorLocked.shift();
  }
  while (anim.segments.length > 0 && !anim.segments[anim.segments.length - 1]) {
    anim.segments.pop(); anim.anchors.pop(); anim.anchorLocked.pop();
  }
}

function deleteArc(anim, segIdx) {
  pushUndo();
  anim.segments[segIdx] = null;
  anim.activeSegments.delete(segIdx);
  compactAnim(anim);
  if (anim.segments.length === 0) {
    if (editModeAnimId === anim.id) editModeAnimId = null;
    if (eccentricitySliderActiveKey?.animId === anim.id) eccentricitySliderActiveKey = null;
    if (plusHover?.anim?.id === anim.id) plusHover = null;
    if (selectedId === anim.id) selectedId = null;
    animations = animations.filter(a => a.id !== anim.id);
    renderAnimList(); draw(); updateCursor(); return;
  }
  recompileAnim(anim);
  enterEditMode(anim, new Set());
  updateCursor();
}


function cancelPlacement(anim) {
  if (!anim || !anim.inPlacementMode) return;
  placementPreviewPos = null;
  if (anim.extensionAnchorIdx != null) {
    anim.inPlacementMode = false;
    anim.extensionAnchorIdx = null;
    anim.extensionInsertAt = 0;
    anim.tContinuation = null;
    recompileAnim(anim);
  } else {
    if (selectedId === anim.id) selectedId = null;
    if (editModeAnimId === anim.id) editModeAnimId = null;
    animations = animations.filter(a => a.id !== anim.id);
  }
  renderAnimList(); draw(); updateCursor();
}

function finalizePrimitivePlacement(anim) {
  if (!anim || !anim.inPlacementMode || !isPrimitiveAnim(anim)) return;
  if (anim.anchors.length < 2) {
    cancelPlacement(anim);
    return;
  }
  anim.inPlacementMode = false;
  anim.expanded = false;
  anim.activeSegments = new Set();
  placementPreviewPos = null;
  enterEditMode(anim);
  renderAnimList(); updateCursor();
}

function finalizePlacement(anim) {
  if (!anim || !anim.inPlacementMode) return;
  if (isPrimitiveAnim(anim)) { finalizePrimitivePlacement(anim); return; }
  if (anim.anchors.length === 0) {
    animations = animations.filter(a => a.id !== anim.id);
    renderAnimList(); draw(); updateCursor(); return;
  }
  anim.inPlacementMode = false;
  anim.tContinuation = null;
  anim.extensionAnchorIdx = null;
  recompileAnim(anim);
  placementPreviewPos = null;
  enterEditMode(anim);
  renderAnimList(); updateCursor();
}

function nextLetter() {
  const used = new Set(animations.map(a => a.letter));
  for (let c = 65; c <= 90; c++) {
    const ch = String.fromCharCode(c);
    if (!used.has(ch)) return ch;
  }
  return '?';
}

function addAnimation(kind = 'freeform') {
  pushUndo();
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  const letter = nextLetter();
  const color  = ANIM_COLORS[animColorIdx++ % ANIM_COLORS.length];
  const anim = {
    id: Date.now() + Math.random(),
    letter, color, kind,
    fillColor: null,
    outlineOpacity: 1,
    fillOpacity: 0.5,
    fillStyle: 'solid',
    visible: true, thickness: globalSettings.defaultThickness,
    rotation: 0,
    anchors: [],
    segments: [],
    anchorLocked: [],
    activeSegments: new Set(),
    inPlacementMode: true,
    reversePlacement: false,
    extensionAnchorIdx: null,
    extensionForward: true,
    extensionInsertAt: 0,
    tContinuation: null,
    expanded: false,
    expandedAnchors: new Set(),
    expandedArcs: new Set(),
  };
  animations.push(anim);
  selectedId = anim.id;
  renderAnimList(); draw(); updateCursor();
  return anim;
}

function addPrimitiveAnimation(kind) {
  return addAnimation(kind);
}

function startPlacementFromTool(kind) {
  openColorMenuAnimId = null;
  const placing = animations.find(a => a.inPlacementMode);
  if (placing && animKind(placing) === kind) {
    cancelPlacement(placing);
    return;
  }
  if (placing) cancelPlacement(placing);
  exitEditMode();
  if (isPrimitiveAnim({ kind })) addPrimitiveAnimation(kind);
  else addAnimation('freeform');
  updateToolPanel();
}


function duplicateAnimation() {
  if (!selectedId) return;
  const src = animations.find(a => a.id === selectedId);
  if (!src || src.inPlacementMode) return;
  pushUndo();
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  const anim = {
    id: Date.now() + Math.random(),
    letter: nextLetter(),
    color: src.color,
    kind: animKind(src),
    fillColor: animFillColor(src),
    outlineOpacity: animOutlineOpacity(src),
    fillOpacity: animFillOpacity(src),
    fillStyle: animFillStyle(src),
    visible: src.visible,
    thickness: src.thickness,
    rotation: animRotation(src),
    anchors: src.anchors.map(a => new Cx(a.re + 1, a.im - 1)),
    segments: src.segments.map(s => s ? ({
      h0: new Cx(s.h0.re + 1, s.h0.im - 1),
      h1: new Cx(s.h1.re + 1, s.h1.im - 1),
      eccentricity: s.eccentricity,
      compiled: null,
      compiledRef: null,
    }) : null),
    anchorLocked: src.anchorLocked ? [...src.anchorLocked] : [],
    activeSegments: new Set([...Array(src.segments.length).keys()]),
    inPlacementMode: false,
    expanded: true,
    expandedAnchors: new Set(),
    expandedArcs: new Set(),
  };
  animations.push(anim);
  recompileAnim(anim);
  enterEditMode(anim);
  updateCursor();
}

// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — canvas interaction
