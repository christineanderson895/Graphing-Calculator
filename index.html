    if (buildShapePath()) paint();
  } else if (kind === 'circle') {
    const radius = Math.hypot(x1 - x0, y1 - y0);
    ctx.beginPath();
    if (radius < 1e-6) {
      ctx.fillStyle = fillColor ? ((fillStyle === 'circular' || fillStyle === 'radial') ? fillColor : (fillStyleValue(fillColor, fillStyle) || fillColor)) : color;
      ctx.globalAlpha = fillColor ? alpha * fillOpacity : alpha * outlineOpacity;
      ctx.arc(x0, y0, Math.max(2 * devicePixelRatio, lineWidth * 0.5), 0, Math.PI * 2);
      ctx.fill();
    } else {
      if (buildShapePath()) paint();
    }
  } else if (kind === 'ellipse') {
    if (buildShapePath()) paint();
  }
  ctx.restore();
}

function drawPrimitive(anim, extraWidth = 0, alpha = 1) {
  if (!isPrimitiveAnim(anim) || anim.anchors.length < 2) return;
  const fillColor = extraWidth === 0 && alpha >= 1 ? animFillColor(anim) : null;
  drawPrimitiveShape(
    anim.kind,
    anim.anchors[0],
    anim.anchors[1],
    anim.color,
    primitiveStrokeWidth(anim, extraWidth),
    alpha,
    false,
    animRotation(anim),
    fillColor,
    animOutlineOpacity(anim),
    animFillOpacity(anim),
    animFillStyle(anim),
    anim
  );
}

function drawPrimitivePlacement(anim, previewPoint) {
  const dpr = devicePixelRatio;
  const cw = primitiveStrokeWidth(anim);
  for (const anchor of anim.anchors) {
    drawAnchorDot(toCanvas(anchor.re, anchor.im), anim.color, 5 * dpr);
  }
  if (!previewPoint) return;
  const [px, py] = toCanvas(previewPoint.re, previewPoint.im);
  if (anim.anchors.length === 0) {
    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.strokeStyle = anim.color;
    ctx.lineWidth = 2 * dpr;
    ctx.beginPath();
    ctx.arc(px, py, 6 * dpr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    return;
  }
  drawPrimitiveShape(anim.kind, anim.anchors[0], previewPoint, anim.color, cw, 0.7, false, 0);
  if (anim.kind === 'circle') {
    const center = anim.anchors[0];
    const [cx, cy] = toCanvas(center.re, center.im);
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = anim.color;
    ctx.lineWidth = 1.2 * dpr;
    ctx.setLineDash([4 * dpr, 4 * dpr]);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(px, py);
    ctx.stroke();
    ctx.restore();
  }
  drawAnchorDot([px, py], anim.color, 5 * dpr);
}

function previewAnchorActivationDistance(anchors) {
  if (!anchors || anchors.length < 3) return 0;
  const last = anchors[anchors.length - 1];
  const prev = anchors[anchors.length - 2];
  const prevLen = Math.hypot(last.re - prev.re, last.im - prev.im);
  return Math.max(0.35, Math.min(1.25, prevLen * 0.25));
}

function drawTentativeFreeformExtension(anchors, segs, previewPoint, color, cw, dpr) {
  if (!previewPoint || !previewPoint.ok || !previewPoint.ok() || anchors.length === 0) return;
  const start = anchors[anchors.length - 1];
  const L = Math.hypot(previewPoint.re - start.re, previewPoint.im - start.im);
  if (L < 1e-7) return;

  // Use the same window algorithm that computeFreshPlacementSegments uses for the last arc,
  // so the dashed preview exactly matches the arc that gets committed on click.
  let pendingSeg;
  if (anchors.length >= 3) {
    const windowSegs = constrainedFourAnchorPlacementSegments(
      [...anchors.slice(-3), cloneCx(previewPoint)]
    );
    pendingSeg = windowSegs.length === 3 ? windowSegs[2] : null;
  } else if (anchors.length === 2) {
    const windowSegs = computeThreeAnchorPlacementSegments(
      [anchors[0], anchors[1], cloneCx(previewPoint)]
    );
    pendingSeg = windowSegs[1] || null;
  }
  if (!pendingSeg) {
    let tOut = chordDir(start, previewPoint);
    const lastSeg = segs[segs.length - 1];
    if (lastSeg) tOut = tangentAtBezierEnd(start, lastSeg.h1);
    pendingSeg = buildPendingPlacementArc(start, previewPoint, tOut, null).seg;
  }
  recompileSegmentRaw(pendingSeg, start, previewPoint);
  ctx.save();
  ctx.globalAlpha = 0.32;
  ctx.setLineDash([4 * dpr, 4 * dpr]);
  drawCompiledCurve(pendingSeg.compiled, color, cw, 1);
  ctx.restore();
}

function drawFreshFreeformPlacement(anim, previewPoint, cw, dpr) {
  const anchors = anim.anchors.map(cloneCx);
  const n = anchors.length;
  const hasPreview = previewPoint && previewPoint.ok && previewPoint.ok();
  if (n === 0) {
    if (hasPreview) {
      const [hx, hy] = toCanvas(previewPoint.re, previewPoint.im);
      ctx.beginPath(); ctx.arc(hx, hy, 6 * dpr, 0, Math.PI * 2);
      ctx.strokeStyle = anim.color; ctx.lineWidth = 2 * dpr;
      ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;
    }
    return;
  }
  const cursorAtEnd = hasPreview && Math.hypot(previewPoint.re - anchors[n-1].re, previewPoint.im - anchors[n-1].im) < 1e-7;
  const previewAnchors = (hasPreview && !cursorAtEnd) ? [...anchors, previewPoint] : [...anchors];
  const previewSegs = computeFreshPlacementSegments(previewAnchors);
  const solidCount = (hasPreview && !cursorAtEnd) ? previewSegs.length - 1 : previewSegs.length;

  for (let i = 0; i < solidCount; i++) {
    const seg = previewSegs[i];
    if (!seg) continue;
    recompileSegmentRaw(seg, previewAnchors[i], previewAnchors[i + 1]);
    ctx.save(); ctx.globalAlpha = 0.85;
    drawCompiledCurve(seg.compiled, anim.color, cw, 1);
    ctx.restore();
  }

  if (hasPreview && !cursorAtEnd && previewSegs.length > 0) {
    const tentSeg = previewSegs[previewSegs.length - 1];
    if (tentSeg) {
      recompileSegmentRaw(tentSeg, anchors[n - 1], previewPoint);
      ctx.save(); ctx.globalAlpha = 0.4; ctx.setLineDash([4 * dpr, 4 * dpr]);
      drawCompiledCurve(tentSeg.compiled, anim.color, cw, 1);
      ctx.restore();
    }
  }

  for (const anchor of anchors)
    drawAnchorDot(toCanvas(anchor.re, anchor.im), anim.color, 5 * dpr);

  if (hasPreview) {
    const [hx, hy] = toCanvas(previewPoint.re, previewPoint.im);
    ctx.beginPath(); ctx.arc(hx, hy, 6 * dpr, 0, Math.PI * 2);
    ctx.strokeStyle = anim.color; ctx.lineWidth = 2 * dpr;
    ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;
  }
}

function drawLineConnectorChoices(start, end, choices, color, cw, dpr, hoverIdx = null) {
  if (!start || !end || !choices || choices.length === 0) return;
  const curveOrder = [2, 1, 4, 3];
  for (const idx of curveOrder) {
    const choice = choices[idx];
    if (!choice?.seg?.compiled) continue;
    const active = hoverIdx === idx;
    drawCompiledCurve(choice.seg.compiled, color, active ? cw * 0.95 : cw * 0.58, active ? 0.78 : 0.34);
  }
  const straight = choices[0];
  if (straight?.seg?.compiled) {
    const active = hoverIdx === 0;
    drawCompiledCurve(straight.seg.compiled, color, active ? cw * 1.45 : cw * 1.18, active ? 0.95 : 0.72);
  }
}

function drawPolylinePlacement(anim, previewPoint, cw, dpr) {
  for (let i = 0; i < anim.segments.length; i++) drawSegment(anim, i);
  for (const anchor of anim.anchors)
    drawAnchorDot(toCanvas(anchor.re, anchor.im), anim.color, 5 * dpr);

  if (lineConnectorChoice?.anim === anim) {
    drawLineConnectorChoices(
      lineConnectorChoice.start,
      lineConnectorChoice.end,
      lineConnectorChoice.choices,
      anim.color,
      cw,
      dpr,
      lineConnectorChoiceHover?.idx ?? null
    );
    drawAnchorDot(toCanvas(lineConnectorChoice.end.re, lineConnectorChoice.end.im), anim.color, 5 * dpr);
    return;
  }

  if (!previewPoint || !previewPoint.ok || !previewPoint.ok()) return;
  const [px, py] = toCanvas(previewPoint.re, previewPoint.im);
  if (anim.anchors.length === 0) {
    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.strokeStyle = anim.color;
    ctx.lineWidth = 2 * dpr;
    ctx.beginPath();
    ctx.arc(px, py, 6 * dpr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    return;
  }

  if (anim.extensionAnchorIdx == null && lineToolModeForPlacement(anim) !== LINE_TOOL_MODE_POLYLINE) {
    if (polylineHasOpenDisconnectedStart(anim)) {
      const src = anim.anchors[anim.anchors.length - 1];
      if (src) {
        if (lineToolModeForPlacement(anim) === LINE_TOOL_MODE_CURVES) {
          drawLineConnectorChoices(src, previewPoint, buildLineConnectorChoices(src, previewPoint), anim.color, cw, dpr);
        } else {
          const [sx, sy] = toCanvas(src.re, src.im);
          ctx.save();
          ctx.globalAlpha = 0.55;
          ctx.strokeStyle = anim.color;
          ctx.lineWidth = cw;
          ctx.setLineDash([4 * dpr, 4 * dpr]);
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(px, py);
          ctx.stroke();
          ctx.restore();
        }
      }
    }
    drawAnchorDot([px, py], anim.color, 5 * dpr);
    return;
  }

  const srcIdx = anim.extensionAnchorIdx != null
    ? (anim.extensionForward ? anim.extensionInsertAt - 1 : anim.extensionInsertAt)
    : anim.anchors.length - 1;
  const src = anim.anchors[srcIdx];
  if (src) {
    const [sx, sy] = toCanvas(src.re, src.im);
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = anim.color;
    ctx.lineWidth = cw;
    ctx.setLineDash([4 * dpr, 4 * dpr]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(px, py);
    ctx.stroke();
    ctx.restore();
  }
  drawAnchorDot([px, py], anim.color, 5 * dpr);
}

function includeCanvasPoint(bounds, pt) {
  if (!pt || !isFinite(pt[0]) || !isFinite(pt[1])) return bounds;
  if (!bounds) return { left: pt[0], right: pt[0], top: pt[1], bottom: pt[1] };
  bounds.left = Math.min(bounds.left, pt[0]);
  bounds.right = Math.max(bounds.right, pt[0]);
  bounds.top = Math.min(bounds.top, pt[1]);
  bounds.bottom = Math.max(bounds.bottom, pt[1]);
  return bounds;
}

function selectedObjectCanvasBounds(anim) {
  if (!anim || !isAnimEffectivelyVisible(anim) || anim.inPlacementMode) return null;

  if (isTextAnim(anim)) {
    let bounds = null;
    for (const pt of textCanvasCorners(anim)) bounds = includeCanvasPoint(bounds, pt);
    return bounds;
  }

  if (isPrimitiveAnim(anim)) {
    if (anim.anchors.length < 2) return null;
    let bounds = null;
    for (const pt of samplePrimitiveBoundaryMath(anim)) {
      bounds = includeCanvasPoint(bounds, toCanvas(pt.re, pt.im));
    }
    return bounds;
  }

  if (anim.anchors.length === 1 && anim.segments.length === 0) {
    const [x, y] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
    const r = dotRadius(anim);
    return { left: x - r, right: x + r, top: y - r, bottom: y + r };
  }

  let bounds = null;
  for (const seg of anim.segments) {
    if (!seg || !seg.compiled) continue;
    for (const pt of sampleCompiledAdaptive(seg.compiled)) {
      bounds = includeCanvasPoint(bounds, pt);
    }
  }
  if (!bounds) {
    for (const anchor of anim.anchors) bounds = includeCanvasPoint(bounds, toCanvas(anchor.re, anchor.im));
  }
  return bounds;
}

function includeArcHandleInfluenceBounds(bounds, anim, segIdx) {
  const includeMath = pt => includeCanvasPoint(bounds, toCanvas(pt.re, pt.im));
  const seg = anim.segments[segIdx];
  if (!seg) return bounds;
  if (anim.anchors[segIdx]) bounds = includeMath(anim.anchors[segIdx]);
  if (anim.anchors[segIdx + 1]) bounds = includeMath(anim.anchors[segIdx + 1]);
  bounds = includeMath(seg.h0);
  bounds = includeMath(seg.h1);

  if (segIdx > 0 && isAnchorLocked(anim, segIdx) && anim.segments[segIdx - 1])
    bounds = includeMath(anim.segments[segIdx - 1].h1);
  if (segIdx + 1 < anim.segments.length && isAnchorLocked(anim, segIdx + 1) && anim.segments[segIdx + 1])
    bounds = includeMath(anim.segments[segIdx + 1].h0);

  const loop = findLoopRange(anim);
  if (loop) {
    const ls = loop.loopStart, le = loop.loopEnd;
    if (segIdx === ls && isAnchorLocked(anim, ls) && anim.segments[le - 1])
      bounds = includeMath(anim.segments[le - 1].h1);
    if (segIdx === le - 1 && isAnchorLocked(anim, le) && anim.segments[ls])
      bounds = includeMath(anim.segments[ls].h0);
  }
  return bounds;
}

function selectedArcCanvasBounds(anim) {
  const segIdx = activeArcIndex(anim);
  if (segIdx === null) return null;
  const seg = anim.segments[segIdx];
  let bounds = null;
  if (seg.compiled) {
    for (const pt of sampleCompiledAdaptive(seg.compiled)) bounds = includeCanvasPoint(bounds, pt);
  }
  bounds = includeArcHandleInfluenceBounds(bounds, anim, segIdx);
  return bounds;
}

function includeMathPoint(bounds, pt) {
  if (!pt || !pt.ok || !pt.ok()) return bounds;
  if (!bounds) return { left: pt.re, right: pt.re, bottom: pt.im, top: pt.im };
  bounds.left = Math.min(bounds.left, pt.re);
  bounds.right = Math.max(bounds.right, pt.re);
  bounds.bottom = Math.min(bounds.bottom, pt.im);
  bounds.top = Math.max(bounds.top, pt.im);
  return bounds;
}

function includeArcHandleInfluenceMathBounds(bounds, anim, segIdx) {
  const includeMath = pt => includeMathPoint(bounds, pt);
  const seg = anim.segments[segIdx];
  if (!seg) return bounds;
  if (anim.anchors[segIdx]) bounds = includeMath(anim.anchors[segIdx]);
  if (anim.anchors[segIdx + 1]) bounds = includeMath(anim.anchors[segIdx + 1]);
  bounds = includeMath(seg.h0);
  bounds = includeMath(seg.h1);

  if (segIdx > 0 && isAnchorLocked(anim, segIdx) && anim.segments[segIdx - 1])
    bounds = includeMath(anim.segments[segIdx - 1].h1);
  if (segIdx + 1 < anim.segments.length && isAnchorLocked(anim, segIdx + 1) && anim.segments[segIdx + 1])
    bounds = includeMath(anim.segments[segIdx + 1].h0);

  const loopM = findLoopRange(anim);
  if (loopM) {
    const ls = loopM.loopStart, le = loopM.loopEnd;
    if (segIdx === ls && isAnchorLocked(anim, ls) && anim.segments[le - 1])
      bounds = includeMath(anim.segments[le - 1].h1);
    if (segIdx === le - 1 && isAnchorLocked(anim, le) && anim.segments[ls])
      bounds = includeMath(anim.segments[ls].h0);

  return bounds;
}

function selectedArcMathBounds(anim) {
  const segIdx = activeArcIndex(anim);
  if (segIdx === null) return null;
  const seg = anim.segments[segIdx];
  let bounds = null;
  if (seg.compiled) {
    for (const pt of sampleCompiledAdaptive(seg.compiled)) {
      const [mx, my] = toMath(pt[0], pt[1]);
      bounds = includeMathPoint(bounds, new Cx(mx, my));
    }
  }
  bounds = includeArcHandleInfluenceMathBounds(bounds, anim, segIdx);
  return bounds;
}

function objectMathBounds(anim) {
  if (!anim || !isAnimEffectivelyVisible(anim) || anim.inPlacementMode) return null;

  if (isTextAnim(anim)) {
    let bounds = null;
    for (const pt of textCanvasCorners(anim)) {
      const [mx, my] = toMath(pt[0], pt[1]);
      bounds = includeMathPoint(bounds, new Cx(mx, my));
    }
    return bounds;
  }

  if (isPrimitiveAnim(anim)) {
    let bounds = null;
    for (const pt of samplePrimitiveBoundaryMath(anim)) bounds = includeMathPoint(bounds, pt);
    return bounds;
  }

  if (isDotAnim(anim)) {
    const center = anim.anchors[0];
    const r = dotRadius(anim) / Math.max(scale, 1e-9);
    return { left: center.re - r, right: center.re + r, bottom: center.im - r, top: center.im + r };
  }

  let bounds = null;
  for (const seg of anim.segments) {
    if (!seg || !seg.compiled) continue;
    for (const pt of sampleCompiledAdaptive(seg.compiled)) {
      const [mx, my] = toMath(pt[0], pt[1]);
      bounds = includeMathPoint(bounds, new Cx(mx, my));
    }

  if (!bounds) {
    for (const anchor of anim.anchors) bounds = includeMathPoint(bounds, anchor);

}

function unionCanvasBounds(bounds, next) {
  if (!next) return bounds;
  if (!bounds) return { ...next };
  bounds.left = Math.min(bounds.left, next.left);
  bounds.right = Math.max(bounds.right, next.right);
  bounds.top = Math.min(bounds.top, next.top);
  bounds.bottom = Math.max(bounds.bottom, next.bottom);
  return bounds;
}

function canvasBoundsContainsPoint(bounds, cx, cy, pad = 0) {
  return !!bounds &&
         cx >= bounds.left - pad &&
         cx <= bounds.right + pad &&
         cy >= bounds.top - pad &&
         cy <= bounds.bottom + pad;
}

function unionMathBounds(bounds, next) {
  if (!next) return bounds;
  if (!bounds) return { ...next };
  bounds.left = Math.min(bounds.left, next.left);
  bounds.right = Math.max(bounds.right, next.right);
  bounds.bottom = Math.min(bounds.bottom, next.bottom);
  bounds.top = Math.max(bounds.top, next.top);
  return bounds;
}

function groupCanvasBounds(groupId) {
  let bounds = null;
  for (const anim of allDescendantAnims(groupId)) bounds = unionCanvasBounds(bounds, selectedObjectCanvasBounds(anim));
  return bounds;
}

function groupMathBounds(groupId) {
  let bounds = null;
  for (const anim of allDescendantAnims(groupId)) bounds = unionMathBounds(bounds, objectMathBounds(anim));
  return bounds;
}

function multiSelectionCanvasBounds() {
  let bounds = null;
  for (const anim of multiSelectionMembers()) bounds = unionCanvasBounds(bounds, selectedObjectCanvasBounds(anim));
  return bounds;
}

function multiSelectionMathBounds() {
  let bounds = null;
  for (const anim of multiSelectionMembers()) bounds = unionMathBounds(bounds, objectMathBounds(anim));
  return bounds;
}

function canvasBoundsInsideRect(bounds, rect) {
  return !!bounds &&
         bounds.left >= rect.left &&
         bounds.right <= rect.right &&
         bounds.top >= rect.top &&
         bounds.bottom <= rect.bottom;
}

function animationsFullyInsideCanvasRect(rect) {
  return animations.filter(anim =>
    isAnimEffectivelyVisible(anim) &&
    !anim.inPlacementMode &&
    canvasBoundsInsideRect(selectedObjectCanvasBounds(anim), rect)
  );
}

function frameMetricsFromCanvasBounds(bounds, lineWidth = devicePixelRatio) {
  if (!bounds) return null;
  const dpr = devicePixelRatio;
  const pad = 10 * dpr + lineWidth * 0.5;
  const x = bounds.left - pad;
  const y = bounds.top - pad;
  const w = Math.max(1, bounds.right - bounds.left + pad * 2);
  const h = Math.max(1, bounds.bottom - bounds.top + pad * 2);
  const outerPad = 4 * dpr;
  return {
    x, y, w, h,
    outerX: x - outerPad,
    outerY: y - outerPad,
    outerW: w + outerPad * 2,
    outerH: h + outerPad * 2,
    outerPad,
    extend: 5 * dpr,
  };
}

function groupSelectionFrameMetrics(groupId) {
  const bounds = groupCanvasBounds(groupId);
  return frameMetricsFromCanvasBounds(bounds, 2 * devicePixelRatio);
}

function multiSelectionFrameMetrics() {
  const bounds = multiSelectionCanvasBounds();
  return frameMetricsFromCanvasBounds(bounds, 2 * devicePixelRatio);
}

function selectionFrameMetrics(anim) {
  const arcBounds = selectedArcCanvasBounds(anim);
  const bounds = arcBounds || selectedObjectCanvasBounds(anim);
  if (!bounds) return null;
  const dpr = devicePixelRatio;
  const lineWidth = isPrimitiveAnim(anim) ? primitiveStrokeWidth(anim) : (1 + 5 * (anim.thickness / 10)) * dpr;
  return frameMetricsFromCanvasBounds(bounds, lineWidth);
}

function frameMathBounds(frame) {
  const [x0, y0] = toMath(frame.x, frame.y);
  const [x1, y1] = toMath(frame.x + frame.w, frame.y + frame.h);
  return {
    left: Math.min(x0, x1),
    right: Math.max(x0, x1),
    bottom: Math.min(y0, y1),
    top: Math.max(y0, y1),
  };
}

function selectionRotationWheel(anim) {
  const f = selectionFrameMetrics(anim);
  return rotationWheelForFrame(f);
}

function groupSelectionRotationWheel(groupId) {
  const f = groupSelectionFrameMetrics(groupId);
  return rotationWheelForFrame(f);
}

function multiSelectionRotationWheel() {
  const f = multiSelectionFrameMetrics();
  return rotationWheelForFrame(f);
}

function rotationWheelForFrame(f) {
  if (!f) return null;
  const cx = f.x + f.w * 0.5;
  const cy = f.y + f.h * 0.5;
  const r = Math.max(0, Math.min(f.w, f.h) * 0.25);
  return { cx, cy, r, frame: f };
}

function selectionSideActionButtons(anim) {
  const f = selectionFrameMetrics(anim);
  return sideActionButtonsForFrame(f);
}

function groupSelectionSideActionButtons(groupId) {
  const f = groupSelectionFrameMetrics(groupId);
  return sideActionButtonsForFrame(f);
}

function multiSelectionSideActionButtons() {
  const f = multiSelectionFrameMetrics();
  return sideActionButtonsForFrame(f);
}

function sideActionButtonsForFrame(f) {
  if (!f) return [];
  const dpr = devicePixelRatio;
  const w = 38 * dpr;
  const rotateW = 30 * dpr;
  const h = 22 * dpr;
  const gap = 5 * dpr;
  const rightEdge = f.outerX + f.outerW + f.extend;
  const topEdge = f.outerY - f.extend;
  const x = rightEdge + 7 * dpr;
  const y = topEdge + 12 * dpr;
  return [
    { kind: 'duplicate', x, y, w, h },
    { kind: 'reflect', x, y: y + h + gap, w, h },
    { kind: 'rotate', x, y: y + (h + gap) * 2, w: rotateW, h },
  ];
}

function pointInRect(px, py, rect) {
  return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

function querySideActionButtonHover(cx, cy) {
  const anim = selectedObjectAnim();
  if (anim && isAnimEffectivelyVisible(anim) && !anim.inPlacementMode) {
    for (const btn of selectionSideActionButtons(anim)) {
      if (pointInRect(cx, cy, btn)) return { anim, kind: btn.kind };
    }
    return null;
  }
  if (isGroupSelectionActive()) {
    for (const btn of groupSelectionSideActionButtons(selectedGroupId)) {
      if (pointInRect(cx, cy, btn)) return { groupId: selectedGroupId, kind: btn.kind };
    }
    return null;
  }
  if (isMultiSelectionActive()) {
    for (const btn of multiSelectionSideActionButtons()) {
      if (pointInRect(cx, cy, btn)) return { multi: true, kind: btn.kind };
    }
    return null;
  }
  return null;
}

function toggleRotationModeFromSideAction(action) {
  const nextTarget = rotationModeTargetFromHit(action);
  rotationModeTarget = sameRotationModeTarget(rotationModeTarget, nextTarget) ? null : nextTarget;
  rotateHover = null;

function handleSideActionButtonPress(action) {
  if (!action) return false;
  if (action.kind === 'rotate') {
    toggleRotationModeFromSideAction(action);
    renderAnimList(); draw(); updateCursor();
    return true;
  }
  clearRotationMode();
  if (action.groupId != null) createGroupSideActionCopy(action.groupId, action.kind);
  else if (action.multi) createMultiSelectionSideActionCopy(action.kind);
  else createSideActionCopy(action.anim, action.kind);
  return true;
}

function selectionResizeSegments(anim) {

function groupSelectionResizeSegments(groupId) {
  const f = groupSelectionFrameMetrics(groupId);

}

function multiSelectionResizeSegments() {
  const f = multiSelectionFrameMetrics();
  return resizeSegmentsForFrame(f);
}

function resizeSegmentsForFrame(f) {
  if (!f) return [];
  const { x, y, w, h, outerX, outerY, outerW, outerH, extend } = f;
  return [
    { handle: 'nw', from: [x, y], to: [outerX - extend, outerY - extend] },
    { handle: 'ne', from: [x + w, y], to: [outerX + outerW + extend, outerY - extend] },
    { handle: 'se', from: [x + w, y + h], to: [outerX + outerW + extend, outerY + outerH + extend] },
    { handle: 'sw', from: [x, y + h], to: [outerX - extend, outerY + outerH + extend] },
    { handle: 'n', from: [x + w * 0.5, y], to: [outerX + outerW * 0.5, outerY - extend] },
    { handle: 'e', from: [x + w, y + h * 0.5], to: [outerX + outerW + extend, outerY + outerH * 0.5] },
    { handle: 's', from: [x + w * 0.5, y + h], to: [outerX + outerW * 0.5, outerY + outerH + extend] },
    { handle: 'w', from: [x, y + h * 0.5], to: [outerX - extend, outerY + outerH * 0.5] },
  ];
}

function resizeCursorForHandle(handle) {
  if (handle === 'nw' || handle === 'se') return 'nwse-resize';
  if (handle === 'ne' || handle === 'sw') return 'nesw-resize';
  return 'grab';
}

function queryResizeHandleHover(cx, cy) {
  const anim = selectedObjectAnim();
  if (anim) return queryResizeHandleHoverForAnim(anim, cx, cy);
  if (isGroupSelectionActive()) {
    const threshold = 8 * devicePixelRatio;
    let best = null, bestDist = Infinity;
    for (const seg of groupSelectionResizeSegments(selectedGroupId)) {
      const dist = distPointToSegmentPx(cx, cy, seg.from[0], seg.from[1], seg.to[0], seg.to[1]);
      if (dist <= threshold && dist < bestDist) {
        bestDist = dist;
        best = { groupId: selectedGroupId, handle: seg.handle };
      }
    }
    return best;
  }
  if (isMultiSelectionActive()) {
    const threshold = 8 * devicePixelRatio;
    let best = null, bestDist = Infinity;
    for (const seg of multiSelectionResizeSegments()) {
      const dist = distPointToSegmentPx(cx, cy, seg.from[0], seg.from[1], seg.to[0], seg.to[1]);
      if (dist <= threshold && dist < bestDist) {
        bestDist = dist;
        best = { multi: true, handle: seg.handle };
      }
    }
    return best;
  }
  return null;
}

function queryResizeHandleHoverForAnim(anim, cx, cy) {
  if (!anim || !isAnimEffectivelyVisible(anim) || anim.inPlacementMode || isDotAnim(anim)) return null;
  if (hasActiveArcSelection(anim)) return null;
  const threshold = 8 * devicePixelRatio;
  let best = null, bestDist = Infinity;
  for (const seg of selectionResizeSegments(anim)) {
    const dist = distPointToSegmentPx(cx, cy, seg.from[0], seg.from[1], seg.to[0], seg.to[1]);
    if (dist <= threshold && dist < bestDist) {
      bestDist = dist;
      best = { anim, handle: seg.handle };
    }
  }
  return best;
}

// ── Match Curves ────────────────────────────────────────────
const MATCH_ARC_THRESHOLD_PX = 12;

function evalBezierMidpoint(anim, segIdx) {
  const a0 = anim.anchors[segIdx], a1 = anim.anchors[segIdx + 1];
  const seg = anim.segments[segIdx];
  if (!seg || !seg.h0 || !seg.h1) return new Cx((a0.re + a1.re) / 2, (a0.im + a1.im) / 2);
  return new Cx(
    0.125*a0.re + 0.375*seg.h0.re + 0.375*seg.h1.re + 0.125*a1.re,
    0.125*a0.im + 0.375*seg.h0.im + 0.375*seg.h1.im + 0.125*a1.im,
  );
}

function gradientArcIndices(anim, key) {
  const raw = anim?.[key];
  const values = raw instanceof Set ? [...raw] : Array.isArray(raw) ? raw : [];
  return values
    .map(Number)
    .filter(idx => Number.isInteger(idx) && idx >= 0 && idx < (anim.segments?.length || 0) && !!anim.segments[idx]?.compiled);
