    // Start rubber-band selection; tiny click handled in mouseup
    rubberBand = { mode: 'arc', startX: cx, startY: cy, curX: cx, curY: cy, ctrl: e.ctrlKey };
    e.preventDefault(); return;
  }
  rubberBand = { mode: 'objects', startX: cx, startY: cy, curX: cx, curY: cy, ctrl: e.ctrlKey };
  selectedId = null;
  selectedGroupId = null;
  clearMultiSelection();
  clearGroupMode();
  clearSelectionShearGuides();
  sideActionHover = null;
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (AUX_WINDOWS_ENABLED && splitDragging) {
    const viewArea = document.getElementById('view-area');
    const totalW = viewArea.getBoundingClientRect().width;
    if (totalW >= 1) {
      const newW = Math.max(20, Math.min(totalW - 85, splitDragStartWidth + (e.clientX - splitDragStartX)));
      document.getElementById('left-column').style.flex = `0 0 ${newW}px`;
    }
    return;
  }

  if (AUX_WINDOWS_ENABLED && hSplitDragging) {
    const leftCol = document.getElementById('left-column');
    const totalH = leftCol.getBoundingClientRect().height;
    if (totalH >= 1) {
      const newH = Math.max(60, Math.min(totalH - 65, hSplitDragStartHeight + (e.clientY - hSplitDragStartY)));
      document.getElementById('isolation-window').style.flex = `0 0 ${newH}px`;
      resizeObjCanvas(); resizeIsolCanvas();
    }
    return;
  }

  const isIsolDrag = AUX_WINDOWS_ENABLED && (isolDragging || resizeDrag?.onIsolCanvas || rotateDrag?.onIsolCanvas ||
                     handleDrag?.onIsolCanvas || anchorDrag?.onIsolCanvas ||
                     curveDrag?.onIsolCanvas || eccDrag?.onIsolCanvas);

  const activeCanvas = isIsolDrag ? isolCanvas : canvas;
  const rect = activeCanvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * devicePixelRatio;
  const cy = (e.clientY - rect.top)  * devicePixelRatio;
  const [mathX, mathY] = isIsolDrag ? [(cx - isolOriginX) / isolScale, (isolOriginY - cy) / isolScale]
                       : toMath(cx, cy);

  if (isolDragging) {
    isolOriginX = isolDragOriginX + (e.clientX * devicePixelRatio - isolDragStartX);
    isolOriginY = isolDragOriginY + (e.clientY * devicePixelRatio - isolDragStartY);
    draw(); return;
  }

  // Placement preview
  const placingForPreview = animations.find(a => a.inPlacementMode);
  if (placingForPreview) {
    const onCanvas = cx >= 0 && cy >= 0 && cx <= canvas.width && cy <= canvas.height;
    if (isPolylineAnim(placingForPreview) && lineConnectorChoice?.anim === placingForPreview) {
      placementPreviewPos = null;
      const nextHover = onCanvas ? queryLineConnectorChoice(cx, cy) : null;
      const changed = (nextHover?.idx ?? -1) !== (lineConnectorChoiceHover?.idx ?? -1);
      lineConnectorChoiceHover = nextHover;
      if (changed) updateCursor();
      draw(); return;
    }
    lineConnectorChoiceHover = null;
    placementPreviewPos = onCanvas ? new Cx(softSnap(mathX), softSnap(mathY)) : null;
    draw(); return;
  }

  if (resizeDrag) {
    const changed = applyResizeOrShearForCursor(resizeDrag, mathX, mathY);
    if (changed) {
      const detail = document.getElementById('object-detail');
      const scrollTop = detail ? detail.scrollTop : 0;
      renderAnimList();
      if (detail) detail.scrollTop = scrollTop;
    }
    draw(); return;
  }

  if (rotateDrag) {
    const angle = Math.atan2(mathY - rotateDrag.center.im, mathX - rotateDrag.center.re);
    applyRotationDelta(rotateDrag, angle - rotateDrag.startAngle);
    const detail = document.getElementById('object-detail');
    const scrollTop = detail ? detail.scrollTop : 0;
    renderAnimList();
    if (detail) detail.scrollTop = scrollTop;
    draw(); return;
  }

  if (handleDrag) {
    const { anim, segIdx, side, anchorIdx } = handleDrag;
    const snapped = snapPointToLattice(new Cx(mathX, mathY));
    anim.segments[segIdx][side] = snapped;
    swingOppositeHandle(anim, anchorIdx, side === 'h0');
    recompileAnim(anim);
    updateSidebarInputs(anim);
    draw(); return;
  }

  if (anchorDrag) {
    const { anim, anchorIdx, startMathX, startMathY, origAnchor, origH0, origH1, linkedIdx, linkedOrigH0, linkedOrigH1 } = anchorDrag;
    const snapX = softSnap(origAnchor.re + (mathX - startMathX));
    const snapY = softSnap(origAnchor.im + (mathY - startMathY));
    const sdx = snapX - origAnchor.re, sdy = snapY - origAnchor.im;
    anim.anchors[anchorIdx] = new Cx(snapX, snapY);
    if (linkedIdx !== null) {
      if (origH0 !== null) anim.segments[anchorIdx].h0 = new Cx(origH0.re + sdx, origH0.im + sdy);
      if (origH1 !== null) anim.segments[anchorIdx - 1].h1 = new Cx(origH1.re + sdx, origH1.im + sdy);
      anim.anchors[linkedIdx] = new Cx(snapX, snapY);
      if (linkedOrigH0 !== null) anim.segments[linkedIdx].h0 = new Cx(linkedOrigH0.re + sdx, linkedOrigH0.im + sdy);
      if (linkedOrigH1 !== null) anim.segments[linkedIdx - 1].h1 = new Cx(linkedOrigH1.re + sdx, linkedOrigH1.im + sdy);
    } else {
      const isInterior = origH0 !== null && origH1 !== null;
      if (isInterior) {
        anim.segments[anchorIdx].h0 = new Cx(origH0.re + sdx, origH0.im + sdy);
        anim.segments[anchorIdx - 1].h1 = new Cx(origH1.re + sdx, origH1.im + sdy);
      }
    }
    recompileAnim(anim);
    updateSidebarInputs(anim);
    draw(); return;
  }

  if (curveDrag) {
    const { anim, startMathX, startMathY, origAnchors, origSegs } = curveDrag;
    const dx = softSnap(mathX - startMathX), dy = softSnap(mathY - startMathY);
    anim.anchors.forEach((_, i) => { anim.anchors[i] = new Cx(origAnchors[i].re + dx, origAnchors[i].im + dy); });
    anim.segments.forEach((s, i) => {
      if (!s || !origSegs[i]) return;
      s.h0 = new Cx(origSegs[i].h0.re + dx, origSegs[i].h0.im + dy);
      s.h1 = new Cx(origSegs[i].h1.re + dx, origSegs[i].h1.im + dy);
    });
    recompileAnim(anim);
    updateSidebarInputs(anim);
    draw(); return;
  }

  if (frameDrag) {
    if (frameDrag.groupId != null || frameDrag.multi) {
      const dx = softSnap(mathX - frameDrag.startMathX), dy = softSnap(mathY - frameDrag.startMathY);
      applyGroupTranslation(frameDrag, dx, dy);
      draw(); return;
    }
    const { anim, startMathX, startMathY, origAnchors, origSegs } = frameDrag;
    const dx = softSnap(mathX - startMathX), dy = softSnap(mathY - startMathY);
    anim.anchors.forEach((_, i) => { anim.anchors[i] = new Cx(origAnchors[i].re + dx, origAnchors[i].im + dy); });
    anim.segments.forEach((s, i) => {
      if (!s || !origSegs[i]) return;
      s.h0 = new Cx(origSegs[i].h0.re + dx, origSegs[i].h0.im + dy);
      s.h1 = new Cx(origSegs[i].h1.re + dx, origSegs[i].h1.im + dy);
    });
    recompileAnim(anim);
    updateSidebarInputs(anim);
    draw(); return;
  }

  if (eccDrag) {
    // Dead zone: ignore tiny movements to prevent accidental eccentricity changes
    if (Math.hypot(e.clientX - mouseDownClientX, e.clientY - mouseDownClientY) < 6) return;
    const { anim, segIdx, perpRe, perpIm, perpSign, startMathX, startMathY, startEccPct } = eccDrag;
    const seg = anim.segments[segIdx];
    if (!seg) { draw(); return; }
    if (!eccDrag.undoPushed) { pushUndo(); eccDrag.undoPushed = true; }
    // Relative-delta drag: perp component of mouse movement from click position.
    // 200 CSS pixels perpendicular to chord = full 0-100% eccentricity range.
    // perpSign ensures dragging toward the bowing side always increases eccentricity.
    const deltaPerp = perpSign * ((mathX - startMathX) * perpRe + (mathY - startMathY) * perpIm);
    const sensitivity = (eccDrag.onIsolCanvas ? isolScale : eccDrag.onObjCanvas ? objScale : scale) / (2 * devicePixelRatio);
    const newPct = Math.max(0, Math.min(100, Math.round(startEccPct + deltaPerp * sensitivity)));
    seg.eccentricity = percentToEccentricity(newPct);
    recompileSegment(anim, segIdx);
    updateSidebarInputs(anim);
    draw(); return;
  }

  if (rubberBand) {
    rubberBand.curX = cx; rubberBand.curY = cy;
    draw(); return;
  }

  if (dragging) {
    originX = dragOriginX + (e.clientX * devicePixelRatio - dragStartX);
    originY = dragOriginY + (e.clientY * devicePixelRatio - dragStartY);
    draw(); return;
  }

  // Hover detection
  if (currentMode === 'animations') {
    const isolBB = AUX_WINDOWS_ENABLED ? isolCanvas.getBoundingClientRect() : { left: 0, right: -1, top: 0, bottom: -1 };
    const overIsol = AUX_WINDOWS_ENABLED && e.clientX >= isolBB.left && e.clientX <= isolBB.right &&
                     e.clientY >= isolBB.top  && e.clientY <= isolBB.bottom;

    let newSideActionHover = null, newResizeHover = null, newFrameHover = null;
    let newPlusHover = null, newLockHover = null, newAnchorHover = null;
    let newHandleHover = null, newRotationHover = null, newSegmentHover = null;

    if (overIsol) {
      const iCx = (e.clientX - isolBB.left) * devicePixelRatio;
      const iCy = (e.clientY - isolBB.top)  * devicePixelRatio;
      const [iMx, iMy] = [(iCx - isolOriginX) / isolScale, (isolOriginY - iCy) / isolScale];
      withIsolViewport(() => {
        newSideActionHover = querySideActionButtonHover(iCx, iCy);
        newRotationHover = newSideActionHover ? null : queryRotationWheelHover(iCx, iCy);
        newResizeHover   = (newSideActionHover || newRotationHover) ? null : queryResizeHandleHover(iCx, iCy);
        newPlusHover     = (newSideActionHover || newRotationHover || newResizeHover) ? null : queryPlusHover(iCx, iCy);
        newLockHover     = (newSideActionHover || newRotationHover || newResizeHover || newPlusHover) ? null : queryLockHover(iCx, iCy);
        newAnchorHover   = (newSideActionHover || newRotationHover || newResizeHover || newPlusHover || newLockHover) ? null : queryAnchorHover(iMx, iMy);
        newHandleHover   = (newSideActionHover || newRotationHover || newResizeHover || newPlusHover || newAnchorHover || newLockHover) ? null : queryHandleHover(iMx, iMy);
        newSegmentHover  = (newSideActionHover || newRotationHover || newResizeHover || newPlusHover || newAnchorHover || newHandleHover || newLockHover) ? null : querySegmentHover(iCx, iCy);
      });
    } else {
      newSideActionHover = querySideActionButtonHover(cx, cy);
      newRotationHover = newSideActionHover ? null : queryRotationWheelHover(cx, cy);
      newResizeHover  = (newSideActionHover || newRotationHover) ? null : queryResizeHandleHover(cx, cy);
      newFrameHover   = (newSideActionHover || newRotationHover || newResizeHover) ? null : queryFrameBorderHover(cx, cy);
      newPlusHover    = (newSideActionHover || newRotationHover || newResizeHover || newFrameHover) ? null : queryPlusHover(cx, cy);
      newLockHover    = (newSideActionHover || newRotationHover || newResizeHover || newFrameHover || newPlusHover) ? null : queryLockHover(cx, cy);
      newAnchorHover  = (newSideActionHover || newRotationHover || newResizeHover || newFrameHover || newPlusHover || newLockHover) ? null : queryAnchorHover(mathX, mathY);
      newHandleHover  = (newSideActionHover || newRotationHover || newResizeHover || newPlusHover || newAnchorHover || newLockHover) ? null : queryHandleHover(mathX, mathY);
      newSegmentHover = (newSideActionHover || newResizeHover || newFrameHover || newPlusHover || newRotationHover || newAnchorHover || newHandleHover || newLockHover) ? null : querySegmentHover(cx, cy);
    }

    const sideActionChanged = (newSideActionHover?.anim !== sideActionHover?.anim) || (newSideActionHover?.groupId !== sideActionHover?.groupId) || (newSideActionHover?.multi !== sideActionHover?.multi) || (newSideActionHover?.kind !== sideActionHover?.kind);
    const resizeChanged = (newResizeHover?.anim !== resizeHover?.anim) || (newResizeHover?.groupId !== resizeHover?.groupId) || (newResizeHover?.multi !== resizeHover?.multi) || (newResizeHover?.handle !== resizeHover?.handle);
    const frameChanged = (newFrameHover?.id !== frameHover?.id) || (newFrameHover?.groupId !== frameHover?.groupId) || (newFrameHover?.multi !== frameHover?.multi);
    const rotationChanged = (newRotationHover?.anim !== rotateHover?.anim) || (newRotationHover?.groupId !== rotateHover?.groupId) || (newRotationHover?.multi !== rotateHover?.multi);
    const plusChanged = (newPlusHover?.anim !== plusHover?.anim) || (newPlusHover?.end !== plusHover?.end);
    const lockChanged = (newLockHover?.anim !== lockHover?.anim) || (newLockHover?.anchorIdx !== lockHover?.anchorIdx);
    const changed = sideActionChanged || resizeChanged || frameChanged || rotationChanged || plusChanged || lockChanged || (newAnchorHover !== anchorHover) || (newHandleHover !== handleHover) ||
      (newSegmentHover !== segmentHover &&
        !(newSegmentHover && segmentHover && newSegmentHover.anim === segmentHover.anim && newSegmentHover.segIdx === segmentHover.segIdx));
    sideActionHover = newSideActionHover;
    resizeHover  = newResizeHover;
    frameHover   = newFrameHover;
    rotateHover  = newRotationHover;
    lockHover    = newLockHover;
    plusHover    = newPlusHover;
    anchorHover  = newAnchorHover;
    handleHover  = newHandleHover;
    segmentHover = newSegmentHover;
    if (changed) { updateCursor(); draw(); }
  }
});

window.addEventListener('mouseup', e => {
  if (splitDragging) { splitDragging = false; suppressExpensiveFills = false; document.getElementById('split-handle').classList.remove('dragging'); resize(); return; }
  if (hSplitDragging) { hSplitDragging = false; document.getElementById('h-split-handle').classList.remove('dragging'); return; }
  if (isolDragging) { isolDragging = false; updateCursor(); return; }
  if (objDragging) { objDragging = false; updateCursor(); return; }
  if (resizeDrag) {
    resizeDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (rotateDrag) {
    rotateDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (handleDrag) {
    handleDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (anchorDrag) {
    anchorDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (rubberBand) {
    const isDrag = Math.hypot(e.clientX - mouseDownClientX, e.clientY - mouseDownClientY) > 5;
    const rbMode = rubberBand.mode || 'arc';
    if (!isDrag) {
      // Tiny click on background: clear the current selection.
      rubberBand = null;
      tilesDrillPath = [];
      if (editModeAnimId !== null) exitEditMode();
      selectedId = null;
      selectedGroupId = null;
      sceneIndicatorAnimId = null;
      clearMultiSelection();
      clearGroupMode();
      clearSelectionShearGuides();
      sideActionHover = null;
      animations.forEach(a => {
        a.expanded = false;
        a.expandedArcs = new Set();
        a.expandedAnchors = new Set();
      });
      renderAnimList(); draw(); return;
    }
    if (rbMode === 'objects') {
      const rect = {
        left: Math.min(rubberBand.startX, rubberBand.curX),
        right: Math.max(rubberBand.startX, rubberBand.curX),
        top: Math.min(rubberBand.startY, rubberBand.curY),
        bottom: Math.max(rubberBand.startY, rubberBand.curY),
      };
      const hits = animationsFullyInsideCanvasRect(rect);
      rubberBand = null;
      if (hits.length > 1) {
        selectTemporaryMultiSelection(hits.map(a => a.id));
      } else if (hits.length === 1) {
        drillSelectObject(hits[0]);
      } else {
        tilesDrillPath = [];
        selectedId = null;
        selectedGroupId = null;
        sceneIndicatorAnimId = null;
        clearMultiSelection();
        clearGroupMode();
        clearSelectionShearGuides();
        sideActionHover = null;
        animations.forEach(a => {
          a.expanded = false;
          a.expandedArcs = new Set();
          a.expandedAnchors = new Set();
        });
      }
      renderAnimList(); draw(); updateCursor(); return;
    }
    // Complete rubber-band: select arcs with any anchor inside the rect
    const anim = animations.find(a => a.id === editModeAnimId);
    if (anim) {
      anim.expandedAnchors = new Set();
      const rx0 = Math.min(rubberBand.startX, rubberBand.curX);
      const rx1 = Math.max(rubberBand.startX, rubberBand.curX);
      const ry0 = Math.min(rubberBand.startY, rubberBand.curY);
      const ry1 = Math.max(rubberBand.startY, rubberBand.curY);
      const inRect = i => {
        const [ax, ay] = toCanvas(anim.anchors[i].re, anim.anchors[i].im);
        const [bx, by] = toCanvas(anim.anchors[i+1].re, anim.anchors[i+1].im);
        return (ax >= rx0 && ax <= rx1 && ay >= ry0 && ay <= ry1)
            || (bx >= rx0 && bx <= rx1 && by >= ry0 && by <= ry1);
      };
      if (rubberBand.ctrl) {
        for (let i = 0; i < anim.segments.length; i++) {
          if (!inRect(i)) continue;
          if (anim.activeSegments.has(i)) anim.activeSegments.delete(i);
          else anim.activeSegments.add(i);
        }
      } else {
        anim.activeSegments = new Set();
        for (let i = 0; i < anim.segments.length; i++) {
          if (inRect(i)) anim.activeSegments.add(i);
        }
      }
    }
    rubberBand = null;
    draw(); return;
  }

  if (frameDrag) {
    const wasTiny = Math.hypot(e.clientX - mouseDownClientX, e.clientY - mouseDownClientY) < 5;
    if (wasTiny) {
      // Tiny click on frame: undo the translate and just exit edit mode
      undoStack.pop();
      frameDrag = null;
      exitEditMode();
    } else {
      frameDrag = null;
    }
    renderAnimList(); draw(); updateCursor(); return;
  }

  if (eccDrag) {
    eccDrag = null;
    const detail = document.getElementById('object-detail');
    const scrollTop = detail ? detail.scrollTop : 0;
    renderAnimList();
    if (detail) detail.scrollTop = scrollTop;
    draw(); updateCursor(); return;
  }

  if (curveDrag) {
    const wasTinyClick = Math.hypot(e.clientX - mouseDownClientX, e.clientY - mouseDownClientY) < 5;
    if (curveDrag.text) {
      const textAnim = curveDrag.anim;
      if (wasTinyClick) undoStack.pop();
      curveDrag = null;
      renderAnimList();
      if (wasTinyClick) beginCanvasTextEdit(textAnim, false, false);
      else draw();
      updateCursor(); return;
    }
    curveDrag = null;
    renderAnimList(); draw(); updateCursor(); return;
  }
  if (dragging && Math.hypot(e.clientX - mouseDownClientX, e.clientY - mouseDownClientY) < 5) {
    // Background click: already handled in mousedown
  }
  dragging = false;
  updateCursor();
});

  e.preventDefault();

canvas.addEventListener('auxclick', e => {

});

canvas.addEventListener('mouseleave', () => {
  placementPreviewPos = null;
  rubberBand = null;
  if (anchorHover || handleHover || segmentHover || resizeHover || rotateHover || sideActionHover || frameHover || plusHover || lockHover) {
    anchorHover = null; handleHover = null; segmentHover = null; resizeHover = null; rotateHover = null; sideActionHover = null; frameHover = null; plusHover = null; lockHover = null;
    updateCursor(); draw();
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const mx = e.offsetX * devicePixelRatio;
  const my = e.offsetY * devicePixelRatio;
  originX = mx + (originX - mx) * factor;
  originY = my + (originY - my) * factor;
  scale *= factor;
  draw();
}, { passive: false });

// ── Object window event handlers ──

objCanvas.addEventListener('mousedown', e => {
  if (!AUX_WINDOWS_ENABLED) return;
  e.preventDefault();
  if (eyedropperTarget !== null && e.button === 0) {
    const objRect = objCanvas.getBoundingClientRect();
    const px = Math.round((e.clientX - objRect.left) * devicePixelRatio);
    const py = Math.round((e.clientY - objRect.top)  * devicePixelRatio);
    const pixel = objCanvas.getContext('2d').getImageData(px, py, 1, 1).data;
    applyEyedropperColor('#' + [pixel[0], pixel[1], pixel[2]].map(v => v.toString(16).padStart(2, '0')).join(''));
    return;
  }
  return; // context window is read-only
  if (e.button !== 0) return;

  mouseDownClientX = e.clientX;
  mouseDownClientY = e.clientY;

  withObjViewport(() => {
    const [mathX, mathY] = toMath(cx, cy);

    // ── Split arc mode ──
    if (splitArcMode !== null) {
      e.preventDefault();
      const hover = querySegmentHover(cx, cy);
      if (hover && hover.anim === splitArcMode.anim && hover.segIdx === splitArcMode.segIdx && typeof hover.u === 'number') {
        pushUndo();
        const { anim, segIdx } = splitArcMode;
        splitArcMode = null;
        splitSegmentAtT(anim, segIdx, hover.u);
        saveProject();
        renderAnimList(); draw();
      } else {
        splitArcMode = null;
        renderAnimList(); draw();
      }
      return;
    }

    const resizeHit = queryResizeHandleHover(cx, cy);
    if (resizeHit) {
      e.preventDefault();
      pushUndo();
      if (resizeHit.anim) {
        const frame = selectionFrameMetrics(resizeHit.anim);
        if (frame) resizeDrag = {
          ...cloneTransformState(resizeHit.anim),
          handle: resizeHit.handle,
          startMathX: mathX, startMathY: mathY,
          origBounds: frameMathBounds(frame),
          onObjCanvas: true,
        };
      } else if (resizeHit.groupId != null) {
        const f = groupSelectionFrameMetrics(resizeHit.groupId);
        if (f) resizeDrag = {
          groupId: resizeHit.groupId,
          handle: resizeHit.handle,
          startMathX: mathX, startMathY: mathY,
          origBounds: frameMathBounds(f),
          origStates: allDescendantAnims(resizeHit.groupId).map(cloneTransformState),
          onObjCanvas: true,
        };
      } else if (resizeHit.multi) {
        const f = multiSelectionFrameMetrics();
        if (f) resizeDrag = {
          multi: true,
          handle: resizeHit.handle,
          startMathX: mathX, startMathY: mathY,
          origBounds: frameMathBounds(f),
          origStates: multiSelectionMembers().map(cloneTransformState),
          onObjCanvas: true,
        };
      }
      updateCursor(); draw(); return;
    }

    const rotateHit = queryRotationWheelHover(cx, cy);
    if (rotateHit) {
      e.preventDefault();
      pushUndo();
      if (rotateHit.anim) {
        const wheel = selectionRotationWheel(rotateHit.anim);
        if (wheel) {
          const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
          const center = new Cx(cRe, cIm);
          rotateDrag = {
            ...cloneTransformState(rotateHit.anim),
            center, startAngle: Math.atan2(mathY - cIm, mathX - cRe),
            onObjCanvas: true,
          };
        }
      } else if (rotateHit.groupId != null) {
        const wheel = groupSelectionRotationWheel(rotateHit.groupId);
        if (wheel) {
          const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
          const center = new Cx(cRe, cIm);
          rotateDrag = {
            groupId: rotateHit.groupId,
            center, startAngle: Math.atan2(mathY - cIm, mathX - cRe),
            origStates: allDescendantAnims(rotateHit.groupId).map(cloneTransformState),
            onObjCanvas: true,
          };
        }
      } else if (rotateHit.multi) {
        const wheel = multiSelectionRotationWheel();
        if (wheel) {
          const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
          const center = new Cx(cRe, cIm);
          rotateDrag = {
            multi: true,
            center, startAngle: Math.atan2(mathY - cIm, mathX - cRe),
            origStates: multiSelectionMembers().map(cloneTransformState),
            onObjCanvas: true,
          };
        }
      }
      updateCursor(); draw(); return;
    }

    const plusHit = queryPlusHover(cx, cy);
    if (plusHit) {
      e.preventDefault();
      startExtendedPlacement(plusHit.anim, plusHit.anchorIdx, plusHit.forward);
      return;
    }

    const lockHit = queryLockHover(cx, cy);
    if (lockHit) {
      e.preventDefault();
      pushUndo();
      setAnchorLocked(lockHit.anim, lockHit.anchorIdx, !isAnchorLocked(lockHit.anim, lockHit.anchorIdx));
      renderAnimList(); draw(); return;
    }

    const anchorHit = queryAnchorHover(mathX, mathY);
    if (anchorHit) {
      e.preventDefault();
      pushUndo();
      const { anim, anchorIdx } = anchorHit;
      const origAnchor = cloneCx(anim.anchors[anchorIdx]);
      const origH0 = anim.segments[anchorIdx] ? cloneCx(anim.segments[anchorIdx].h0) : null;
      const origH1 = anchorIdx > 0 && anim.segments[anchorIdx - 1] ? cloneCx(anim.segments[anchorIdx - 1].h1) : null;
      let linkedIdx = null, linkedOrigH0 = null, linkedOrigH1 = null;
      const loopRange = findLoopRange(anim);
      if (loopRange) {
        if (anchorIdx === loopRange.loopStart) {
          linkedIdx = loopRange.loopEnd;
          linkedOrigH0 = anim.segments[linkedIdx] ? cloneCx(anim.segments[linkedIdx].h0) : null;
          linkedOrigH1 = linkedIdx > 0 && anim.segments[linkedIdx - 1] ? cloneCx(anim.segments[linkedIdx - 1].h1) : null;
        } else if (anchorIdx === loopRange.loopEnd) {
          linkedIdx = loopRange.loopStart;
          linkedOrigH0 = anim.segments[linkedIdx] ? cloneCx(anim.segments[linkedIdx].h0) : null;
          linkedOrigH1 = linkedIdx > 0 && anim.segments[linkedIdx - 1] ? cloneCx(anim.segments[linkedIdx - 1].h1) : null;
        }
      }
      anchorDrag = {
        anim, anchorIdx, startMathX: mathX, startMathY: mathY,
        origAnchor, origH0, origH1, linkedIdx, linkedOrigH0, linkedOrigH1,
        onObjCanvas: true,
      };
      updateCursor(); draw(); return;
    }

    const handleHit = queryHandleHover(mathX, mathY);
    if (handleHit) {
      e.preventDefault();
      pushUndo();
      const { anim, segIdx, side } = handleHit;
      handleDrag = { anim, segIdx, side, anchorIdx: side === 'h0' ? segIdx : segIdx + 1, onObjCanvas: true };
      updateCursor(); draw(); return;
    }

    const segHit = querySegmentHover(cx, cy);
    if (segHit && editModeAnimId === segHit.anim.id) {
      e.preventDefault();
      const { anim: hitAnim, segIdx: hitSegIdx } = segHit;

      if (isTextAnim(hitAnim)) {
        pushUndo();
        curveDrag = {
          anim: hitAnim, text: true,
          startMathX: mathX, startMathY: mathY,
          origAnchors: hitAnim.anchors.map(cloneCx),
          origSegs: [],
          onObjCanvas: true,
        };
        hitAnim.selectionGuideShear = null;
        hitAnim.expanded = true;
        hitAnim.activeSegments = new Set();
        hitAnim.expandedArcs = new Set();
        hitAnim.expandedAnchors = new Set();
        updateCursor(); draw(); return;
      }

      hitAnim.activeSegments = new Set([hitSegIdx]);
      hitAnim.selectionGuideShear = null;
      resizeHover = null; rotateHover = null; frameHover = null;
      hitAnim.expanded = true;
      hitAnim.expandedArcs = new Set([hitSegIdx]);
      hitAnim.expandedAnchors = new Set();
      animations.forEach(a => {
        if (a.id !== hitAnim.id) { a.expanded = false; a.expandedArcs = new Set(); a.expandedAnchors = new Set(); }
      });

      const a0 = hitAnim.anchors[hitSegIdx];
      const a1 = hitAnim.anchors[hitSegIdx + 1];
      let perpRe = 0, perpIm = 1;
      if (a0 && a1) {
        const cRe = a1.re - a0.re, cIm = a1.im - a0.im;
        const cLen = Math.hypot(cRe, cIm);
        if (cLen > 1e-9) { perpRe = -cIm / cLen; perpIm = cRe / cLen; }
      }
      const hitSeg = hitAnim.segments[hitSegIdx];
      const startEccPct = hitSeg ? eccentricityToPercent(hitSeg.eccentricity) : 50;
      let perpSign = 1;
      if (hitSeg?.compiled && a0 && a1) {
        const chordMidRe = (a0.re + a1.re) / 2, chordMidIm = (a0.im + a1.im) / 2;
        const mid = hitSeg.compiled(0, 0.5, {});
        if (mid && mid.ok()) {
          const proj = (mid.re - chordMidRe) * perpRe + (mid.im - chordMidIm) * perpIm;
          if (Math.abs(proj) > 1e-6) {
            perpSign = proj > 0 ? 1 : -1;
          } else if (hitSeg.h0 && hitSeg.h1) {
            const hProj = ((hitSeg.h0.re + hitSeg.h1.re) / 2 - chordMidRe) * perpRe +
                          ((hitSeg.h0.im + hitSeg.h1.im) / 2 - chordMidIm) * perpIm;
            perpSign = hProj < 0 ? -1 : 1;
          }
        }
      }
      eccDrag = {
        anim: hitAnim, segIdx: hitSegIdx,
        perpRe, perpIm, perpSign,
        startMathX: mathX, startMathY: mathY,
        startEccPct, undoPushed: false,
        onObjCanvas: true,
      };
      renderAnimList(); scrollToShowExpanded(hitAnim.id);
      updateCursor(); draw(); return;
    }

    // Clicking any other visible object in the obj window: select it without re-fitting the viewport
    const otherHit = querySegmentHover(cx, cy);
    if (otherHit) {
      e.preventDefault();
      suppressNextFitObjWindow = true;
      objWindowInteracting = true;
      enterEditMode(otherHit.anim, new Set());
      return;
    }
  });

  // Nothing was hit: deselect everything
  if (!e.defaultPrevented) {
    if (editModeAnimId !== null) exitEditMode();
    selectedId = null;
    selectedGroupId = null;
    sceneIndicatorAnimId = null;
    clearMultiSelection();
    clearGroupMode();
    clearSelectionShearGuides();
    sideActionHover = null;
    animations.forEach(a => { a.expanded = false; a.expandedArcs = new Set(); a.expandedAnchors = new Set(); });
    renderAnimList(); draw();
  }
});

objCanvas.addEventListener('wheel', e => { if (AUX_WINDOWS_ENABLED) e.preventDefault(); }, { passive: false });
objCanvas.addEventListener('contextmenu', e => { if (AUX_WINDOWS_ENABLED) e.preventDefault(); });

// ── Isolation window event handlers ──

isolCanvas.addEventListener('mousedown', e => {
  if (!AUX_WINDOWS_ENABLED) return;
  if (currentMode !== 'animations') return;

  const isolRect = isolCanvas.getBoundingClientRect();
  const cx = (e.clientX - isolRect.left) * devicePixelRatio;
  const cy = (e.clientY - isolRect.top) * devicePixelRatio;

  if (eyedropperTarget !== null && e.button === 0) {
    e.preventDefault();
    const px = Math.round(cx), py = Math.round(cy);
    const pixel = isolCanvas.getContext('2d').getImageData(px, py, 1, 1).data;
    applyEyedropperColor('#' + [pixel[0], pixel[1], pixel[2]].map(v => v.toString(16).padStart(2, '0')).join(''));
    return;
  }

  if (!getIsolationAnims().length) return;

  if (e.button === 2 || e.button === 1) {
    isolDragging = true;
    isolDragStartX = e.clientX * devicePixelRatio;
    isolDragStartY = e.clientY * devicePixelRatio;
    isolDragOriginX = isolOriginX;
    isolDragOriginY = isolOriginY;
    if (e.button === 1) e.preventDefault();
    return;
  }
  if (e.button !== 0) return;

  mouseDownClientX = e.clientX;
  mouseDownClientY = e.clientY;

  let isolSideAction = null;
  withIsolViewport(() => {
    const [mathX, mathY] = toMath(cx, cy);

    const sideAction = querySideActionButtonHover(cx, cy);
    if (sideAction) {
      e.preventDefault();
      isolSideAction = sideAction;
      return;
    }

    const activeRotateHit = (rotateHover && isRotationModeActiveForHit(rotateHover)) ? rotateHover : queryRotationWheelHover(cx, cy);
    if (activeRotateHit) {
      e.preventDefault();
      beginRotationDragFromHit(activeRotateHit, mathX, mathY, { onIsolCanvas: true });
      updateCursor(); draw();
      return;
    }
    if (isRotationModeActive()) clearRotationMode();

    if (splitArcMode !== null) {
      e.preventDefault();
      const hover = querySegmentHover(cx, cy);
      if (hover && hover.anim === splitArcMode.anim && hover.segIdx === splitArcMode.segIdx && typeof hover.u === 'number') {
        pushUndo();
        const { anim, segIdx } = splitArcMode;
        splitArcMode = null;
        splitSegmentAtT(anim, segIdx, hover.u);
        saveProject();
        renderAnimList(); draw();
      } else {
        splitArcMode = null;
        renderAnimList(); draw();
      }
      return;
    }

    const resizeHit = queryResizeHandleHover(cx, cy);
    if (resizeHit) {
      e.preventDefault();
      pushUndo();
      if (resizeHit.anim) {
        const frame = selectionFrameMetrics(resizeHit.anim);
        if (frame) resizeDrag = {
          ...cloneTransformState(resizeHit.anim),
          handle: resizeHit.handle,
          startMathX: mathX, startMathY: mathY,
          origBounds: frameMathBounds(frame),
          onIsolCanvas: true,
        };
      } else if (resizeHit.groupId != null) {
        const f = groupSelectionFrameMetrics(resizeHit.groupId);
        if (f) resizeDrag = {
          groupId: resizeHit.groupId,
          handle: resizeHit.handle,
          startMathX: mathX, startMathY: mathY,
          origBounds: frameMathBounds(f),
          origStates: allDescendantAnims(resizeHit.groupId).map(cloneTransformState),
          onIsolCanvas: true,
        };
      } else if (resizeHit.multi) {
        const f = multiSelectionFrameMetrics();
        if (f) resizeDrag = {
          multi: true,
          handle: resizeHit.handle,
          startMathX: mathX, startMathY: mathY,
          origBounds: frameMathBounds(f),
          origStates: multiSelectionMembers().map(cloneTransformState),
          onIsolCanvas: true,
        };
      }
      updateCursor(); draw(); return;
    }

    const rotateHit = queryRotationWheelHover(cx, cy);
    if (rotateHit) {
      e.preventDefault();
      pushUndo();
      if (rotateHit.anim) {
        const wheel = selectionRotationWheel(rotateHit.anim);
        if (wheel) {
          const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
          const center = new Cx(cRe, cIm);
          rotateDrag = {
            ...cloneTransformState(rotateHit.anim),
            center, startAngle: Math.atan2(mathY - cIm, mathX - cRe),
            onIsolCanvas: true,
          };
        }
      } else if (rotateHit.groupId != null) {
        const wheel = groupSelectionRotationWheel(rotateHit.groupId);
        if (wheel) {
          const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
          const center = new Cx(cRe, cIm);
          rotateDrag = {
            groupId: rotateHit.groupId,
            center, startAngle: Math.atan2(mathY - cIm, mathX - cRe),
            origStates: allDescendantAnims(rotateHit.groupId).map(cloneTransformState),
            onIsolCanvas: true,
          };
        }
      } else if (rotateHit.multi) {
        const wheel = multiSelectionRotationWheel();
        if (wheel) {
          const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
          const center = new Cx(cRe, cIm);
          rotateDrag = {
            multi: true,
            center, startAngle: Math.atan2(mathY - cIm, mathX - cRe),
            origStates: multiSelectionMembers().map(cloneTransformState),
            onIsolCanvas: true,
          };
        }
      }
      updateCursor(); draw(); return;
    }

    const plusHit = queryPlusHover(cx, cy);
    if (plusHit) {
      e.preventDefault();
      startExtendedPlacement(plusHit.anim, plusHit.anchorIdx, plusHit.forward);
      return;
    }

    const lockHit = queryLockHover(cx, cy);
    if (lockHit) {
      e.preventDefault();
      pushUndo();
      setAnchorLocked(lockHit.anim, lockHit.anchorIdx, !isAnchorLocked(lockHit.anim, lockHit.anchorIdx));
      renderAnimList(); draw(); return;
    }

    const anchorHit = queryAnchorHover(mathX, mathY);
    if (anchorHit) {
      e.preventDefault();
      pushUndo();
      const { anim, anchorIdx } = anchorHit;
      const origAnchor = cloneCx(anim.anchors[anchorIdx]);
      const origH0 = anim.segments[anchorIdx] ? cloneCx(anim.segments[anchorIdx].h0) : null;
      const origH1 = anchorIdx > 0 && anim.segments[anchorIdx - 1] ? cloneCx(anim.segments[anchorIdx - 1].h1) : null;
      let linkedIdx = null, linkedOrigH0 = null, linkedOrigH1 = null;
      const loopRange = findLoopRange(anim);
      if (loopRange) {
        if (anchorIdx === loopRange.loopStart) {
          linkedIdx = loopRange.loopEnd;
          linkedOrigH0 = anim.segments[linkedIdx] ? cloneCx(anim.segments[linkedIdx].h0) : null;
          linkedOrigH1 = linkedIdx > 0 && anim.segments[linkedIdx - 1] ? cloneCx(anim.segments[linkedIdx - 1].h1) : null;
        } else if (anchorIdx === loopRange.loopEnd) {
          linkedIdx = loopRange.loopStart;
          linkedOrigH0 = anim.segments[linkedIdx] ? cloneCx(anim.segments[linkedIdx].h0) : null;
          linkedOrigH1 = linkedIdx > 0 && anim.segments[linkedIdx - 1] ? cloneCx(anim.segments[linkedIdx - 1].h1) : null;
        }
      }
      anchorDrag = {
        anim, anchorIdx, startMathX: mathX, startMathY: mathY,
        origAnchor, origH0, origH1, linkedIdx, linkedOrigH0, linkedOrigH1,
        onIsolCanvas: true,
      };
      updateCursor(); draw(); return;
    }

    const handleHit = queryHandleHover(mathX, mathY);
    if (handleHit) {
      e.preventDefault();
      pushUndo();
      const { anim, segIdx, side } = handleHit;
      handleDrag = { anim, segIdx, side, anchorIdx: side === 'h0' ? segIdx : segIdx + 1, onIsolCanvas: true };
      updateCursor(); draw(); return;
    }

    const segHit = querySegmentHover(cx, cy);
    if (segHit && editModeAnimId === segHit.anim.id) {
      e.preventDefault();
      const { anim: hitAnim, segIdx: hitSegIdx } = segHit;

      if (isTextAnim(hitAnim)) {
        pushUndo();
        curveDrag = {
          anim: hitAnim, text: true,
          startMathX: mathX, startMathY: mathY,
          origAnchors: hitAnim.anchors.map(cloneCx),
          origSegs: [],
          onIsolCanvas: true,
        };
        hitAnim.selectionGuideShear = null;
        hitAnim.expanded = true;
        hitAnim.activeSegments = new Set();
        hitAnim.expandedArcs = new Set();
        hitAnim.expandedAnchors = new Set();
        updateCursor(); draw(); return;
      }

      hitAnim.activeSegments = new Set([hitSegIdx]);
      hitAnim.selectionGuideShear = null;
      resizeHover = null; rotateHover = null; frameHover = null;
      hitAnim.expanded = true;
      hitAnim.expandedArcs = new Set([hitSegIdx]);
      hitAnim.expandedAnchors = new Set();
      animations.forEach(a => {
        if (a.id !== hitAnim.id) { a.expanded = false; a.expandedArcs = new Set(); a.expandedAnchors = new Set(); }
      });

      const a0 = hitAnim.anchors[hitSegIdx];
      const a1 = hitAnim.anchors[hitSegIdx + 1];
      let perpRe = 0, perpIm = 1;
      if (a0 && a1) {
        const cRe = a1.re - a0.re, cIm = a1.im - a0.im;
        const cLen = Math.hypot(cRe, cIm);
        if (cLen > 1e-9) { perpRe = -cIm / cLen; perpIm = cRe / cLen; }
      }
      const hitSeg = hitAnim.segments[hitSegIdx];
      const startEccPct = hitSeg ? eccentricityToPercent(hitSeg.eccentricity) : 50;
      let perpSign = 1;
      if (hitSeg?.compiled && a0 && a1) {
        const chordMidRe = (a0.re + a1.re) / 2, chordMidIm = (a0.im + a1.im) / 2;
        const mid = hitSeg.compiled(0, 0.5, {});
        if (mid && mid.ok()) {
          const proj = (mid.re - chordMidRe) * perpRe + (mid.im - chordMidIm) * perpIm;
          if (Math.abs(proj) > 1e-6) {
            perpSign = proj > 0 ? 1 : -1;
          } else if (hitSeg.h0 && hitSeg.h1) {
            const hProj = ((hitSeg.h0.re + hitSeg.h1.re) / 2 - chordMidRe) * perpRe +
                          ((hitSeg.h0.im + hitSeg.h1.im) / 2 - chordMidIm) * perpIm;
            perpSign = hProj < 0 ? -1 : 1;
          }
        }
      }
      eccDrag = {
        anim: hitAnim, segIdx: hitSegIdx,
        perpRe, perpIm, perpSign,
        startMathX: mathX, startMathY: mathY,
        startEccPct, undoPushed: false,
        onIsolCanvas: true,
      };
      renderAnimList(); scrollToShowExpanded(hitAnim.id);
      updateCursor(); draw(); return;
    }

    const otherHit = querySegmentHover(cx, cy);
    if (otherHit) {
      e.preventDefault();
      suppressNextFitObjWindow = true;
      objWindowInteracting = true;
      enterEditMode(otherHit.anim, new Set());
      return;
    }
  });

  if (isolSideAction) {
    // Duplicate/reflect outside withIsolViewport so copied objects land in the scene viewport.
    handleSideActionButtonPress(isolSideAction);
    return;
  }
  if (!e.defaultPrevented) {
    if (editModeAnimId !== null) exitEditMode();
    selectedId = null;
    selectedGroupId = null;
    sceneIndicatorAnimId = null;
    clearMultiSelection();
    clearGroupMode();
    clearSelectionShearGuides();
    sideActionHover = null;
    animations.forEach(a => { a.expanded = false; a.expandedArcs = new Set(); a.expandedAnchors = new Set(); });
    renderAnimList(); draw();
  }
});

isolCanvas.addEventListener('wheel', e => {
  if (!AUX_WINDOWS_ENABLED) return;
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const mx = e.offsetX * devicePixelRatio;
  const my = e.offsetY * devicePixelRatio;
  isolOriginX = mx + (isolOriginX - mx) * factor;
  isolOriginY = my + (isolOriginY - my) * factor;
  isolScale *= factor;
  draw();
}, { passive: false });

isolCanvas.addEventListener('contextmenu', e => { if (AUX_WINDOWS_ENABLED) e.preventDefault(); });
isolCanvas.addEventListener('auxclick', e => { if (AUX_WINDOWS_ENABLED && e.button === 2) e.preventDefault(); });

isolCanvas.addEventListener('mouseleave', () => {
  if (!AUX_WINDOWS_ENABLED) return;
  if (anchorHover || handleHover || segmentHover || resizeHover || rotateHover || sideActionHover || plusHover || lockHover) {
    anchorHover = null; handleHover = null; segmentHover = null;
    resizeHover = null; rotateHover = null; sideActionHover = null; plusHover = null; lockHover = null;
    updateCursor(); draw();
  }
});

document.getElementById('object-recenter-btn').addEventListener('click', () => {
  if (!AUX_WINDOWS_ENABLED) return;
  fitObjWindow();
  draw();
});

document.getElementById('isolation-recenter-btn').addEventListener('click', () => {
  if (!AUX_WINDOWS_ENABLED) return;
  fitIsolationWindow();
  draw();
});

document.getElementById('split-handle').addEventListener('mousedown', e => {
  if (!AUX_WINDOWS_ENABLED) return;
  if (e.button !== 0) return;
  splitDragging = true;
  splitDragStartX = e.clientX;
  splitDragStartWidth = document.getElementById('left-column').getBoundingClientRect().width;
  document.getElementById('split-handle').classList.add('dragging');
  e.preventDefault();
});

document.getElementById('h-split-handle').addEventListener('mousedown', e => {
  if (!AUX_WINDOWS_ENABLED) return;
  if (e.button !== 0) return;
  hSplitDragging = true;
  hSplitDragStartY = e.clientY;
  hSplitDragStartHeight = document.getElementById('isolation-window').getBoundingClientRect().height;
  document.getElementById('h-split-handle').classList.add('dragging');
  e.preventDefault();
});

document.addEventListener('mousedown', e => {
  if (!rotationModeTarget) return;
  const path = e.composedPath ? e.composedPath() : [];
  if (path.includes(canvas) || path.includes(objCanvas) || path.includes(isolCanvas)) return;
  clearRotationMode();
  draw(); updateCursor();
}, true);

document.addEventListener('click', e => {
  if (globalSettingsOpen && !(e.target.closest && e.target.closest('#global-settings'))) {
    setGlobalSettingsOpen(false);
  }
  const path = e.composedPath ? e.composedPath() : [];
  const inUI = path.some(el => el.id === 'scene-window' || el.id === 'object-window' || el.id === 'isolation-window' || el.id === 'left-column' || el.id === 'view-area' || el.id === 'sidebar');
  if (inUI) return;
  if (openColorMenuAnimId !== null) { openColorMenuAnimId = null; renderAnimList(); }
  const placing = animations.find(a => a.inPlacementMode);
  if (placing && isPrimitiveAnim(placing)) cancelPlacement(placing);
  if (editModeAnimId !== null) exitEditMode();
  selectedId = null;
  selectedGroupId = null;
  clearMultiSelection();
  clearGroupMode();
  sideActionHover = null;
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  renderAnimList(); draw();
});


// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — drawing
// ════════════════════════════════════════════════════════

function drawAnchorDot(canvasPt, color, r) {
  ctx.beginPath();
  ctx.arc(canvasPt[0], canvasPt[1], r, 0, Math.PI * 2);
  ctx.fillStyle = '#101020';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(canvasPt[0], canvasPt[1], r, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2 * devicePixelRatio;
  ctx.stroke();
}

function drawHandleDot(canvasPt, color, r) {
  ctx.beginPath();
  ctx.arc(canvasPt[0], canvasPt[1], r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawHandles(anim) {
  const dpr = devicePixelRatio;
  const activeArc = activeArcIndex(anim);

  // Dot in edit mode: ring highlight
  if (anim.anchors.length === 1 && anim.segments.length === 0) {
    const [x, y] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
    ctx.save();
    ctx.strokeStyle = anim.color; ctx.lineWidth = 1.5 * dpr; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.arc(x, y, 9 * dpr, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  // "+" signs always visible in edit mode
  for (const pp of getPlusPositions(anim)) {
    const isHov = plusHover?.anim === anim && plusHover?.end === pp.end;
    drawPlusSign(pp.cx, pp.cy, CANVAS_BUTTON_COLOR, dpr, isHov);
  }

  // Anchor dots visible whenever in edit mode
  const softColor = softenedSelectionColor(anim.color);
  for (let i = 0; i < anim.anchors.length; i++) {
    if (!anim.anchors[i]) continue;
    const isHov = anchorHover?.anim === anim && anchorHover?.anchorIdx === i;
    const isExp = anim.expandedAnchors?.has(i);
    const anchorColor = activeArc === null || i === activeArc || i === activeArc + 1 ? anim.color : softColor;
    drawAnchorDot(toCanvas(anim.anchors[i].re, anim.anchors[i].im), anchorColor, (isHov || isExp ? 7 : 5) * dpr);
  }

  // Bézier handles and lock toggles only visible when an arc is selected
  if (activeArc === null) return;

  const { anchorSet, handlePairs } = getActiveHandleInfo(anim);
  if (anchorSet.size === 0) return;
  // Dashed lines + handle dots
  for (const { segIdx, side } of handlePairs) {
    const anchorIdx = side === 'h0' ? segIdx : segIdx + 1;
    const Acp = toCanvas(anim.anchors[anchorIdx].re, anim.anchors[anchorIdx].im);
    const hcp = toCanvas(anim.segments[segIdx][side].re, anim.segments[segIdx][side].im);
    ctx.save();
    ctx.globalAlpha = 0.45; ctx.strokeStyle = anim.color;
    ctx.lineWidth = 1.2 * dpr; ctx.setLineDash([3*dpr, 3*dpr]);
    ctx.beginPath(); ctx.moveTo(Acp[0], Acp[1]); ctx.lineTo(hcp[0], hcp[1]); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    const isHov = handleHover?.anim === anim && handleHover?.segIdx === segIdx && handleHover?.side === side;
    drawHandleDot(hcp, anim.color, (isHov ? 5 : 3.5) * dpr);
  }
  // Lock toggles only for interior anchors adjacent to the selected arc
  if (!isPolylineAnim(anim)) {
    for (let i = 1; i < anim.anchors.length - 1; i++) {
      if (!anchorSet.has(i)) continue;
      if (activeArc !== null && i !== activeArc && i !== activeArc + 1) continue;
      const locked = isAnchorLocked(anim, i);
      const isHov  = lockHover?.anim === anim && lockHover?.anchorIdx === i;
      const [lx, ly] = lockTogglePosition(anim, i, activeArc);
      drawLockToggle(lx, ly, locked, isHov, CANVAS_TOOL_COLOR, dpr);
    }
  }
}

// Returns true when eccentricity ghost curves should be shown for this arc.
function isEccGhostActive(anim, segIdx) {
  if (eccentricitySliderActiveKey?.animId === anim.id && eccentricitySliderActiveKey?.segIdx === segIdx)
    return true;
  if (handleDrag?.anim === anim) {
    const isInterior = handleDrag.anchorIdx > 0 && handleDrag.anchorIdx < anim.anchors.length - 1;
    if (isInterior) return true;          // A1-adjacent handle: both arcs
    if (handleDrag.segIdx === segIdx) return true; // same-arc handle
  }
  if (anchorDrag?.anim === anim) {
    const isInterior = anchorDrag.anchorIdx > 0 && anchorDrag.anchorIdx < anim.anchors.length - 1;
    if (isInterior) return true;          // A1 drag: both arcs
  }
  return false;
}

function fillEvenOdd(renderCtx) {
  try { renderCtx.fill('evenodd'); }
  catch (_err) { renderCtx.fill(); }
}

function clipEvenOdd(renderCtx) {
  try { renderCtx.clip('evenodd'); }
  catch (_err) { renderCtx.clip(); }
}

function drawCircularFillRings(renderCtx, bounds, color, alpha = 1) {
  if (!bounds || !color || alpha <= 0) return false;
  const dpr = devicePixelRatio;
  const cx = (bounds.left + bounds.right) * 0.5;
  const cy = (bounds.top + bounds.bottom) * 0.5;
  const rx = Math.max(Math.abs(bounds.left - cx), Math.abs(bounds.right - cx));
  const ry = Math.max(Math.abs(bounds.top - cy), Math.abs(bounds.bottom - cy));
  const maxR = Math.max(1, Math.hypot(rx, ry)) + 8 * dpr;
  const spacing = Math.max(6, 8 * dpr);
  renderCtx.save();
  renderCtx.strokeStyle = color;
  renderCtx.globalAlpha = alpha;
  renderCtx.lineWidth = Math.max(1, dpr);
  for (let r = spacing * 0.5; r <= maxR; r += spacing) {
    renderCtx.beginPath();
    renderCtx.arc(cx, cy, r, 0, Math.PI * 2);
    renderCtx.stroke();
  }
  renderCtx.restore();
  return true;
}

function maxDistanceToRectCorners(x, y, bounds) {
  if (!bounds) return 0;
  return Math.max(
    Math.hypot(bounds.left - x, bounds.top - y),
    Math.hypot(bounds.right - x, bounds.top - y),
    Math.hypot(bounds.right - x, bounds.bottom - y),
    Math.hypot(bounds.left - x, bounds.bottom - y)
  );
}

function drawRadialFillRays(renderCtx, bounds, color, alpha = 1) {
  if (!bounds || !color || alpha <= 0) return false;
  const dpr = devicePixelRatio;
  const cx = (bounds.left + bounds.right) * 0.5;
  const cy = (bounds.top + bounds.bottom) * 0.5;
  const objectFar = Math.max(1, maxDistanceToRectCorners(cx, cy, bounds));
  const far = objectFar + 8 * dpr;
  const targetSpacing = Math.max(4, 8 * dpr);
  const rayCount = Math.round(clamp((Math.PI * 2 * objectFar) / targetSpacing, 16, 720));
  const step = (Math.PI * 2) / rayCount;
  renderCtx.save();
  renderCtx.strokeStyle = color;
  renderCtx.globalAlpha = alpha;
  renderCtx.lineWidth = Math.max(1, dpr);
  renderCtx.lineCap = 'square';
  for (let i = 0; i < rayCount; i++) {
    const a = i * step;
    const dx = Math.cos(a) * far;
    const dy = Math.sin(a) * far;
    renderCtx.beginPath();
    renderCtx.moveTo(cx, cy);
    renderCtx.lineTo(cx + dx, cy + dy);
    renderCtx.stroke();
  }
  renderCtx.restore();
  return true;
}

function drawPatternFillInCurrentPath(renderCtx, anim, color, style, alpha = 1) {
  const bounds = selectedObjectCanvasBounds(anim);
  if (!bounds) return false;
  renderCtx.save();
  clipEvenOdd(renderCtx);
  if (style === 'circular') drawCircularFillRings(renderCtx, bounds, color, alpha);
  else if (style === 'radial') drawRadialFillRays(renderCtx, bounds, color, alpha);
  renderCtx.restore();
  return true;
}

function paintCurrentPathFill(renderCtx, anim, color, style, alpha = 1) {
  if (!color || alpha <= 0) return false;
  if (style === 'circular' || style === 'radial')
    return drawPatternFillInCurrentPath(renderCtx, anim, color, style, alpha);
  renderCtx.fillStyle = fillStyleValueForContext(renderCtx, color, style) || color;
  renderCtx.globalAlpha = alpha;
  fillEvenOdd(renderCtx);
  return true;
}

function addCompiledSegmentToPath(renderCtx, seg, startNewSubpath) {
  if (!seg || !seg.compiled) return false;
  let started = !startNewSubpath;
  let drew = false;
  for (const pt of sampleCompiledAdaptive(seg.compiled)) {
    if (!pt) continue;
    if (!started) {
      renderCtx.moveTo(pt[0], pt[1]);
      started = true;
    } else {
      renderCtx.lineTo(pt[0], pt[1]);
    }
    drew = true;
  }
  return drew;
}

function addCurveFillPath(renderCtx, anim, closedOnly = false) {
  if (!anim || isPrimitiveAnim(anim) || isTextAnim(anim)) return false;
  let drew = false;

  if (closedOnly) {
    const loop = findLoopRange(anim);
    if (!loop || !anim.closed) return false;
    let startNewSubpath = true;
    for (let i = loop.loopStart; i < loop.loopEnd; i++) {
      const segDrew = addCompiledSegmentToPath(renderCtx, anim.segments[i], startNewSubpath);
      if (segDrew) {
        drew = true;
        startNewSubpath = false;
      }
    }
    if (drew) renderCtx.closePath();
    return drew;
  }

  let componentOpen = false;
  for (const seg of anim.segments) {
    if (!seg || !seg.compiled) {
      if (componentOpen) {
        renderCtx.closePath();
        componentOpen = false;
      }
      continue;
    }
    const segDrew = addCompiledSegmentToPath(renderCtx, seg, !componentOpen);
    if (segDrew) {
      drew = true;
      componentOpen = true;
    }
  }
  if (componentOpen) renderCtx.closePath();
  return drew;
}

function strokeCompiledSegmentsMask(renderCtx, anim) {
  const dpr = devicePixelRatio;
  renderCtx.save();
  renderCtx.strokeStyle = '#000';
  renderCtx.lineWidth = (1 + 5 * ((anim.thickness ?? 1) / 10)) * dpr;
  renderCtx.lineCap = 'round';
  renderCtx.lineJoin = 'round';
  for (const seg of anim.segments || []) {
    if (!seg || !seg.compiled) continue;
    renderCtx.beginPath();
    let started = false;
    for (const pt of sampleCompiledAdaptive(seg.compiled)) {
      if (!pt) continue;
      if (!started) { renderCtx.moveTo(pt[0], pt[1]); started = true; }
      else renderCtx.lineTo(pt[0], pt[1]);
    }
    if (started) renderCtx.stroke();
  }
  renderCtx.restore();
}

function drawPrimitiveBlockerMask(renderCtx, anim) {
  if (!isPrimitiveAnim(anim) || anim.anchors.length < 2) return;
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  const [x0, y0] = toCanvas(p0.re, p0.im);
  const [x1, y1] = toCanvas(p1.re, p1.im);
  const lineWidth = primitiveStrokeWidth(anim);
  renderCtx.save();
  renderCtx.fillStyle = '#000';
  renderCtx.strokeStyle = '#000';
  renderCtx.lineWidth = lineWidth;
  renderCtx.lineCap = 'round';
  renderCtx.lineJoin = 'round';
  renderCtx.beginPath();
  if (animKind(anim) === 'line') {
    renderCtx.moveTo(x0, y0);
    renderCtx.lineTo(x1, y1);
    renderCtx.stroke();
  } else if (animKind(anim) === 'rectangle') {
    const center = new Cx((p0.re + p1.re) * 0.5, (p0.im + p1.im) * 0.5);
    const corners = [
      new Cx(p0.re, p0.im),
      new Cx(p1.re, p0.im),
      new Cx(p1.re, p1.im),
      new Cx(p0.re, p1.im),
    ].map(pt => animRotation(anim) ? rotateMathPoint(pt, center, animRotation(anim)) : pt);
    const pts = corners.map(pt => toCanvas(pt.re, pt.im));
    renderCtx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) renderCtx.lineTo(pts[i][0], pts[i][1]);
    renderCtx.closePath();
    renderCtx.fill();
    renderCtx.stroke();
  } else if (animKind(anim) === 'circle') {
    renderCtx.arc(x0, y0, Math.hypot(x1 - x0, y1 - y0), 0, Math.PI * 2);
    renderCtx.fill();
    renderCtx.stroke();
  } else if (animKind(anim) === 'ellipse') {
    renderCtx.ellipse(x0, y0, Math.abs(x1 - x0), Math.abs(y1 - y0), -animRotation(anim), 0, Math.PI * 2);
    renderCtx.fill();
    renderCtx.stroke();
  }
  renderCtx.restore();
}

function drawTextBlockerMask(renderCtx, anim) {
  const bounds = selectedObjectCanvasBounds(anim);
  if (!bounds) return;
  renderCtx.save();
  renderCtx.fillStyle = '#000';
  renderCtx.fillRect(bounds.left, bounds.top, bounds.right - bounds.left, bounds.bottom - bounds.top);
  renderCtx.restore();
}

function drawHigherLayerBlockerMask(renderCtx, blocker) {
  if (!blocker || !blocker.visible || blocker.inPlacementMode) return;
  if (isPrimitiveAnim(blocker)) {
    drawPrimitiveBlockerMask(renderCtx, blocker);
    return;
  }
  if (isTextAnim(blocker)) {
    drawTextBlockerMask(renderCtx, blocker);
    return;
  }
  if (isDotAnim(blocker)) {
    const [x, y] = toCanvas(blocker.anchors[0].re, blocker.anchors[0].im);
    renderCtx.save();
    renderCtx.fillStyle = '#000';
    renderCtx.beginPath();
    renderCtx.arc(x, y, dotRadius(blocker), 0, Math.PI * 2);
    renderCtx.fill();
    renderCtx.restore();
    return;
  }
  if (blocker.closed && findLoopRange(blocker)) {
    renderCtx.save();
    renderCtx.fillStyle = '#000';
    renderCtx.beginPath();
    if (addCurveFillPath(renderCtx, blocker, true)) fillEvenOdd(renderCtx);
    renderCtx.restore();
  }
  strokeCompiledSegmentsMask(renderCtx, blocker);

let _sharedFillCanvas = null;
function getSharedFillCanvas(w, h) {
  if (!_sharedFillCanvas) _sharedFillCanvas = document.createElement('canvas');
  if (_sharedFillCanvas.width !== w || _sharedFillCanvas.height !== h) {
    _sharedFillCanvas.width = w;
    _sharedFillCanvas.height = h;
  } else {
    _sharedFillCanvas.getContext('2d').clearRect(0, 0, w, h);
  }
  return _sharedFillCanvas.getContext('2d');
}

function higherLayerBlockersFor(anim) {
  if (suppressBlockersInFill) return [];
  const idx = animations.indexOf(anim);
  if (idx < 0) return [];
  const higher = animations.slice(idx + 1).filter(b => b.visible && !b.inPlacementMode);
  if (isIsolViewport) return higher.filter(b => isolationAnimIds.has(b.id));
  return higher;
}

function canvasPixelIndex(x, y, width) {
  return y * width + x;
}

function maskAllowsFill(candidateData, barrierData, idx) {
  const alphaIdx = idx * 4 + 3;
  return candidateData[alphaIdx] > 0 && barrierData[alphaIdx] === 0;
}

function barrierPixelSet(barrierData, x, y, width, height) {
  if (x < 0 || y < 0 || x >= width || y >= height) return false;
  return barrierData[(canvasPixelIndex(x, y, width) * 4) + 3] > 0;
}

function barrierLineBetween(barrierData, width, height, x0, y0, x1, y1) {
  const steps = Math.max(1, Math.ceil(Math.hypot(x1 - x0, y1 - y0)));
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = Math.round(x0 + (x1 - x0) * t);
    const y = Math.round(y0 + (y1 - y0) * t);
    if (barrierPixelSet(barrierData, x, y, width, height)) return true;
  }
  return false;
}

function barrierMaskHasPixels(barrierData) {
  for (let i = 3; i < barrierData.length; i += 4) {
    if (barrierData[i] > 0) return true;
  }
  return false;
}

function openFillSeedMathOffsets() {
  const pxToMath = 1 / Math.max(Math.abs(scale), 1e-6);
  const pixelOffsets = [0.5, 1, 2, 3, 4, 6, 8, 12].map(px => px * pxToMath);
  const fineOffsets = [1, 2, 4, 8, 16, 32, 64].map(mult => mult / 960);
  return Array.from(new Set([...fineOffsets, ...pixelOffsets].map(v => v.toFixed(8))))
    .map(Number)
    .sort((a, b) => a - b);
}

function addOpenFillSeed(queue, queued, x, y, width, height, candidateData, barrierData, fromX = null, fromY = null) {
  const sx = Math.round(x), sy = Math.round(y);
  if (sx < 0 || sy < 0 || sx >= width || sy >= height) return false;
  if (fromX !== null && fromY !== null && barrierLineBetween(barrierData, width, height, fromX, fromY, sx, sy)) return false;
  const idx = canvasPixelIndex(sx, sy, width);
  if (queued[idx] || !maskAllowsFill(candidateData, barrierData, idx)) return false;
  queued[idx] = 1;
  queue.push(idx);
  return true;
}

function seedOpenFillFromCurve(queue, queued, anim, width, height, candidateData, barrierData) {
  let added = 0;
  const offsets = openFillSeedMathOffsets();
  for (const seg of anim.segments || []) {
    if (!seg || !seg.compiled) continue;
    const samples = sampleCompiledAdaptive(seg.compiled);
    for (let i = 0; i < samples.length - 1; i++) {
      const a = samples[i], b = samples[i + 1];
      if (!a || !b) continue;
      const [aMx, aMy] = toMath(a[0], a[1]);
      const [bMx, bMy] = toMath(b[0], b[1]);
      const dx = bMx - aMx, dy = bMy - aMy;
      const len = Math.hypot(dx, dy);
      if (len < 1e-6) continue;
      const mx = (aMx + bMx) * 0.5;
      const my = (aMy + bMy) * 0.5;
      const [seedFromX, seedFromY] = toCanvas(mx, my);
      const nx = -dy / len, ny = dx / len;
      for (const dist of offsets) {
        const pos = toCanvas(mx + nx * dist, my + ny * dist);
        const neg = toCanvas(mx - nx * dist, my - ny * dist);
        if (addOpenFillSeed(queue, queued, pos[0], pos[1], width, height, candidateData, barrierData, seedFromX, seedFromY)) added++;
        if (addOpenFillSeed(queue, queued, neg[0], neg[1], width, height, candidateData, barrierData, seedFromX, seedFromY)) added++;
      }
    }
  }
  return added;
}

function seedOpenFillFallback(queue, queued, width, height, candidateData, barrierData) {
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      if (addOpenFillSeed(queue, queued, x, y, width, height, candidateData, barrierData)) return true;
    }
  }
  return false;
}

function floodOpenFillMask(anim, candidateCanvas, barrierCanvas) {
  const width = candidateCanvas.width;
  const height = candidateCanvas.height;
  const candidateCtx = candidateCanvas.getContext('2d');
  const barrierCtx = barrierCanvas.getContext('2d');
  const candidateData = candidateCtx.getImageData(0, 0, width, height).data;
  const barrierData = barrierCtx.getImageData(0, 0, width, height).data;
  const queued = new Uint8Array(width * height);
  const queue = [];
  const seedCount = seedOpenFillFromCurve(queue, queued, anim, width, height, candidateData, barrierData);
  if (seedCount === 0)
    seedOpenFillFallback(queue, queued, width, height, candidateData, barrierData);

  const reachable = new Uint8Array(width * height);
  let head = 0;
  const drainQueue = () => {
    while (head < queue.length) {
      const idx = queue[head++];
      if (reachable[idx] || !maskAllowsFill(candidateData, barrierData, idx)) continue;
      reachable[idx] = 1;
      const x = idx % width;
      const y = Math.floor(idx / width);
      const neighbors = [
        x > 0 ? idx - 1 : -1,
        x + 1 < width ? idx + 1 : -1,
        y > 0 ? idx - width : -1,
        y + 1 < height ? idx + width : -1,
      ];
      for (const next of neighbors) {
        if (next < 0 || queued[next]) continue;
        if (!maskAllowsFill(candidateData, barrierData, next)) continue;
        queued[next] = 1;
        queue.push(next);
      }
    }
  };
  drainQueue();
  // Fill sub-regions separated from initial seeds by barrier strokes
  for (let i = 0; i < width * height; i++) {
    if (reachable[i] || queued[i] || !maskAllowsFill(candidateData, barrierData, i)) continue;
    queued[i] = 1;
    queue.push(i);
    drainQueue();
  }

  const maskCanvas = document.createElement('canvas');
  maskCanvas.width = width;
  maskCanvas.height = height;
  const maskCtx = maskCanvas.getContext('2d');
  const out = maskCtx.createImageData(width, height);
  for (let i = 0; i < reachable.length; i++) {
    if (!reachable[i]) continue;
    const a = i * 4 + 3;
    out.data[a] = 255;
  }
  maskCtx.putImageData(out, 0, 0);
  return maskCanvas;
}

function drawOpenCurveFillWithBarriers(anim, fillColor, opacityScale, blockers) {
  if (suppressExpensiveFills) return;
  const width = canvas.width;
  const height = canvas.height;

  // Cap BFS canvas to 1024px to keep getImageData fast on large/high-DPR canvases
  const BFS_MAX = 1024;
  const bfsS = Math.min(1, BFS_MAX / Math.max(width, height, 1));
  const bfsW = Math.max(1, Math.round(width * bfsS));
  const bfsH = Math.max(1, Math.round(height * bfsS));
  const savedOriginX = originX, savedOriginY = originY, savedScale = scale;
  originX *= bfsS; originY *= bfsS; scale *= bfsS;

  const candidateCanvas = document.createElement('canvas');
  candidateCanvas.width = bfsW;
  candidateCanvas.height = bfsH;
  const candidateCtx = candidateCanvas.getContext('2d');
  candidateCtx.save();
  candidateCtx.fillStyle = '#000';
  candidateCtx.globalAlpha = 1;
  candidateCtx.beginPath();
  const drewCandidate = addCurveFillPath(candidateCtx, anim, false);
  if (drewCandidate) fillEvenOdd(candidateCtx);
  candidateCtx.restore();

  const barrierCanvas = document.createElement('canvas');
  barrierCanvas.width = bfsW;
  barrierCanvas.height = bfsH;
  const barrierCtx = barrierCanvas.getContext('2d');

  const reachableMask = drewCandidate ? floodOpenFillMask(anim, candidateCanvas, barrierCanvas) : null;
  originX = savedOriginX; originY = savedOriginY; scale = savedScale;
  if (!drewCandidate) return;

  const targetCtx = getSharedFillCanvas(width, height);
  targetCtx.save();
  targetCtx.beginPath();
  if (addCurveFillPath(targetCtx, anim, false))
    paintCurrentPathFill(targetCtx, anim, fillColor, animFillStyle(anim), animFillOpacity(anim) * opacityScale);
  targetCtx.restore();
  targetCtx.save();
  targetCtx.globalCompositeOperation = 'destination-in';
  targetCtx.drawImage(reachableMask, 0, 0, width, height);
  targetCtx.restore();
  ctx.drawImage(_sharedFillCanvas, 0, 0);
}

function drawCurveFill(anim, fillColorOverride = null, opacityScale = 1, blockers = []) {
  if (animFillStyle(anim) === 'gradient') return;
  if (!animFillColor(anim) || animFillOpacity(anim) <= 0) return;
  const closedOnly = !!(anim.closed && findLoopRange(anim));
  const fillColor = fillColorOverride || animFillColor(anim);
  if (!closedOnly && blockers.length) {
    drawOpenCurveFillWithBarriers(anim, fillColor, opacityScale, blockers);
    return;
  }
  const targetCtx = blockers.length ? getSharedFillCanvas(canvas.width, canvas.height) : ctx;
  targetCtx.save();
  targetCtx.beginPath();
  const drew = addCurveFillPath(targetCtx, anim, closedOnly);
  if (drew) paintCurrentPathFill(targetCtx, anim, fillColor, animFillStyle(anim), animFillOpacity(anim) * opacityScale);
  targetCtx.restore();
  if (!drew) return;

  if (blockers.length) {
    targetCtx.save();
    targetCtx.globalCompositeOperation = 'destination-out';
    targetCtx.globalAlpha = 1;
    for (const blocker of blockers) drawHigherLayerBlockerMask(targetCtx, blocker);
    targetCtx.restore();
    ctx.drawImage(targetCtx.canvas, 0, 0);

function drawClosedSegmentFill(anim, fillColorOverride = null, opacityScale = 1) {

  drawCurveFill(anim, fillColorOverride, opacityScale, []);
}

function drawSegment(anim, segIdx, colorOverride = null, opacityScale = 1, thicknessOverride = null) {

  if (!seg || !seg.compiled) return;
  const dpr = devicePixelRatio;
  const effectiveThickness = thicknessOverride !== null ? thicknessOverride : anim.thickness;
  const cw = (1 + 5 * (effectiveThickness / 10)) * dpr;
  const color = colorOverride || anim.color;
  const opacity = animOutlineOpacity(anim) * opacityScale;
  if (seg.visible === false) {
    if (editModeAnimId !== anim.id) return;
    drawCompiledCurve(seg.compiled, color, cw * 0.4, 0.18 * opacityScale);
    return;
  }
  const eccGhostActive = isEccGhostActive(anim, segIdx);
  const arcSelectGhost = !eccGhostActive && activeArcIndex(anim) === segIdx;

    seg.compiledRef.forEach(entry => {

    }
  } else if (arcSelectGhost && seg.compiledRef) {
    seg.compiledRef.forEach((entry, i) => {
      if (i % 2 !== 0) return; // every 10% only
      if (Math.abs(entry.eccentricity - seg.eccentricity) >= 1e-9)
        drawCompiledCurve(entry.fn, '#888888', cw * 0.2, 0.4 * opacity);
    });
    drawCompiledCurve(seg.compiled, color, cw, opacity);
  } else {
    drawCompiledCurve(seg.compiled, color, cw, opacity);
  }
}

function primitiveStrokeWidth(anim, extra = 0) {
  return (1 + 5 * (anim.thickness / 10)) * devicePixelRatio + extra;
}

function fillStyleValueForContext(renderCtx, color, style) {
  if (!color || style === 'solid' || style === 'gradient' || style === 'circular' || style === 'radial') return color;
  const dpr = devicePixelRatio;
  const size = Math.max(8, Math.round(8 * dpr));
  const tile = document.createElement('canvas');
  tile.width = size;
  tile.height = size;
  const pctx = tile.getContext('2d');
  pctx.strokeStyle = color;
  pctx.lineWidth = Math.max(1, dpr);
  pctx.lineCap = 'square';

  const line = (x1, y1, x2, y2) => {
    pctx.beginPath();
    pctx.moveTo(x1, y1);
    pctx.lineTo(x2, y2);
    pctx.stroke();
  };
  const drawHorizontal = () => line(0, size * 0.5, size, size * 0.5);
  const drawVertical = () => line(size * 0.5, 0, size * 0.5, size);
  const drawDiagDown = () => {
    line(-size * 0.25, -size * 0.25, size * 1.25, size * 1.25);
    line(-size * 0.25, size * 0.75, size * 0.25, size * 1.25);
    line(size * 0.75, -size * 0.25, size * 1.25, size * 0.25);
  };
  const drawDiagUp = () => {
    line(-size * 0.25, size * 1.25, size * 1.25, -size * 0.25);
    line(-size * 0.25, size * 0.25, size * 0.25, -size * 0.25);
    line(size * 0.75, size * 1.25, size * 1.25, size * 0.75);
  };

  if (style === 'horizontal') drawHorizontal();
  else if (style === 'vertical') drawVertical();
  else if (style === 'diagDown') drawDiagDown();
  else if (style === 'diagUp') drawDiagUp();
  else if (style === 'cross') { drawHorizontal(); drawVertical(); }
  else if (style === 'diagCross') { drawDiagDown(); drawDiagUp(); }

}

function fillStyleValue(color, style) {
  return fillStyleValueForContext(ctx, color, style);
}

function drawPrimitiveShape(kind, p0, p1, color, lineWidth, alpha = 1, dashed = false, rotation = 0, fillColor = null, outlineOpacity = 1, fillOpacity = 0.5, fillStyle = 'solid', fillAnim = null) {

  const [x1, y1] = toCanvas(p1.re, p1.im);

  ctx.strokeStyle = color;
  ctx.fillStyle = fillStyleValue(fillColor, fillStyle) || color;
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

    ctx.beginPath();
    if (kind === 'rectangle') {
      const center = new Cx((p0.re + p1.re) * 0.5, (p0.im + p1.im) * 0.5);
      const corners = [
        new Cx(p0.re, p0.im),
        new Cx(p1.re, p0.im),
        new Cx(p1.re, p1.im),
        new Cx(p0.re, p1.im),
      ].map(pt => rotation ? rotateMathPoint(pt, center, rotation) : pt);
      const pts = corners.map(pt => toCanvas(pt.re, pt.im));
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      return true;
    }
    if (kind === 'circle') {
      ctx.arc(x0, y0, Math.hypot(x1 - x0, y1 - y0), 0, Math.PI * 2);
      return true;
    }
    if (kind === 'ellipse') {
      const rx = Math.abs(x1 - x0), ry = Math.abs(y1 - y0);
      ctx.ellipse(x0, y0, rx, ry, -rotation, 0, Math.PI * 2);
      return true;
    }
    return false;
  };
  const paint = () => {
    if (fillColor) {
      const fillAlpha = alpha * fillOpacity;
      if ((fillStyle === 'circular' || fillStyle === 'radial') && fillAnim) {
        const filled = drawPatternFillInCurrentPath(ctx, fillAnim, fillColor, fillStyle, fillAlpha);
        if (filled) buildShapePath();
        else {
          ctx.fillStyle = fillColor;
          ctx.globalAlpha = fillAlpha;
          ctx.fill();
        }
      } else if (fillStyle === 'gradient' && fillAnim) {
        const grad = gradientFillStyleForBounds(fillAnim, selectedObjectCanvasBounds(fillAnim));

        ctx.globalAlpha = grad ? alpha : fillAlpha;
        ctx.fill();
      } else {
        ctx.globalAlpha = fillAlpha;
        ctx.fill();
      }
    }
    ctx.globalAlpha = alpha * outlineOpacity;
    ctx.stroke();
  };

    ctx.globalAlpha = alpha * outlineOpacity;
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
