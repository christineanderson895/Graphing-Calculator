  return svg;
}

function makeAnchorLockIcon(locked) {
  const svg = makeSvgEl('svg', { viewBox: '0 0 24 24', 'aria-hidden': 'true' });
  svg.appendChild(makeSvgEl('rect', { x: 6.5, y: 10.5, width: 11, height: 8, rx: 1.5 }));
  svg.appendChild(makeSvgEl('path', {
    d: locked
      ? 'M8.5 10.5V8c0-2.4 1.5-3.9 3.5-3.9s3.5 1.5 3.5 3.9v2.5'
      : 'M8.5 10.5V8c0-2.4 1.5-3.9 3.5-3.9 1.5 0 2.7.8 3.2 2.1'
  }));
  return svg;
}

function objectLabel(anim) {
  const kind = animKind(anim);
  if (kind === 'line') return `${anim.letter} - line`;
  if (kind === 'rectangle') return `${anim.letter} - rectangle`;
  if (kind === 'circle') return `${anim.letter} - circle`;
  if (kind === 'ellipse') return `${anim.letter} - ellipse`;
  if (anim.anchors.length === 1 && anim.segments.length === 0) return `${anim.letter} - dot`;
  return `${anim.letter} - freeform`;
}

function primitiveDetails(anim) {
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  if (!p0 || !p1) return [];
  if (anim.kind === 'line') {
    return [['Endpoints', `${formatCoordPairHundredths(p0)}, ${formatCoordPairHundredths(p1)}`]];
  }
  if (anim.kind === 'rectangle') {
    const width = Math.abs(p1.re - p0.re);
    const height = Math.abs(p1.im - p0.im);
    return [
      ['Corners', `${formatCoordPairHundredths(p0)}, ${formatCoordPairHundredths(p1)}`],
      ['Size', `${formatNumberHundredths(width)} x ${formatNumberHundredths(height)}`],
    ];
  }
  if (anim.kind === 'circle') {
    const radius = Math.hypot(p1.re - p0.re, p1.im - p0.im);
    return [
      ['Center', formatCoordPairHundredths(p0)],
      ['Radius', formatNumberHundredths(radius)],
    ];
  }
  if (anim.kind === 'ellipse') {
    return [
      ['Center', formatCoordPairHundredths(p0)],
      ['Radius x', formatNumberHundredths(Math.abs(p1.re - p0.re))],
      ['Radius y', formatNumberHundredths(Math.abs(p1.im - p0.im))],
    ];
  }
  return [];
}

function appendReadOnlyRow(parent, lbl, val) {
  const r = document.createElement('div'); r.className = 'tree-input-row';
  const l = document.createElement('label'); l.textContent = lbl;
  const v = document.createElement('div');
  v.style.cssText = 'flex:1;min-width:0;font-size:12px;color:#cdd6f4;line-height:1.35;padding:6px 8px;border:1px solid #313244;border-radius:8px;background:#11111b;';
  v.textContent = val;
  r.append(l, v);
  parent.appendChild(r);
}

function sameColor(a, b) {
  return (a || '').toLowerCase() === (b || '').toLowerCase();
}

function appendColorMenuLabel(parent, text) {
  const label = document.createElement('div');
  label.className = 'color-menu-label';
  label.textContent = text;
  parent.appendChild(label);
}

function appendPaletteSwatches(section, activeColor, onSelect) {
  ANIM_COLORS.forEach(color => {
    const opt = document.createElement('button');
    opt.className = 'color-swatch-option' + (sameColor(activeColor, color) ? ' active' : '');
    opt.title = color;
    opt.style.background = color;
    opt.addEventListener('click', e => {
      e.stopPropagation();
      onSelect(color);
    });
    section.appendChild(opt);
  });
}

function makeFillStyleIcon(style) {
  const svg = makeSvgEl('svg', { viewBox: '0 0 24 24', 'aria-hidden': 'true' });
  const rect = makeSvgEl('rect', { x: 4, y: 4, width: 16, height: 16, rx: 0 });
  if (style === 'solid') {
    rect.setAttribute('style', 'fill:currentColor;stroke:currentColor;');
    svg.appendChild(rect);
    return svg;
  }
  svg.appendChild(rect);
  const addLine = (x1, y1, x2, y2) => svg.appendChild(makeSvgEl('line', { x1, y1, x2, y2 }));
  if (style === 'horizontal' || style === 'cross') {
    addLine(5, 8, 19, 8); addLine(5, 12, 19, 12); addLine(5, 16, 19, 16);
  }
  if (style === 'vertical' || style === 'cross') {
    addLine(8, 5, 8, 19); addLine(12, 5, 12, 19); addLine(16, 5, 16, 19);
  }
  if (style === 'diagDown' || style === 'diagCross') {
    addLine(4, 7, 17, 20); addLine(4, 13, 11, 20); addLine(10, 4, 20, 14);
  }
  if (style === 'diagUp' || style === 'diagCross') {
    addLine(4, 17, 17, 4); addLine(4, 11, 11, 4); addLine(10, 20, 20, 10);
  }
  return svg;
}

function appendSliderRow(parent, labelText, min, max, step, value, formatValue, onInput, disabled = false) {
  const row = document.createElement('div');
  row.className = 'tree-slider-row';
  row.style.padding = '2px 0';
  const label = document.createElement('label');
  label.textContent = labelText;
  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = min;
  slider.max = max;
  slider.step = step;
  slider.value = value;
  slider.disabled = disabled;
  const valSpan = document.createElement('span');
  valSpan.className = 'tree-slider-val';
  valSpan.textContent = formatValue(value);
  slider.addEventListener('mousedown', () => { if (!slider.disabled) pushUndo(); });
  slider.addEventListener('touchstart', () => { if (!slider.disabled) pushUndo(); }, { passive: true });
  slider.addEventListener('input', () => {
    onInput(slider.value);
    valSpan.textContent = formatValue(slider.value);
    draw();
  });
  row.append(label, slider, valSpan);
  parent.appendChild(row);
}

function appendColorExpansion(parent, anim) {
  if (colorEditTarget === 'fill' && !canFillAnim(anim)) colorEditTarget = 'outline';
  const fillEnabled = canFillAnim(anim);
  const fillActive = fillEnabled && !!animFillColor(anim);
  const root = document.createElement('div');
  root.className = 'color-expansion';

  const outlineSection = document.createElement('div');
  outlineSection.className = 'color-section';
  const outlineHeader = document.createElement('div');
  outlineHeader.className = 'color-section-title';
  const outlineLabel = document.createElement('span');
  outlineLabel.textContent = 'Outline';
  const outlineSwatch = document.createElement('button');
  outlineSwatch.className = 'color-target-swatch' + (colorEditTarget === 'outline' ? ' active' : '');
  outlineSwatch.title = 'Edit outline color';
  outlineSwatch.style.background = anim.color;
  outlineSwatch.addEventListener('click', e => {
    e.stopPropagation();
    colorEditTarget = 'outline';
    renderAnimList();
  });
  outlineHeader.append(outlineLabel, outlineSwatch);
  outlineSection.appendChild(outlineHeader);
  appendSliderRow(outlineSection, 'Thickness', 1, 10, 1, anim.thickness, v => `${Math.round(v)}`, v => {
    anim.thickness = parseInt(v, 10);
  });
  appendSliderRow(outlineSection, 'Opacity', 0, 100, 1, Math.round(animOutlineOpacity(anim) * 100), v => `${Math.round(v)}%`, v => {
    anim.outlineOpacity = clamp(parseFloat(v) / 100, 0, 1);
  });
  root.appendChild(outlineSection);

  const fillSection = document.createElement('div');
  fillSection.className = 'color-section' + (fillEnabled ? '' : ' disabled');
  const fillHeader = document.createElement('div');
  fillHeader.className = 'color-section-title';
  const fillLabel = document.createElement('span');
  fillLabel.textContent = 'Fill';
  const fillSwatch = document.createElement('button');
  fillSwatch.className = 'color-target-swatch' + (colorEditTarget === 'fill' ? ' active' : '') + (!animFillColor(anim) ? ' no-fill' : '');
  fillSwatch.title = fillEnabled ? 'Edit fill color' : 'Fill unavailable';
  fillSwatch.style.background = animFillColor(anim) || '#11111b';
  fillSwatch.disabled = !fillEnabled;
  fillSwatch.addEventListener('click', e => {
    e.stopPropagation();
    if (!fillEnabled) return;
    colorEditTarget = 'fill';
    renderAnimList();
  });
  fillHeader.append(fillLabel, fillSwatch);
  fillSection.appendChild(fillHeader);

  const fillControls = document.createElement('div');
  fillControls.className = fillActive ? '' : 'color-controls-dim';
  const styleRow = document.createElement('div');
  styleRow.className = 'fill-style-row';
  FILL_STYLES.forEach(({ key, title }) => {
    const btn = document.createElement('button');
    btn.className = 'fill-style-btn' + (animFillStyle(anim) === key ? ' active' : '');
    btn.title = title;
    btn.disabled = !fillActive;
    btn.appendChild(makeFillStyleIcon(key));
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (!fillActive) return;
      if (animFillStyle(anim) !== key) {
        pushUndo();
        anim.fillStyle = key;
        renderAnimList(); draw();
      }
    });
    styleRow.appendChild(btn);
  });
  fillControls.appendChild(styleRow);
  appendSliderRow(fillControls, 'Opacity', 0, 100, 1, Math.round(animFillOpacity(anim) * 100), v => `${Math.round(v)}%`, v => {
    anim.fillOpacity = clamp(parseFloat(v) / 100, 0, 1);
  }, !fillActive);
  fillSection.appendChild(fillControls);
  root.appendChild(fillSection);

  const colorsSection = document.createElement('div');
  colorsSection.className = 'color-section';
  const swatches = document.createElement('div');
  swatches.className = 'color-menu-section';
  appendColorMenuLabel(swatches, 'Colors');
  if (colorEditTarget === 'fill' && fillEnabled) {
    const noneOpt = document.createElement('button');
    noneOpt.className = 'color-swatch-option no-fill' + (!animFillColor(anim) ? ' active' : '');
    noneOpt.title = 'No fill';
    noneOpt.addEventListener('click', e => {
      e.stopPropagation();
      if (animFillColor(anim)) {
        pushUndo();
        anim.fillColor = null;
      }
      renderAnimList(); draw();
    });
    swatches.appendChild(noneOpt);
  }
  appendPaletteSwatches(swatches, colorEditTarget === 'fill' ? animFillColor(anim) : anim.color, color => {
    if (colorEditTarget === 'fill' && fillEnabled) {
      if (!sameColor(animFillColor(anim), color)) {
        pushUndo();
        anim.fillColor = color;
        if (!anim.fillStyle) anim.fillStyle = 'solid';
      }
    } else if (!sameColor(anim.color, color)) {
      pushUndo();
      anim.color = color;
    }
    renderAnimList(); draw();
  });
  colorsSection.appendChild(swatches);
  root.appendChild(colorsSection);
  parent.appendChild(root);
}

function renderAnimList() {
  const list = document.getElementById('anim-list');
  list.innerHTML = '';

  for (const anim of animations) {
    if (!anim.activeSegments) anim.activeSegments = new Set();
    if (!anim.expandedArcs) anim.expandedArcs = new Set();
    if (!anim.expandedAnchors) anim.expandedAnchors = new Set();
    const inEdit = (editModeAnimId === anim.id);
    const isSelected = (selectedId === anim.id);

    const row = document.createElement('div');
    row.className = 'anim-row' + (inEdit ? ' in-edit' : isSelected ? ' selected' : '') + (!anim.visible ? ' is-hidden' : '');
    row.style.borderColor = !anim.visible ? '#585b70' : anim.color;
    row.dataset.animId = anim.id;

    // ── Header ──
    const header = document.createElement('div');
    header.className = 'anim-header';

    const label = document.createElement('span');
    label.className = 'anim-label';
    label.title = objectLabel(anim);
    label.setAttribute('aria-label', objectLabel(anim));
    const letter = document.createElement('span');
    letter.className = 'anim-letter';
    letter.textContent = anim.letter;
    label.append(letter, makeObjectIcon(objectIconKind(anim)));

    const actions = document.createElement('div');
    actions.className = 'anim-actions';

    const colorBtn = document.createElement('button');
    colorBtn.className = 'anim-color-btn';
    colorBtn.title = 'Change colors';
    colorBtn.style.background = anim.color;
    colorBtn.addEventListener('click', e => {
      e.stopPropagation();
      const opening = openColorMenuAnimId !== anim.id;
      selectedId = anim.id;
      editModeAnimId = anim.id;
      animations.forEach(a => {
        a.expanded = false;
        a.expandedArcs = new Set();
        a.expandedAnchors = new Set();
      });
      anim.activeSegments = new Set();
      openColorMenuAnimId = opening ? anim.id : null;
      colorEditTarget = 'outline';
      renderAnimList(); draw();
    });

    const visBtn = document.createElement('button');
    visBtn.className = 'anim-icon-btn anim-vis-btn' + (!anim.visible ? ' is-hidden' : '');
    visBtn.title = anim.visible ? 'Hide' : 'Show';
    visBtn.appendChild(makeVisibilityIcon(anim.visible));
    visBtn.addEventListener('click', e => {
      e.stopPropagation(); pushUndo();
      anim.visible = !anim.visible;
      openColorMenuAnimId = null;
      renderAnimList(); draw();
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'anim-icon-btn anim-delete-btn';
    delBtn.title = 'Delete';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', e => { e.stopPropagation(); openColorMenuAnimId = null; deleteAnimation(anim.id); });

    actions.append(colorBtn, visBtn, delBtn);
    header.append(label, actions);
    row.appendChild(header);

    header.addEventListener('click', e => {
      e.stopPropagation();
      openColorMenuAnimId = null;
      const shouldCollapse = selectedId === anim.id && anim.expanded;
      if (shouldCollapse) {
        if (editModeAnimId === anim.id) editModeAnimId = null;
        selectedId = null;
        anim.expanded = false;
        anim.activeSegments = new Set();
        anim.expandedArcs = new Set();
        anim.expandedAnchors = new Set();
      } else if (!anim.inPlacementMode) {
        enterEditMode(anim, new Set());
      } else {
        selectedId = anim.id;
        animations.forEach(a => {
          a.expanded = a.id === anim.id;
          if (a.id !== anim.id) {
            a.expandedArcs = new Set();
            a.expandedAnchors = new Set();
          }
        });
      }
      renderAnimList(); draw();
      if (anim.expanded) scrollToShowExpanded(anim.id);
    });

    // ── Accordion ──
    const colorExpanded = openColorMenuAnimId === anim.id;
    const accordionOpen = anim.expanded || colorExpanded;
    const accordion = document.createElement('div');
    accordion.className = 'anim-accordion' + (accordionOpen ? ' open' : '');
    const curveColor = !anim.visible ? '#585b70' : anim.color;
    if (accordionOpen) {
      accordion.style.border = `1px solid ${curveColor}`;
      accordion.style.borderTop = 'none';
    }
    const inner = document.createElement('div');
    inner.className = 'anim-accordion-inner';
    inner.style.borderTopColor = curveColor;

    if (colorExpanded) {
      appendColorExpansion(inner, anim);
      accordion.appendChild(inner);
      row.appendChild(accordion);
      list.appendChild(row);
      continue;
    }

    if (isPrimitiveAnim(anim)) {
      primitiveDetails(anim).forEach(([lbl, val]) => appendReadOnlyRow(inner, lbl, val));
      accordion.appendChild(inner);
      row.appendChild(accordion);
      list.appendChild(row);
      continue;
    }

    // ── Dot size slider ──
    if (anim.anchors.length === 1 && anim.segments.length === 0) {
      const sliderRow = document.createElement('div'); sliderRow.className = 'tree-slider-row';
      sliderRow.style.padding = '4px 6px';
      const lbl = document.createElement('label'); lbl.textContent = 'Size';
      const slider = document.createElement('input');
      slider.type = 'range'; slider.min = 1; slider.max = 10; slider.step = 1; slider.value = anim.thickness;
      const valSpan = document.createElement('span'); valSpan.className = 'tree-slider-val'; valSpan.textContent = anim.thickness;
      slider.addEventListener('input', () => {
        anim.thickness = parseInt(slider.value);
        valSpan.textContent = anim.thickness;
        draw();
      });
      sliderRow.append(lbl, slider, valSpan);
      inner.appendChild(sliderRow);
    }

    // Anchor and arc sections
    const selectAnchorRow = anchorIdx => {
      if (editModeAnimId !== anim.id) enterEditMode(anim, new Set());
      selectedId = anim.id;
      anim.expanded = true;
      animations.forEach(a => {
        if (a.id !== anim.id) {
          a.expanded = false;
          a.expandedArcs = new Set();
          a.expandedAnchors = new Set();
        }
      });
      anim.activeSegments = new Set();
      anim.expandedArcs = new Set();
      anim.expandedAnchors = new Set([anchorIdx]);
      draw();
      renderAnimList();
      scrollToShowExpanded(anim.id);
    };

    const selectArcRow = segIdx => {
      if (editModeAnimId !== anim.id) enterEditMode(anim, new Set());
      selectedId = anim.id;
      anim.expanded = true;
      animations.forEach(a => {
        if (a.id !== anim.id) {
          a.expanded = false;
          a.expandedArcs = new Set();
          a.expandedAnchors = new Set();
        }
      });
      anim.activeSegments = new Set([segIdx]);
      anim.expandedArcs = new Set([segIdx]);
      anim.expandedAnchors = new Set();
      draw();
      renderAnimList();
      scrollToShowExpanded(anim.id);
    };

    const appendAnchorItem = anchorIdx => {
      const anchor = anim.anchors[anchorIdx];
      if (!anchor) return;
      const anchorSelected = anim.expandedAnchors?.has(anchorIdx);
      const item = document.createElement('div'); item.className = 'tree-item';
      const anchorHeader = document.createElement('div');
      anchorHeader.className = 'tree-item-header anchor-row';
      if (anchorSelected) anchorHeader.style.boxShadow = `inset 0 0 0 1px ${curveColor}55`;
      const labelSpan = document.createElement('span');
      labelSpan.className = 'anchor-row-label';
      labelSpan.textContent = `Anchor ${anchorIdx}`;
      const locked = isAnchorLocked(anim, anchorIdx);
      const lockBtn = document.createElement('button');
      lockBtn.type = 'button';
      lockBtn.className = 'anchor-inline-lock' + (locked ? '' : ' unlocked');
      lockBtn.title = locked ? 'Unlock tangent' : 'Lock tangent';
      lockBtn.setAttribute('aria-label', locked ? 'Unlock tangent' : 'Lock tangent');
      lockBtn.appendChild(makeAnchorLockIcon(locked));
      lockBtn.addEventListener('click', e => {
        e.stopPropagation();
        pushUndo();
        setAnchorLocked(anim, anchorIdx, !isAnchorLocked(anim, anchorIdx));
        selectAnchorRow(anchorIdx);
      });
      const coordsSpan = document.createElement('span');
      coordsSpan.className = 'anchor-coords';
      coordsSpan.textContent = formatCoordPairHundredths(anchor);
      anchorHeader.append(labelSpan, lockBtn, coordsSpan);
      anchorHeader.addEventListener('click', e => {
        e.stopPropagation();
        selectAnchorRow(anchorIdx);
      });
      item.appendChild(anchorHeader);
      inner.appendChild(item);
    };

    let visibleArcNum = 0;
    const appendArcItem = segIdx => {
      const seg = anim.segments[segIdx];
      if (!seg) return;
      visibleArcNum++;
      const pct = Math.round(eccentricityToPercent(seg.eccentricity) / 5) * 5;
      const coordsOpen = anim.expandedArcs.has(segIdx);
      const arcSelected = anim.activeSegments?.has(segIdx);
      const item = document.createElement('div'); item.className = 'tree-item';
      item.classList.add('arc-item');
      item.style.boxShadow = `inset 0 0 0 1px ${curveColor}99`;
      if (arcSelected) {
        item.classList.add('is-selected');
        item.style.boxShadow = `inset 0 0 0 2px ${curveColor}`;
      }

      const arcHeader = document.createElement('div');
      arcHeader.className = 'tree-item-header arc-row';
      const arcLabelSpan = document.createElement('span');
      arcLabelSpan.textContent = `Arc ${visibleArcNum}`;
      arcHeader.append(arcLabelSpan);
      arcHeader.addEventListener('click', e => {
        e.stopPropagation();
        selectArcRow(segIdx);
      });
      item.appendChild(arcHeader);

      if (coordsOpen) {
        const body = document.createElement('div'); body.className = 'tree-item-body arc-body';
        const sliderRow = document.createElement('div'); sliderRow.className = 'tree-slider-row arc-slider-row';
        const sliderLbl = document.createElement('label'); sliderLbl.textContent = 'Eccentricity';
        const slider = document.createElement('input');
        slider.type = 'range'; slider.min = 0; slider.max = 100; slider.step = 5; slider.value = pct;
        const sliderVal = document.createElement('span'); sliderVal.className = 'tree-slider-val'; sliderVal.textContent = `${pct}%`;
        slider.addEventListener('mousedown', () => {
          selectedId = anim.id;
          if (editModeAnimId !== anim.id) enterEditMode(anim, new Set());
          anim.activeSegments = new Set([segIdx]);
          anim.expandedArcs = new Set([segIdx]);
          anim.expandedAnchors = new Set();
          pushUndo(); draw();
        });
        slider.addEventListener('focus', () => { eccentricitySliderActiveKey = { animId: anim.id, segIdx }; draw(); });
        slider.addEventListener('blur', () => { eccentricitySliderActiveKey = null; draw(); });
        slider.addEventListener('input', () => {
          seg.eccentricity = percentToEccentricity(parseFloat(slider.value));
          sliderVal.textContent = `${Math.round(slider.value)}%`;
          recompileSegment(anim, segIdx); draw();
        });
        sliderRow.append(sliderLbl, slider, sliderVal);
        const controlRow = document.createElement('div'); controlRow.className = 'tree-input-row arc-control-row';
        const controlLabel = document.createElement('label'); controlLabel.textContent = 'Control points';
        const controlValue = document.createElement('div'); controlValue.className = 'arc-control-value';
        controlValue.textContent = `${formatCoordPairHundredths(seg.h0)}, ${formatCoordPairHundredths(seg.h1)}`;
        controlRow.append(controlLabel, controlValue);
        body.appendChild(controlRow);
        body.appendChild(sliderRow);
        item.appendChild(body);
      }

      inner.appendChild(item);
    };

    for (let anchorIdx = 0; anchorIdx < anim.anchors.length; anchorIdx++) {
      appendAnchorItem(anchorIdx);
      if (anchorIdx < anim.segments.length) appendArcItem(anchorIdx);
    }

    accordion.appendChild(inner);
    row.appendChild(accordion);

    list.appendChild(row);
  }

  updateToolPanel();
}

function scrollToShowExpanded(animId) {
  const list = document.getElementById('anim-list');
  const row = list.querySelector(`[data-anim-id="${animId}"]`);
  if (!row) return;
  const rowBottom = row.offsetTop + row.offsetHeight;
  const listVisible = list.scrollTop + list.clientHeight;
  if (rowBottom > listVisible) list.scrollTo({ top: rowBottom - list.clientHeight, behavior: 'smooth' });
}

  }
}, true);

function renderGlobalSettingsControls() {
  defaultThicknessInput.value = globalSettings.defaultThickness;
  defaultThicknessVal.textContent = globalSettings.defaultThickness;
  gridStrengthInput.value = globalSettings.gridStrength;
  gridStrengthVal.textContent = `${globalSettings.gridStrength}%`;
  axisStrengthInput.value = globalSettings.axisStrength;
  axisStrengthVal.textContent = `${globalSettings.axisStrength}%`;

  snapStrengthInput.value = snapStrengthIndex(globalSettings.snapStrength);
  snapStrengthVal.textContent = `${currentSnapStrength()}%`;
}

globalSettingsBtn.addEventListener('click', e => {
  e.stopPropagation();
  setGlobalSettingsOpen(!globalSettingsOpen);
});

globalSettingsMenu.addEventListener('click', e => e.stopPropagation());

defaultThicknessInput.addEventListener('input', () => {
  globalSettings.defaultThickness = parseInt(defaultThicknessInput.value, 10);
  saveGlobalSettings();
  renderGlobalSettingsControls();
});

gridStrengthInput.addEventListener('input', () => {
  globalSettings.gridStrength = parseInt(gridStrengthInput.value, 10);
  saveGlobalSettings();
  renderGlobalSettingsControls();
  draw();
});

axisStrengthInput.addEventListener('input', () => {
  globalSettings.axisStrength = parseInt(axisStrengthInput.value, 10);
  saveGlobalSettings();
  renderGlobalSettingsControls();
  draw();
});

snapStrengthInput.addEventListener('input', () => {
  globalSettings.snapStrength = SNAP_STRENGTH_VALUES[parseInt(snapStrengthInput.value, 10)] ?? DEFAULT_GLOBAL_SETTINGS.snapStrength;
  saveGlobalSettings();
  renderGlobalSettingsControls();
});

function setMode(mode) {
  currentMode = mode;
  const toGraphs = mode === 'graphs';
  document.getElementById('animations-panel').style.display = toGraphs ? 'none' : 'flex';
  document.getElementById('graphs-panel').style.display     = toGraphs ? 'flex' : 'none';
  if (toGraphs) setGlobalSettingsOpen(false);
  fold.classList.toggle('graphs-mode', toGraphs);
  foldTooltip.textContent = toGraphs ? 'Switch to Animations' : 'Switch to Graphs';
  draw();
}

fold.addEventListener('click', () => setMode(currentMode === 'animations' ? 'graphs' : 'animations'));
fold.addEventListener('mouseenter', () => { foldTooltip.style.display = 'block'; });
fold.addEventListener('mouseleave', () => { foldTooltip.style.display = 'none'; });

function draw() {
  if (currentMode === 'graphs') drawGraphs(); else drawAnimations();
}


// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    startPlacementFromTool(btn.dataset.tool);
  });
});

document.getElementById('anim-list').addEventListener('click', e => {
  if (e.target !== e.currentTarget) return;
  openColorMenuAnimId = null;
  const placing = animations.find(a => a.inPlacementMode);
  if (placing) {
    if (isPrimitiveAnim(placing) || placing.anchors.length === 0) cancelPlacement(placing);
    else finalizePlacement(placing);
  }
  if (editModeAnimId !== null) exitEditMode();
  selectedId = null;
  sideActionHover = null;
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  renderAnimList(); draw();
});

addFunction('sin(x)', 'cartesian');
addFunction('cos(theta)', 'polar');
functions.forEach(compileFunction);
renderFunctionList();
renderAnimList();
renderGlobalSettingsControls();

resize();
</script>
</body>
</html>
