function gradientColorStops(anim) {
  const color1 = normalizeColorString(animFillColor(anim) || anim?.color) || '#000000';
  const color2 = normalizeColorString(anim?.gradientToColor || color1) || color1;
  return {
    color1: parseColorToRgb(color1) || { r: 0, g: 0, b: 0 },
    color2: parseColorToRgb(color2) || { r: 0, g: 0, b: 0 },
    opacity1: animFillOpacity(anim),
    opacity2: isFinite(anim?.gradientToOpacity) ? clamp(anim.gradientToOpacity, 0, 1) : 0,
  };
}

function ensureGradientDefaults(anim) {
  if (!anim) return;
  if (!anim.gradientFromArcs || !(anim.gradientFromArcs instanceof Set)) anim.gradientFromArcs = new Set(anim.gradientFromArcs || []);
  if (!anim.gradientToArcs || !(anim.gradientToArcs instanceof Set)) anim.gradientToArcs = new Set(anim.gradientToArcs || []);
  if (!anim.gradientToColor) anim.gradientToColor = animFillColor(anim) || anim.color;
  if (!isFinite(anim.gradientToOpacity)) anim.gradientToOpacity = 0;
}

function rgbaCss(rgb, alpha) {
  return `rgba(${Math.round(rgb.r)},${Math.round(rgb.g)},${Math.round(rgb.b)},${clamp(alpha, 0, 1)})`;
}

function gradientFillStyleForBounds(anim, bounds) {
  if (!bounds) return null;
  const stops = gradientColorStops(anim);
  const x1 = bounds.left, y1 = bounds.top;
  const x2 = Math.abs(bounds.right - bounds.left) < 1 ? bounds.left + 1 : bounds.right;
  const y2 = Math.abs(bounds.bottom - bounds.top) < 1 ? bounds.top : bounds.bottom;
  const grad = ctx.createLinearGradient(x1, y1, x2, y2);
  grad.addColorStop(0, rgbaCss(stops.color1, stops.opacity1));
  grad.addColorStop(1, rgbaCss(stops.color2, stops.opacity2));
  return grad;
}

function drawGradientFallbackFill(anim) {
  if (!animFillColor(anim) || !anim.closed || !findLoopRange(anim)) return;
  const bounds = selectedObjectCanvasBounds(anim);
  const grad = gradientFillStyleForBounds(anim, bounds);
  if (!grad) return;
  ctx.save();
  ctx.beginPath();
  if (addCurveFillPath(ctx, anim, true)) {
    ctx.fillStyle = grad;
    ctx.globalAlpha = 1;
    fillEvenOdd(ctx);
  }
  ctx.restore();
}

function strokeGradientArcMask(renderCtx, anim, segIndices) {
  let drew = false;
  renderCtx.save();
  renderCtx.strokeStyle = '#000';
  renderCtx.lineWidth = Math.max(3, Math.ceil(2 * devicePixelRatio));
  renderCtx.lineCap = 'round';
  renderCtx.lineJoin = 'round';
  for (const segIdx of segIndices) {
    const seg = anim.segments[segIdx];
    if (!seg || !seg.compiled) continue;
    renderCtx.beginPath();
    if (addCompiledSegmentToPath(renderCtx, seg, true)) {
      renderCtx.stroke();
      drew = true;
    }
  }
  renderCtx.restore();
  return drew;
}

function gradientDistanceMap(candidateData, sourceData, width, height) {
  const total = width * height;
  const INF = 1e9;
  const dist = new Float32Array(total);
  let seedCount = 0;
  for (let i = 0; i < total; i++) {
    const alphaIdx = i * 4 + 3;
    if (candidateData[alphaIdx] <= 0) {
      dist[i] = INF;
    } else if (sourceData[alphaIdx] > 0) {
      dist[i] = 0;
      seedCount++;
    } else {
      dist[i] = INF;
    }
  }

  if (seedCount === 0) {
    const maxR = 4;
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        if (sourceData[(canvasPixelIndex(x, y, width) * 4) + 3] <= 0) continue;
        for (let r = 1; r <= maxR; r++) {
          let seeded = false;
          for (let dy = -r; dy <= r; dy++) {
            for (let dx = -r; dx <= r; dx++) {
              const nx = x + dx, ny = y + dy;
              if (nx < 0 || ny < 0 || nx >= width || ny >= height) continue;
              const idx = canvasPixelIndex(nx, ny, width);
              if (candidateData[idx * 4 + 3] <= 0 || dist[idx] === 0) continue;
              dist[idx] = 0;
              seedCount++;
              seeded = true;
            }
          }
          if (seeded) break;
        }
      }
    }
  }

  if (seedCount === 0) return null;
  const D = Math.SQRT2;
  const relax = (idx, nextIdx, weight) => {
    const next = dist[nextIdx] + weight;
    if (next < dist[idx]) dist[idx] = next;
  };

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const idx = canvasPixelIndex(x, y, width);
      if (candidateData[idx * 4 + 3] <= 0) continue;
      if (x > 0) relax(idx, idx - 1, 1);
      if (y > 0) relax(idx, idx - width, 1);
      if (x > 0 && y > 0) relax(idx, idx - width - 1, D);
      if (x + 1 < width && y > 0) relax(idx, idx - width + 1, D);
    }
  }
  for (let y = height - 1; y >= 0; y--) {
    for (let x = width - 1; x >= 0; x--) {
      const idx = canvasPixelIndex(x, y, width);
      if (candidateData[idx * 4 + 3] <= 0) continue;
      if (x + 1 < width) relax(idx, idx + 1, 1);
      if (y + 1 < height) relax(idx, idx + width, 1);
      if (x + 1 < width && y + 1 < height) relax(idx, idx + width + 1, D);
      if (x > 0 && y + 1 < height) relax(idx, idx + width - 1, D);
    }
  }
  return dist;
}

function drawGradientFill(anim) {
  if (!animFillColor(anim)) return;
  const stops = gradientColorStops(anim);
  if (stops.opacity1 <= 0 && stops.opacity2 <= 0) return;
  if (!anim.closed || !findLoopRange(anim)) {
    drawGradientFallbackFill(anim);
    return;
  }

  const toSet = new Set(gradientArcIndices(anim, 'gradientToArcs'));
  const fromArcs = gradientArcIndices(anim, 'gradientFromArcs').filter(idx => !toSet.has(idx));
  const toArcs = [...toSet];
  if (!fromArcs.length || !toArcs.length) {
    drawGradientFallbackFill(anim);
    return;
  }

  const width = canvas.width;
  const height = canvas.height;
  if (!width || !height) return;

  const GRADIENT_MAX = 768;
  const gradScale = Math.min(1, GRADIENT_MAX / Math.max(width, height, 1));
  const gradW = Math.max(1, Math.round(width * gradScale));
  const gradH = Math.max(1, Math.round(height * gradScale));

  const candidateCanvas = document.createElement('canvas');
  candidateCanvas.width = gradW;
  candidateCanvas.height = gradH;
  const candidateCtx = candidateCanvas.getContext('2d');
  const fromCanvas = document.createElement('canvas');
  fromCanvas.width = gradW;
  fromCanvas.height = gradH;
  const fromCtx = fromCanvas.getContext('2d');
  const toCanvasEl = document.createElement('canvas');
  toCanvasEl.width = gradW;
  toCanvasEl.height = gradH;
  const toCtx = toCanvasEl.getContext('2d');

  const savedOriginX = originX, savedOriginY = originY, savedScale = scale;
  let drewCandidate = false;
  try {
    originX *= gradScale;
    originY *= gradScale;
    scale *= gradScale;

    candidateCtx.save();
    candidateCtx.fillStyle = '#000';
    candidateCtx.globalAlpha = 1;
    candidateCtx.beginPath();
    drewCandidate = addCurveFillPath(candidateCtx, anim, true);
    if (drewCandidate) fillEvenOdd(candidateCtx);
    candidateCtx.restore();

    strokeGradientArcMask(fromCtx, anim, fromArcs);
    strokeGradientArcMask(toCtx, anim, toArcs);
  } finally {
    originX = savedOriginX;
    originY = savedOriginY;
    scale = savedScale;
  }
  if (!drewCandidate) return;

  const candidateData = candidateCtx.getImageData(0, 0, gradW, gradH).data;
  const fromData = fromCtx.getImageData(0, 0, gradW, gradH).data;
  const toData = toCtx.getImageData(0, 0, gradW, gradH).data;
  const fromDist = gradientDistanceMap(candidateData, fromData, gradW, gradH);
  const toDist = gradientDistanceMap(candidateData, toData, gradW, gradH);
  if (!fromDist || !toDist) {
    drawGradientFallbackFill(anim);
    return;
  }

  const resultCanvas = document.createElement('canvas');
  resultCanvas.width = gradW;
  resultCanvas.height = gradH;
  const resultCtx = resultCanvas.getContext('2d');
  const out = resultCtx.createImageData(gradW, gradH);
  const INF = 1e8;
  for (let i = 0; i < gradW * gradH; i++) {
    const alphaIdx = i * 4 + 3;
    const maskAlpha = candidateData[alphaIdx] / 255;
    if (maskAlpha <= 0) continue;
    const d1 = fromDist[i], d2 = toDist[i];
    let t = 0.5;
    if (d1 >= INF && d2 >= INF) continue;
    else if (d1 >= INF) t = 1;
    else if (d2 >= INF) t = 0;
    else {
      const sum = d1 + d2;
      t = sum <= 1e-6 ? 0.5 : d1 / sum;
    }
    const inv = 1 - t;
    out.data[i * 4] = Math.round(stops.color1.r * inv + stops.color2.r * t);
    out.data[i * 4 + 1] = Math.round(stops.color1.g * inv + stops.color2.g * t);
    out.data[i * 4 + 2] = Math.round(stops.color1.b * inv + stops.color2.b * t);
    out.data[i * 4 + 3] = Math.round(255 * maskAlpha * (stops.opacity1 * inv + stops.opacity2 * t));
  }
  resultCtx.putImageData(out, 0, 0);
  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(resultCanvas, 0, 0, width, height);
  ctx.restore();
}

function queryMatchCandidates(anim, segIdx) {
  if (!anim.segments[segIdx]) return [];
  const threshold = MATCH_ARC_THRESHOLD_PX * devicePixelRatio;
  const sM = anim.anchors[segIdx], eM = anim.anchors[segIdx + 1];
  const mM = evalBezierMidpoint(anim, segIdx);
  const [sCx, sCy] = toCanvas(sM.re, sM.im);
  const [eCx, eCy] = toCanvas(eM.re, eM.im);
  const [mCx, mCy] = toCanvas(mM.re, mM.im);
  const results = [];
  for (const other of animations) {
    if (other.id === anim.id || !other.visible || other.inPlacementMode) continue;
    for (let i = 0; i < other.anchors.length - 1; i++) {
      if (!other.segments[i]) continue;
      const oS = other.anchors[i], oE = other.anchors[i + 1];
      const oMid = evalBezierMidpoint(other, i);
      const [oSCx, oSCy] = toCanvas(oS.re, oS.im);
      const [oECx, oECy] = toCanvas(oE.re, oE.im);
      const [oMCx, oMCy] = toCanvas(oMid.re, oMid.im);
      const dMid = Math.hypot(mCx - oMCx, mCy - oMCy);
      if (dMid > threshold) continue;
      const dSS = Math.hypot(sCx - oSCx, sCy - oSCy);
      const dEE = Math.hypot(eCx - oECx, eCy - oECy);
      if (dSS <= threshold && dEE <= threshold) {
        results.push({ anim: other, segIdx: i, reversed: false, score: dSS + dEE + dMid });
        continue;
      }
      const dSE = Math.hypot(sCx - oECx, sCy - oECy);
      const dES = Math.hypot(eCx - oSCx, eCy - oSCy);
      if (dSE <= threshold && dES <= threshold) {
        results.push({ anim: other, segIdx: i, reversed: true, score: dSE + dES + dMid });
      }
    }
  }
  return results.sort((a, b) => a.score - b.score);
}

function snapArcToMatch(anim, segIdx, candidate) {
  const { anim: src, segIdx: sIdx, reversed } = candidate;
  const srcSeg = src.segments[sIdx];
  if (!reversed) {
    anim.anchors[segIdx]     = cloneCx(src.anchors[sIdx]);
    anim.anchors[segIdx + 1] = cloneCx(src.anchors[sIdx + 1]);
    anim.segments[segIdx] = srcSeg
      ? { h0: cloneCx(srcSeg.h0), h1: cloneCx(srcSeg.h1), eccentricity: srcSeg.eccentricity }
      : null;
  } else {
    anim.anchors[segIdx]     = cloneCx(src.anchors[sIdx + 1]);
    anim.anchors[segIdx + 1] = cloneCx(src.anchors[sIdx]);
    anim.segments[segIdx] = srcSeg
      ? { h0: cloneCx(srcSeg.h1), h1: cloneCx(srcSeg.h0), eccentricity: srcSeg.eccentricity }
      : null;
  }
  recompileAnim(anim);
  saveProject();
}

function updatePlacementMatchCandidate(anim) {
  const n = anim.anchors.length;
  if (n < 2) { placementMatchCandidate = null; return; }
  const segIdx = n - 2;
  if (!anim.segments[segIdx]) { placementMatchCandidate = null; return; }
  const hits = queryMatchCandidates(anim, segIdx);
  placementMatchCandidate = hits.length > 0 ? { anim, segIdx, candidate: hits[0] } : null;
}

function drawPlacementMatchButton() {
  if (!placementMatchCandidate) return;
  const { anim, segIdx } = placementMatchCandidate;
  if (!anim.inPlacementMode) return;
  const mid = evalBezierMidpoint(anim, segIdx);
  const [mx, my] = toCanvas(mid.re, mid.im);
  const dpr = devicePixelRatio;
  const bw = 76 * dpr, bh = 22 * dpr;
  const bx = mx + 14 * dpr, by = my - bh / 2;
  const r = 4 * dpr;
  ctx.save();
  ctx.fillStyle = '#1e1e2e';
  ctx.strokeStyle = '#89dceb';
  ctx.lineWidth = 1.4 * dpr;
  ctx.globalAlpha = 0.94;
  ctx.beginPath();
  ctx.moveTo(bx + r, by);
  ctx.lineTo(bx + bw - r, by);
  ctx.arc(bx + bw - r, by + r, r, -Math.PI / 2, 0);
  ctx.lineTo(bx + bw, by + bh - r);
  ctx.arc(bx + bw - r, by + bh - r, r, 0, Math.PI / 2);
  ctx.lineTo(bx + r, by + bh);
  ctx.arc(bx + r, by + bh - r, r, Math.PI / 2, Math.PI);
  ctx.lineTo(bx, by + r);
  ctx.arc(bx + r, by + r, r, Math.PI, -Math.PI / 2);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#89dceb';
  ctx.font = `bold ${9 * dpr}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = 1;
  ctx.fillText('≈ Match arc', bx + bw / 2, by + bh / 2);
  ctx.restore();
  placementMatchCandidate._btnX = bx;
  placementMatchCandidate._btnY = by;
  placementMatchCandidate._btnW = bw;
  placementMatchCandidate._btnH = bh;
}

function queryFrameBorderHover(cx, cy) {
  const anim = selectedObjectAnim();
  if (anim) return queryFrameBorderHoverForAnim(anim, cx, cy);
  if (isGroupSelectionActive()) {
    if (queryResizeHandleHover(cx, cy)) return null;
    const f = groupSelectionFrameMetrics(selectedGroupId);
    if (!f) return null;
    const { x, y, w, h, outerX, outerY, outerW, outerH, extend } = f;
    const ol = outerX - extend, or_ = outerX + outerW + extend;
    const ot = outerY - extend, ob = outerY + outerH + extend;
    const dpr = devicePixelRatio;
    const tol = 4 * dpr;
    const il = x + tol, ir = x + w - tol;
    const it = y + tol, ib = y + h - tol;
    const inOuter = cx >= ol && cx <= or_ && cy >= ot && cy <= ob;
    const inInner = cx >= il && cx <= ir && cy >= it && cy <= ib;
    return (inOuter && !inInner) ? { groupId: selectedGroupId } : null;
  }
  if (isMultiSelectionActive()) {
    if (queryResizeHandleHover(cx, cy)) return null;
    const f = multiSelectionFrameMetrics();
    if (!f) return null;
    const { x, y, w, h, outerX, outerY, outerW, outerH, extend } = f;
    const ol = outerX - extend, or_ = outerX + outerW + extend;
    const ot = outerY - extend, ob = outerY + outerH + extend;
    const dpr = devicePixelRatio;
    const tol = 4 * dpr;
    const il = x + tol, ir = x + w - tol;
    const it = y + tol, ib = y + h - tol;
    const inOuter = cx >= ol && cx <= or_ && cy >= ot && cy <= ob;
    const inInner = cx >= il && cx <= ir && cy >= it && cy <= ib;
    return (inOuter && !inInner) ? { multi: true } : null;
  }
  return null;
}

function queryFrameBorderHoverForAnim(anim, cx, cy) {
  if (!anim || !isAnimEffectivelyVisible(anim) || anim.inPlacementMode || isDotAnim(anim)) return null;
  if (hasActiveArcSelection(anim)) return null;
  if (queryResizeHandleHoverForAnim(anim, cx, cy)) return null;
  const f = selectionFrameMetrics(anim);
  if (!f) return null;
  const { x, y, w, h, outerX, outerY, outerW, outerH, extend } = f;
  // Outer boundary (the extent of the drawn frame including handle stubs)
  const ol = outerX - extend, or_ = outerX + outerW + extend;
  const ot = outerY - extend, ob = outerY + outerH + extend;
  // Inner boundary (slightly inset so clicking inside the object doesn't trigger drag)
  const dpr = devicePixelRatio;
  const tol = 4 * dpr;
  const il = x + tol, ir = x + w - tol;
  const it = y + tol, ib = y + h - tol;
  const inOuter = cx >= ol && cx <= or_ && cy >= ot && cy <= ob;
  const inInner = cx >= il && cx <= ir && cy >= it && cy <= ib;
  return (inOuter && !inInner) ? anim : null;
}

function queryGroupMemberFrameBorderHover(groupId, cx, cy) {
  const members = groupMembers(groupId);
  for (let i = members.length - 1; i >= 0; i--) {
    const hit = queryFrameBorderHoverForAnim(members[i], cx, cy);
    if (hit) return hit;
  }
  return null;
}

function queryRotationWheelHover(cx, cy) {
  const anim = selectedObjectAnim();
  if (anim) return queryRotationWheelHoverForAnim(anim, cx, cy);
  if (isGroupSelectionActive()) {
    if (!isRotationModeActiveForGroup(selectedGroupId)) return null;
    const wheel = groupSelectionRotationWheel(selectedGroupId);
    if (!wheel || wheel.r < 4 * devicePixelRatio) return null;
    const threshold = 8 * devicePixelRatio;
    const d = Math.hypot(cx - wheel.cx, cy - wheel.cy);
    return Math.abs(d - wheel.r) <= threshold ? { groupId: selectedGroupId } : null;
  }
  if (isMultiSelectionActive()) {
    if (!isRotationModeActiveForMultiSelection()) return null;
    const wheel = multiSelectionRotationWheel();
    if (!wheel || wheel.r < 4 * devicePixelRatio) return null;
    const threshold = 8 * devicePixelRatio;
    const d = Math.hypot(cx - wheel.cx, cy - wheel.cy);
    return Math.abs(d - wheel.r) <= threshold ? { multi: true } : null;
  }
  return null;
}

function queryRotationWheelHoverForAnim(anim, cx, cy) {
  if (!anim || !isAnimEffectivelyVisible(anim) || anim.inPlacementMode || isDotAnim(anim)) return null;
  if (hasActiveArcSelection(anim)) return null;
  if (!isRotationModeActiveForAnim(anim)) return null;
  const wheel = selectionRotationWheel(anim);
  if (!wheel || wheel.r < 4 * devicePixelRatio) return null;
  const threshold = 8 * devicePixelRatio;
  const d = Math.hypot(cx - wheel.cx, cy - wheel.cy);
  return Math.abs(d - wheel.r) <= threshold ? { anim } : null;
}

function cloneResizeSeg(seg) {
  return seg ? { h0: cloneCx(seg.h0), h1: cloneCx(seg.h1), eccentricity: seg.eccentricity } : null;
}

function cloneTransformState(anim) {
  return {
    anim,
    origKind: animKind(anim),
    origClosed: !!anim.closed,
    origRotation: animRotation(anim),
    origTextScaleX: textScaleX(anim),
    origTextScaleY: textScaleY(anim),
    origTextShearX: textShearX(anim),
    origTextShearY: textShearY(anim),
    origAnchors: anim.anchors.map(cloneCx),
    origSegs: anim.segments.map(cloneResizeSeg),
    origAnchorLocked: anim.anchorLocked ? [...anim.anchorLocked] : [],
  };
}

function applyPointTransformFromState(state, transformPoint, options = {}) {
  const { anim, origKind, origAnchors, origSegs } = state;
  anim.kind = origKind;
  anim.closed = !!state.origClosed;
  anim.rotation = state.origRotation;
  anim.anchorLocked = state.origAnchorLocked ? [...state.origAnchorLocked] : [];

  if (origKind === 'text') {
    if (options.canvasMatrix) {
      applyTextCanvasLinearTransform(anim, {
        origRotation: state.origRotation,
        origTextScaleX: state.origTextScaleX,
        origTextScaleY: state.origTextScaleY,
        origTextShearX: state.origTextShearX,
        origTextShearY: state.origTextShearY,
        origAnchors,
      }, options.canvasMatrix, transformPoint);
    } else {
      anim.rotation = state.origRotation + (options.rotationDelta || 0);
      anim.textScaleX = state.origTextScaleX;
      anim.textScaleY = state.origTextScaleY;
      anim.textShearX = state.origTextShearX;
      anim.textShearY = state.origTextShearY;
      anim.anchors = origAnchors.map(transformPoint);
    }
    return;
  }

  anim.anchors = origAnchors.map(transformPoint);
  if (isPrimitiveAnim(anim)) {
    if (options.forcePath && (origKind === 'rectangle' || origKind === 'circle' || origKind === 'ellipse')) {
      const path = primitivePathForDrag(state);
      if (path) {
        anim.kind = path.kind;
        anim.closed = path.closed;
        anim.rotation = 0;
        anim.anchors = path.anchors.map(transformPoint);
        anim.segments = path.segments.map(seg => transformResizeSeg(seg, transformPoint));
        anim.anchorLocked = anim.anchors.map(() => !!path.locked);
        recompileAnim(anim);
      }
      return;
    }
    anim.segments = [];
    if (options.rotationDelta && (origKind === 'rectangle' || origKind === 'circle' || origKind === 'ellipse')) {
      anim.rotation = state.origRotation + options.rotationDelta;
    }
    return;
  }

  anim.segments = origSegs.map(seg => transformResizeSeg(seg, transformPoint));
  recompileAnim(anim);
}

function applyGroupTranslation(drag, dx, dy) {
  for (const state of drag.origStates) {
    applyPointTransformFromState(state, pt => new Cx(pt.re + dx, pt.im + dy));
  }
}

function transformPointInBounds(pt, fromBounds, toBounds) {
  const w0 = fromBounds.right - fromBounds.left;
  const h0 = fromBounds.top - fromBounds.bottom;
  const re = Math.abs(w0) < 1e-9
    ? fromBounds.left
    : toBounds.left + (pt.re - fromBounds.left) * (toBounds.right - toBounds.left) / w0;
  const im = Math.abs(h0) < 1e-9
    ? fromBounds.bottom
    : toBounds.bottom + (pt.im - fromBounds.bottom) * (toBounds.top - toBounds.bottom) / h0;
  return new Cx(re, im);
}

function isSideResizeHandle(handle) {
  return handle === 'n' || handle === 'e' || handle === 's' || handle === 'w';
}

function snapShearOffsetMath(offsetMath) {
  const threshold = (2 * devicePixelRatio) / Math.max(scale, 1e-9);
  const absOffset = Math.abs(offsetMath);
  if (absOffset <= threshold) return 0;
  return Math.sign(offsetMath) * (absOffset - threshold);
}

function sideShearOffsetForCursor(drag, mathX, mathY) {
  const dx = mathX - drag.startMathX;
  const dy = mathY - drag.startMathY;
  return (drag.handle === 'e' || drag.handle === 'w')
    ? snapShearOffsetMath(dy)
    : snapShearOffsetMath(dx);
}

function shearParamsForCursor(drag, mathX, mathY) {
  const b = drag.origBounds;
  const dx = mathX - drag.startMathX;
  const dy = mathY - drag.startMathY;
  const w = b.right - b.left;
  const h = b.top - b.bottom;
  if ((drag.handle === 'e' || drag.handle === 'w') && Math.abs(w) >= 1e-9) {
    return {
      axis: 'vertical',
      k: drag.handle === 'e' ? dy / w : -dy / w,
      fixedX: drag.handle === 'e' ? b.left : b.right,
    };
  }
  if ((drag.handle === 'n' || drag.handle === 's') && Math.abs(h) >= 1e-9) {
    return {
      axis: 'horizontal',
      k: drag.handle === 'n' ? dx / h : -dx / h,
      fixedY: drag.handle === 'n' ? b.bottom : b.top,
    };
  }
  return null;
}

function shearParamsForSideOffset(handle, bounds, offset) {
  if (!bounds || Math.abs(offset) < 1e-10) return null;
  const w = bounds.right - bounds.left;
  const h = bounds.top - bounds.bottom;
  if ((handle === 'e' || handle === 'w') && Math.abs(w) >= 1e-9) {
    return {
      axis: 'vertical',
      k: handle === 'e' ? offset / w : -offset / w,
      fixedX: handle === 'e' ? bounds.left : bounds.right,
    };
  }
  if ((handle === 'n' || handle === 's') && Math.abs(h) >= 1e-9) {
    return {
      axis: 'horizontal',
      k: handle === 'n' ? offset / h : -offset / h,
      fixedY: handle === 'n' ? bounds.bottom : bounds.top,
    };
  }
  return null;
}

function shearGuideForCursor(drag, mathX, mathY) {
  const b = drag.origFrameBounds || drag.origBounds;
  const dx = mathX - drag.startMathX;
  const dy = mathY - drag.startMathY;
  const w = b.right - b.left;
  const h = b.top - b.bottom;
  if ((drag.handle === 'e' || drag.handle === 'w') && Math.abs(w) >= 1e-9) {
    return {
      frameBounds: { ...b },
      params: {
        axis: 'vertical',
        k: drag.handle === 'e' ? dy / w : -dy / w,
        fixedX: drag.handle === 'e' ? b.left : b.right,
      },
    };
  }
  if ((drag.handle === 'n' || drag.handle === 's') && Math.abs(h) >= 1e-9) {
    return {
      frameBounds: { ...b },
      params: {
        axis: 'horizontal',
        k: drag.handle === 'n' ? dx / h : -dx / h,
        fixedY: drag.handle === 'n' ? b.bottom : b.top,
      },
    };
  }
  return null;
}

function transformSelectionCrossbeamGuide(drag, transformPoint) {
  const b = drag.origFrameBounds || drag.origBounds;
  if (!b) return null;
  const midX = (b.left + b.right) * 0.5;
  const midY = (b.bottom + b.top) * 0.5;
  return {
    crossbeams: [
      [transformPoint(new Cx(b.left, midY)), transformPoint(new Cx(b.right, midY))],
      [transformPoint(new Cx(midX, b.bottom)), transformPoint(new Cx(midX, b.top))],
    ],
  };
}

function shearPointForParams(pt, params) {
  if (!params) return cloneCx(pt);
  if (params.axis === 'vertical')
    return new Cx(pt.re, pt.im + params.k * (pt.re - params.fixedX));
  return new Cx(pt.re + params.k * (pt.im - params.fixedY), pt.im);
}

function rotateMathVector(vec, angle) {
  if (!angle) return cloneCx(vec);
  const c = Math.cos(angle), s = Math.sin(angle);
  return new Cx(vec.re * c - vec.im * s, vec.re * s + vec.im * c);
}

function primitiveRectanglePathForDrag(drag) {
  const temp = {
    kind: 'rectangle',
    anchors: drag.origAnchors.map(cloneCx),
    rotation: drag.origRotation ?? 0,
  };
  const corners = primitiveRectangleCorners(temp);
  if (corners.length < 4) return null;
  const anchors = corners.concat([cloneCx(corners[0])]);
  return {
    kind: POLYLINE_KIND,
    closed: true,
    anchors,
    segments: anchors.slice(0, -1).map((p, i) => makeStraightSegment(p, anchors[i + 1])),
    locked: false,
  };
}

function primitiveEllipsePathForDrag(drag) {
  const center = drag.origAnchors[0];
  const p1 = drag.origAnchors[1];
  if (!center || !p1) return null;
  const kind = drag.origKind;
  const rot = kind === 'ellipse' ? (drag.origRotation ?? 0) : 0;
  const rx = kind === 'circle'
    ? Math.hypot(p1.re - center.re, p1.im - center.im)
    : Math.abs(p1.re - center.re);
  const ry = kind === 'circle' ? rx : Math.abs(p1.im - center.im);
  if (rx < 1e-9 || ry < 1e-9) return null;

  const kappa = 4 / 3 * Math.tan(Math.PI / 8);
  const pointAt = angle => {
    const local = new Cx(center.re + rx * Math.cos(angle), center.im + ry * Math.sin(angle));
    return rot ? rotateMathPoint(local, center, rot) : local;
  };
  const tangentAt = angle => rotateMathVector(
    new Cx(-rx * Math.sin(angle), ry * Math.cos(angle)),
    rot
  );

  const angles = [0, Math.PI / 2, Math.PI, Math.PI * 1.5, Math.PI * 2];
  const anchors = angles.map(pointAt);
  anchors[anchors.length - 1] = cloneCx(anchors[0]);
  const segments = [];
  for (let i = 0; i < 4; i++) {
    const start = anchors[i];
    const end = anchors[i + 1];
    const t0 = tangentAt(angles[i]);
    const t1 = tangentAt(angles[i + 1]);
    segments.push(makeSeg(
      new Cx(start.re + t0.re * kappa, start.im + t0.im * kappa),
      new Cx(end.re - t1.re * kappa, end.im - t1.im * kappa)
    ));
  }
  return { kind: 'freeform', closed: true, anchors, segments, locked: true };
}

function primitivePathForDrag(drag) {
  if (drag.origKind === 'rectangle') return primitiveRectanglePathForDrag(drag);
  if (drag.origKind === 'circle' || drag.origKind === 'ellipse') return primitiveEllipsePathForDrag(drag);
  return null;
}

function transformResizeSeg(seg, transformPoint) {
  return seg ? {
    h0: transformPoint(seg.h0),
    h1: transformPoint(seg.h1),
    eccentricity: seg.eccentricity,
    compiled: null,
    compiledRef: null,
  } : null;
}

function restoreResizeOriginalAnim(drag) {
  const { anim } = drag;
  anim.kind = drag.origKind;
  anim.closed = !!drag.origClosed;
  anim.rotation = drag.origRotation ?? 0;
  anim.textScaleX = drag.origTextScaleX ?? textScaleX(anim);
  anim.textScaleY = drag.origTextScaleY ?? textScaleY(anim);
  anim.textShearX = drag.origTextShearX ?? textShearX(anim);
  anim.textShearY = drag.origTextShearY ?? textShearY(anim);
  anim.anchors = drag.origAnchors.map(cloneCx);
  anim.segments = drag.origSegs.map(cloneResizeSeg);
  anim.anchorLocked = drag.origAnchorLocked ? [...drag.origAnchorLocked] : [];
  if (!isPrimitiveAnim(anim) && !isTextAnim(anim)) recompileAnim(anim);
}

function textCanvasLinearMatrixFromValues(rotation, sx, sy, shx, shy) {
  const theta = -rotation;
  const c = Math.cos(theta), s = Math.sin(theta);
  const p00 = sx;
  const p01 = shx * sy;
  const p10 = shy * sx;
  const p11 = sy;
  return [
    [c * p00 - s * p10, c * p01 - s * p11],
    [s * p00 + c * p10, s * p01 + c * p11],
  ];
}

function multiplyMatrix2(a, b) {
  return [
    [a[0][0] * b[0][0] + a[0][1] * b[1][0], a[0][0] * b[0][1] + a[0][1] * b[1][1]],
    [a[1][0] * b[0][0] + a[1][1] * b[1][0], a[1][0] * b[0][1] + a[1][1] * b[1][1]],
  ];
}

function shearCanvasMatrixForParams(params) {
  return params.axis === 'vertical'
    ? [[1, 0], [-params.k, 1]]
    : [[1, -params.k], [0, 1]];
}

function resizeCanvasMatrixForBounds(origBounds, nextBounds) {
  const ow = origBounds.right - origBounds.left;
  const oh = origBounds.top - origBounds.bottom;
  const sx = Math.abs(ow) < 1e-9 ? 1 : (nextBounds.right - nextBounds.left) / ow;
  const sy = Math.abs(oh) < 1e-9 ? 1 : (nextBounds.top - nextBounds.bottom) / oh;
  return [[sx, 0], [0, sy]];
}

function applyTextCanvasLinearTransform(anim, drag, canvasMatrix, transformPoint) {
  const oldMatrix = textCanvasLinearMatrixFromValues(
    drag.origRotation ?? 0,
    drag.origTextScaleX ?? 1,
    drag.origTextScaleY ?? 1,
    drag.origTextShearX ?? 0,
    drag.origTextShearY ?? 0
  );
  const nextMatrix = multiplyMatrix2(canvasMatrix, oldMatrix);
  const rotation = drag.origRotation ?? 0;
  const theta = -rotation;
  const c = Math.cos(theta), s = Math.sin(theta);
  const q00 = c * nextMatrix[0][0] + s * nextMatrix[1][0];
  const q01 = c * nextMatrix[0][1] + s * nextMatrix[1][1];
  const q10 = -s * nextMatrix[0][0] + c * nextMatrix[1][0];
  const q11 = -s * nextMatrix[0][1] + c * nextMatrix[1][1];
  const sx = Math.abs(q00) < 1e-9 ? (q00 < 0 ? -1e-9 : 1e-9) : q00;
  const sy = Math.abs(q11) < 1e-9 ? (q11 < 0 ? -1e-9 : 1e-9) : q11;
  anim.rotation = rotation;
  anim.textScaleX = sx;
  anim.textScaleY = sy;
  anim.textShearY = q10 / sx;
  anim.textShearX = q01 / sy;
  anim.anchors = drag.origAnchors.map(transformPoint);
}

function applyTextShearFromParams(anim, drag, params, transformPoint) {
  applyTextCanvasLinearTransform(anim, drag, shearCanvasMatrixForParams(params), transformPoint);
}

function applyShearForCursor(drag, mathX, mathY) {
  const params = shearParamsForCursor(drag, mathX, mathY);
  if (!params) return false;
  if (Math.abs(params.k) < 1e-10) {
    drag.anim.selectionGuideShear = null;
    restoreResizeOriginalAnim(drag);
    return true;
  }
  drag.anim.selectionGuideShear = shearGuideForCursor(drag, mathX, mathY);
  const { anim, origKind, origAnchors, origSegs } = drag;
  const transformPoint = pt => shearPointForParams(pt, params);

  if (origKind === 'text') {
    applyTextShearFromParams(anim, drag, params, transformPoint);
    return true;
  }

  if (origKind === 'line') {
    anim.kind = 'line';
    anim.closed = false;
    anim.rotation = drag.origRotation ?? 0;
    anim.anchors = origAnchors.map(transformPoint);
    anim.segments = [];
    return true;
  }

  if (origKind === 'rectangle' || origKind === 'circle' || origKind === 'ellipse') {
    const path = primitivePathForDrag(drag);
    if (!path) return false;
    anim.kind = path.kind;
    anim.closed = path.closed;
    anim.rotation = 0;
    anim.anchors = path.anchors.map(transformPoint);
    anim.segments = path.segments.map(seg => transformResizeSeg(seg, transformPoint));
    anim.anchorLocked = anim.anchors.map(() => !!path.locked);
    anim.activeSegments = new Set();
    anim.expandedAnchors = new Set();
    anim.expandedArcs = new Set();
    recompileAnim(anim);
    return true;
  }

  anim.kind = origKind;
  anim.closed = !!drag.origClosed;
  anim.rotation = drag.origRotation ?? 0;
  anim.anchors = origAnchors.map(transformPoint);
  anim.segments = origSegs.map(seg => transformResizeSeg(seg, transformPoint));
  anim.anchorLocked = drag.origAnchorLocked ? [...drag.origAnchorLocked] : [];
  recompileAnim(anim);
  return true;
}

function applySideResizeShearForCursor(drag, mathX, mathY) {
  const nextBounds = resizeBoundsForCursor(drag, mathX, mathY);
  const shearOffset = sideShearOffsetForCursor(drag, mathX, mathY);
  const params = shearParamsForSideOffset(drag.handle, nextBounds, shearOffset);

  if (!params) {
    drag.anim.selectionGuideShear = null;
    applyResizeBounds(drag, nextBounds);
    return true;
  }

  const { anim, origKind, origBounds, origAnchors, origSegs } = drag;
  const resizePoint = pt => transformPointInBounds(pt, origBounds, nextBounds);
  const transformPoint = pt => shearPointForParams(resizePoint(pt), params);
  anim.selectionGuideShear = transformSelectionCrossbeamGuide(drag, transformPoint);

  if (origKind === 'text') {
    const resizeMatrix = resizeCanvasMatrixForBounds(origBounds, nextBounds);
    const shearMatrix = shearCanvasMatrixForParams(params);
    applyTextCanvasLinearTransform(anim, drag, multiplyMatrix2(shearMatrix, resizeMatrix), transformPoint);
    return true;
  }

  if (origKind === 'line') {
    anim.kind = 'line';
    anim.closed = false;
    anim.rotation = drag.origRotation ?? 0;
    anim.anchors = origAnchors.map(transformPoint);
    anim.segments = [];
    return true;
  }

  if (origKind === 'rectangle' || origKind === 'circle' || origKind === 'ellipse') {
    const path = primitivePathForDrag(drag);
    if (!path) return false;
    anim.kind = path.kind;
    anim.closed = path.closed;
    anim.rotation = 0;
    anim.anchors = path.anchors.map(transformPoint);
    anim.segments = path.segments.map(seg => transformResizeSeg(seg, transformPoint));
    anim.anchorLocked = anim.anchors.map(() => !!path.locked);
    anim.activeSegments = new Set();
    anim.expandedAnchors = new Set();
    anim.expandedArcs = new Set();
    recompileAnim(anim);
    return true;
  }

  anim.kind = origKind;
  anim.closed = !!drag.origClosed;
  anim.rotation = drag.origRotation ?? 0;
  anim.anchors = origAnchors.map(transformPoint);
  anim.segments = origSegs.map(seg => transformResizeSeg(seg, transformPoint));
  anim.anchorLocked = drag.origAnchorLocked ? [...drag.origAnchorLocked] : [];
  recompileAnim(anim);
  return true;
}

function applyResizeOrShearForCursor(drag, mathX, mathY) {
  if (drag.multi) return applyMultiSelectionResizeOrShearForCursor(drag, mathX, mathY);
  if (drag.groupId != null) return applyGroupResizeOrShearForCursor(drag, mathX, mathY);
  if (isSideResizeHandle(drag.handle)) return applySideResizeShearForCursor(drag, mathX, mathY);
  drag.anim.selectionGuideShear = null;
  const nextBounds = resizeBoundsForCursor(drag, mathX, mathY);
  applyResizeBounds(drag, nextBounds);
  return true;
}

function applyGroupResizeOrShearForCursor(drag, mathX, mathY) {
  const nextBounds = resizeBoundsForCursor(drag, mathX, mathY);
  const shearOffset = isSideResizeHandle(drag.handle) ? sideShearOffsetForCursor(drag, mathX, mathY) : 0;
  const params = shearParamsForSideOffset(drag.handle, nextBounds, shearOffset);
  const resizePoint = pt => transformPointInBounds(pt, drag.origBounds, nextBounds);
  const transformPoint = params
    ? pt => shearPointForParams(resizePoint(pt), params)
    : resizePoint;
  groupSelectionGuideShear = params ? transformSelectionCrossbeamGuide(drag, transformPoint) : null;
  const resizeMatrix = resizeCanvasMatrixForBounds(drag.origBounds, nextBounds);
  const canvasMatrix = params
    ? multiplyMatrix2(shearCanvasMatrixForParams(params), resizeMatrix)
    : resizeMatrix;
  const forcePath = !!params || isSideResizeHandle(drag.handle);
  for (const state of drag.origStates) {
    applyPointTransformFromState(state, transformPoint, { canvasMatrix, forcePath });
  }
  return true;
}

function applyMultiSelectionResizeOrShearForCursor(drag, mathX, mathY) {
  const nextBounds = resizeBoundsForCursor(drag, mathX, mathY);
  const shearOffset = isSideResizeHandle(drag.handle) ? sideShearOffsetForCursor(drag, mathX, mathY) : 0;
  const params = shearParamsForSideOffset(drag.handle, nextBounds, shearOffset);
  const resizePoint = pt => transformPointInBounds(pt, drag.origBounds, nextBounds);
  const transformPoint = params
    ? pt => shearPointForParams(resizePoint(pt), params)
    : resizePoint;
  multiSelectionGuideShear = params ? transformSelectionCrossbeamGuide(drag, transformPoint) : null;
  const resizeMatrix = resizeCanvasMatrixForBounds(drag.origBounds, nextBounds);
  const canvasMatrix = params
    ? multiplyMatrix2(shearCanvasMatrixForParams(params), resizeMatrix)
    : resizeMatrix;
  const forcePath = !!params || isSideResizeHandle(drag.handle);
  for (const state of drag.origStates) {
    applyPointTransformFromState(state, transformPoint, { canvasMatrix, forcePath });
  }
  return true;
}

function boundsFromEdges(ax, bx, ay, by) {
  return {
    left: Math.min(ax, bx),
    right: Math.max(ax, bx),
    bottom: Math.min(ay, by),
    top: Math.max(ay, by),
  };
}

function resizeBoundsForCursor(drag, mathX, mathY) {
  const b = drag.origBounds;
  const dx = mathX - drag.startMathX;
  const dy = mathY - drag.startMathY;
  const h = drag.handle;

  if (h.length === 1) {
    const next = { ...b };
    if (h === 'e') next.right = Math.max(next.left, softSnap(b.right + dx));
    if (h === 'w') next.left = Math.min(next.right, softSnap(b.left + dx));
    if (h === 'n') next.top = Math.max(next.bottom, softSnap(b.top + dy));
    if (h === 's') next.bottom = Math.min(next.top, softSnap(b.bottom + dy));
    return next;
  }

  const movingEast = h.includes('e');
  const movingNorth = h.includes('n');
  const fixedX = movingEast ? b.left : b.right;
  const fixedY = movingNorth ? b.bottom : b.top;
  const origX = movingEast ? b.right : b.left;
  const origY = movingNorth ? b.top : b.bottom;
  const candX = softSnap(origX + dx);
  const candY = softSnap(origY + dy);
  const origW = Math.abs(origX - fixedX);
  const origH = Math.abs(origY - fixedY);
  const signX = Math.sign(origX - fixedX) || 1;
  const signY = Math.sign(origY - fixedY) || 1;

  let scaleFactor = 0;
  if (origW < 1e-9 && origH < 1e-9) {
    scaleFactor = 0;
  } else if (origW < 1e-9) {
    scaleFactor = Math.max(0, signY * (candY - fixedY) / origH);
  } else if (origH < 1e-9) {
    scaleFactor = Math.max(0, signX * (candX - fixedX) / origW);
  } else {
    const sx = signX * (candX - fixedX) / origW;
    const sy = signY * (candY - fixedY) / origH;
    const relX = Math.abs((candX - origX) / origW);
    const relY = Math.abs((candY - origY) / origH);
    scaleFactor = Math.max(0, relX >= relY ? sx : sy);
  }

  const nextX = fixedX + signX * origW * scaleFactor;
  const nextY = fixedY + signY * origH * scaleFactor;
  return boundsFromEdges(fixedX, nextX, fixedY, nextY);
}

function applyResizeBounds(drag, nextBounds) {
  const { anim, origKind, origBounds, origAnchors, origSegs } = drag;

  if (origKind === 'text') {
    const ow = Math.max(1e-9, origBounds.right - origBounds.left);
    const oh = Math.max(1e-9, origBounds.top - origBounds.bottom);
    const nw = Math.max(1e-9, nextBounds.right - nextBounds.left);
    const nh = Math.max(1e-9, nextBounds.top - nextBounds.bottom);
    anim.rotation = drag.origRotation ?? animRotation(anim);
    anim.textScaleX = (drag.origTextScaleX ?? textScaleX(anim)) * (nw / ow);
    anim.textScaleY = (drag.origTextScaleY ?? textScaleY(anim)) * (nh / oh);
    anim.textShearX = drag.origTextShearX ?? textShearX(anim);
    anim.textShearY = drag.origTextShearY ?? textShearY(anim);
    anim.anchors = origAnchors.map(pt => transformPointInBounds(pt, origBounds, nextBounds));
    return;
  }

  if (origKind === 'circle' || origKind === 'ellipse') {
    const cx = (nextBounds.left + nextBounds.right) * 0.5;
    const cy = (nextBounds.bottom + nextBounds.top) * 0.5;
    const rx = Math.max(0, (nextBounds.right - nextBounds.left) * 0.5);
    const ry = Math.max(0, (nextBounds.top - nextBounds.bottom) * 0.5);
    const isCircle = Math.abs(rx - ry) <= 1e-7;
    anim.kind = isCircle ? 'circle' : 'ellipse';
    anim.rotation = drag.origRotation ?? animRotation(anim);
    anim.closed = false;
    anim.anchors = [
      new Cx(cx, cy),
      isCircle ? new Cx(cx + rx, cy) : new Cx(cx + rx, cy + ry),
    ];
    anim.segments = [];
    anim.anchorLocked = [];
    return;
  }

  anim.kind = origKind;
  anim.closed = !!drag.origClosed;
  anim.rotation = drag.origRotation ?? animRotation(anim);
  anim.anchors = origAnchors.map(pt => transformPointInBounds(pt, origBounds, nextBounds));
  anim.segments = origSegs.map(seg => seg ? ({
    h0: transformPointInBounds(seg.h0, origBounds, nextBounds),
    h1: transformPointInBounds(seg.h1, origBounds, nextBounds),
    eccentricity: seg.eccentricity,
    compiled: null,
    compiledRef: null,
  }) : null);
  anim.anchorLocked = drag.origAnchorLocked ? [...drag.origAnchorLocked] : [];
  if (!isPrimitiveAnim(anim)) recompileAnim(anim);
}

function rotationCenterForAnim(anim) {
  const bounds = selectedObjectCanvasBounds(anim);
  if (!bounds) return null;
  const [mx, my] = toMath((bounds.left + bounds.right) * 0.5, (bounds.top + bounds.bottom) * 0.5);
  return new Cx(mx, my);
}

function rotationCenterForGroup(groupId) {
  const bounds = groupCanvasBounds(groupId);
  if (!bounds) return null;
  const [mx, my] = toMath((bounds.left + bounds.right) * 0.5, (bounds.top + bounds.bottom) * 0.5);
  return new Cx(mx, my);
}

function rotationCenterForMultiSelection() {
  const bounds = multiSelectionCanvasBounds();
  if (!bounds) return null;
  const [mx, my] = toMath((bounds.left + bounds.right) * 0.5, (bounds.top + bounds.bottom) * 0.5);
  return new Cx(mx, my);
}

function applyRotationDelta(drag, delta) {
  if (drag.groupId != null || drag.multi) {
    for (const state of drag.origStates) {
      applyPointTransformFromState(
        state,
        pt => rotateMathPoint(pt, drag.center, delta),
        { rotationDelta: delta }
      );
    }
    return;
  }
  const { anim, center, origRotation, origAnchors, origSegs } = drag;
  const kind = animKind(anim);
  if (isTextAnim(anim)) {
    anim.rotation = origRotation + delta;
    return;
  }
  if (isPrimitiveAnim(anim) && (kind === 'rectangle' || kind === 'circle' || kind === 'ellipse')) {
    anim.rotation = origRotation + delta;
    return;
  }

  anim.rotation = origRotation;
  anim.anchors = origAnchors.map(pt => rotateMathPoint(pt, center, delta));
  if (!isPrimitiveAnim(anim)) {
    anim.segments = origSegs.map(seg => seg ? ({
      h0: rotateMathPoint(seg.h0, center, delta),
      h1: rotateMathPoint(seg.h1, center, delta),
      eccentricity: seg.eccentricity,
      compiled: null,
      compiledRef: null,
    }) : null);
    recompileAnim(anim);
  }
}

function beginRotationDragFromHit(rotateHit, mathX, mathY, flags = {}) {
  if (!rotateHit || !isRotationModeActiveForHit(rotateHit)) return false;
  let nextDrag = null;
  if (rotateHit.anim) {
    const wheel = selectionRotationWheel(rotateHit.anim);
    if (wheel) {
      const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
      nextDrag = {
        ...cloneTransformState(rotateHit.anim),
        center: new Cx(cRe, cIm),
        startAngle: Math.atan2(mathY - cIm, mathX - cRe),
        ...flags,
      };
    }
  } else if (rotateHit.groupId != null) {
    const wheel = groupSelectionRotationWheel(rotateHit.groupId);
    if (wheel) {
      const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
      nextDrag = {
        groupId: rotateHit.groupId,
        center: new Cx(cRe, cIm),
        startAngle: Math.atan2(mathY - cIm, mathX - cRe),
        origStates: allDescendantAnims(rotateHit.groupId).map(cloneTransformState),
        ...flags,
      };
    }
  } else if (rotateHit.multi) {
    const wheel = multiSelectionRotationWheel();
    if (wheel) {
      const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
      nextDrag = {
        multi: true,
        center: new Cx(cRe, cIm),
        startAngle: Math.atan2(mathY - cIm, mathX - cRe),
        origStates: multiSelectionMembers().map(cloneTransformState),
        ...flags,
      };
    }
  }
  if (!nextDrag) return false;
  pushUndo();
  rotateDrag = nextDrag;
  return !!rotateDrag;
}

function drawRotationSideActionIcon(btn, active) {
  const dpr = devicePixelRatio;
  const cx = btn.x + btn.w * 0.5;
  const cy = btn.y + btn.h * 0.5;
  const r = Math.min(btn.w, btn.h) * 0.31;
  const arrowLen = 3.35 * dpr;
  const arrowSpread = 0.68;
  const headGap = 0.19;

  const drawArcArrow = (start, headAngle) => {
    const arcEnd = headAngle - headGap;
    const headX = cx + Math.cos(headAngle) * r;
    const headY = cy + Math.sin(headAngle) * r;
    const tangent = headAngle + Math.PI * 0.5;
    const back = tangent + Math.PI;

    ctx.beginPath();
    ctx.arc(cx, cy, r, start, arcEnd, false);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(headX, headY);
    ctx.lineTo(
      headX + arrowLen * Math.cos(back - arrowSpread),
      headY + arrowLen * Math.sin(back - arrowSpread)
    );
    ctx.moveTo(headX, headY);
    ctx.lineTo(
      headX + arrowLen * Math.cos(back + arrowSpread),
      headY + arrowLen * Math.sin(back + arrowSpread)
    );
    ctx.stroke();
  };

  ctx.save();
  ctx.strokeStyle = active ? CANVAS_BUTTON_COLOR : CANVAS_BUTTON_IDLE_COLOR;
  ctx.lineWidth = (active ? 1.55 : 1.2) * dpr;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalAlpha = active ? 0.9 : 0.72;

  drawArcArrow(Math.PI * 0.10, Math.PI * 0.78);
  drawArcArrow(Math.PI * 1.10, Math.PI * 1.78);
  ctx.restore();
}

function drawSelectionSideActionButton(btn, active, showLabel = active) {
  const dpr = devicePixelRatio;
  const midX = btn.x + btn.w * 0.5;
  const midY = btn.y + btn.h * 0.5;
  const cellL = btn.x + btn.w * 0.25;
  const cellR = btn.x + btn.w * 0.75;

  ctx.save();
  ctx.fillStyle = '#11111b';
  ctx.globalAlpha = active ? 0.92 : 0.78;
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);

  ctx.globalAlpha = active ? 0.78 : 0.56;
  ctx.strokeStyle = active ? CANVAS_BUTTON_COLOR : CANVAS_BUTTON_IDLE_COLOR;
  ctx.lineWidth = (active ? 1.4 : 1) * dpr;
  ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);

  ctx.globalAlpha = active ? 0.62 : 0.4;
  ctx.beginPath();
  ctx.moveTo(midX, btn.y + 3 * dpr);
  ctx.lineTo(midX, btn.y + btn.h - 3 * dpr);
  if (btn.kind !== 'rotate') ctx.stroke();

  if (btn.kind === 'rotate') {
    drawRotationSideActionIcon(btn, active);
  } else {
    ctx.globalAlpha = active ? 0.9 : 0.7;
    ctx.fillStyle = active ? CANVAS_BUTTON_COLOR : CANVAS_BUTTON_IDLE_COLOR;
    ctx.font = `700 ${12 * dpr}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('R', cellL, midY + 0.5 * dpr);
    if (btn.kind === 'reflect') {
      ctx.translate(cellR, midY + 0.5 * dpr);
      ctx.scale(-1, 1);
      ctx.fillText('R', 0, 0);
    } else {
      ctx.fillText('R', cellR, midY + 0.5 * dpr);
    }
  }
  ctx.restore();

  if (showLabel) drawSelectionSideActionLabel(btn);
}

function drawSelectionSideActionLabel(btn) {
  const dpr = devicePixelRatio;
  const text = btn.kind === 'reflect' ? 'Reflect' : btn.kind === 'rotate' ? 'Rotate' : 'Duplicate';
  ctx.save();
  ctx.font = `${11 * dpr}px sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';

  const padX = 7 * dpr;
  const labelW = ctx.measureText(text).width + padX * 2;
  const labelH = 18 * dpr;
  let x = btn.x + btn.w + 6 * dpr;
  if (x + labelW > canvas.width - 4 * dpr) x = btn.x - labelW - 6 * dpr;
  const y = btn.y + (btn.h - labelH) * 0.5;

  ctx.fillStyle = '#11111b';
  ctx.globalAlpha = 0.92;
  ctx.fillRect(x, y, labelW, labelH);
  ctx.strokeStyle = CANVAS_TOOL_COLOR;
  ctx.lineWidth = 1 * dpr;
  ctx.globalAlpha = 0.55;
  ctx.strokeRect(x, y, labelW, labelH);
  ctx.fillStyle = '#cdd6f4';
  ctx.globalAlpha = 0.95;
  ctx.fillText(text, x + padX, y + labelH * 0.5 + 0.3 * dpr);
  ctx.restore();
}

function drawSelectionSideActionButtons(anim) {
  for (const btn of selectionSideActionButtons(anim)) {
    const hovered = sideActionHover?.anim === anim && sideActionHover?.kind === btn.kind;
    const active = hovered || (btn.kind === 'rotate' && isRotationModeActiveForAnim(anim));
    drawSelectionSideActionButton(btn, active, hovered);
  }
}

function drawSelectionCrossbeams(anim, frame) {
  const { x, y, w, h } = frame;
  const guide = anim.selectionGuideShear;

  ctx.beginPath();
  if (guide?.crossbeams) {
    for (const beam of guide.crossbeams) {
      if (!beam || beam.length < 2) continue;
      const p0 = toCanvas(beam[0].re, beam[0].im);
      const p1 = toCanvas(beam[1].re, beam[1].im);
      ctx.moveTo(p0[0], p0[1]);
      ctx.lineTo(p1[0], p1[1]);
    }
    ctx.stroke();
    return;
  }

  if (guide?.frameBounds && guide?.params) {
    const b = guide.frameBounds;
    const midX = (b.left + b.right) * 0.5;
    const midY = (b.bottom + b.top) * 0.5;
    if (guide.params.axis === 'vertical') {
      const hp0 = shearPointForParams(new Cx(b.left, midY), guide.params);
      const hp1 = shearPointForParams(new Cx(b.right, midY), guide.params);
      const h0 = toCanvas(hp0.re, hp0.im);
      const h1 = toCanvas(hp1.re, hp1.im);
      const frameMidX = x + w * 0.5;
      ctx.moveTo(h0[0], h0[1]);
      ctx.lineTo(h1[0], h1[1]);
      ctx.moveTo(frameMidX, y);
      ctx.lineTo(frameMidX, y + h);
    } else {
      const vp0 = shearPointForParams(new Cx(midX, b.bottom), guide.params);
      const vp1 = shearPointForParams(new Cx(midX, b.top), guide.params);
      const v0 = toCanvas(vp0.re, vp0.im);
      const v1 = toCanvas(vp1.re, vp1.im);
      const frameMidY = y + h * 0.5;
      ctx.moveTo(x, frameMidY);
      ctx.lineTo(x + w, frameMidY);
      ctx.moveTo(v0[0], v0[1]);
      ctx.lineTo(v1[0], v1[1]);
    }
    ctx.stroke();
    return;
  }

  const midX = x + w * 0.5;
  const midY = y + h * 0.5;
  ctx.moveTo(x, midY);
  ctx.lineTo(x + w, midY);
  ctx.moveTo(midX, y);
  ctx.lineTo(midX, y + h);
  ctx.stroke();
}

function drawSelectedObjectBounds(anim) {
  if (suppressSelectionOverlays) return;
  const groupCandidate = groupSelectionMode && groupCandidateIds.has(anim.id);
  const isActive = selectedId === anim.id || editModeAnimId === anim.id;
  if (!isActive && !groupCandidate) return;
  const arcSelected = hasActiveArcSelection(anim);
  const frame = selectionFrameMetrics(anim);
  if (!frame) return;

  const dpr = devicePixelRatio;
  const { x, y, w, h, outerX, outerY, outerW, outerH, extend } = frame;

  ctx.save();
  ctx.fillStyle = CANVAS_TOOL_COLOR;
  ctx.globalAlpha = 0.05;
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = CANVAS_TOOL_COLOR;
  ctx.lineWidth = 1.25 * dpr;
  ctx.globalAlpha = 0.48;
  ctx.shadowBlur = 8 * dpr;
  ctx.shadowColor = CANVAS_TOOL_COLOR;
  ctx.strokeRect(x, y, w, h);

  ctx.lineWidth = 0.9 * dpr;
  ctx.globalAlpha = 0.26;
  ctx.strokeRect(outerX, outerY, outerW, outerH);

  ctx.lineWidth = 2 * dpr;
  ctx.globalAlpha = 0.3;
  ctx.strokeRect(outerX - extend, outerY - extend, outerW + extend * 2, outerH + extend * 2);

  if (groupCandidate) {
    ctx.restore();
    return;
  }

  if (!arcSelected) {
    ctx.shadowBlur = 0;
    ctx.lineWidth = 1 * dpr;
    ctx.globalAlpha = 0.32;
    drawSelectionCrossbeams(anim, frame);

    const wheel = selectionRotationWheel(anim);
    const wheelVisible = isRotationModeActiveForAnim(anim) || rotateDrag?.anim === anim;
    const wheelActive = rotateDrag?.anim === anim || rotateHover?.anim === anim;
    if (wheelVisible && wheel && wheel.r > 0) {
      ctx.strokeStyle = wheelActive ? CANVAS_TOOL_COLOR : CANVAS_CONTROL_IDLE_COLOR;
      ctx.lineWidth = (wheelActive ? 2.6 : 1.65) * dpr;
      ctx.globalAlpha = wheelActive ? 0.66 : 0.5;
      ctx.shadowBlur = wheelActive ? 6 * dpr : 0;
      ctx.shadowColor = CANVAS_TOOL_COLOR;
      ctx.beginPath();
      ctx.arc(wheel.cx, wheel.cy, wheel.r, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.shadowBlur = 0;
    ctx.strokeStyle = (resizeDrag?.anim === anim || resizeHover?.anim === anim) ? CANVAS_BUTTON_COLOR : CANVAS_BUTTON_IDLE_COLOR;
    ctx.beginPath();
    for (const seg of selectionResizeSegments(anim)) {
      ctx.moveTo(seg.from[0], seg.from[1]);
      ctx.lineTo(seg.to[0], seg.to[1]);
    }
    ctx.lineWidth = 1.8 * dpr;
    ctx.globalAlpha = (resizeDrag?.anim === anim || resizeHover?.anim === anim) ? 0.62 : 0.52;
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  drawSelectionSideActionButtons(anim);
  ctx.restore();
}

function drawSelectedGroupBounds() {
  if (suppressSelectionOverlays) return;
  if (!isGroupSelectionActive()) return;
  const frame = groupSelectionFrameMetrics(selectedGroupId);
  if (!frame) return;
  const dpr = devicePixelRatio;
  const { x, y, w, h, outerX, outerY, outerW, outerH, extend } = frame;

  ctx.save();
  ctx.fillStyle = CANVAS_TOOL_COLOR;
  ctx.globalAlpha = 0.045;
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = CANVAS_TOOL_COLOR;
  ctx.lineWidth = 1.4 * dpr;
  ctx.globalAlpha = 0.56;
  ctx.shadowBlur = 8 * dpr;
  ctx.shadowColor = CANVAS_TOOL_COLOR;
  ctx.strokeRect(x, y, w, h);

  ctx.shadowBlur = 0;
  ctx.lineWidth = 0.9 * dpr;
  ctx.globalAlpha = 0.3;
  ctx.strokeRect(outerX, outerY, outerW, outerH);

  ctx.lineWidth = 2 * dpr;
  ctx.globalAlpha = 0.34;
  ctx.strokeRect(outerX - extend, outerY - extend, outerW + extend * 2, outerH + extend * 2);

  ctx.lineWidth = 1 * dpr;
  ctx.globalAlpha = 0.32;
  drawSelectionCrossbeams({ selectionGuideShear: groupSelectionGuideShear }, frame);

  const groupWheel = groupSelectionRotationWheel(selectedGroupId);
  const groupWheelVisible = isRotationModeActiveForGroup(selectedGroupId) || rotateDrag?.groupId === selectedGroupId;
  const groupWheelActive = rotateDrag?.groupId === selectedGroupId || rotateHover?.groupId === selectedGroupId;
  if (groupWheelVisible && groupWheel && groupWheel.r > 0) {
    ctx.strokeStyle = groupWheelActive ? CANVAS_TOOL_COLOR : CANVAS_CONTROL_IDLE_COLOR;
    ctx.lineWidth = (groupWheelActive ? 2.6 : 1.65) * dpr;
    ctx.globalAlpha = groupWheelActive ? 0.66 : 0.5;
    ctx.shadowBlur = groupWheelActive ? 6 * dpr : 0;
    ctx.shadowColor = CANVAS_TOOL_COLOR;
    ctx.beginPath();
    ctx.arc(groupWheel.cx, groupWheel.cy, groupWheel.r, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
  ctx.strokeStyle = (resizeDrag?.groupId === selectedGroupId || resizeHover?.groupId === selectedGroupId) ? CANVAS_BUTTON_COLOR : CANVAS_BUTTON_IDLE_COLOR;
  ctx.beginPath();
  for (const seg of groupSelectionResizeSegments(selectedGroupId)) {
    ctx.moveTo(seg.from[0], seg.from[1]);
    ctx.lineTo(seg.to[0], seg.to[1]);
  }
  ctx.lineWidth = 1.8 * dpr;
  ctx.globalAlpha = (resizeDrag?.groupId === selectedGroupId || resizeHover?.groupId === selectedGroupId) ? 0.62 : 0.52;
  ctx.stroke();

  ctx.shadowBlur = 0;
  for (const btn of groupSelectionSideActionButtons(selectedGroupId)) {
    const hovered = sideActionHover?.groupId === selectedGroupId && sideActionHover?.kind === btn.kind;
    const active = hovered || (btn.kind === 'rotate' && isRotationModeActiveForGroup(selectedGroupId));
    drawSelectionSideActionButton(btn, active, hovered);
  }
  ctx.restore();
}

function drawSelectedMultiSelectionBounds() {
  if (suppressSelectionOverlays) return;
  if (!isMultiSelectionActive()) return;
  const frame = multiSelectionFrameMetrics();
  if (!frame) return;
  const dpr = devicePixelRatio;
  const { x, y, w, h, outerX, outerY, outerW, outerH, extend } = frame;

  ctx.save();
  ctx.fillStyle = CANVAS_TOOL_COLOR;
  ctx.globalAlpha = 0.045;
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = CANVAS_TOOL_COLOR;
  ctx.lineWidth = 1.4 * dpr;
  ctx.globalAlpha = 0.56;
  ctx.shadowBlur = 8 * dpr;
  ctx.shadowColor = CANVAS_TOOL_COLOR;
  ctx.strokeRect(x, y, w, h);

  ctx.shadowBlur = 0;
  ctx.lineWidth = 0.9 * dpr;
  ctx.globalAlpha = 0.3;
  ctx.strokeRect(outerX, outerY, outerW, outerH);

  ctx.lineWidth = 2 * dpr;
  ctx.globalAlpha = 0.34;
  ctx.strokeRect(outerX - extend, outerY - extend, outerW + extend * 2, outerH + extend * 2);

  ctx.lineWidth = 1 * dpr;
  ctx.globalAlpha = 0.32;
  drawSelectionCrossbeams({ selectionGuideShear: multiSelectionGuideShear }, frame);

  const multiWheel = multiSelectionRotationWheel();
  const multiWheelVisible = isRotationModeActiveForMultiSelection() || rotateDrag?.multi;
  const multiWheelActive = rotateDrag?.multi || rotateHover?.multi;
  if (multiWheelVisible && multiWheel && multiWheel.r > 0) {
    ctx.strokeStyle = multiWheelActive ? CANVAS_TOOL_COLOR : CANVAS_CONTROL_IDLE_COLOR;
    ctx.lineWidth = (multiWheelActive ? 2.6 : 1.65) * dpr;
    ctx.globalAlpha = multiWheelActive ? 0.66 : 0.5;
    ctx.shadowBlur = multiWheelActive ? 6 * dpr : 0;
    ctx.shadowColor = CANVAS_TOOL_COLOR;
    ctx.beginPath();
    ctx.arc(multiWheel.cx, multiWheel.cy, multiWheel.r, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
  ctx.strokeStyle = (resizeDrag?.multi || resizeHover?.multi) ? CANVAS_BUTTON_COLOR : CANVAS_BUTTON_IDLE_COLOR;
  ctx.beginPath();
  for (const seg of multiSelectionResizeSegments()) {
    ctx.moveTo(seg.from[0], seg.from[1]);
    ctx.lineTo(seg.to[0], seg.to[1]);
  }
  ctx.lineWidth = 1.8 * dpr;
  ctx.globalAlpha = (resizeDrag?.multi || resizeHover?.multi) ? 0.62 : 0.52;
  ctx.stroke();

  ctx.shadowBlur = 0;
  for (const btn of multiSelectionSideActionButtons()) {
    const hovered = sideActionHover?.multi && sideActionHover?.kind === btn.kind;
    const active = hovered || (btn.kind === 'rotate' && isRotationModeActiveForMultiSelection());
    drawSelectionSideActionButton(btn, active, hovered);
  }
  ctx.restore();
}

function drawCommittedAnimation(anim) {
  if (!anim || !isAnimEffectivelyVisible(anim) || anim.inPlacementMode) return;
  const inEditMode = (editModeAnimId === anim.id);

  if (isPrimitiveAnim(anim)) {
    drawPrimitive(anim);
    drawSelectedObjectBounds(anim);
    return;
  }
  if (isTextAnim(anim)) {
    if (canvasTextEditAnimId !== anim.id) drawTextAnim(anim);
    drawSelectedObjectBounds(anim);
    return;
  }
  if (anim.anchors.length === 1 && anim.segments.length === 0) drawDot(anim);
  const activeArc = activeArcIndex(anim);
  const softColor = activeArc !== null ? softenedSelectionColor(anim.color) : null;
  if (canFillAnim(anim)) {
    if (animFillStyle(anim) === 'gradient') {
      drawGradientFill(anim);
    } else if (animFillColor(anim)) {
      const softFill = activeArc !== null && animFillColor(anim)
        ? softenedSelectionColor(animFillColor(anim))
        : null;
      const isClosedFill = !!(anim.closed && findLoopRange(anim));
      drawCurveFill(anim, softFill, activeArc !== null ? 0.55 : 1, isClosedFill ? [] : higherLayerBlockersFor(anim));
    }
  }
  if (activeArc !== null) {
    const thickDim   = Math.max(1, anim.thickness - 2);
    const thickBoost = Math.min(10, anim.thickness + 2);
    for (let i = 0; i < anim.segments.length; i++) {
      if (i !== activeArc) drawSegment(anim, i, softColor, 1, thickDim);
    }
    drawSegment(anim, activeArc, null, 1, thickBoost);
  } else {
    for (let i = 0; i < anim.segments.length; i++) drawSegment(anim, i);
  }
  drawSelectedObjectBounds(anim);
  if (inEditMode) drawHandles(anim);
}

function drawAnimations() {
  drawGrid();
  const dpr = devicePixelRatio;

  // Hover glow under hovered segment
  if (segmentHover && isAnimEffectivelyVisible(segmentHover.anim)) {
    if (isPrimitiveAnim(segmentHover.anim)) {
      drawPrimitive(segmentHover.anim, 8 * dpr, 0.22);
    } else {
      const seg = segmentHover.anim.segments[segmentHover.segIdx];
      if (seg && seg.compiled && activeArcIndex(segmentHover.anim) !== segmentHover.segIdx) {
        const cw = (1 + 5 * (segmentHover.anim.thickness / 10)) * dpr;
        drawCompiledCurve(seg.compiled, segmentHover.anim.color, cw + 8 * dpr, 0.22);
      }
    }
  }


  for (const anim of animations) {
    if (!isAnimEffectivelyVisible(anim) && !anim.inPlacementMode) continue;

    if (anim.inPlacementMode) {
      if (isTextAnim(anim)) {
        if (placementPreviewPos) {
          const preview = { ...anim, anchors: [placementPreviewPos], text: anim.text || 'Text', outlineOpacity: 0, fillColor: anim.color, fillOpacity: 0.7 };
          drawTextAnim(preview);
        }
        continue;
      }
      if (isPolylineAnim(anim)) {
        const cw = (1 + 5 * (anim.thickness / 10)) * dpr;
        drawPolylinePlacement(anim, placementPreviewPos, cw, dpr);
        continue;
      }
      if (isPrimitiveAnim(anim)) {
        drawPrimitivePlacement(anim, placementPreviewPos);
        continue;
      }
      const n = anim.anchors.length;
      const hasPreview = placementPreviewPos && placementPreviewPos.ok();
      const cw = (1 + 5 * (anim.thickness / 10)) * dpr;
      const isExt = anim.extensionAnchorIdx != null;

      if (!isExt) {
        drawFreshFreeformPlacement(anim, placementPreviewPos, cw, dpr);
        continue;
      }

      // Draw all committed arcs and anchor dots
      for (let i = 0; i < anim.segments.length; i++) drawSegment(anim, i);
      for (const anchor of anim.anchors)
        drawAnchorDot(toCanvas(anchor.re, anchor.im), anim.color, 5 * dpr);

      if (hasPreview) {
        const cursor = placementPreviewPos;
        const [hx, hy] = toCanvas(cursor.re, cursor.im);

        if (n === 0) {
          ctx.beginPath(); ctx.arc(hx, hy, 6*dpr, 0, Math.PI*2);
          ctx.strokeStyle = anim.color; ctx.lineWidth = 2*dpr;
          ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;

        } else if (n === 1) {
          const [ax, ay] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
          ctx.save(); ctx.globalAlpha = 0.5; ctx.strokeStyle = anim.color;
          ctx.lineWidth = cw; ctx.setLineDash([4*dpr, 4*dpr]);
          ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(hx, hy); ctx.stroke();
          ctx.setLineDash([]); ctx.restore();
          ctx.beginPath(); ctx.arc(hx, hy, 6*dpr, 0, Math.PI*2);
          ctx.strokeStyle = anim.color; ctx.lineWidth = 2*dpr;
          ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;

        } else if (isExt) {
          // Extension: preview arc from current end anchor to cursor
          const endIdx = anim.extensionForward
            ? anim.extensionInsertAt - 1 : anim.extensionInsertAt;
          if (anim.anchors[endIdx] && anim.tContinuation) {
            const built = buildExtensionSegment(anim, endIdx, cursor);
            const prevSeg = built.seg;
            recompileSegmentRaw(prevSeg, built.start, built.end);
            ctx.save(); ctx.globalAlpha = 0.4; ctx.setLineDash([4*dpr, 4*dpr]);
            drawCompiledCurve(prevSeg.compiled, anim.color, cw, 1);
            ctx.setLineDash([]); ctx.restore();
          }
          ctx.beginPath(); ctx.arc(hx, hy, 6*dpr, 0, Math.PI*2);
          ctx.strokeStyle = anim.color; ctx.lineWidth = 2*dpr;
          ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;

        } else {
          // Fresh placement, n >= 2: pending arc (solid) + preview next arc (dashed)
          const p_prev = anim.anchors[n-2], p_end = anim.anchors[n-1];

          // The pending arc starts as a free end, then smoothly admits the next point.
          const pending = buildPendingPlacementArc(p_prev, p_end, anim.tContinuation, cursor);
          const t_end = pending.tIn;
          const pendSeg = pending.seg;
          recompileSegmentRaw(pendSeg, p_prev, p_end);
          ctx.save(); ctx.globalAlpha = 0.85;
          drawCompiledCurve(pendSeg.compiled, anim.color, cw, 1);
          ctx.restore();

          // Preview arc P_{n-1}→cursor: symmetric (reflect t_end over chord)
          const cd = chordDir(p_end, cursor);
          const dotV = t_end.re*cd.re + t_end.im*cd.im;
          const t_cursor = new Cx(2*dotV*cd.re - t_end.re, 2*dotV*cd.im - t_end.im);
          const f_prev = turnHandleFactor(p_end, cursor, t_cursor);
          const prevSeg = bisectorArc(p_end, cursor, t_end, t_cursor, f_prev);
          recompileSegmentRaw(prevSeg, p_end, cursor);
          ctx.save(); ctx.globalAlpha = 0.4; ctx.setLineDash([4*dpr, 4*dpr]);
          drawCompiledCurve(prevSeg.compiled, anim.color, cw, 1);
          ctx.setLineDash([]); ctx.restore();

          ctx.beginPath(); ctx.arc(hx, hy, 6*dpr, 0, Math.PI*2);
          ctx.strokeStyle = anim.color; ctx.lineWidth = 2*dpr;
          ctx.globalAlpha = 0.8; ctx.stroke(); ctx.globalAlpha = 1;
        }
      }
      continue;
    }

    drawCommittedAnimation(anim);
  }

  drawSelectedGroupBounds();
  drawSelectedMultiSelectionBounds();
  drawPlacementMatchButton();

  // Rubber-band selection rectangle
  if (rubberBand) {
    const dpr = devicePixelRatio;
    const x0 = Math.min(rubberBand.startX, rubberBand.curX);
    const y0 = Math.min(rubberBand.startY, rubberBand.curY);
    const w  = Math.abs(rubberBand.curX - rubberBand.startX);
    const h  = Math.abs(rubberBand.curY - rubberBand.startY);
    if (w > 2 || h > 2) {
      ctx.save();
      ctx.strokeStyle = '#cba6f7'; ctx.lineWidth = 1 * dpr;
      ctx.setLineDash([4*dpr, 4*dpr]); ctx.globalAlpha = 0.7;
      ctx.strokeRect(x0, y0, w, h);
      ctx.fillStyle = '#cba6f7'; ctx.globalAlpha = 0.07;
      ctx.fillRect(x0, y0, w, h);
      ctx.restore();
    }
  }
}  // end drawAnimations


// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — sidebar rendering
// ════════════════════════════════════════════════════════

// Called during anchor/handle drag to keep inputs current
function updateSidebarInputs(anim) {
  const detail = document.querySelector(`[data-anim-id="${anim.id}"]`);
  if (!detail) return;
  anim.anchors.forEach((anchor, i) => {
    detail.querySelectorAll(`[data-anchor-loc="${i}"]`).forEach(el => {
      if (el.tagName === 'INPUT') { if (document.activeElement !== el) el.value = formatCx(anchor); }
      else el.textContent = formatCoordPairHundredths(anchor);
    });
  });
  anim.segments.forEach((seg, i) => {
    if (!seg) return;
    const h0el = detail.querySelector(`[data-seg-h0="${i}"]`);
    const h1el = detail.querySelector(`[data-seg-h1="${i}"]`);
    if (h0el) {
      if (h0el.tagName === 'INPUT') { if (document.activeElement !== h0el) h0el.value = formatCx(seg.h0); }
      else h0el.textContent = formatCoordPairHundredths(seg.h0);
    }
    if (h1el) {

function primitiveDetails(anim) {
  const p0 = anim.anchors[0], p1 = anim.anchors[1];

    return [['Endpoints', `${formatCoordPairHundredths(p0)}, ${formatCoordPairHundredths(p1)}`]];
  }
  if (anim.kind === 'rectangle') {
    const width = Math.abs(p1.re - p0.re);
    const height = Math.abs(p1.im - p0.im);
    return [
      ['Corners', `${formatCoordPairHundredths(p0)}, ${formatCoordPairHundredths(p1)}`],
      ['Size', `${formatNumberHundredths(width)} x ${formatNumberHundredths(height)}`],

      ['Center', formatCoordPairHundredths(p0)],
      ['Radius', formatNumberHundredths(radius)],

      ['Center', formatCoordPairHundredths(p0)],

function circleRadius(anim) {
  const p0 = anim?.anchors?.[0], p1 = anim?.anchors?.[1];

}

function setCircleRadius(anim, radius) {
  const center = anim?.anchors?.[0];
  if (!center || !isFinite(radius) || radius < 0) return false;
  const edge = anim.anchors[1];
  let ux = 1, uy = 0;
  if (edge) {
    const dx = edge.re - center.re;
    const dy = edge.im - center.im;
    const len = Math.hypot(dx, dy);
    if (len > 1e-12) {
      ux = dx / len;
      uy = dy / len;
    }
  }
  anim.kind = 'circle';
  anim.anchors[1] = new Cx(center.re + ux * radius, center.im + uy * radius);
  anim.segments = [];
  return true;
}

function appendCircleRadiusRow(parent, anim) {
  const row = document.createElement('div');
  row.className = 'tree-input-row';
  const label = document.createElement('label');
  label.textContent = 'Radius';
  const input = document.createElement('input');
  input.type = 'number';
  input.min = '0';
  input.step = 'any';
  input.value = formatNumberHundredths(circleRadius(anim));
  let lastCommitted = circleRadius(anim);

  const parseRadius = () => {
    const v = parseFloat(input.value);
    return isFinite(v) && v >= 0 ? v : null;
  };
  const validate = () => {
    const ok = parseRadius() !== null;
    input.classList.toggle('error', !ok);
    return ok;
  };
  const commit = () => {
    const next = parseRadius();
    if (next === null) {
      input.value = formatNumberHundredths(lastCommitted);
      input.classList.remove('error');
      return false;
    }
    input.classList.remove('error');
    if (Math.abs(next - lastCommitted) <= 1e-10) return true;
    pushUndo();
    setCircleRadius(anim, next);
    lastCommitted = next;
    saveProject();
    renderAnimList();
    draw();
    return true;
  };

  input.addEventListener('input', validate);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (validate()) commit();
    } else if (e.key === 'Escape') {
      input.value = formatNumberHundredths(lastCommitted);
      input.classList.remove('error');
      input.blur();
    }
  });
  input.addEventListener('blur', commit);
  row.append(label, input);
  parent.appendChild(row);
}

function sameColor(a, b) {
  return (a || '').toLowerCase() === (b || '').toLowerCase();
}

function parseHexColor(color) {
  const short = /^#?([0-9a-f]{3})$/i.exec(color || '');
  if (short) {
    const hex = short[1].split('').map(ch => ch + ch).join('');
    const n = parseInt(hex, 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }
  const m = /^#?([0-9a-f]{6})$/i.exec(color || '');
  if (!m) return null;
  const n = parseInt(m[1], 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

function rgbToHex(r, g, b) {
  return `#${[r, g, b].map(v => Math.round(clamp(v, 0, 255)).toString(16).padStart(2, '0')).join('')}`;
}

function parseRgbColor(color) {
  const m = /^rgba?\(\s*([0-9.]+)\s*,\s*([0-9.]+)\s*,\s*([0-9.]+)(?:\s*,\s*[0-9.]+)?\s*\)$/i.exec(color || '');
  if (!m) return null;
  return {
    r: clamp(parseFloat(m[1]), 0, 255),
    g: clamp(parseFloat(m[2]), 0, 255),
    b: clamp(parseFloat(m[3]), 0, 255),
  };
}

function parseColorToRgb(color) {
  return parseHexColor(color) || parseRgbColor(color);
}

function normalizeColorString(color) {
  const rgb = parseColorToRgb(color);
  return rgb ? rgbToHex(rgb.r, rgb.g, rgb.b) : null;
}

function hslToRgb(h, s, l) {
  h = ((Number(h) % 360) + 360) % 360;
  s = clamp(Number(s), 0, 100) / 100;
  l = clamp(Number(l), 0, 100) / 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r1 = 0, g1 = 0, b1 = 0;
  if (h < 60) { r1 = c; g1 = x; }
  else if (h < 120) { r1 = x; g1 = c; }
  else if (h < 180) { g1 = c; b1 = x; }
  else if (h < 240) { g1 = x; b1 = c; }
  else if (h < 300) { r1 = x; b1 = c; }
  else { r1 = c; b1 = x; }
  return {
    r: Math.round((r1 + m) * 255),
    g: Math.round((g1 + m) * 255),
    b: Math.round((b1 + m) * 255),
  };
}

function hslToHex(h, s, l) {
  const rgb = hslToRgb(h, s, l);
  return rgbToHex(rgb.r, rgb.g, rgb.b);
}

function rgbToHsl(r, g, b) {
  r = clamp(Number(r), 0, 255) / 255;
  g = clamp(Number(g), 0, 255) / 255;
  b = clamp(Number(b), 0, 255) / 255;
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  const d = max - min;
  let h = 0;
  const l = (max + min) / 2;
  const s = d === 0 ? 0 : d / (1 - Math.abs(2 * l - 1));
  if (d !== 0) {
    if (max === r) h = 60 * (((g - b) / d) % 6);
    else if (max === g) h = 60 * ((b - r) / d + 2);
    else h = 60 * ((r - g) / d + 4);
  }
  if (h < 0) h += 360;
  return { h, s: s * 100, l: l * 100 };
}

function colorToHsl(color, fallbackHue = 0) {
  const rgb = parseColorToRgb(color) || hslToRgb(fallbackHue, 100, 50);
  const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
  if (hsl.s < 0.5) hsl.h = fallbackHue;
  return hsl;
}

function readableTextColorForBackground(color) {
  return colorToHsl(color).l < 55 ? '#f5f7ff' : '#11111b';
}

function huePercentToAngle(percent) {
  const p = clamp(Number(percent), 0, 100);
  if (p >= 100) return 359.999;
  if (p <= 25) return (p / 25) * 60;
  return 60 + ((p - 25) / 75) * 300;
}

function hueAngleToPercent(angle) {
  const hue = ((Number(angle) % 360) + 360) % 360;
  if (hue <= 60) return (hue / 60) * 25;
  return 25 + ((hue - 60) / 300) * 75;
}

function huePercentDistance(a, b) {
  const diff = Math.abs(clamp(Number(a), 0, 100) - clamp(Number(b), 0, 100));
  return Math.min(diff, 100 - diff);
}

function formatPercentPrecise(value) {
  return `${Math.round(Number(value))}%`;
}

function setRangeTrack(slider, track) {
  if (!slider) return;
  slider.classList.add('color-range-slider');
  slider.style.setProperty('--range-track', track);
}

function huePercentToWheelAngle(percent) {
  return (huePercentToAngle(percent) - 90) * Math.PI / 180;
}

function wheelPointToHuePercent(canvas, clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + rect.width * 0.5;
  const cy = rect.top + rect.height * 0.5;
  const angle = Math.atan2(clientY - cy, clientX - cx);
  const hue = ((angle * 180 / Math.PI + 90) % 360 + 360) % 360;
  return Math.round(hueAngleToPercent(hue));
}

function drawHueWheel(canvas, huePercent) {
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const cssSize = Math.max(1, Math.round(rect.width || 132));
  const dpr = window.devicePixelRatio || 1;
  const size = Math.round(cssSize * dpr);
  if (canvas.width !== size || canvas.height !== size) {
    canvas.width = size;
    canvas.height = size;
  }
  const c = canvas.getContext('2d');
  c.clearRect(0, 0, size, size);
  const cx = size * 0.5;
  const cy = size * 0.5;
  const outerR = size * 0.46;
  const innerR = outerR * 0.5;
  c.save();
  const gradient = c.createConicGradient(-Math.PI / 2, cx, cy);
  for (let h = 0; h <= 360; h += 6) gradient.addColorStop(h / 360, `hsl(${h},100%,50%)`);
  c.fillStyle = gradient;
  c.beginPath();
  c.arc(cx, cy, outerR, 0, Math.PI * 2, false);
  c.arc(cx, cy, innerR, 0, Math.PI * 2, true);
  c.fill();
  c.restore();

  c.save();
  c.strokeStyle = 'rgba(17,17,27,0.72)';
  c.lineWidth = 1.3 * dpr;
  c.beginPath();
  c.arc(cx, cy, outerR, 0, Math.PI * 2);
  c.stroke();
  c.beginPath();
  c.arc(cx, cy, innerR, 0, Math.PI * 2);
  c.stroke();
  c.restore();

  const markerAngle = huePercentToWheelAngle(huePercent);
  const markerR = (outerR + innerR) * 0.5;
  const mx = cx + Math.cos(markerAngle) * markerR;
  const my = cy + Math.sin(markerAngle) * markerR;
  c.save();
  c.fillStyle = hslToHex(huePercentToAngle(huePercent), 100, 50);
  c.strokeStyle = '#11111b';
  c.lineWidth = 3 * dpr;
  c.beginPath();
  c.arc(mx, my, 7 * dpr, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  c.strokeStyle = '#f5f7ff';
  c.lineWidth = 1.5 * dpr;
  c.beginPath();
  c.arc(mx, my, 7 * dpr, 0, Math.PI * 2);
  c.stroke();
  c.restore();
}

function lightnessSliderTrack(hue, saturation) {
  const h = Math.round(((Number(hue) % 360) + 360) % 360);
  const s = Math.round(clamp(Number(saturation), 0, 100));
  return `linear-gradient(90deg, hsl(${h}, ${s}%, 0%), hsl(${h}, ${s}%, 25%), hsl(${h}, ${s}%, 50%), hsl(${h}, ${s}%, 75%), hsl(${h}, ${s}%, 100%))`;
}

function saturationSliderTrack(hue, lightness) {
  const h = Math.round(((Number(hue) % 360) + 360) % 360);
  const l = Math.round(clamp(Number(lightness), 0, 100));
  return `linear-gradient(90deg, hsl(${h}, 0%, ${l}%), hsl(${h}, 100%, ${l}%))`;
}

function opacitySliderTrack(color) {
  const rgb = parseColorToRgb(color) || { r: 203, g: 166, b: 247 };
  const r = Math.round(rgb.r), g = Math.round(rgb.g), b = Math.round(rgb.b);
  return `linear-gradient(90deg, rgba(${r}, ${g}, ${b}, 0), rgba(${r}, ${g}, ${b}, 1)), repeating-conic-gradient(#313244 0% 25%, #11111b 0% 50%) 0 0 / 10px 10px`;
}

function mixHexColor(a, b, t = 0.5) {
  const ca = parseHexColor(a);
  const cb = parseHexColor(b);
  if (!ca || !cb) return a || b || CANVAS_CONTROL_IDLE_COLOR;
  const r = Math.round(ca.r + (cb.r - ca.r) * t);
  const g = Math.round(ca.g + (cb.g - ca.g) * t);
  const bl = Math.round(ca.b + (cb.b - ca.b) * t);
  return `#${[r, g, bl].map(v => v.toString(16).padStart(2, '0')).join('')}`;
}

function softenedSelectionColor(color) {
  return mixHexColor(color, '#000000', 0.5);

  valSpan.textContent = formatValue(slider.value);

function appendHslColorPicker(parent, activeColor, onChange, options = {}) {

  const initialColor = normalizeColorString(activeColor) || hslToHex(fallbackHue, 100, 50);
  const hsl = colorToHsl(initialColor, fallbackHue);
  const state = {
    huePercent: Math.round(hueAngleToPercent(hsl.h)),
    saturation: Math.round(clamp(hsl.s, 0, 100)),
    lightness: Math.round(clamp(hsl.l, 0, 100)),
