<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graphing Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      font-family: sans-serif;
      background: #0c0c16;
      color: #cdd6f4;
      padding: 10px;
      gap: 10px;
      box-sizing: border-box;
    }

    /* ── Corner fold ── */
    #corner-fold {
      position: fixed;
      top: 0; left: 0;
      width: 44px; height: 44px;
      cursor: pointer;
      z-index: 300;
    }
    #corner-fold::before {
      content: '';
      display: block;
      width: 0; height: 0;
      border-top: 44px solid #3c3c58;
      border-right: 44px solid transparent;
      transition: border-top-color 0.2s;
    }
    #corner-fold:hover::before  { border-top-color: #5a5a80; }
    #corner-fold.graphs-mode::before { border-top-color: #4a2e68; }
    #corner-fold:hover.graphs-mode::before { border-top-color: #7a50a8; }

    /* ── Fold tooltip ── */
    #fold-tooltip {
      position: fixed;
      top: 48px; left: 4px;
      background: #313244;
      color: #cdd6f4;
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      z-index: 400;
      border: 1px solid #45475a;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #181825;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #313244;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }

    /* ── Animations panel ── */
    #animations-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      padding-top: 44px;
    }

    #anim-list {
      flex: 1; overflow-y: auto;
      padding: 8px;
      display: flex; flex-direction: column;
      gap: 5px; min-height: 0;
    }

    /* ── Object tiles ── */
    /* Sidebar scrollbars */
    #anim-list,
    #object-detail,
    #function-list {
      scrollbar-width: thin;
      scrollbar-color: #585b70 #181825;
    }
    #anim-list::-webkit-scrollbar,
    #object-detail::-webkit-scrollbar,
    #function-list::-webkit-scrollbar {
      width: 10px;
    }
    #anim-list::-webkit-scrollbar-track,
    #object-detail::-webkit-scrollbar-track,
    #function-list::-webkit-scrollbar-track {
      background: #181825;
      border-left: 1px solid #313244;
    }
    #anim-list::-webkit-scrollbar-thumb,
    #object-detail::-webkit-scrollbar-thumb,
    #function-list::-webkit-scrollbar-thumb {
      background: #45475a;
      border: 2px solid #181825;
      border-radius: 6px;
    }
    #anim-list::-webkit-scrollbar-thumb:hover,
    #object-detail::-webkit-scrollbar-thumb:hover,
    #function-list::-webkit-scrollbar-thumb:hover {
      background: #6c7086;
    }
    #anim-list::-webkit-scrollbar-thumb:active,
    #object-detail::-webkit-scrollbar-thumb:active,
    #function-list::-webkit-scrollbar-thumb:active {
      background: #89b4fa;
    }

    /* Object tiles */
    #object-tiles-wrapper {
      flex-shrink: 0;
      height: 92px;
      margin: 0 0 8px;
      border: 2px solid #6c7086;
      border-radius: 8px;
      background: #11111b;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: opacity 0.15s ease;
    }
    #object-tiles-wrapper::before,
    #object-tiles-wrapper::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 28px;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.16s ease;
    }
    #object-tiles-wrapper::before {
      left: 0;
      background: linear-gradient(90deg, #11111b 0%, rgba(17, 17, 27, 0) 100%);
    }
    #object-tiles-wrapper::after {
      right: 0;
      background: linear-gradient(270deg, #11111b 0%, rgba(17, 17, 27, 0) 100%);
    }
    #object-tiles-wrapper.can-scroll-left::before,
    #object-tiles-wrapper.can-scroll-right::after {
      opacity: 1;
    }
    #object-tiles {
      flex-shrink: 0;
      height: 100%;
      padding: 7px 14px 9px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: #45475a #11111b;
      position: relative;
      isolation: isolate;
    }
    #object-tiles::-webkit-scrollbar { height: 8px; }
    #object-tiles::-webkit-scrollbar-track { background: #11111b; }
    #object-tiles::-webkit-scrollbar-thumb {
      background: #45475a;
      border: 2px solid #11111b;
      border-radius: 999px;
    }
    #object-tiles::-webkit-scrollbar-thumb:hover { background: #6c7086; }
    #group-objects-btn {
      margin: 0 8px 7px;
      min-height: 30px;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      cursor: pointer;
      font-size: 0.74rem;
      line-height: 1.2;
      padding: 6px 9px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    #group-objects-btn:hover:not(:disabled) {
      background: #45475a;
      border-color: #89b4fa;
    }
    #group-objects-btn.is-ready {
      border-color: #89b4fa;
      color: #f5f7ff;
    }
    #group-objects-btn.is-ungroup {
      border-color: #f38ba8;
    }
    #group-objects-btn:disabled {
      cursor: default;
      opacity: 0.72;
    }
    .group-objects-btn-inner {
      display: block;
      width: calc(100% - 16px);
      margin: 4px 8px 8px;
      min-height: 28px;
      border: 1px solid #6c7086;
      border-radius: 6px;
      background: #313244;
      color: #a6adc8;
      cursor: pointer;
      font-size: 0.74rem;
      line-height: 1.2;
      padding: 5px 9px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .group-objects-btn-inner:hover {
      background: #45475a;
      border-color: #f38ba8;
      color: #cdd6f4;
    }
    #tiles-more-above {
      flex-shrink: 0;
      text-align: center;
      font-size: 0.75rem;
      color: #585b70;
      padding: 3px 0;
      display: none;
      user-select: none;
      border-bottom: 1px solid #313244;
    }
    #tiles-more {
      flex-shrink: 0;
      text-align: center;
      font-size: 0.75rem;
      color: #585b70;
      padding: 3px 0;
      display: none;
      user-select: none;
      border-top: 1px solid #313244;
    }
    .obj-tile-wrap {
      display: block;
      position: relative;
      z-index: 2;
      border-radius: 7px;
      user-select: none;
      flex: 0 0 auto;
    }
    .obj-tile-wrap[draggable="true"] .obj-tile { cursor: grab; }
    .obj-tile-wrap.dragging {
      opacity: 0.45;
    }
    .obj-tile-wrap.dragging .obj-tile { cursor: grabbing; }
    .obj-tile-wrap.drop-before::before,
    .obj-tile-wrap.drop-after::after {
      content: '';
      position: absolute;
      top: 4px;
      bottom: 4px;
      width: 3px;
      border-radius: 999px;
      background: #89b4fa;
      box-shadow: 0 0 8px rgba(137, 180, 250, 0.75);
      pointer-events: none;
      z-index: 6;
    }
    .obj-tile-wrap.drop-before::before { left: -4px; }
    .obj-tile-wrap.drop-after::after { right: -4px; }
    .obj-group-backdrop {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      border: 1px solid rgba(137, 180, 250, 0.34);
      border-radius: 8px;
      background: rgba(49, 50, 68, 0.62);
      box-shadow: inset 0 0 0 1px rgba(24, 24, 37, 0.62);
    }
    .obj-group-backdrop.selected {
      border-color: rgba(245, 247, 255, 0.78);
      background: rgba(69, 71, 90, 0.76);
      box-shadow: 0 0 0 1px rgba(137, 180, 250, 0.38), 0 0 10px rgba(137, 180, 250, 0.18);
    }
    .obj-group-backdrop.candidate {
      border-color: rgba(203, 166, 247, 0.78);
      background: rgba(69, 71, 90, 0.72);
      box-shadow: 0 0 0 1px rgba(203, 166, 247, 0.35);
    }
    .obj-tile-wrap.group-candidate .obj-tile {
      border-color: #cba6f7;
      box-shadow: 0 0 0 2px rgba(203, 166, 247, 0.6);
    }
    .obj-tile-wrap.group-selected .obj-tile {
      border-color: #cdd6f4;
      box-shadow: 0 0 0 1px rgba(205, 214, 244, 0.28);
    }
    .obj-tile-label {
      position: absolute;
      top: 3px;
      left: 4px;
      z-index: 3;
      font-family: monospace;
      font-size: 0.58rem;
      font-weight: 600;
      color: rgba(205, 214, 244, 0.58);
      line-height: 1;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.75);
    }
    .obj-tile {
      width: 72px; height: 72px;
      box-sizing: border-box;
      border-radius: 6px;
      border: 1.5px solid #45475a;
      background: #1e1e2e;
      cursor: pointer;
      padding: 0; overflow: hidden; display: block;
      position: relative;
      transition: border-color 0.12s, background 0.12s;
    }
    .obj-tile:hover { border-color: #6c7086; }
    .obj-tile.selected {
      border-color: #cdd6f4;
      border-width: 2px;
      box-shadow: 0 0 0 1px rgba(205, 214, 244, 0.22);
    }
    .obj-tile.obj-tile-hidden { opacity: 0.45; }
    .obj-tile canvas { display: block; width: 100%; height: 100%; }
    .obj-tray-partition {
      flex: 0 0 2px;
      align-self: stretch;
      width: 2px;
      margin: 4px 3px;
      background: #6c7086;
      border-radius: 999px;
    }
    #object-tiles.line-tool-options-host {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 7px;
      overflow: hidden;
    }
    .line-tool-mode-btn {
      width: 58px;
      height: 50px;
      border-radius: 6px;
      border: 1.5px solid #45475a;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .line-tool-mode-btn:hover {
      border-color: #89b4fa;
      background: #313244;
      color: #f5f7ff;
    }
    .line-tool-mode-btn.active {
      border-color: #89b4fa;
      background: #313244;
      color: #f5f7ff;
      box-shadow: 0 0 0 1px rgba(137, 180, 250, 0.32), 0 0 10px rgba(137, 180, 250, 0.18);
    }
    .line-tool-mode-btn svg {
      width: 46px;
      height: 34px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .line-tool-mode-btn svg circle {
      fill: currentColor;
      stroke: none;
    }

    /* ── Object detail panel ── */
    #object-detail {
      flex: 0 1 auto; overflow-y: auto; min-height: 0;
      margin: 6px 8px;
      border: 2px solid #6c7086;
      border-radius: 6px;
      transition: opacity 0.15s ease;
    }
    .detail-header {
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 5px; padding: 7px 7px 7px 10px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    .detail-header-left { display: flex; align-items: center; gap: 6px; }
    .detail-header-right { display: flex; align-items: center; gap: 5px; }
    .detail-header-right .anim-color-btn { margin-right: 3px; }
    .detail-thumb {
      width: 30px; height: 30px;
      padding: 0; overflow: hidden; display: block; flex-shrink: 0;
    }
    .detail-thumb canvas { display: block; width: 100%; height: 100%; }
    .detail-num {
      font-family: monospace; font-size: 1.1rem; font-weight: 600;
      color: #cdd6f4; min-width: 18px; flex-shrink: 0;
    }
    .detail-thickness {
      flex: 1; min-width: 0; display: flex; align-items: center;
    }
    .detail-thickness input[type="range"] { width: 100%; }

    .detail-group-tiles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
    }
    .detail-group-tile {
      width: 64px; height: 64px;
      box-sizing: border-box;
      border-radius: 6px;
      border: 2px solid #45475a;
      background: #1e1e2e;
      cursor: pointer;
      overflow: hidden;
      padding: 0;
      display: block;
      flex-shrink: 0;
    }
    .detail-group-tile canvas { display: block; width: 100%; height: 100%; }
    .detail-group-tile:hover { border-color: #585b70; }
    .detail-group-tile.selected { border-color: #cdd6f4; border-width: 2px; }
    .group-name-placeholder { color: #a6adc8; font-weight: 600; }
    #tiles-breadcrumb {
      display: none;
      align-items: center;
      gap: 2px;
      padding: 3px 6px 2px;
      font-size: 0.70rem;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #tiles-breadcrumb button {
      background: none; border: none; padding: 2px 5px;
      border-radius: 4px; color: #a6adc8; font-size: 0.70rem;
      cursor: pointer; line-height: 1.4;
    }
    #tiles-breadcrumb button:hover { background: #313244; color: #cdd6f4; }
    .tiles-breadcrumb-sep { color: #45475a; padding: 0 1px; }
    .obj-group-mosaic-tile { position: relative; }
    .obj-group-mosaic-icon {
      position: absolute; bottom: 2px; right: 2px;
      font-size: 8px; line-height: 1; color: rgba(137,180,250,0.7);
      pointer-events: none;
    }

    /* ── Arc list ── */
    .arc-list {
      padding: 5px 6px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .arc-list-item {
      border-radius: 5px;
      border: 1px solid #313244;
      overflow: hidden;
    }
    .arc-list-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 8px; cursor: pointer;
      font-size: 0.75rem; color: #9399b2; user-select: none;
      transition: background 0.1s;
    }
    .arc-list-header:hover { background: #252537; }
    .arc-list-header.arc-expanded { color: #cdd6f4; }
    .arc-detail-body {
      padding: 5px 8px 8px;
      border-top: 1px solid #313244;
      display: flex; flex-direction: column; gap: 3px;
    }
    .arc-coord-row {
      display: flex; align-items: baseline; gap: 6px;
      font-size: 0.72rem;
    }
    .arc-coord-label { color: #6c7086; min-width: 130px; flex-shrink: 0; }
    .arc-coord-val { color: #cdd6f4; font-family: monospace; font-size: 0.7rem; }

    /* ── Anchor rows (interleaved list) ── */
    .anchor-list-item {
      border-radius: 4px;
      border: 1px solid #252537;
      overflow: hidden;
    }
    .anchor-list-header {
      display: flex; align-items: center;
      padding: 3px 8px; cursor: default;
      font-size: 0.72rem; color: #6c7086; user-select: none;
      gap: 6px;
    }
    .anchor-list-header:hover { background: #1e1e2e; }
    .anchor-list-header.anchor-active { color: #cdd6f4; }
    .anchor-label { flex: 0 0 auto; font-family: monospace; min-width: 32px; }
    .anchor-coords { flex: 1; font-size: 0.68rem; color: #585b70; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .anchor-split-btn, .arc-split-btn {
      flex-shrink: 0; background: none; border: 1px solid #45475a;
      color: #6c7086; border-radius: 3px; padding: 1px 5px;
      font-size: 0.65rem; cursor: pointer; line-height: 1.4;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }
    .anchor-split-btn:hover, .arc-split-btn:hover { color: #cdd6f4; border-color: #89b4fa; background: #252537; }
    .arc-match-btn { color: #89dceb; border-color: #89dceb55; }
    .arc-match-btn:hover { color: #cdd6f4; border-color: #89dceb; background: #1e3040; }
    .arc-split-btn.split-active { color: #cba6f7; border-color: #cba6f7; background: #252537; }
    .arc-gradient-from-btn { color: #cba6f7; border-color: #cba6f755; }
    .arc-gradient-from-btn.active { background: #2a1e40; border-color: #cba6f7; }
    .arc-gradient-from-btn:hover { color: #cdd6f4; border-color: #cba6f7; background: #2a1e40; }
    .arc-gradient-to-btn { color: #f38ba8; border-color: #f38ba855; }
    .arc-gradient-to-btn.active { background: #401e27; border-color: #f38ba8; }
    .arc-gradient-to-btn:hover { color: #cdd6f4; border-color: #f38ba8; background: #401e27; }

    #anim-tool-panel {
      margin: 0 8px 6px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(5, 40px);
      justify-content: center;
      gap: 8px;
      border: 2px solid #6c7086;
      border-radius: 8px;
      background: #1e1e2e;
      box-shadow: inset 0 1px 0 rgba(205,214,244,0.06), 0 0 0 1px rgba(0,0,0,0.28);
      flex-shrink: 0;
    }
    .tool-btn {
      height: 34px;
      width: 40px;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .tool-btn svg {
      width: 26px;
      height: 26px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tool-text-icon {
      font-family: Georgia, serif;
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1;
    }
    .tool-btn:hover { background: #45475a; border-color: #89b4fa; }
    .tool-btn.active {
      background: #cba6f7;
      border-color: #cba6f7;
      color: #181825;
      box-shadow: 0 0 0 1px rgba(203,166,247,0.28);
    }
    .tool-btn:focus-visible {
      outline: 2px solid #89b4fa;
      outline-offset: 2px;
    }

    /* ── Animation rows ── */
    .anim-row {
      border: 1px solid #313244;
      border-radius: 8px;
      position: relative;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, margin-bottom 0.25s ease;
      background: #1e1e2e;
    }
    .anim-row.selected { border-color: #cba6f7; background: #1e1e30; }
    .anim-row.in-edit { border-color: #89b4fa; background: #1e2030; }
    .anim-row.is-hidden { background: #191927; }

    .anim-header {
      display: flex; align-items: center;
      gap: 8px; padding: 7px 7px 7px 14px; cursor: pointer;
      min-height: 42px;
    }
    .anim-label {
      flex: 1; min-width: 0;
      display: flex; align-items: center; gap: 8px;
      font-family: monospace; font-size: 0.82rem;
      color: #cdd6f4; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .anim-letter {
      min-width: 22px;
      flex-shrink: 0;
      font-weight: 600;
      font-size: 1.32rem;
      line-height: 1;
    }
    .anim-kind-icon {
      width: 25px;
      height: 25px;
      flex-shrink: 0;
      color: #bac2de;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .anim-row.in-edit .anim-kind-icon { color: #cdd6f4; }
    .anim-row.is-hidden .anim-kind-icon,
    .anim-row.is-hidden .anim-letter {
      opacity: 0.45;
    }

    .anim-actions {
      display: grid;
      grid-template-columns: repeat(3, 30px);
      align-items: center;
      justify-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .anim-color-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #cdd6f4;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transform: translateX(-2px);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.45);
    }
    .anim-row.is-hidden .anim-color-btn {
      opacity: 0.34;
      border-color: #6c7086;
    }
    .anim-icon-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: #a6adc8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .anim-icon-btn:hover {
      background: #313244;
      color: #cdd6f4;
    }
    .anim-icon-btn svg {
      width: 26px;
      height: 26px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .anim-vis-btn svg {
      width: 28px;
      height: 28px;
    }
    .anim-vis-btn.is-hidden {
      color: #f38ba8;
    }

    /* ── Delete button ── */
    .anim-delete-btn {
      font-size: 1.78rem;
      font-weight: 700;
      line-height: 1;

      -webkit-appearance: none;

    /* ── Graphs panel ── */

    #object-recenter-btn svg, #isolation-recenter-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    /* ── Canvas ── */

<script>
// ════════════════════════════════════════════════════════
// SHARED
// ════════════════════════════════════════════════════════

let canvas = document.getElementById('graph');
let ctx = canvas.getContext('2d');

let originX = 0, originY = 0;
let scale = 60;
const TEXT_BASE_SCALE = 60;
let dragging = false, dragStartX, dragStartY, dragOriginX, dragOriginY;
let currentMode = 'animations';
let mouseDownClientX = 0, mouseDownClientY = 0;
const AUX_WINDOWS_ENABLED = false;
document.documentElement.classList.toggle('aux-windows-disabled', !AUX_WINDOWS_ENABLED);

// ── Object window (second canvas) ──
const objCanvas = document.getElementById('object-canvas');
const objCtx = objCanvas.getContext('2d');
let objOriginX = 0, objOriginY = 0, objScale = 60;
let objDragging = false, objDragStartX, objDragStartY, objDragOriginX, objDragOriginY;
let splitDragging = false, splitDragStartX = 0, splitDragStartWidth = 0, splitDragDrawPending = false;
let suppressExpensiveFills = false;
let suppressBlockersInFill = false;
let isObjViewport = false;

// ── Isolation window (third canvas) ──
const isolCanvas = document.getElementById('isolation-canvas');
const isolCtx = isolCanvas.getContext('2d');
let isolOriginX = 0, isolOriginY = 0, isolScale = 60;
let isolDragging = false, isolDragStartX, isolDragStartY, isolDragOriginX, isolDragOriginY;
let hSplitDragging = false, hSplitDragStartY = 0, hSplitDragStartHeight = 0;
let isIsolViewport = false;
let isolationAnimIds = new Set();

// Temporarily swap canvas, ctx, and transform to the object window so all
// drawing helpers (drawGrid, toCanvas, etc.) render into the correct target.
function withObjViewport(fn) {
  const [sC, sCt, sX, sY, sSc] = [canvas, ctx, originX, originY, scale];
  canvas = objCanvas; ctx = objCtx; originX = objOriginX; originY = objOriginY; scale = objScale;
  isObjViewport = true;
  try { return fn(); }
  finally { canvas = sC; ctx = sCt; originX = sX; originY = sY; scale = sSc; isObjViewport = false; }
}

function withIsolViewport(fn) {
  const [sC, sCt, sX, sY, sSc, sObj, sIsol] = [canvas, ctx, originX, originY, scale, isObjViewport, isIsolViewport];
  canvas = isolCanvas; ctx = isolCtx; originX = isolOriginX; originY = isolOriginY; scale = isolScale;
  isObjViewport = false; isIsolViewport = true;
  try { return fn(); }
  finally { canvas = sC; ctx = sCt; originX = sX; originY = sY; scale = sSc; isObjViewport = sObj; isIsolViewport = sIsol; }
}

const CANVAS_TOOL_COLOR = '#e1e8ff';
const CANVAS_CONTROL_IDLE_COLOR = '#f2f4fb';
const CANVAS_BUTTON_COLOR = '#f8faff';
const CANVAS_BUTTON_IDLE_COLOR = '#fcfdff';

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

const GLOBAL_SETTINGS_KEY = 'animatorGlobalSettings.v1';
const PROJECT_KEY = 'animatorProject.v1';
const PROJECT_FILL_STYLE_VERSION = 2;
const SNAP_STRENGTH_VALUES = [0, 1, 2, 5, 10, 20, 50, 100];
const LINE_TOOL_MODE_POLYLINE = 'polyline';
const LINE_TOOL_MODE_SEGMENTS = 'segments';
const LINE_TOOL_MODE_CURVES = 'curves';
const LINE_TOOL_MODES = new Set([LINE_TOOL_MODE_POLYLINE, LINE_TOOL_MODE_SEGMENTS, LINE_TOOL_MODE_CURVES]);
const DEFAULT_GLOBAL_SETTINGS = {
  defaultThickness: 4,
  defaultColor: null,
  gridStrength: 50,
  axisStrength: 50,
  snapStrength: 10,
  lineToolMode: LINE_TOOL_MODE_POLYLINE,
};

function nearestSnapStrength(v) {
  return SNAP_STRENGTH_VALUES.reduce((best, cand) =>
    Math.abs(cand - v) < Math.abs(best - v) ? cand : best,
    SNAP_STRENGTH_VALUES[0]
  );
}

function snapStrengthIndex(v) {
  return Math.max(0, SNAP_STRENGTH_VALUES.indexOf(nearestSnapStrength(v)));
}

function normalizeGlobalSettings(raw = {}) {
  const rawSnapStrength = raw.snapToGrid === false
    ? 0
    : raw.snapStrength ?? DEFAULT_GLOBAL_SETTINGS.snapStrength;
  return {
    defaultThickness: Math.round(clamp(Number(raw.defaultThickness ?? DEFAULT_GLOBAL_SETTINGS.defaultThickness), 1, 10)),
    defaultColor: normalizeColorString(raw.defaultColor),
    gridStrength: Math.round(clamp(Number(raw.gridStrength ?? DEFAULT_GLOBAL_SETTINGS.gridStrength), 0, 100) / 5) * 5,
    axisStrength: Math.round(clamp(Number(raw.axisStrength ?? DEFAULT_GLOBAL_SETTINGS.axisStrength), 0, 100) / 5) * 5,
    snapStrength: nearestSnapStrength(Number(rawSnapStrength)),
    lineToolMode: LINE_TOOL_MODES.has(raw.lineToolMode) ? raw.lineToolMode : DEFAULT_GLOBAL_SETTINGS.lineToolMode,
  };
}

function loadGlobalSettings() {
  try {
    const saved = localStorage.getItem(GLOBAL_SETTINGS_KEY);
    return normalizeGlobalSettings(saved ? JSON.parse(saved) : DEFAULT_GLOBAL_SETTINGS);
  } catch {
    return normalizeGlobalSettings(DEFAULT_GLOBAL_SETTINGS);
  }
}

function saveGlobalSettings() {
  try { localStorage.setItem(GLOBAL_SETTINGS_KEY, JSON.stringify(globalSettings)); } catch {}
}

function saveProject() {
  try {
    localStorage.setItem(PROJECT_KEY, JSON.stringify({
      animations: snapshotAnimations(),
      groups: snapshotGroups(),
      groupNameCounter,
      viewport: { originX, originY, scale },
      animColorIdx,
      fillStyleVersion: PROJECT_FILL_STYLE_VERSION,
    }));
  } catch {}
}

function loadProject() {
  try {
    const saved = localStorage.getItem(PROJECT_KEY);
    if (!saved) return false;
    const { animations: snap, groups: savedGroups, groupNameCounter: savedCounter, viewport, animColorIdx: ci, fillStyleVersion } = JSON.parse(saved);
    if (viewport) {
      if (typeof viewport.originX === 'number') originX = viewport.originX;
      if (typeof viewport.originY === 'number') originY = viewport.originY;
      if (typeof viewport.scale === 'number') scale = viewport.scale;
    }
    if (typeof ci === 'number') animColorIdx = ci;
    if (snap) {
      const legacyRadialIsCircular = !fillStyleVersion || fillStyleVersion < PROJECT_FILL_STYLE_VERSION;
      const state = {
        anims: normalizeProjectSnapshotFillStyles(snap, legacyRadialIsCircular),
        groups: savedGroups ?? [],
        groupNameCounter: savedCounter ?? 0,
      };
      restoreSnapshot(state);
      if (legacyRadialIsCircular) setTimeout(saveProject, 0);
    }
    return true;
  } catch {
    return false;
  }
}

function anchorLabel(anim, idx) {
  return (anim.anchorLabels && anim.anchorLabels[idx]) ? anim.anchorLabels[idx] : 'P' + idx;
}

function splitSegmentAtT(anim, segIdx, t) {
  const seg = anim.segments[segIdx];
  if (!seg) return;
  const A0 = anim.anchors[segIdx], A1 = anim.anchors[segIdx + 1];
  const H0 = seg.h0, H1 = seg.h1;
  const lerp = (a, b, u) => new Cx(a.re + (b.re - a.re) * u, a.im + (b.im - a.im) * u);
  const P  = lerp(A0, H0, t), Q  = lerp(H0, H1, t), R  = lerp(H1, A1, t);
  const S  = lerp(P,  Q,  t), T_ = lerp(Q,  R,  t);
  const U  = lerp(S,  T_, t);
  anim.anchors.splice(segIdx + 1, 0, U);
  const leftSeg  = { h0: P,  h1: S,  eccentricity: seg.eccentricity, visible: seg.visible ?? true, compiled: null, compiledRef: null };
  const rightSeg = { h0: T_, h1: R,  eccentricity: seg.eccentricity, visible: seg.visible ?? true, compiled: null, compiledRef: null };
  anim.segments.splice(segIdx, 1, leftSeg, rightSeg);
  if (!anim.anchorLocked) anim.anchorLocked = [];
  anim.anchorLocked.splice(segIdx + 1, 0, true);
  if (!anim.anchorLabels) anim.anchorLabels = [];
  anim.anchorLabels.splice(segIdx + 1, 0, null);
  anim.activeSegments = new Set();
  anim.expandedArcs = new Set();
  anim.expandedAnchors = new Set([segIdx + 1]);
  recompileAnim(anim);
}

function splitAnchorPoint(anim, anchorIdx) {
  const prevSeg = anchorIdx > 0 ? anim.segments[anchorIdx - 1] : null;
  const nextSeg = anchorIdx < anim.segments.length ? anim.segments[anchorIdx] : null;
  if (!prevSeg && !nextSeg) return;
  const label = anchorLabel(anim, anchorIdx);
  const pos = anim.anchors[anchorIdx];
  anim.anchors.splice(anchorIdx + 1, 0, new Cx(pos.re, pos.im));
  anim.segments.splice(anchorIdx, 0, null);
  if (!anim.anchorLocked) anim.anchorLocked = [];
  anim.anchorLocked.splice(anchorIdx + 1, 0, true);
  if (!anim.anchorLabels) anim.anchorLabels = [];
  anim.anchorLabels[anchorIdx] = label + '⁻';
  anim.anchorLabels.splice(anchorIdx + 1, 0, label + '⁺');
  anim.activeSegments = new Set();
  anim.expandedArcs = new Set();
  anim.expandedAnchors = new Set([anchorIdx]);
  recompileAnim(anim);
}

let globalSettings = loadGlobalSettings();

function currentLineToolMode() {
  return LINE_TOOL_MODES.has(globalSettings.lineToolMode)
    ? globalSettings.lineToolMode
    : LINE_TOOL_MODE_POLYLINE;
}

function setLineToolMode(mode) {
  if (!LINE_TOOL_MODES.has(mode)) return;
  globalSettings.lineToolMode = mode;
  saveGlobalSettings();
  renderAnimList();
  draw();
  updateCursor();
}

function colorFromStrength(strength, base, max) {
  const pct = clamp(strength, 0, 100);
  if (pct <= 0) return 'rgba(0,0,0,0)';
  if (pct <= 50) {
    const a = pct / 50;
    return `rgba(${base[0]},${base[1]},${base[2]},${a.toFixed(3)})`;
  }
  const t = (pct - 50) / 50;
  const r = Math.round(base[0] + (max[0] - base[0]) * t);
  const g = Math.round(base[1] + (max[1] - base[1]) * t);
  const b = Math.round(base[2] + (max[2] - base[2]) * t);
  return `rgb(${r},${g},${b})`;
}

function gridStrokeColor() {
  return colorFromStrength(globalSettings.gridStrength, [49, 50, 68], [69, 71, 90]);
}

function axisStrokeColor() {
  return colorFromStrength(globalSettings.axisStrength, [88, 91, 112], [127, 132, 156]);
}

function axisTextColor() {
  return colorFromStrength(globalSettings.axisStrength, [108, 112, 134], [147, 153, 178]);
}

function currentSnapStrength() {
  return globalSettings.snapStrength;
}

function snapThreshold() {
  return currentSnapStrength() / 200;
}

function resize() {
  // Use the real main canvas element (not swapped), so always reference by id
  const mainCanvas = document.getElementById('graph');
  const wrap = mainCanvas.parentElement;
  mainCanvas.width  = wrap.clientWidth  * devicePixelRatio;
  mainCanvas.height = wrap.clientHeight * devicePixelRatio;
  mainCanvas.style.width  = wrap.clientWidth  + 'px';
  mainCanvas.style.height = wrap.clientHeight + 'px';
  if (originX === 0 && originY === 0) {
    originX = mainCanvas.width  / 2;
    originY = mainCanvas.height / 2;
  }
  if (AUX_WINDOWS_ENABLED) {
    resizeObjCanvas();
    resizeIsolCanvas();
  }
  draw();
}

function resizeObjCanvas() {
  if (!AUX_WINDOWS_ENABLED) return;
  const wrap = objCanvas.parentElement;
  if (!wrap) return;
  objCanvas.width  = wrap.clientWidth  * devicePixelRatio;
  objCanvas.height = wrap.clientHeight * devicePixelRatio;
  objCanvas.style.width  = wrap.clientWidth  + 'px';
  objCanvas.style.height = wrap.clientHeight + 'px';
}

function resizeIsolCanvas() {
  if (!AUX_WINDOWS_ENABLED) return;
  const wrap = isolCanvas.parentElement;
  if (!wrap) return;
  isolCanvas.width  = wrap.clientWidth  * devicePixelRatio;
  isolCanvas.height = wrap.clientHeight * devicePixelRatio;
  isolCanvas.style.width  = wrap.clientWidth  + 'px';
  isolCanvas.style.height = wrap.clientHeight + 'px';
}

window.addEventListener('resize', resize);

function toCanvas(mathX, mathY) {
  return [originX + mathX * scale, originY - mathY * scale];
}
function toMath(cx, cy) {
  return [(cx - originX) / scale, (originY - cy) / scale];
}
function toObjMath(cx, cy) {
  return [(cx - objOriginX) / objScale, (objOriginY - cy) / objScale];
}

function drawGrid() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);
  const step = Math.abs(scale);
  if (!isFinite(step) || step < 1e-6) return;
  const startX = Math.floor(-originX / step) * step + originX;
  const startY = Math.floor(-originY / step) * step + originY;
  ctx.lineWidth = 1;
  ctx.strokeStyle = gridStrokeColor();
  for (let x = startX; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = startY; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle = axisStrokeColor();
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(originX, 0); ctx.lineTo(originX, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(W, originY); ctx.stroke();
  ctx.fillStyle = axisTextColor();
  ctx.font = `${11 * devicePixelRatio}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  const mathLeft  = Math.ceil(toMath(0,0)[0]);
  const mathRight = Math.floor(toMath(W,0)[0]);
  for (let n = mathLeft; n <= mathRight; n++) {
    if (n === 0) continue;
    const [cx] = toCanvas(n, 0);
    ctx.fillText(n, cx, originY + 4);
  }
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  const mathTop    = Math.ceil(toMath(0,0)[1]);
  const mathBottom = Math.floor(toMath(0,H)[1]);
  for (let n = mathBottom; n <= mathTop; n++) {
    if (n === 0) continue;
    const [, cy] = toCanvas(0, n);
    ctx.fillText(n, originX - 6, cy);
  }
}

// GRAPHS MODE
// ════════════════════════════════════════════════════════

function makeEval(expr) {
  const src = expr
    .replace(/\^/g,      '**')
    .replace(/\bsin\b/g,  'Math.sin')
    .replace(/\bcos\b/g,  'Math.cos')
    .replace(/\btan\b/g,  'Math.tan')
    .replace(/\bsqrt\b/g, 'Math.sqrt')
    .replace(/\babs\b/g,  'Math.abs')
    .replace(/\blog\b/g,  'Math.log10')
    .replace(/\bln\b/g,   'Math.log')
    .replace(/\bexp\b/g,  'Math.exp')
    .replace(/\bpi\b/g,   'Math.PI')
    .replace(/\be\b/g,    'Math.E')
    .replace(/\bfloor\b/g,'Math.floor')
    .replace(/\bceil\b/g, 'Math.ceil');
  // eslint-disable-next-line no-new-func
  return new Function('x','theta','t',`"use strict"; try { return ${src}; } catch(e) { return NaN; }`);
}

const GRAPH_COLORS = ['#f38ba8','#a6e3a1','#89b4fa','#fab387','#f9e2af','#cba6f7','#89dceb','#94e2d5'];
let functions = [];
let graphColorIdx = 0;

function addFunction(expr = '', type = 'cartesian') {
  const color = GRAPH_COLORS[graphColorIdx++ % GRAPH_COLORS.length];
  const f = { id: Date.now() + Math.random(), expr, type, color,
               compiled: null, compiledX: null, compiledY: null, error: false };
  functions.push(f);
  renderFunctionList();
  return f;
}

function compileFunction(f) {
  f.error = false;
  try {
    if (f.type === 'parametric') {
      const parts = f.expr.split(',');
      if (parts.length < 2) throw new Error('need two expressions');
      f.compiledX = makeEval(parts[0].trim());
      f.compiledY = makeEval(parts[1].trim());
      f.compiled  = true;
    } else {
      f.compiled = makeEval(f.expr);
    }
  } catch(e) { f.error = true; f.compiled = null; }
}

function renderFunctionList() {
  const list = document.getElementById('function-list');
  list.innerHTML = '';
  for (const f of functions) {
    const row = document.createElement('div');
    row.className = 'fn-row';
    const dot = document.createElement('div');
    dot.className = 'fn-color'; dot.style.background = f.color;
    const typeSelect = document.createElement('select');
    typeSelect.className = 'fn-type';
    ['cartesian','polar','parametric'].forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t[0].toUpperCase();
      if (t === f.type) opt.selected = true;
      typeSelect.appendChild(opt);
    });
    typeSelect.title = 'Function type';
    typeSelect.addEventListener('change', () => {
      f.type = typeSelect.value; compileFunction(f);
      input.classList.toggle('error', f.error); draw();
    });
    const input = document.createElement('input');
    input.className = 'fn-input' + (f.error ? ' error' : '');
    input.type = 'text'; input.value = f.expr;
    input.placeholder = f.type === 'polar' ? 'r = f(theta)' : f.type === 'parametric' ? 'x(t), y(t)' : 'y = f(x)';
    input.addEventListener('input', () => {
      f.expr = input.value; compileFunction(f);
      input.classList.toggle('error', f.error && f.expr.trim() !== ''); draw();
    });
    const rm = document.createElement('button');
    rm.className = 'fn-remove'; rm.textContent = '×';
    rm.addEventListener('click', () => { functions = functions.filter(x => x.id !== f.id); renderFunctionList(); draw(); });
    row.append(dot, typeSelect, input, rm);
    list.appendChild(row);
  }
}

document.getElementById('add-fn').addEventListener('click', () => addFunction('', 'cartesian'));

const thetaStepInput = document.getElementById('theta-step');
const thetaStepVal   = document.getElementById('theta-step-val');
thetaStepInput.addEventListener('input', () => {
  thetaStepVal.textContent = parseFloat(thetaStepInput.value).toFixed(3); draw();
});

function plotCartesian(fn, color) {
  const W = canvas.width, step = 1 / devicePixelRatio;
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2 * devicePixelRatio;
  let first = true, prevPy = null;
  for (let px = 0; px <= W; px += step) {
    const y = fn((px - originX) / scale, 0, 0);
    if (!isFinite(y)) { first = true; prevPy = null; continue; }
    const py = originY - y * scale;
    if (prevPy !== null && ((py < 0 && prevPy > canvas.height) || (py > canvas.height && prevPy < 0))) first = true;
    if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
    prevPy = py;
  }
  ctx.stroke();
}

function plotPolar(fn, color, thetaStep) {
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2 * devicePixelRatio;
  let first = true;
  for (let theta = 0; theta <= Math.PI * 2 + thetaStep; theta += thetaStep) {
    const r = fn(0, theta, theta);
    if (!isFinite(r)) { first = true; continue; }
    const [px, py] = toCanvas(r * Math.cos(theta), r * Math.sin(theta));
    if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
  }
  ctx.stroke();
}

function plotParametric(fnX, fnY, color) {
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2 * devicePixelRatio;
  const steps = 2000, tMin = -20, tMax = 20;
  let first = true;
  for (let i = 0; i <= steps; i++) {
    const t = tMin + (tMax - tMin) * i / steps;
    const x = fnX(0,0,t), y = fnY(0,0,t);
    if (!isFinite(x) || !isFinite(y)) { first = true; continue; }
    const [px, py] = toCanvas(x, y);
    if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
  }
  ctx.stroke();
}

function drawGraphs() {
  drawGrid();
  const thetaStep = parseFloat(thetaStepInput.value);
  for (const f of functions) {
    if (!f.compiled || f.error) continue;
    try {
      if      (f.type === 'cartesian')  plotCartesian(f.compiled, f.color);
      else if (f.type === 'polar')      plotPolar(f.compiled, f.color, thetaStep);
      else if (f.type === 'parametric') plotParametric(f.compiledX, f.compiledY, f.color);
    } catch(e) {}
  }
}


// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — complex number engine
// ════════════════════════════════════════════════════════

class Cx {
  constructor(re = 0, im = 0) { this.re = re; this.im = im; }
  add(b) { return new Cx(this.re + b.re, this.im + b.im); }
  sub(b) { return new Cx(this.re - b.re, this.im - b.im); }
  mul(b) { return new Cx(this.re*b.re - this.im*b.im, this.re*b.im + this.im*b.re); }
  div(b) {
    const d = b.re*b.re + b.im*b.im;
    if (d === 0) return new Cx(NaN, NaN);
    return new Cx((this.re*b.re + this.im*b.im)/d, (this.im*b.re - this.re*b.im)/d);
  }
  pow(b) {
    if (this.re === 0 && this.im === 0) return b.re > 0 ? new Cx(0,0) : new Cx(NaN,NaN);
    const r   = Math.sqrt(this.re*this.re + this.im*this.im);
    const lnA = new Cx(Math.log(r), argW(this));
    const p   = b.mul(lnA);
    const eR  = Math.exp(p.re);
    return new Cx(eR * Math.cos(p.im), eR * Math.sin(p.im));
  }
  neg() { return new Cx(-this.re, -this.im); }
  ok()  { return isFinite(this.re) && isFinite(this.im); }
}

function argW(z) {
  if (z.im === 0 && z.re > 0) return 2 * Math.PI;
  const a = Math.atan2(z.im, z.re);
  return a > 0 ? a : a + 2 * Math.PI;
}

function animTokenize(expr) {
  const toks = [];
  let i = 0;
  while (i < expr.length) {
    if (/\s/.test(expr[i])) { i++; continue; }
    if (/\d/.test(expr[i]) || (expr[i] === '.' && /\d/.test(expr[i+1] !== undefined ? expr[i+1] : ''))) {
      let j = i;
      while (j < expr.length && /[\d.]/.test(expr[j])) j++;
      toks.push({t:'num', v: parseFloat(expr.slice(i,j))}); i = j;
    } else if (/[a-zA-Z]/.test(expr[i])) {
      toks.push({t:'id', v: expr[i++]});
    } else {
      const ch = expr[i++];
      if      (ch==='+') toks.push({t:'+'});
      else if (ch==='-') toks.push({t:'-'});
      else if (ch==='*') toks.push({t:'*'});
      else if (ch==='/') toks.push({t:'/'});
      else if (ch==='^') toks.push({t:'^'});
      else if (ch==='(') toks.push({t:'('});
      else if (ch===')') toks.push({t:')'});
    }
  }
  return toks;
}

function animParse(toks) {
  let p = 0;
  const peek = () => toks[p];
  const next = () => toks[p++];
  function expr() {
    let L = term();
    while (peek() && (peek().t==='+' || peek().t==='-')) {
      const op = next().t; L = {n:'op', op, L, R: term()};
    }
    return L;
  }
  function term() {
    let L = unary();
    while (peek()) {
      const t = peek().t;
      if (t==='*' || t==='/') { const op=next().t; L={n:'op',op,L,R:unary()}; }
      else if (t==='num' || t==='id' || t==='(') { L={n:'op',op:'*',L,R:unary()}; }
      else break;
    }
    return L;
  }
  function unary() {
    if (peek() && peek().t==='-') { next(); return {n:'neg', arg: power()}; }
    return power();
  }
  function power() {
    const base = atom();
    if (peek() && peek().t==='^') { next(); return {n:'op',op:'^',L:base,R:unary()}; }
    return base;
  }
  function atom() {
    const tok = peek();
    if (!tok) throw new Error('Unexpected end');
    if (tok.t === 'num') { next(); return {n:'num', v: tok.v}; }
    if (tok.t === 'id') {
      next(); const name = tok.v;
      if (peek() && peek().t === '(') {
        next(); let depth = 1;
        while (p < toks.length && depth > 0) {
          if (toks[p].t==='(') depth++;
          else if (toks[p].t===')') depth--;
          p++;
        }
        if (/^[A-Z]$/.test(name)) return {n:'ref', name};
        throw new Error(`Unknown function: ${name}`);
      }
      if (name === 'i') return {n:'i'};
      if (name === 't') return {n:'t'};
      if (name === 'u') return {n:'u'};
      if (/^[A-Z]$/.test(name)) return {n:'ref', name};
      throw new Error(`Unknown identifier: ${name}`);
    }
    if (tok.t === '(') {
      next(); const node = expr();
      if (!peek() || peek().t !== ')') throw new Error('Expected )');
      next(); return node;
    }
    throw new Error(`Unexpected token: ${tok.t}`);
  }
  const ast = expr();
  if (p < toks.length) throw new Error('Unexpected extra tokens');
  return ast;
}

function evalAST(node, t, u, aCtx) {
  switch (node.n) {
    case 'num': return new Cx(node.v, 0);
    case 'i':   return new Cx(0, 1);
    case 't':   return new Cx(t, 0);
    case 'u':   return new Cx(u, 0);
    case 'ref': { const fn = aCtx[node.name]; if (!fn) throw new Error(`Undefined: ${node.name}`); return fn(u); }
    case 'neg': return evalAST(node.arg, t, u, aCtx).neg();
    case 'op': {
      const L = evalAST(node.L, t, u, aCtx);
      const R = evalAST(node.R, t, u, aCtx);
      if (node.op==='+') return L.add(R);
      if (node.op==='-') return L.sub(R);
      if (node.op==='*') return L.mul(R);
      if (node.op==='/') return L.div(R);
      if (node.op==='^') return L.pow(R);
      throw new Error(`Unknown op: ${node.op}`);
    }
    default: throw new Error(`Unknown node: ${node.n}`);
  }
}

function astUsesU(node) {
  if (!node) return false;
  if (node.n === 'u') return true;
  if (node.n === 'neg') return astUsesU(node.arg);
  if (node.n === 'op') return astUsesU(node.L) || astUsesU(node.R);
  return false;
}

function compileAnimExpr(expr) {
  const ast = animParse(animTokenize(expr));
  const fn = (t, u, aCtx) => evalAST(ast, t, u, aCtx);
  fn.usesU = astUsesU(ast);
  return fn;
}

function parseCx(str) {
  try {
    const fn = compileAnimExpr(str.trim() || '0');
    const v = fn(0, 0, {});
    return (v && v.ok()) ? v : null;
  } catch(e) { return null; }
}

function formatCx(cx) {
  function fmtN(v) { return Number.isInteger(v) ? String(v) : parseFloat(v.toFixed(3)).toString(); }
  function fmtIm(v) { return v === 1 ? 'i' : v === -1 ? '-i' : `${fmtN(v)}i`; }
  const { re, im } = cx;
  if (im === 0) return fmtN(re);
  if (re === 0) return fmtIm(im);
  return `${fmtN(re)}${im > 0 ? '+' : ''}${fmtIm(im)}`;
}

function formatCxHundredths(cx) {
  function fmtN(v) {
    const r = Math.round(v * 100) / 100;
    return Number.isInteger(r) ? String(r) : r.toFixed(2);
  }
  function fmtIm(v) {
    const r = Math.round(v * 100) / 100;
    return r === 1 ? 'i' : r === -1 ? '-i' : `${fmtN(r)}i`;
  }
  const { re, im } = cx;
  if (im === 0) return fmtN(re);
  if (re === 0) return fmtIm(im);
  return `${fmtN(re)}${im > 0 ? '+' : ''}${fmtIm(im)}`;
}

function formatNumberHundredths(v) {
  const r = Math.round(v * 100) / 100;
  return Number.isInteger(r) ? String(r) : r.toFixed(2);
}

function formatCoordPairHundredths(cx) {
  return `(${formatNumberHundredths(cx.re)}, ${formatNumberHundredths(cx.im)})`;
}


// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — bezier / eccentricity utilities
// ════════════════════════════════════════════════════════


function sameCx(a, b) {
  return !!a && !!b && Math.abs(a.re - b.re) < 1e-9 && Math.abs(a.im - b.im) < 1e-9;
}

function cloneCx(p) { return new Cx(p.re, p.im); }
function clonePts(pts) { return (pts || []).map(p => new Cx(p.re, p.im)); }

function collapseCtrlPts(pts) {
  const out = clonePts(pts || []);
  while (out.length > 1 && sameCx(out[out.length - 1], out[out.length - 2])) out.pop();
  return out;
}

function evalBezierPoint(ctrlPts, u) {
  const pts = clonePts(ctrlPts || []);
  if (pts.length === 0) return new Cx(NaN, NaN);
  if (pts.length === 1) return pts[0];
  const uu = Math.max(0, Math.min(1, u));
  for (let level = pts.length - 1; level > 0; level--) {
    for (let i = 0; i < level; i++) {
      pts[i] = new Cx(
        pts[i].re + (pts[i + 1].re - pts[i].re) * uu,
        pts[i].im + (pts[i + 1].im - pts[i].im) * uu
      );
    }
  }
  return pts[0];
}

function buildBezierFn(ctrlPts) {
  const collapsed = collapseCtrlPts(ctrlPts || []);
  const fn = (_t, u) => evalBezierPoint(collapsed, u);
  fn.usesU = collapsed.length > 1;
  fn.degree = Math.max(0, collapsed.length - 1);
  fn.basePts = collapsed;
  return fn;
}

function midpointCx(a, b) {
  return new Cx((a.re + b.re) * 0.5, (a.im + b.im) * 0.5);
}

function buildCompositeBezierFn(ctrlPts) {
  const pts = clonePts(ctrlPts || []);
  if (pts.length < 4) return null;
  const [p0, p1, p2, p3] = pts;
  if (![p0, p1, p2, p3].every(p => p && p.ok && p.ok())) return null;
  const m01 = midpointCx(p0, p1);
  const m12 = midpointCx(p1, p2);
  const m23 = midpointCx(p2, p3);
  const first = [p0, m01, p1, m12];
  const second = [m12, p2, m23, p3];
  const fn = (_t, u) => {
    const s = Math.max(0, Math.min(1, u));
    if (s <= 0.5) return evalBezierPoint(first, s * 2);
    return evalBezierPoint(second, (s - 0.5) * 2);
  };
  fn.usesU = true;
  fn.degree = 3;
  fn.basePts = pts;
  fn.curveKind = 'composite';
  return fn;
}

function buildPolygonFn(pts) {
  const N = pts.length - 1;
  if (N <= 0) return null;
  const cpts = clonePts(pts);
  const fn = (_t, u) => {
    const s = Math.max(0, Math.min(1, u)) * N;
    const k = Math.min(Math.floor(s), N - 1);
    const frac = s - k;
    const a = cpts[k], b = cpts[k + 1];
    return new Cx(a.re + (b.re - a.re) * frac, a.im + (b.im - a.im) * frac);
  };
  fn.usesU = true;
  return fn;
}

function buildShiftedCompositeBezierFn(ctrlPts, alpha) {
  const pts = clonePts(ctrlPts || []);
  if (pts.length < 4) return null;
  const [p0, p1, p2, p3] = pts;
  if (![p0, p1, p2, p3].every(p => p && p.ok && p.ok())) return null;
  const s = Math.max(0, Math.min(1, alpha));
  const m01 = midpointCx(p0, p1);
  const m12 = midpointCx(p1, p2);
  const m23 = midpointCx(p2, p3);
  const q01 = new Cx(m01.re + (p1.re - m01.re) * s, m01.im + (p1.im - m01.im) * s);
  const q23 = new Cx(m23.re + (p2.re - m23.re) * s, m23.im + (p2.im - m23.im) * s);
  const first = [p0, q01, p1, m12];
  const second = [m12, p2, q23, p3];
  const fn = (_t, u) => {
    const t = Math.max(0, Math.min(1, u));
    if (t <= 0.5) return evalBezierPoint(first, t * 2);
    return evalBezierPoint(second, (t - 0.5) * 2);
  };
  fn.usesU = true;
  fn.degree = 3;
  fn.basePts = pts;
  fn.curveKind = 'shiftedComposite';
  return fn;
}

function buildRepeatedDegreeCompositeBezierFn(ctrlPts, degree) {
  const pts = clonePts(ctrlPts || []);
  if (pts.length < 4) return null;
  const [p0, p1, p2, p3] = pts;
  if (![p0, p1, p2, p3].every(p => p && p.ok && p.ok())) return null;
  const d = Math.max(3, Math.round(degree));
  const m12 = midpointCx(p1, p2);
  const first = [p0];
  const second = [m12];
  for (let i = 0; i < d - 1; i++) { first.push(p1); second.push(p2); }
  first.push(m12);
  second.push(p3);
  const fn = (_t, u) => {
    const t = Math.max(0, Math.min(1, u));
    if (t <= 0.5) return evalBezierPoint(first, t * 2);
    return evalBezierPoint(second, (t - 0.5) * 2);
  };
  fn.usesU = true;
  fn.degree = d;
  fn.basePts = pts;
  fn.curveKind = 'repeatedComposite';
  return fn;
}

function buildSingleEccentricityFn(pts, e, bezier, spiral, composite) {
  if (!bezier) return null;
  if (pts.length < 4) return bezier;
  const [p0, p1, p2, p3] = pts;
  const polygon = buildPolygonFn(pts);
  const ce = Math.max(0, Math.min(3, e));
  let fn;
  if (ce <= 1) {
    const sp1 = new Cx(p0.re + ce*(p1.re-p0.re), p0.im + ce*(p1.im-p0.im));
    const sp2 = new Cx(p3.re - ce*(p3.re-p2.re), p3.im - ce*(p3.im-p2.im));
    fn = buildBezierFn([p0, sp1, sp2, p3]);
  } else if (ce <= 2) {
    const alpha = ce - 1;
    const hi = composite || bezier;
    fn = (_t, u, ctx) => {
      const v1 = bezier(_t, u, ctx), v2 = hi(_t, u, ctx);
      if (!v1 || !v1.ok() || !v2 || !v2.ok()) return new Cx(NaN, NaN);
      return new Cx(v1.re + (v2.re - v1.re) * alpha, v1.im + (v2.im - v1.im) * alpha);
    };
  } else if (ce <= 2.5) {
    fn = buildShiftedCompositeBezierFn(pts, (ce - 2) * 2) || composite || bezier;
  } else if (ce <= 2.8) {
    const alpha = (ce - 2.5) / 0.3;
    const lo = buildShiftedCompositeBezierFn(pts, 1) || composite || bezier;
    const hi = buildRepeatedDegreeCompositeBezierFn(pts, 4) || lo;
    fn = (_t, u, ctx) => {
      const v1 = lo(_t, u, ctx), v2 = hi(_t, u, ctx);
      if (!v1 || !v1.ok() || !v2 || !v2.ok()) return new Cx(NaN, NaN);
      return new Cx(v1.re + (v2.re - v1.re) * alpha, v1.im + (v2.im - v1.im) * alpha);
    };
  } else if (ce <= 2.9) {
    const alpha = (ce - 2.8) / 0.1;
    const lo = buildRepeatedDegreeCompositeBezierFn(pts, 4) || composite || bezier;
    const hi = buildRepeatedDegreeCompositeBezierFn(pts, 5) || lo;
    fn = (_t, u, ctx) => {
      const v1 = lo(_t, u, ctx), v2 = hi(_t, u, ctx);
      if (!v1 || !v1.ok() || !v2 || !v2.ok()) return new Cx(NaN, NaN);
      return new Cx(v1.re + (v2.re - v1.re) * alpha, v1.im + (v2.im - v1.im) * alpha);
    };
  } else {
    const alpha = (ce - 2.9) / 0.1;
    const lo = buildRepeatedDegreeCompositeBezierFn(pts, 5) || composite || bezier;
    const hi = polygon || lo;
    fn = (_t, u, ctx) => {
      const v1 = lo(_t, u, ctx), v2 = hi(_t, u, ctx);
      if (!v1 || !v1.ok() || !v2 || !v2.ok()) return new Cx(NaN, NaN);
      return new Cx(v1.re + (v2.re - v1.re) * alpha, v1.im + (v2.im - v1.im) * alpha);
    };
  }
  fn.usesU = true;
  return fn;
}

function eccentricityToPercent(e) {
  const ce = Math.max(0, Math.min(3, typeof e === 'number' ? e : 1));
  if (ce <= 1) return ce * 50;
  if (ce <= 2) return 50 + (ce - 1) * 25;
  return 75 + (ce - 2) * 25;
}

function percentToEccentricity(pct) {
  const cp = Math.max(0, Math.min(100, typeof pct === 'number' ? pct : 50));
  if (cp <= 50) return cp / 50;
  if (cp <= 75) return 1 + (cp - 50) / 25;
  return 2 + (cp - 75) / 25;
}

// Hit-detection utilities
function compiledCanvasPoint(compiled, u) {
  try {
    const v = compiled(0, u, {});
    return (v && v.ok()) ? toCanvas(v.re, v.im) : null;
  } catch (_err) { return null; }
}

function pointLineDeviation(pt, a, b) {
  if (!pt || !a || !b) return Infinity;
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const len = Math.hypot(dx, dy);
  if (len < 1e-9) return Math.hypot(pt[0] - a[0], pt[1] - a[1]);
  return Math.abs(dy * pt[0] - dx * pt[1] + b[0] * a[1] - b[1] * a[0]) / len;
}

function pointSegmentDistance(px, py, a, b) {
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const len2 = dx * dx + dy * dy;
  if (len2 < 1e-9) return Math.hypot(px - a[0], py - a[1]);
  const t = clamp(((px - a[0]) * dx + (py - a[1]) * dy) / len2, 0, 1);
  return Math.hypot(px - a[0] - dx * t, py - a[1] - dy * t);
}

function sampleCompiledAdaptive(compiled, tolerancePx = 0.7 * devicePixelRatio, maxDepth = 9) {
  if (!compiled) return [];
  const cacheKey = [tolerancePx.toFixed(3), maxDepth, scale.toFixed(4), originX.toFixed(2), originY.toFixed(2), devicePixelRatio].join('|');
  if (!compiled._sampleCache) compiled._sampleCache = {};
  if (compiled._sampleCache[cacheKey]) return compiled._sampleCache[cacheKey];
  const p0 = compiledCanvasPoint(compiled, 0);
  const p1 = compiledCanvasPoint(compiled, 1);
  if (!p0 || !p1) return [];
  const samples = [p0];
  function recurse(u0, a, u1, b, depth) {
    if (depth <= 0) { samples.push(b); return; }
    const um = (u0 + u1) * 0.5;
    const ul = (2 * u0 + u1) / 3, ur = (u0 + 2 * u1) / 3;
    const pm = compiledCanvasPoint(compiled, um);
    const pl = compiledCanvasPoint(compiled, ul);
    const pr = compiledCanvasPoint(compiled, ur);
    if (!pm || !pl || !pr) { samples.push(b); return; }
    const maxDev = Math.max(pointLineDeviation(pl, a, b), pointLineDeviation(pm, a, b), pointLineDeviation(pr, a, b));
    if (maxDev <= tolerancePx) { samples.push(b); return; }
    recurse(u0, a, um, pm, depth - 1);
    recurse(um, pm, u1, b, depth - 1);
  }
  recurse(0, p0, 1, p1, maxDepth);
  compiled._sampleCache[cacheKey] = samples;
  return samples;
}

function polylineHitInfo(samples, cx, cy) {
  if (!samples || samples.length === 0) return { dist: Infinity, u: 0 };
  if (samples.length === 1) return { dist: Math.hypot(cx - samples[0][0], cy - samples[0][1]), u: 0 };
  let bestDist = Infinity, bestU = 0;
  const segCount = samples.length - 1;
  for (let i = 0; i < segCount; i++) {
    const dist = pointSegmentDistance(cx, cy, samples[i], samples[i + 1]);
    if (dist < bestDist) { bestDist = dist; bestU = (i + 0.5) / segCount; }
  }
  return { dist: bestDist, u: bestU };
}

function strokePath(pts, color, lineWidth) {
  ctx.beginPath();
  ctx.strokeStyle = color; ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  let first = true;
  for (const pt of pts) {
    if (!pt) { first = true; continue; }
    if (first) { ctx.moveTo(pt[0], pt[1]); first = false; } else ctx.lineTo(pt[0], pt[1]);
  }
  ctx.stroke();
}

function drawCompiledCurve(compiled, color, lineWidth, alpha) {
  if (!compiled) return;
  const STEPS = 240;
  const samples = [];
  for (let i = 0; i <= STEPS; i++) {
    const v = compiled(0, i / STEPS, {});
    samples.push((v && v.ok()) ? toCanvas(v.re, v.im) : null);
  }
  ctx.save();
  ctx.globalAlpha = alpha;
  strokePath(samples, color, lineWidth);
  ctx.restore();
}


// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — new curve math helpers
// ════════════════════════════════════════════════════════

function lerpCx(a, b, t) {
  return new Cx(a.re + (b.re - a.re) * t, a.im + (b.im - a.im) * t);
}

function deCasteljauSplit(pts, t) {
  const [p0, p1, p2, p3] = pts;
  const q0 = lerpCx(p0, p1, t), q1 = lerpCx(p1, p2, t), q2 = lerpCx(p2, p3, t);
  const r0 = lerpCx(q0, q1, t), r1 = lerpCx(q1, q2, t);
  const s0 = lerpCx(r0, r1, t);
  return [[p0, q0, r0, s0], [s0, r1, q2, p3]];
}

function computeInitialHandles(anchors) {
  const n = anchors.length;
  if (n < 2) return [];

  const makeSeg = (h0, h1) => ({ h0, h1, eccentricity: 1, compiled: null, compiledRef: null });

  if (n === 2) {
    const [A0, A1] = anchors;
    return [makeSeg(lerpCx(A0, A1, 1/3), lerpCx(A0, A1, 2/3))];
  }

  if (n === 3) {
    const [A0, A1, A2] = anchors;
    const d01 = Math.hypot(A1.re - A0.re, A1.im - A0.im);
    const d12 = Math.hypot(A2.re - A1.re, A2.im - A1.im);
    const t1 = (d01 + d12) > 1e-9 ? d01 / (d01 + d12) : 0.5;
    const denom = 2 * t1 * (1 - t1);
    let Q;
    if (denom < 1e-9) {
      Q = lerpCx(A0, A2, 0.5);
    } else {
      Q = new Cx(
        (A1.re - (1-t1)*(1-t1)*A0.re - t1*t1*A2.re) / denom,
        (A1.im - (1-t1)*(1-t1)*A0.im - t1*t1*A2.im) / denom
      );
    }
    const C1 = new Cx((A0.re + 2*Q.re) / 3, (A0.im + 2*Q.im) / 3);
    const C2 = new Cx((2*Q.re + A2.re) / 3, (2*Q.im + A2.im) / 3);
    const [left, right] = deCasteljauSplit([A0, C1, C2, A2], t1);
    return [makeSeg(left[1], left[2]), makeSeg(right[1], right[2])];
  }

  if (n === 4) {
    const [A0, A1, A2, A3] = anchors;
    const d01 = Math.hypot(A1.re-A0.re, A1.im-A0.im);
    const d12 = Math.hypot(A2.re-A1.re, A2.im-A1.im);
    const d23 = Math.hypot(A3.re-A2.re, A3.im-A2.im);
    const D = d01 + d12 + d23;
    const t1 = D > 1e-9 ? d01 / D : 1/3;
    const t2 = D > 1e-9 ? (d01 + d12) / D : 2/3;
    const a1 = 3*t1*(1-t1)*(1-t1), b1 = 3*t1*t1*(1-t1);
    const a2 = 3*t2*(1-t2)*(1-t2), b2 = 3*t2*t2*(1-t2);
    const det = a1*b2 - a2*b1;
    let P1, P2;
    if (Math.abs(det) < 1e-9) {
      P1 = lerpCx(A0, A3, 1/3);
      P2 = lerpCx(A0, A3, 2/3);
    } else {
      const r1 = new Cx(A1.re - Math.pow(1-t1,3)*A0.re - t1*t1*t1*A3.re,
                        A1.im - Math.pow(1-t1,3)*A0.im - t1*t1*t1*A3.im);
      const r2 = new Cx(A2.re - Math.pow(1-t2,3)*A0.re - t2*t2*t2*A3.re,
                        A2.im - Math.pow(1-t2,3)*A0.im - t2*t2*t2*A3.im);
      P1 = new Cx((r1.re*b2 - r2.re*b1) / det, (r1.im*b2 - r2.im*b1) / det);
      P2 = new Cx((r2.re*a1 - r1.re*a2) / det, (r2.im*a1 - r1.im*a2) / det);
    }
    const [left, right1] = deCasteljauSplit([A0, P1, P2, A3], t1);
    const t2p = (t1 < 1 - 1e-9) ? (t2 - t1) / (1 - t1) : 0.5;
    const [mid, last] = deCasteljauSplit(right1, t2p);
    return [makeSeg(left[1], left[2]), makeSeg(mid[1], mid[2]), makeSeg(last[1], last[2])];
  }

  return [];
}

function buildInterpolatingPreviewFn(anchors) {
  const n = anchors.length;
  if (n < 2) return null;
  if (n === 2) return buildBezierFn(anchors);
  if (n === 3) {
    const [A0, A1, A2] = anchors;
    const d01 = Math.hypot(A1.re-A0.re, A1.im-A0.im);
    const d12 = Math.hypot(A2.re-A1.re, A2.im-A1.im);
    const t1 = (d01+d12) > 1e-9 ? d01/(d01+d12) : 0.5;
    const denom = 2*t1*(1-t1);
    if (denom < 1e-9) return buildBezierFn([A0, A2]);
    const Q = new Cx(
      (A1.re - (1-t1)*(1-t1)*A0.re - t1*t1*A2.re) / denom,
      (A1.im - (1-t1)*(1-t1)*A0.im - t1*t1*A2.im) / denom
    );
    return buildBezierFn([A0, new Cx((A0.re+2*Q.re)/3,(A0.im+2*Q.im)/3),
                               new Cx((2*Q.re+A2.re)/3,(2*Q.im+A2.im)/3), A2]);
  }
  if (n === 4) {
    const [A0, A1, A2, A3] = anchors;
    const d01 = Math.hypot(A1.re-A0.re, A1.im-A0.im);
    const d12 = Math.hypot(A2.re-A1.re, A2.im-A1.im);
    const d23 = Math.hypot(A3.re-A2.re, A3.im-A2.im);
    const D = d01+d12+d23;
    const t1 = D>1e-9 ? d01/D : 1/3, t2 = D>1e-9 ? (d01+d12)/D : 2/3;
    const a1=3*t1*(1-t1)*(1-t1), b1=3*t1*t1*(1-t1);
    const a2=3*t2*(1-t2)*(1-t2), b2=3*t2*t2*(1-t2);
    const det = a1*b2 - a2*b1;
    if (Math.abs(det) < 1e-9) return buildInterpolatingPreviewFn([A0, A1, A2]);
    const r1 = new Cx(A1.re-Math.pow(1-t1,3)*A0.re-t1*t1*t1*A3.re, A1.im-Math.pow(1-t1,3)*A0.im-t1*t1*t1*A3.im);
    const r2 = new Cx(A2.re-Math.pow(1-t2,3)*A0.re-t2*t2*t2*A3.re, A2.im-Math.pow(1-t2,3)*A0.im-t2*t2*t2*A3.im);
    const P1 = new Cx((r1.re*b2-r2.re*b1)/det, (r1.im*b2-r2.im*b1)/det);
    const P2 = new Cx((r2.re*a1-r1.re*a2)/det, (r2.im*a1-r1.im*a2)/det);
    return buildBezierFn([A0, P1, P2, A3]);
  }
  return null;
}


function computeFiveCandidates(p0, p1) {
  const dx = p1.re - p0.re, dy = p1.im - p0.im;
  const L = Math.hypot(dx, dy);
  const makeCandidate = (h0, h1) => {
    const pts = [p0, h0, h1, p1];
    const bezier = buildBezierFn(pts);
    const composite = buildCompositeBezierFn(pts);
    return { h0, h1, compiled: buildSingleEccentricityFn(pts, 1, bezier, null, composite) };
  };
  if (L < 1e-9) {
    const fallback = makeCandidate(cloneCx(p0), cloneCx(p1));
    return [fallback, fallback, fallback, fallback, fallback];
  }
  const dRe = dx / L, dIm = dy / L;   // unit direction
  const nRe = -dIm,  nIm =  dRe;      // unit normal (90° CCW)
  return [
    makeCandidate( // 0: Straight
      new Cx(p0.re + dRe*L/3,               p0.im + dIm*L/3),
      new Cx(p1.re - dRe*L/3,               p1.im - dIm*L/3)
    ),
    makeCandidate( // 1: Up large
      new Cx(p0.re + nRe*L/2,               p0.im + nIm*L/2),
      new Cx(p1.re + nRe*L/2,               p1.im + nIm*L/2)
    ),
    makeCandidate( // 2: Up gentle
      new Cx(p0.re + dRe*L/4 + nRe*L/4,    p0.im + dIm*L/4 + nIm*L/4),
      new Cx(p1.re - dRe*L/4 + nRe*L/4,    p1.im - dIm*L/4 + nIm*L/4)
    ),
    makeCandidate( // 3: Down gentle
      new Cx(p0.re + dRe*L/4 - nRe*L/4,    p0.im + dIm*L/4 - nIm*L/4),
      new Cx(p1.re - dRe*L/4 - nRe*L/4,    p1.im - dIm*L/4 - nIm*L/4)
    ),
    makeCandidate( // 4: Down large
      new Cx(p0.re - nRe*L/2,               p0.im - nIm*L/2),
      new Cx(p1.re - nRe*L/2,               p1.im - nIm*L/2)
    ),
  ];
}

// Angle bisector tangent at p1, given neighbors p0 and p2.
// Returns the unit vector bisecting the angle between chords p0→p1 and p1→p2.
function bisectorTangent(p0, p1, p2) {
  const ux = p1.re-p0.re, uy = p1.im-p0.im;
  const vx = p2.re-p1.re, vy = p2.im-p1.im;
  const Lu = Math.hypot(ux,uy), Lv = Math.hypot(vx,vy);
  if (Lu < 1e-9) { const l = Lv||1; return new Cx(vx/l, vy/l); }
  if (Lv < 1e-9) return new Cx(ux/Lu, uy/Lu);
  const sx = ux/Lu + vx/Lv, sy = uy/Lu + vy/Lv;
  const Ls = Math.hypot(sx, sy);
  if (Ls < 1e-9) return new Cx(-uy/Lu, ux/Lu); // U-turn: perpendicular to chord
  return new Cx(sx/Ls, sy/Ls);
}

// Handle-length factor: f = angle(chord p0→p1, tangent t) / 90°, clamped to [1/3, 1].
// Minimum 1/3 avoids degenerate zero-length handles when tangent is parallel to chord.
function turnHandleFactor(p0, p1, t) {
  const dx = p1.re-p0.re, dy = p1.im-p0.im;
  const L = Math.hypot(dx, dy);
  if (L < 1e-9) return 0;
  const dot = Math.min(1, Math.max(-1, (dx/L)*t.re + (dy/L)*t.im));
  return Math.min(2/3, Math.max(1/3, Math.acos(dot) / (Math.PI / 2)));
}

// Unit direction vector from p0 to p1.
function chordDir(p0, p1) {
  const dx = p1.re-p0.re, dy = p1.im-p0.im;
  const L = Math.hypot(dx, dy);
  return L < 1e-9 ? new Cx(1, 0) : new Cx(dx/L, dy/L);
}

// Build a segment from p0 to p1 with bisector-derived handles.
// tOut: outgoing unit tangent at p0. tIn: outgoing unit tangent at p1 (pointing away from arc).
// f: handle factor; both handles get length f × |p0p1|.
// f0: handle factor at p0 end; f1: handle factor at p1 end (may differ for interior arcs).
function bisectorArc(p0, p1, tOut, tIn, f0, f1) {
  if (f1 === undefined) f1 = f0; // backward compat for symmetric arcs
  const L = Math.hypot(p1.re-p0.re, p1.im-p0.im);
  return makeSeg(
    new Cx(p0.re + tOut.re*f0*L, p0.im + tOut.im*f0*L),
    new Cx(p1.re - tIn.re*f1*L,  p1.im - tIn.im*f1*L)
  );
}

// Reflect unit vector t over the chord direction from p1 to p2 (kept for extension flow).
function reflectOverChord(t, p1, p2) {
  const dx = p2.re-p1.re, dy = p2.im-p1.im;
  const L = Math.hypot(dx, dy);
  if (L < 1e-9) return t;
  const dRe = dx/L, dIm = dy/L;
  const dot2 = 2*(t.re*dRe + t.im*dIm);
  return new Cx(dot2*dRe - t.re, dot2*dIm - t.im);
}

function smoothstep01(x) {
  const t = Math.max(0, Math.min(1, x));
  return t * t * (3 - 2 * t);
}

function blendUnitTangents(a, b, weight) {
  const w = Math.max(0, Math.min(1, weight));
  if (w <= 0) return new Cx(a.re, a.im);
  if (w >= 1) return new Cx(b.re, b.im);
  const a0 = Math.atan2(a.im, a.re);
  const a1 = Math.atan2(b.im, b.re);
  const d = Math.atan2(Math.sin(a1 - a0), Math.cos(a1 - a0));
  const angle = a0 + d * w;
  return new Cx(Math.cos(angle), Math.sin(angle));
}

function prospectivePointWeight(p0, p1, nextPoint) {
  if (!nextPoint) return 0;
  const nextDist = Math.hypot(nextPoint.re - p1.re, nextPoint.im - p1.im);
  if (nextDist < 1e-9) return 0;
  const chordLen = Math.hypot(p1.re - p0.re, p1.im - p0.im);
  const influenceRadius = Math.max(0.35, chordLen * 0.75);
  return smoothstep01(nextDist / influenceRadius);
}

function buildPendingPlacementArc(p0, p1, tContinuation, nextPoint) {
  let tOut, tIn;
  if (tContinuation) {
    tOut = tContinuation;
    const freeEnd = reflectOverChord(tOut, p0, p1);
    const nextEnd = nextPoint ? bisectorTangent(p0, p1, nextPoint) : freeEnd;
    tIn = blendUnitTangents(freeEnd, nextEnd, prospectivePointWeight(p0, p1, nextPoint));
  } else if (nextPoint) {
    tIn = bisectorTangent(p0, p1, nextPoint);
    tOut = reflectOverChord(tIn, p0, p1);
  } else {
    tOut = chordDir(p0, p1);
    tIn = reflectOverChord(tOut, p0, p1);
  }
  const f0 = turnHandleFactor(p0, p1, tOut);
  const f1 = turnHandleFactor(p0, p1, tIn);
  return { seg: bisectorArc(p0, p1, tOut, tIn, f0, f1), tOut, tIn };
}

// Outgoing tangent at the end of a cubic Bézier (used by startExtendedPlacement).
function tangentAtBezierEnd(anchor, h1) {
  const dx = anchor.re - h1.re, dy = anchor.im - h1.im;
  const L = Math.hypot(dx, dy);
  return L < 1e-9 ? new Cx(1, 0) : new Cx(dx/L, dy/L);
}

function tangentAtBezierStart(anchor, h0) {
  const dx = h0.re - anchor.re, dy = h0.im - anchor.im;
  const L = Math.hypot(dx, dy);
  return L < 1e-9 ? new Cx(1, 0) : new Cx(dx/L, dy/L);
}

// Build a new segment object (with handles) for placement.
function makeSeg(h0, h1) {
  return { h0, h1, eccentricity: 1, compiled: null, compiledRef: null };
}

function buildExtensionSegment(anim, sourceAnchorIdx, target) {
  const src = anim.anchors[sourceAnchorIdx];
  const locked = isAnchorLocked(anim, sourceAnchorIdx);
  if (anim.extensionForward) {
    const chord = chordDir(src, target);
    const tOut = locked ? anim.tContinuation : chord;
    const tIn = locked ? reflectOverChord(tOut, src, target) : chord;
    const seg = bisectorArc(src, target, tOut, tIn, turnHandleFactor(src, target, tOut), turnHandleFactor(src, target, tIn));
    return { seg, start: src, end: target, nextTangent: tIn };
  }

  const chord = chordDir(target, src);
  const tIn = locked ? anim.tContinuation : chord;
  const tOut = locked ? reflectOverChord(tIn, target, src) : chord;
  const seg = bisectorArc(target, src, tOut, tIn, turnHandleFactor(target, src, tOut), turnHandleFactor(target, src, tIn));
  return { seg, start: target, end: src, nextTangent: tOut };
}

function cleanSplinePoints(points) {
  const out = [];
  for (const p of points || []) {
    if (!p || !p.ok || !p.ok()) continue;
    const prev = out[out.length - 1];
    if (!prev || Math.hypot(p.re - prev.re, p.im - prev.im) > 1e-7)
      out.push(new Cx(p.re, p.im));
  }
  return out;
}

function computeThreeAnchorPlacementSegments(pts) {
  const first = buildPendingPlacementArc(pts[0], pts[1], null, pts[2]);
  const second = buildPendingPlacementArc(pts[1], pts[2], first.tIn, null);
  return [first.seg, second.seg];
}

function blendPoint(a, b, weight) {
  const w = Math.max(0, Math.min(1, weight));
  return new Cx(a.re + (b.re - a.re) * w, a.im + (b.im - a.im) * w);
}

function constrainedFourAnchorPlacementSegments(pts) {
  const base = computeThreeAnchorPlacementSegments(pts.slice(0, 3));
  const candidate = computeInitialHandles(pts);
  if (candidate.length < 3 || base.length < 2) return candidate.length ? candidate : base;

  const tangentShift = 0.18;
  const seg0 = makeSeg(
    blendPoint(base[0].h0, candidate[0].h0, tangentShift),
    blendPoint(base[0].h1, candidate[0].h1, tangentShift)
  );
  const seg1 = makeSeg(
    blendPoint(base[1].h0, candidate[1].h0, tangentShift),
    blendPoint(base[1].h1, candidate[1].h1, 0.45)
  );

  const tOut = tangentAtBezierEnd(pts[2], seg1.h1);
  const pending = buildPendingPlacementArc(pts[2], pts[3], tOut, null);
  return [seg0, seg1, pending.seg];
}

function fourPointWindowStability(pts) {
  const ds = [
    Math.hypot(pts[1].re - pts[0].re, pts[1].im - pts[0].im),
    Math.hypot(pts[2].re - pts[1].re, pts[2].im - pts[1].im),
    Math.hypot(pts[3].re - pts[2].re, pts[3].im - pts[2].im),
  ];
  const maxD = Math.max(...ds);
  if (maxD < 1e-9) return 1;
  const minD = Math.min(...ds);
  return smoothstep01((minD / maxD) / 0.25);
}

function alignInteriorTangents(segs, pts) {
  for (let i = 1; i < pts.length - 1; i++) {
    const prev = segs[i - 1], next = segs[i];
    const anchor = pts[i];
    if (!prev || !next) continue;
    const prevV = new Cx(anchor.re - prev.h1.re, anchor.im - prev.h1.im);
    const nextV = new Cx(next.h0.re - anchor.re, next.h0.im - anchor.im);
    const prevLen = Math.hypot(prevV.re, prevV.im);
    const nextLen = Math.hypot(nextV.re, nextV.im);
    if (prevLen < 1e-9 || nextLen < 1e-9) continue;
    let sx = prevV.re / prevLen + nextV.re / nextLen;
    let sy = prevV.im / prevLen + nextV.im / nextLen;
    let L = Math.hypot(sx, sy);
    if (L < 1e-9) {
      const chord = chordDir(pts[i - 1], pts[i + 1]);
      sx = chord.re; sy = chord.im; L = 1;
    }
    const ux = sx / L, uy = sy / L;
    prev.h1 = new Cx(anchor.re - ux * prevLen, anchor.im - uy * prevLen);
    next.h0 = new Cx(anchor.re + ux * nextLen, anchor.im + uy * nextLen);
  }
  return segs;
}

function computeFreshPlacementSegments(points) {
  const pts = cleanSplinePoints(points);
  if (pts.length < 2) return [];
  if (pts.length === 2)
    return [makeSeg(lerpCx(pts[0], pts[1], 1 / 3), lerpCx(pts[0], pts[1], 2 / 3))];
  if (pts.length === 3) return computeThreeAnchorPlacementSegments(pts);
  if (pts.length === 4) return constrainedFourAnchorPlacementSegments(pts);

  const accum = Array.from({ length: pts.length - 1 }, () => ({ w: 0, h0re: 0, h0im: 0, h1re: 0, h1im: 0 }));
  const arcWeights = [0.45, 1, 0.45];
  for (let start = 0; start <= pts.length - 4; start++) {
    const windowPts = pts.slice(start, start + 4);
    const windowSegs = constrainedFourAnchorPlacementSegments(windowPts);
    const stability = fourPointWindowStability(windowPts);
    for (let j = 0; j < windowSegs.length; j++) {
      const seg = windowSegs[j];
      const acc = accum[start + j];
      const w = arcWeights[j] * stability;
      acc.w += w;
      acc.h0re += seg.h0.re * w;
      acc.h0im += seg.h0.im * w;
      acc.h1re += seg.h1.re * w;
      acc.h1im += seg.h1.im * w;
    }
  }
  const segs = accum.map((acc, i) => {
    if (acc.w <= 1e-9)
      return makeSeg(lerpCx(pts[i], pts[i + 1], 1 / 3), lerpCx(pts[i], pts[i + 1], 2 / 3));
    return makeSeg(
      new Cx(acc.h0re / acc.w, acc.h0im / acc.w),
      new Cx(acc.h1re / acc.w, acc.h1im / acc.w)
    );
  });
  return alignInteriorTangents(segs, pts);
}

function rebuildFreshPlacementSegments(anim) {
  anim.segments = computeFreshPlacementSegments(anim.anchors);
  anim.tContinuation = null;
  recompileAnim(anim);
}

function makeStraightSegment(p0, p1) {
  return makeSeg(lerpCx(p0, p1, 1 / 3), lerpCx(p0, p1, 2 / 3));
}

function cloneSegment(seg) {
  return seg ? {
    h0: cloneCx(seg.h0),
    h1: cloneCx(seg.h1),
    eccentricity: seg.eccentricity ?? 1,
    visible: seg.visible ?? true,
    compiled: null,
    compiledRef: null,
  } : null;
}

function lineToolModeForPlacement(anim) {
  return anim?.extensionAnchorIdx != null ? LINE_TOOL_MODE_POLYLINE : currentLineToolMode();
}

function polylineHasOpenDisconnectedStart(anim) {
  return !!anim && anim.anchors.length > 0 &&
    (anim.segments.length === 0 || anim.segments[anim.segments.length - 1] === null);
}

function committedPolylineSegmentCount(anim) {
  return anim ? anim.segments.reduce((count, seg) => count + (seg ? 1 : 0), 0) : 0;
}

function addDisconnectedPolylineStart(anim, anchor) {
  const target = cloneCx(anchor);
  if (polylineHasOpenDisconnectedStart(anim)) {
    anim.anchors[anim.anchors.length - 1] = target;
    return;
  }
  if (anim.anchors.length > 0) anim.segments.push(null);
  anim.anchors.push(target);
  anim.anchorLocked.push(false);
}

function addDisconnectedPolylineConnector(anim, endpoint, seg = null) {
  if (!polylineHasOpenDisconnectedStart(anim)) addDisconnectedPolylineStart(anim, endpoint);
  const start = anim.anchors[anim.anchors.length - 1];
  const target = cloneCx(endpoint);
  const committedSeg = cloneSegment(seg || makeStraightSegment(start, target));
  anim.anchors.push(target);
  anim.anchorLocked.push(false);
  anim.segments.push(committedSeg);
  recompileSegment(anim, anim.segments.length - 1);
}

function trimDanglingDisconnectedPolylineStart(anim) {
  if (!polylineHasOpenDisconnectedStart(anim)) return;
  anim.anchors.pop();
  if (anim.anchorLocked) anim.anchorLocked.pop();
  if (anim.anchorLabels) anim.anchorLabels.pop();
  if (anim.segments.length > 0 && anim.segments[anim.segments.length - 1] === null)
    anim.segments.pop();
}

function addPolylineSegment(anim, anchor) {
  const anch = anim.anchors;
  const segs = anim.segments;
  const target = cloneCx(anchor);
  const start = anch[anch.length - 1];
  anch.push(target);
  anim.anchorLocked.push(false);
  segs.push(makeStraightSegment(start, target));
  recompileAnim(anim);
}

function rotateUnitVector(vec, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return new Cx(vec.re * c - vec.im * s, vec.re * s + vec.im * c);
}

function lineIntersection(p, d, q, e) {
  const det = d.re * e.im - d.im * e.re;
  if (Math.abs(det) < 1e-9) return null;
  const qx = q.re - p.re, qy = q.im - p.im;
  const t = (qx * e.im - qy * e.re) / det;
  return new Cx(p.re + d.re * t, p.im + d.im * t);
}

function makeParabolicLineConnector(p0, p1, angleDeg, side) {
  const dx = p1.re - p0.re, dy = p1.im - p0.im;
  const L = Math.hypot(dx, dy);
  if (L < 1e-9) return makeStraightSegment(p0, p1);
  const chord = new Cx(dx / L, dy / L);
  const theta = angleDeg * Math.PI / 180;
  const t0 = rotateUnitVector(chord, side * theta);
  const t1 = rotateUnitVector(chord, -side * theta);
  let control = lineIntersection(p0, t0, p1, new Cx(-t1.re, -t1.im));
  if (!control || !control.ok()) {
    const normal = new Cx(-chord.im, chord.re);
    control = new Cx(
      (p0.re + p1.re) * 0.5 + normal.re * side * L * Math.tan(theta) * 0.5,
      (p0.im + p1.im) * 0.5 + normal.im * side * L * Math.tan(theta) * 0.5
    );
  }
  return makeSeg(
    new Cx(p0.re + (control.re - p0.re) * 2 / 3, p0.im + (control.im - p0.im) * 2 / 3),
    new Cx(p1.re + (control.re - p1.re) * 2 / 3, p1.im + (control.im - p1.im) * 2 / 3)
  );
}

function buildLineConnectorChoices(start, end) {
  const choices = [
    { key: 'straight', title: 'Straight line', seg: makeStraightSegment(start, end) },
    { key: 'inner-up', title: 'Gentle curve above', seg: makeParabolicLineConnector(start, end, 22.5, 1) },
    { key: 'outer-up', title: 'Wide curve above', seg: makeParabolicLineConnector(start, end, 45, 1) },
    { key: 'inner-down', title: 'Gentle curve below', seg: makeParabolicLineConnector(start, end, 22.5, -1) },
    { key: 'outer-down', title: 'Wide curve below', seg: makeParabolicLineConnector(start, end, 45, -1) },
  ];
  for (const choice of choices) recompileSegmentRaw(choice.seg, start, end);
  return choices;
}

function clearLineConnectorChoice() {
  lineConnectorChoice = null;
  lineConnectorChoiceHover = null;
}

function queryLineConnectorChoice(cx, cy) {
  if (!lineConnectorChoice) return null;
  let best = null, bestDist = Infinity;
  lineConnectorChoice.choices.forEach((choice, idx) => {
    const samples = sampleCompiledAdaptive(choice.seg.compiled);
    const hit = polylineHitInfo(samples, cx, cy);
    const threshold = (idx === 0 ? 10 : 8) * devicePixelRatio;
    if (hit.dist <= threshold && hit.dist < bestDist) {
      bestDist = hit.dist;
      best = { idx, choice };
    }
  });
  return best;
}

function commitLineConnectorChoice(choiceIdx = 0, shouldRender = true) {
  const pending = lineConnectorChoice;
  if (!pending?.anim) return false;
  const choice = pending.choices[choiceIdx] || pending.choices[0];
  pushUndo();
  clearLineConnectorChoice();
  addDisconnectedPolylineConnector(pending.anim, pending.end, choice.seg);
  if (shouldRender) {
    renderAnimList();
    draw();
    updateCursor();
  }
  return true;
}

// Commit a pending arc with independent handle lengths at each end.
function _commitPendingArc(anim, nextPoint) {
  const anch = anim.anchors, n = anch.length;
  const p_prev = anch[n-2], p_end = anch[n-1];
  const pending = buildPendingPlacementArc(p_prev, p_end, anim.tContinuation, nextPoint);
  anim.segments.push(pending.seg);
  anim.tContinuation = pending.tIn;
}

function pushUndo(preSnapshot) {
  undoStack.push(preSnapshot !== undefined ? preSnapshot : snapshotState());
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];

function isTypingTarget(el) {
  if (!el) return false;
  return el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable;
}

function animKind(anim) {
  return anim?.kind || 'freeform';

function isPrimitiveAnim(anim) {
  return PRIMITIVE_KINDS.has(animKind(anim));
}

function isTextAnim(anim) {
  return animKind(anim) === 'text';
}

function groupMembers(groupId) {
  if (groupId == null) return [];

function groupMemberIds(groupId) {

function cleanupSingletonGroups() {
  const childCount = new Map();
  animations.forEach(a => {
    if (a.groupId != null) childCount.set(a.groupId, (childCount.get(a.groupId) || 0) + 1);
  });
  groups.forEach(g => {
    if (g.parentGroupId != null) childCount.set(g.parentGroupId, (childCount.get(g.parentGroupId) || 0) + 1);
  });
  animations.forEach(a => {
    if (a.groupId == null) return;
    if ((childCount.get(a.groupId) || 0) < 2) {
      if (selectedGroupId === a.groupId) selectedGroupId = null;
      tilesDrillPath = tilesDrillPath.filter(id => id !== a.groupId);
      groupGroupCandidateIds.delete(a.groupId);
      const g = groups.find(grp => grp.id === a.groupId);
      a.groupId = g?.parentGroupId ?? null;
    }
  });

    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  renderAnimList(); neutralizeToolPanel(); draw(); updateCursor();
}

document.addEventListener('keydown', e => {
  if (isTypingTarget(document.activeElement)) return;
  if (e.key === 'Escape') {
    e.preventDefault();
    if (eyedropperTarget !== null) { deactivateEyedropper(); renderAnimList(); return; }
    const placing = animations.find(a => a.inPlacementMode);
    if (placing) {
      if (isPolylineAnim(placing) && lineConnectorChoice?.anim === placing) {
        commitLineConnectorChoice(0);
        return;
      }
      if (isPrimitiveAnim(placing) || placing.anchors.length === 0) {
        cancelPlacement(placing);
      } else {
        finalizePlacement(placing);
      }
      return;
    }
