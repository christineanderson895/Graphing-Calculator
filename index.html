    if (splitArcMode !== null) {
      splitArcMode = null;
      renderAnimList(); draw();
      return;
    }
    if (groupSelectionMode || isGroupSelectionActive() || isMultiSelectionActive()) {
      selectedGroupId = null;
      clearMultiSelection();
      clearGroupMode();
      renderAnimList(); draw();
      return;
    }
    if (editModeAnimId !== null) {
      exitEditMode();
      selectedId = null;
      animations.forEach(a => {
        a.expanded = false;
        a.expandedArcs = new Set();
        a.expandedAnchors = new Set();
      });
      renderAnimList(); draw();
      return;
    }
    return;
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && isGroupSelectionActive()) {
    e.preventDefault();
    deleteGroup(selectedGroupId);
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && isMultiSelectionActive()) {
    e.preventDefault();
    deleteMultiSelection();
    return;
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId != null) {
    e.preventDefault();
    const anim = animations.find(a => a.id === selectedId);
    if (anim && editModeAnimId === anim.id && anim.activeSegments.size === 1) {
      const segIdx = [...anim.activeSegments][0];
      if (anim.segments[segIdx]) { deleteArc(anim, segIdx); return; }
    }
    deleteAnimation(selectedId);
    return;
  }
  if (e.ctrlKey && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey && e.key === 'y') || (e.ctrlKey && e.shiftKey && (e.key === 'z' || e.key === 'Z'))) { e.preventDefault(); redo(); }
  if (e.ctrlKey && (e.key === 'd' || e.key === 'D')) { e.preventDefault(); duplicateAnimation(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); originX += scale; draw(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); originX -= scale; draw(); }
  if (e.key === 'ArrowUp')    { e.preventDefault(); originY += scale; draw(); }
  if (e.key === 'ArrowDown')  { e.preventDefault(); originY -= scale; draw(); }
});


// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — compilation & handle logic
// ════════════════════════════════════════════════════════

function recompileSegment(anim, i) {
  const seg = anim.segments[i];
  if (!seg) return;
  const A0 = anim.anchors[i], A1 = anim.anchors[i + 1];
  const pts = [A0, seg.h0, seg.h1, A1];
  const bezier    = buildBezierFn(pts);
  const composite = buildCompositeBezierFn(pts);
  seg.compiled = buildSingleEccentricityFn(pts, seg.eccentricity, bezier, null, composite);
  const previewEccs = Array.from({length: 21}, (_, j) => percentToEccentricity(j * 5));
  seg.compiledRef = previewEccs.map(e => ({
    eccentricity: e,
    fn: buildSingleEccentricityFn(pts, e, bezier, null, composite),
  }));
}

function recompileAnim(anim) {
  for (let i = 0; i < anim.segments.length; i++) recompileSegment(anim, i);
}

function recompileSegmentRaw(seg, A0, A1) {
  const pts = [A0, seg.h0, seg.h1, A1];
  const bezier = buildBezierFn(pts);
  const composite = buildCompositeBezierFn(pts);
  seg.compiled = buildSingleEccentricityFn(pts, seg.eccentricity, bezier, null, composite);
}

function swingOppositeHandle(anim, anchorIdx, movedWasOutgoing) {
  if (anim.segments.length < 2) return;
  if (anchorIdx <= 0 || anchorIdx >= anim.anchors.length - 1) return;
  if (!isAnchorLocked(anim, anchorIdx)) return;
  if (!anim.segments[anchorIdx] || !anim.segments[anchorIdx - 1]) return; // gap: no coupling
  const anchor = anim.anchors[anchorIdx];
  let movedHandle, oppSegIdx, oppSide;
  if (movedWasOutgoing) {
    movedHandle = anim.segments[anchorIdx].h0;
    oppSegIdx = anchorIdx - 1; oppSide = 'h1';
  } else {
    movedHandle = anim.segments[anchorIdx - 1].h1;
    oppSegIdx = anchorIdx; oppSide = 'h0';
  }
  const opp = anim.segments[oppSegIdx][oppSide];
  const dx = movedHandle.re - anchor.re, dy = movedHandle.im - anchor.im;
  const len = Math.hypot(dx, dy);
  if (len < 1e-9) return;
  const oppLen = Math.hypot(opp.re - anchor.re, opp.im - anchor.im);
  anim.segments[oppSegIdx][oppSide] = new Cx(anchor.re - dx/len*oppLen, anchor.im - dy/len*oppLen);
}

function enterEditMode(anim, activeSegs) {
  const fromObj = objWindowInteracting; objWindowInteracting = false;
  clearRotationMode();
  openColorMenuAnimId = null;
  selectedGroupId = null;
  clearMultiSelection();
  clearGroupMode();
  const keepGuide = selectedId === anim.id || editModeAnimId === anim.id;
  clearSelectionShearGuides(keepGuide ? anim : null);
  editModeAnimId = anim.id;
  selectedId = anim.id;
  if (!fromObj) sceneIndicatorAnimId = anim.id;
  animations.forEach(a => { a.expanded = a.id === anim.id; });
  anim.activeSegments = activeSegs !== undefined
    ? activeSegs
    : new Set();
  if (!anim.expandedAnchors) anim.expandedAnchors = new Set();
  anim.expandedAnchors.clear();
  if (!anim.expandedArcs) anim.expandedArcs = new Set();
  if (anim.activeSegments.size === 0) anim.expandedArcs.clear();
  fitObjWindow(); fitIsolationWindow();
  renderAnimList();
  draw();
}

function exitEditMode() {
  clearSelectionShearGuides();
  editModeAnimId = null;
  openColorMenuAnimId = null;
  finishCanvasTextEdit(false);
  eccentricitySliderActiveKey = null;
  eccDrag = null;
  frameDrag = null;
  frameHover = null;
  resizeHover = null;
  resizeDrag = null;
  clearRotationMode();
  rotateHover = null;
  rotateDrag = null;
  sideActionHover = null;
  plusHover = null;
  lockHover = null;
  rubberBand = null;
  splitArcMode = null;
  renderAnimList();
  draw();
}

function compactAnim(anim) {
  if (!anim.anchorLabels) anim.anchorLabels = [];
  while (anim.segments.length > 0 && !anim.segments[0]) {
    anim.segments.shift(); anim.anchors.shift(); anim.anchorLocked.shift(); anim.anchorLabels.shift();
  }
  while (anim.segments.length > 0 && !anim.segments[anim.segments.length - 1]) {
    anim.segments.pop(); anim.anchors.pop(); anim.anchorLocked.pop(); anim.anchorLabels.pop();
  }
}

function deleteArc(anim, segIdx) {
  pushUndo();
  if (anim.closed) anim.closed = false;
  anim.segments[segIdx] = null;
  anim.activeSegments.delete(segIdx);
  compactAnim(anim);
  if (anim.segments.length === 0) {
    if (editModeAnimId === anim.id) editModeAnimId = null;
    if (eccentricitySliderActiveKey?.animId === anim.id) eccentricitySliderActiveKey = null;
    if (plusHover?.anim?.id === anim.id) plusHover = null;
    if (selectedId === anim.id) selectedId = null;
    animations = animations.filter(a => a.id !== anim.id);
    renderAnimList(); draw(); updateCursor(); return;
  }
  recompileAnim(anim);
  enterEditMode(anim, new Set());
  updateCursor();
}


function cancelPlacement(anim) {
  if (!anim || !anim.inPlacementMode) return;
  placementPreviewPos = null;
  placementMatchCandidate = null;
  if (lineConnectorChoice?.anim === anim) clearLineConnectorChoice();
  if (anim.extensionAnchorIdx != null) {
    anim.inPlacementMode = false;
    anim.extensionAnchorIdx = null;
    anim.extensionInsertAt = 0;
    anim.tContinuation = null;
    recompileAnim(anim);
  } else {
    if (selectedId === anim.id) selectedId = null;
    if (editModeAnimId === anim.id) editModeAnimId = null;
    animations = animations.filter(a => a.id !== anim.id);
  }
  renderAnimList(); draw(); updateCursor();
}

function finalizePrimitivePlacement(anim) {
  if (!anim || !anim.inPlacementMode || !isPrimitiveAnim(anim)) return;
  if (anim.anchors.length < 2) {
    cancelPlacement(anim);
    return;
  }
  anim.inPlacementMode = false;
  anim.expanded = false;
  anim.activeSegments = new Set();
  placementPreviewPos = null;
  enterEditMode(anim);
  renderAnimList(); updateCursor();
  saveProject();
}

function finalizePolylinePlacement(anim) {
  if (!anim || !anim.inPlacementMode || !isPolylineAnim(anim)) return;
  const isExtension = anim.extensionAnchorIdx != null;
  if (lineConnectorChoice?.anim === anim) commitLineConnectorChoice(0, false);
  if (!isExtension) trimDanglingDisconnectedPolylineStart(anim);
  if (!isExtension && committedPolylineSegmentCount(anim) < 1) {
    cancelPlacement(anim);
    return;
  }
  if (anim.closed && (anim.anchors.length < 4 || anim.segments.length < 3)) {
    anim.closed = false;
  }
  anim.inPlacementMode = false;
  anim.tContinuation = null;
  anim.extensionAnchorIdx = null;
  anim.extensionInsertAt = 0;
  anim.extensionForward = true;
  recompileAnim(anim);
  placementPreviewPos = null;
  enterEditMode(anim);
  renderAnimList(); updateCursor();
  saveProject();
}

function finalizePlacement(anim) {
  if (!anim || !anim.inPlacementMode) return;
  if (isPrimitiveAnim(anim)) { finalizePrimitivePlacement(anim); return; }
  if (isPolylineAnim(anim)) { finalizePolylinePlacement(anim); return; }
  if (anim.anchors.length === 0) {
    animations = animations.filter(a => a.id !== anim.id);
    renderAnimList(); draw(); updateCursor(); return;
  }
  anim.inPlacementMode = false;
  anim.tContinuation = null;
  anim.extensionAnchorIdx = null;
  recompileAnim(anim);
  placementPreviewPos = null;
  placementMatchCandidate = null;
  enterEditMode(anim);
  renderAnimList(); updateCursor();
  saveProject();
}

function objectLetterForIndex(idx) {
  let n = Math.max(0, Math.floor(idx));
  let label = '';
  do {
    label = String.fromCharCode(65 + (n % 26)) + label;
    n = Math.floor(n / 26) - 1;
  } while (n >= 0);
  return label;
}

function renumberAnimationsByStackOrder() {
  animations.forEach((anim, idx) => { anim.letter = objectLetterForIndex(idx); });
}

function nextLetter() {
  const used = new Set(animations.map(a => a.letter));
  for (let i = 0; i < animations.length + 26; i++) {
    const ch = objectLetterForIndex(i);
    if (!used.has(ch)) return ch;
  }
  return objectLetterForIndex(animations.length);
}

function addAnimation(kind = 'freeform') {
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  const letter = nextLetter();
  const defaultColor = normalizeColorString(globalSettings.defaultColor);
  const color  = defaultColor || DEFAULT_COLORS[animColorIdx++ % DEFAULT_COLORS.length];
  const anim = {
    id: Date.now() + Math.random(),
    letter, color, kind,
    fillColor: null,
    outlineOpacity: 1,
    fillOpacity: 0.3,
    fillStyle: 'solid',
    closed: false,
    text: '',
    fontSize: 36,
    textScaleX: 1,
    textScaleY: 1,
    textShearX: 0,
    textShearY: 0,
    visible: true, thickness: globalSettings.defaultThickness,
    rotation: 0,
    anchors: [],
    segments: [],
    anchorLocked: [],
    anchorLabels: [],
    activeSegments: new Set(),
    inPlacementMode: true,
    reversePlacement: false,
    extensionAnchorIdx: null,
    extensionForward: true,
    extensionInsertAt: 0,
    tContinuation: null,
    expanded: false,
    expandedAnchors: new Set(),
    expandedArcs: new Set(),
  };
  if (canFillAnim(anim)) anim.fillColor = color;
  animations.push(anim);
  selectedGroupId = null;
  clearMultiSelection();
  selectedId = anim.id;
  renderAnimList(); draw(); updateCursor();
  return anim;
}

function addPrimitiveAnimation(kind) {
  return addAnimation(kind);
}

function addPolylineAnimation() {
  return addAnimation(POLYLINE_KIND);
}

function addTextAnimation() {
  const anim = addAnimation('text');
  anim.text = 'Text';
  anim.fontSize = 36;
  anim.textScaleX = 1;
  anim.textScaleY = 1;
  anim.textShearX = 0;
  anim.textShearY = 0;
  anim.thickness = 1;
  anim.outlineOpacity = 0;
  anim.fillColor = anim.color;
  anim.fillOpacity = 1;
  anim.fillStyle = 'solid';
  renderAnimList(); draw(); updateCursor();
  return anim;
}

function startPlacementFromTool(kind) {
  openColorMenuAnimId = null;
  const placing = animations.find(a => a.inPlacementMode);
  if (placing && activePlacementTool() === kind) {
    cancelPlacement(placing);
    return;
  }
  if (placing) cancelPlacement(placing);
  exitEditMode();
  selectedGroupId = null;
  clearMultiSelection();
  clearGroupMode();
  if (kind === 'line') addPolylineAnimation();
  else if (isPrimitiveAnim({ kind })) addPrimitiveAnimation(kind);
  else if (kind === 'text') addTextAnimation();
  else addAnimation('freeform');
  updateToolPanel();
}


function duplicateAnimation() {
  if (isGroupSelectionActive()) {
    createGroupSideActionCopy(selectedGroupId, 'duplicate');
    return;
  }
  if (isMultiSelectionActive()) {
    createMultiSelectionSideActionCopy('duplicate');
    return;
  }
  if (!selectedId) return;
  const src = animations.find(a => a.id === selectedId);
  if (!src || src.inPlacementMode) return;
  pushUndo();
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  const anim = {
    id: Date.now() + Math.random(),
    letter: nextLetter(),
    color: src.color,
    kind: animKind(src),
    fillColor: animFillColor(src),
    outlineOpacity: animOutlineOpacity(src),
    fillOpacity: animFillOpacity(src),
    fillStyle: animFillStyle(src),
    closed: !!src.closed,
    text: src.text ?? '',
    fontSize: src.fontSize ?? 36,
    textScaleX: src.textScaleX ?? 1,
    textScaleY: src.textScaleY ?? 1,
    textShearX: src.textShearX ?? 0,
    textShearY: src.textShearY ?? 0,
    visible: src.visible,
    thickness: src.thickness,
    rotation: animRotation(src),
    anchors: src.anchors.map(a => new Cx(a.re + 1, a.im - 1)),
    segments: src.segments.map(s => s ? ({
      h0: new Cx(s.h0.re + 1, s.h0.im - 1),
      h1: new Cx(s.h1.re + 1, s.h1.im - 1),
      eccentricity: s.eccentricity,
      compiled: null,
      compiledRef: null,
    }) : null),
    anchorLocked: src.anchorLocked ? [...src.anchorLocked] : [],
    activeSegments: new Set([...Array(src.segments.length).keys()]),
    inPlacementMode: false,
    expanded: true,
    expandedAnchors: new Set(),
    expandedArcs: new Set(),
  };
  animations.push(anim);
  recompileAnim(anim);
  enterEditMode(anim);
  updateCursor();
}

// ════════════════════════════════════════════════════════
// ANIMATIONS MODE — canvas interaction
// ════════════════════════════════════════════════════════

function makeTransformedAnimation(src, transformPoint, rotation) {
  return {
    id: Date.now() + Math.random(),
    letter: nextLetter(),
    color: src.color,
    kind: animKind(src),
    fillColor: animFillColor(src),
    outlineOpacity: animOutlineOpacity(src),
    fillOpacity: animFillOpacity(src),
    fillStyle: animFillStyle(src),
    closed: !!src.closed,
    text: src.text ?? '',
    fontSize: src.fontSize ?? 36,
    textScaleX: src.textScaleX ?? 1,
    textScaleY: src.textScaleY ?? 1,
    textShearX: src.textShearX ?? 0,
    textShearY: src.textShearY ?? 0,
    visible: src.visible,
    thickness: src.thickness,
    rotation,
    anchors: src.anchors.map(transformPoint),
    segments: src.segments.map(s => s ? ({
      h0: transformPoint(s.h0),
      h1: transformPoint(s.h1),
      eccentricity: s.eccentricity,
      compiled: null,
      compiledRef: null,
    }) : null),
    anchorLocked: src.anchorLocked ? [...src.anchorLocked] : [],
    activeSegments: new Set(),
    inPlacementMode: false,
    reversePlacement: false,
    extensionAnchorIdx: null,
    extensionForward: true,
    extensionInsertAt: 0,
    tContinuation: null,
    expanded: false,
    expandedAnchors: new Set(),
    expandedArcs: new Set(),
  };
}

function sideActionTargetLeftMath(src, kind) {
  const bounds = selectedArcMathBounds(src) || objectMathBounds(src);
  const btn = selectionSideActionButtons(src).find(b => b.kind === kind);
  if (!bounds || !btn) return null;
  const gap = 6 * devicePixelRatio;
  const [targetLeft] = toMath(btn.x + btn.w + gap, 0);
  return { bounds, targetLeft };
}

function makeTransformedArcAnimation(src, segIdx, transformPoint) {
  const seg = src.segments[segIdx];
  const kind = isPolylineAnim(src) ? POLYLINE_KIND : 'freeform';
  return {
    id: Date.now() + Math.random(),
    letter: nextLetter(),
    color: src.color,
    kind,
    fillColor: null,
    outlineOpacity: animOutlineOpacity(src),
    fillOpacity: animFillOpacity(src),
    fillStyle: animFillStyle(src),
    closed: false,
    text: '',
    fontSize: 36,
    textScaleX: 1,
    textScaleY: 1,
    textShearX: 0,
    textShearY: 0,
    visible: src.visible,
    thickness: src.thickness,
    rotation: 0,
    anchors: [transformPoint(src.anchors[segIdx]), transformPoint(src.anchors[segIdx + 1])],
    segments: [{
      h0: transformPoint(seg.h0),
      h1: transformPoint(seg.h1),
      eccentricity: seg.eccentricity,
      compiled: null,
      compiledRef: null,
    }],
    anchorLocked: [isAnchorLocked(src, segIdx), isAnchorLocked(src, segIdx + 1)],
    activeSegments: new Set(),
    inPlacementMode: false,
    reversePlacement: false,
    extensionAnchorIdx: null,
    extensionForward: true,
    extensionInsertAt: 0,
    tContinuation: null,
    expanded: false,
    expandedAnchors: new Set(),
    expandedArcs: new Set(),
  };
}

function createSideActionCopy(src, kind) {
  if (!src || src.inPlacementMode) return;
  const placement = sideActionTargetLeftMath(src, kind);
  if (!placement) return;
  const { bounds, targetLeft } = placement;
  pushUndo();

  let transformPoint;
  let rotation = animRotation(src);
  if (kind === 'reflect') {
    const mirrorX = (bounds.right + targetLeft) * 0.5;
    transformPoint = pt => new Cx(2 * mirrorX - pt.re, pt.im);
    rotation = -rotation;
  } else {
    const dx = targetLeft - bounds.left;
    transformPoint = pt => new Cx(pt.re + dx, pt.im);
  }

  const segIdx = activeArcIndex(src);
  const anim = segIdx !== null
    ? makeTransformedArcAnimation(src, segIdx, transformPoint)
    : makeTransformedAnimation(src, transformPoint, rotation);
  if (kind === 'reflect' && isTextAnim(anim)) anim.textScaleX = -(anim.textScaleX || 1);
  animations.push(anim);
  recompileAnim(anim);

  selectedGroupId = null;
  selectedId = src.id;
  src.expanded = true;
  anim.expanded = false;
  anim.activeSegments = new Set();
  anim.expandedAnchors = new Set();
  anim.expandedArcs = new Set();
  clearSelectionHovers();
  renderAnimList(); draw(); updateCursor();
}

function createGroupSideActionCopy(groupId, kind) {
  const members = allDescendantAnims(groupId);
  if (members.length === 0) return;
  const bounds = groupMathBounds(groupId);
  const btn = groupSelectionSideActionButtons(groupId).find(b => b.kind === kind);
  if (!bounds || !btn) return;
  const gap = 6 * devicePixelRatio;
  const [targetLeft] = toMath(btn.x + btn.w + gap, 0);
  pushUndo();

  let transformPoint;
  if (kind === 'reflect') {
    const mirrorX = (bounds.right + targetLeft) * 0.5;
    transformPoint = pt => new Cx(2 * mirrorX - pt.re, pt.im);
  } else {
    const dx = targetLeft - bounds.left;
    transformPoint = pt => new Cx(pt.re + dx, pt.im);
  }

  const newGroupId = Date.now() + Math.random();
  const copies = members.map(src => {
    const rotation = kind === 'reflect' ? -animRotation(src) : animRotation(src);
    const copy = makeTransformedAnimation(src, transformPoint, rotation);
    copy.groupId = newGroupId;
    if (kind === 'reflect' && isTextAnim(copy)) copy.textScaleX = -(copy.textScaleX || 1);
    recompileAnim(copy);
    return copy;
  });
  animations.push(...copies);
  selectGroup(groupId);
  renderAnimList(); draw(); updateCursor();
}

function createMultiSelectionSideActionCopy(kind) {
  const members = multiSelectionMembers();
  if (members.length === 0) return;
  const bounds = multiSelectionMathBounds();
  const btn = multiSelectionSideActionButtons().find(b => b.kind === kind);
  if (!bounds || !btn) return;
  const gap = 6 * devicePixelRatio;
  const [targetLeft] = toMath(btn.x + btn.w + gap, 0);
  pushUndo();

  let transformPoint;
  if (kind === 'reflect') {
    const mirrorX = (bounds.right + targetLeft) * 0.5;
    transformPoint = pt => new Cx(2 * mirrorX - pt.re, pt.im);
  } else {
    const dx = targetLeft - bounds.left;
    transformPoint = pt => new Cx(pt.re + dx, pt.im);
  }

  const copies = members.map(src => {
    const rotation = kind === 'reflect' ? -animRotation(src) : animRotation(src);
    const copy = makeTransformedAnimation(src, transformPoint, rotation);
    if (kind === 'reflect' && isTextAnim(copy)) copy.textScaleX = -(copy.textScaleX || 1);
    recompileAnim(copy);
    return copy;
  });
  animations.push(...copies);
  renumberAnimationsByStackOrder();
  selectTemporaryMultiSelection(members.map(a => a.id));
  renderAnimList(); draw(); updateCursor();
}

function softSnap(v) {
  const threshold = snapThreshold();
  if (threshold <= 0) return v;
  const n = Math.round(v);
  return Math.abs(v - n) <= threshold ? n : v;
}

function snapPointToLattice(pt, threshold = snapThreshold()) {
  if (threshold <= 0) return pt;
  const nearX = Math.round(pt.re), nearY = Math.round(pt.im);
  return new Cx(
    Math.abs(pt.re - nearX) <= threshold ? nearX : pt.re,
    Math.abs(pt.im - nearY) <= threshold ? nearY : pt.im
  );
}

function rotateMathPoint(pt, center, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  const dx = pt.re - center.re, dy = pt.im - center.im;
  return new Cx(center.re + dx * c - dy * s, center.im + dx * s + dy * c);
}

function primitiveCenter(anim) {
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  if (!p0) return null;
  const kind = animKind(anim);
  if (kind === 'circle' || kind === 'ellipse') return p0;
  if (!p1) return p0;
  return new Cx((p0.re + p1.re) * 0.5, (p0.im + p1.im) * 0.5);
}

function primitiveRectangleCorners(anim) {
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  if (!p0 || !p1) return [];
  const center = primitiveCenter(anim);
  const corners = [
    new Cx(p0.re, p0.im),
    new Cx(p1.re, p0.im),
    new Cx(p1.re, p1.im),
    new Cx(p0.re, p1.im),
  ];
  const rot = animRotation(anim);
  return rot ? corners.map(pt => rotateMathPoint(pt, center, rot)) : corners;
}

function samplePrimitiveBoundaryMath(anim, count = 96) {
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  if (!p0 || !p1) return [];
  const kind = animKind(anim);
  if (kind === 'line') return [p0, p1];
  if (kind === 'rectangle') return primitiveRectangleCorners(anim);
  const rot = animRotation(anim);
  if (kind === 'circle') {
    const radius = Math.hypot(p1.re - p0.re, p1.im - p0.im);
    return Array.from({ length: count }, (_, i) => {
      const a = Math.PI * 2 * i / count;
      return new Cx(p0.re + radius * Math.cos(a), p0.im + radius * Math.sin(a));
    });
  }
  if (kind === 'ellipse') {
    const rx = Math.abs(p1.re - p0.re), ry = Math.abs(p1.im - p0.im);
    return Array.from({ length: count }, (_, i) => {
      const a = Math.PI * 2 * i / count;
      const local = new Cx(p0.re + rx * Math.cos(a), p0.im + ry * Math.sin(a));
      return rot ? rotateMathPoint(local, p0, rot) : local;
    });
  }
  return [];
}

const SCISSORS_CURSOR = (() => {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3" fill="#fff" stroke="#000" stroke-width="2.5"/><circle cx="6" cy="18" r="3" fill="#fff" stroke="#000" stroke-width="2.5"/><line x1="20" y1="4" x2="8.12" y2="15.88" stroke="#000" stroke-width="3.5"/><line x1="20" y1="4" x2="8.12" y2="15.88" stroke="#fff" stroke-width="1.5"/><line x1="14.47" y1="14.48" x2="20" y2="20" stroke="#000" stroke-width="3.5"/><line x1="14.47" y1="14.48" x2="20" y2="20" stroke="#fff" stroke-width="1.5"/><line x1="8.12" y1="8.12" x2="12" y2="12" stroke="#000" stroke-width="3.5"/><line x1="8.12" y1="8.12" x2="12" y2="12" stroke="#fff" stroke-width="1.5"/></svg>`;
  return `url("data:image/svg+xml;base64,${btoa(svg)}") 12 12, crosshair`;
})();

const EYEDROPPER_CURSOR = (() => {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M3 21l1.5-4.5L15.5 6l3 3L8 20.5z" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-linejoin="round"/><path d="M18.5 6l1.5-1.5c.8-.8.8-2.2 0-3s-2.2-.8-3 0L15.5 3" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round"/><circle cx="3" cy="21" r="2" fill="#000000"/></svg>`;
  return `url("data:image/svg+xml;base64,${btoa(svg)}") 3 21, crosshair`;
})();

function deactivateEyedropper() {
  eyedropperTarget = null;
  eyedropperAnimId = null;
  updateCursor();
}

function applyEyedropperColor(hex) {
  const anim = animations.find(a => a.id === eyedropperAnimId);
  if (!anim) { deactivateEyedropper(); return; }
  pushUndo();
  if (eyedropperTarget === 'gradientTo') {
    anim.gradientToColor = hex;
    openColorMenuAnimId = eyedropperAnimId;
    colorEditTarget = 'fill';
    gradientColorTab = 2;
  } else if (eyedropperTarget === 'fill') {
    anim.fillColor = hex;
    if (!anim.fillStyle) anim.fillStyle = 'solid';
    anim.fillOpacity = 1;
    openColorMenuAnimId = eyedropperAnimId;
    colorEditTarget = 'fill';
    gradientColorTab = 1;
  } else {
    anim.color = hex;
    anim.outlineOpacity = 1;
    openColorMenuAnimId = eyedropperAnimId;
    colorEditTarget = eyedropperTarget;
  }
  deactivateEyedropper();
  renderAnimList(); draw();
}

function updateCursor() {
  if (eyedropperTarget !== null) {
    canvas.style.cursor = EYEDROPPER_CURSOR;
    objCanvas.style.cursor = EYEDROPPER_CURSOR;
    isolCanvas.style.cursor = EYEDROPPER_CURSOR;
    return;
  }
  const placing = animations.some(a => a.inPlacementMode);
  if (placing) {
    canvas.style.cursor = lineConnectorChoice
      ? (lineConnectorChoiceHover ? 'pointer' : 'crosshair')
      : 'none';
  } else if (splitArcMode !== null) {
    const onTarget = segmentHover?.anim === splitArcMode.anim && segmentHover?.segIdx === splitArcMode.segIdx;
    canvas.style.cursor = 'default';
    objCanvas.style.cursor = onTarget ? SCISSORS_CURSOR : 'not-allowed';
    isolCanvas.style.cursor = onTarget ? SCISSORS_CURSOR : 'not-allowed';
    return;
  } else if (resizeDrag) {
    const c = resizeCursorForHandle(resizeDrag.handle);
    canvas.style.cursor = c === 'grab' ? 'grabbing' : c;
  } else if (resizeHover) {
    canvas.style.cursor = resizeCursorForHandle(resizeHover.handle);
  } else if (rotateDrag) {
    canvas.style.cursor = 'grabbing';
  } else if (rotateHover) {
    canvas.style.cursor = 'grab';
  } else if (sideActionHover) {
    canvas.style.cursor = 'grab';
  } else if (anchorHover || handleHover || lockHover) {
    canvas.style.cursor = 'grab';
  } else if (plusHover) {
    canvas.style.cursor = 'default';
  } else if (frameHover) {
    canvas.style.cursor = 'move';
  } else if (anchorDrag || handleDrag || curveDrag || eccDrag || frameDrag || dragging || objDragging) {
    canvas.style.cursor = 'grabbing';
  } else if (segmentHover) {
    canvas.style.cursor = 'grab';
  } else {
    canvas.style.cursor = 'default';
  }
  if (AUX_WINDOWS_ENABLED) {
    objCanvas.style.cursor = (resizeDrag?.onObjCanvas || rotateDrag?.onObjCanvas || anchorDrag?.onObjCanvas ||
      handleDrag?.onObjCanvas || curveDrag?.onObjCanvas || eccDrag?.onObjCanvas || objDragging) ? 'grabbing' : 'crosshair';
    isolCanvas.style.cursor = (resizeDrag?.onIsolCanvas || rotateDrag?.onIsolCanvas || anchorDrag?.onIsolCanvas ||
      handleDrag?.onIsolCanvas || curveDrag?.onIsolCanvas || eccDrag?.onIsolCanvas || isolDragging) ? 'grabbing' : 'crosshair';
  }
}

function queryAnchorHover(mathX, mathY, thresholdPx = 7 * devicePixelRatio) {
  let best = null, bestDist = Infinity;
  const [cx, cy] = toCanvas(mathX, mathY);
  if (editModeAnimId) {
    const anim = animations.find(a => a.id === editModeAnimId);
    if (isPrimitiveAnim(anim) || isTextAnim(anim)) return null;
    if (anim && isAnimEffectivelyVisible(anim) && !anim.inPlacementMode) {
      const { anchorSet } = getActiveHandleInfo(anim);
      for (const i of anchorSet) {
        const a = anim.anchors[i];
        if (!a) continue;
        const [ax, ay] = toCanvas(a.re, a.im);
        const d = Math.hypot(ax - cx, ay - cy);
        if (d <= thresholdPx && d < bestDist) { bestDist = d; best = { anim, anchorIdx: i }; }
      }
    }
  } else if (isIsolViewport) {
    for (const anim of animations) {
      if (!isAnimEffectivelyVisible(anim) || anim.inPlacementMode) continue;
      if (isPrimitiveAnim(anim) || isTextAnim(anim)) continue;
      for (let i = 0; i < anim.anchors.length; i++) {
        const a = anim.anchors[i];
        if (!a) continue;
        const [ax, ay] = toCanvas(a.re, a.im);
        const d = Math.hypot(ax - cx, ay - cy);
        if (d <= thresholdPx && d < bestDist) { bestDist = d; best = { anim, anchorIdx: i }; }
      }
    }
  }
  return best;
}

function queryHandleHover(mathX, mathY) {
  if (!editModeAnimId) return null;
  const anim = animations.find(a => a.id === editModeAnimId);
  if (!anim) return null;
  if (isPrimitiveAnim(anim) || isTextAnim(anim)) return null;
  const { handlePairs } = getActiveHandleInfo(anim);
  const thresholdPx = 7 * devicePixelRatio;
  const [cx, cy] = toCanvas(mathX, mathY);
  let best = null, bestDist = Infinity;
  for (const { segIdx, side } of handlePairs) {
    const h = anim.segments[segIdx][side];
    const [hx, hy] = toCanvas(h.re, h.im);
    const d = Math.hypot(hx - cx, hy - cy);
    if (d < thresholdPx && d < bestDist) { bestDist = d; best = { anim, segIdx, side }; }
  }
  return best;
}


function distPointToSegmentPx(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq < 1e-9) return Math.hypot(px - ax, py - ay);
  const t = clamp(((px - ax) * dx + (py - ay) * dy) / lenSq, 0, 1);
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function isPointInCurrentPathEvenOdd(renderCtx, cx, cy) {
  try { return renderCtx.isPointInPath(cx, cy, 'evenodd'); }
  catch (_err) { return renderCtx.isPointInPath(cx, cy); }
}

function addPrimitiveFillPath(renderCtx, anim) {
  if (!isPrimitiveAnim(anim) || animKind(anim) === 'line' || anim.anchors.length < 2) return false;
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  const [x0, y0] = toCanvas(p0.re, p0.im);
  const [x1, y1] = toCanvas(p1.re, p1.im);
  const kind = animKind(anim);
  if (kind === 'rectangle') {
    const pts = primitiveRectangleCorners(anim).map(pt => toCanvas(pt.re, pt.im));
    if (pts.length < 4) return false;
    renderCtx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) renderCtx.lineTo(pts[i][0], pts[i][1]);
    renderCtx.closePath();
    return true;
  }
  if (kind === 'circle') {
    const radius = Math.hypot(x1 - x0, y1 - y0);
    renderCtx.arc(x0, y0, radius < 1e-6 ? Math.max(2 * devicePixelRatio, primitiveStrokeWidth(anim) * 0.5) : radius, 0, Math.PI * 2);
    return true;
  }
  if (kind === 'ellipse') {
    const rx = Math.abs(x1 - x0), ry = Math.abs(y1 - y0);
    renderCtx.ellipse(x0, y0, Math.max(rx, 1e-6), Math.max(ry, 1e-6), -animRotation(anim), 0, Math.PI * 2);
    return true;
  }
  return false;
}

function animHasVisibleFill(anim) {
  return !!anim && isAnimEffectivelyVisible(anim) && !anim.inPlacementMode && canFillAnim(anim) &&
         !!animFillColor(anim) && animFillOpacity(anim) > 0;
}

function primitiveFillHit(anim, cx, cy) {
  if (!animHasVisibleFill(anim) || !isPrimitiveAnim(anim)) return false;
  ctx.save();
  ctx.beginPath();
  const drew = addPrimitiveFillPath(ctx, anim);
  const hit = drew && isPointInCurrentPathEvenOdd(ctx, cx, cy);
  ctx.restore();
  ctx.beginPath();
  return hit;
}

function curveFillMaskHit(anim, cx, cy, blockers) {
  const sx = Math.round(cx), sy = Math.round(cy);
  if (sx < 0 || sy < 0 || sx >= canvas.width || sy >= canvas.height) return false;

  const candidateCanvas = document.createElement('canvas');
  candidateCanvas.width = canvas.width;
  candidateCanvas.height = canvas.height;
  const candidateCtx = candidateCanvas.getContext('2d');
  candidateCtx.fillStyle = '#000';
  candidateCtx.beginPath();
  const drewCandidate = addCurveFillPath(candidateCtx, anim, false);
  if (!drewCandidate) return false;
  fillEvenOdd(candidateCtx);

  const barrierCanvas = document.createElement('canvas');
  barrierCanvas.width = canvas.width;
  barrierCanvas.height = canvas.height;
  const barrierCtx = barrierCanvas.getContext('2d');
  for (const blocker of blockers) drawHigherLayerBlockerMask(barrierCtx, blocker);

  const reachableMask = floodOpenFillMask(anim, candidateCanvas, barrierCanvas);
  return reachableMask.getContext('2d').getImageData(sx, sy, 1, 1).data[3] > 0;
}

function curveFillHit(anim, cx, cy) {
  if (!animHasVisibleFill(anim) || isPrimitiveAnim(anim) || isTextAnim(anim)) return false;
  const closedOnly = !!(anim.closed && findLoopRange(anim));
  if (!closedOnly) {
    const blockers = higherLayerBlockersFor(anim);
    if (blockers.length) return curveFillMaskHit(anim, cx, cy, blockers);
  }
  ctx.save();
  ctx.beginPath();
  const drew = addCurveFillPath(ctx, anim, closedOnly);
  const hit = drew && isPointInCurrentPathEvenOdd(ctx, cx, cy);
  ctx.restore();
  ctx.beginPath();
  return hit;
}

function textFillHit(anim, cx, cy) {
  return animHasVisibleFill(anim) && isTextAnim(anim) && textHitDistance(anim, cx, cy) === 0;
}

function fillHitCandidate(anim, cx, cy) {
  if (!animHasVisibleFill(anim)) return false;
  if (isTextAnim(anim)) return textFillHit(anim, cx, cy);
  if (isPrimitiveAnim(anim)) return primitiveFillHit(anim, cx, cy);
  return curveFillHit(anim, cx, cy);
}

function queryFillHit(cx, cy) {
  for (let i = animations.length - 1; i >= 0; i--) {
    const anim = animations[i];
    if (fillHitCandidate(anim, cx, cy)) return anim;
  }
  return null;
}

function primitiveHitDistance(anim, cx, cy) {
  if (!isPrimitiveAnim(anim) || anim.anchors.length < 2) return Infinity;
  const p0 = anim.anchors[0], p1 = anim.anchors[1];
  const [x0, y0] = toCanvas(p0.re, p0.im);
  const [x1, y1] = toCanvas(p1.re, p1.im);
  if (anim.kind === 'line') {
    return distPointToSegmentPx(cx, cy, x0, y0, x1, y1);
  }
  if (anim.kind === 'rectangle') {
    const pts = primitiveRectangleCorners(anim).map(pt => toCanvas(pt.re, pt.im));
    if (pts.length < 4) return Infinity;
    let best = Infinity;
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i], b = pts[(i + 1) % pts.length];
      best = Math.min(best, distPointToSegmentPx(cx, cy, a[0], a[1], b[0], b[1]));
    }
    return best;
  }
  if (anim.kind === 'circle') {
    const radius = Math.hypot(x1 - x0, y1 - y0);
    return Math.abs(Math.hypot(cx - x0, cy - y0) - radius);
  }
  if (anim.kind === 'ellipse') {
    const rx = Math.abs(x1 - x0), ry = Math.abs(y1 - y0);
    if (rx < 1e-6 && ry < 1e-6) return Math.hypot(cx - x0, cy - y0);
    const [mx, my] = toMath(cx, cy);
    const center = p0;
    const local = rotateMathPoint(new Cx(mx, my), center, -animRotation(anim));
    if (rx < 1e-6) {
      const a = rotateMathPoint(new Cx(center.re, center.im - Math.abs(p1.im - p0.im)), center, animRotation(anim));
      const b = rotateMathPoint(new Cx(center.re, center.im + Math.abs(p1.im - p0.im)), center, animRotation(anim));
      const [ax, ay] = toCanvas(a.re, a.im), [bx, by] = toCanvas(b.re, b.im);
      return distPointToSegmentPx(cx, cy, ax, ay, bx, by);
    }
    if (ry < 1e-6) {
      const a = rotateMathPoint(new Cx(center.re - Math.abs(p1.re - p0.re), center.im), center, animRotation(anim));
      const b = rotateMathPoint(new Cx(center.re + Math.abs(p1.re - p0.re), center.im), center, animRotation(anim));
      const [ax, ay] = toCanvas(a.re, a.im), [bx, by] = toCanvas(b.re, b.im);
      return distPointToSegmentPx(cx, cy, ax, ay, bx, by);
    }
    const angle = Math.atan2((local.im - center.im) / Math.abs(p1.im - p0.im), (local.re - center.re) / Math.abs(p1.re - p0.re));
    const boundaryLocal = new Cx(center.re + Math.abs(p1.re - p0.re) * Math.cos(angle), center.im + Math.abs(p1.im - p0.im) * Math.sin(angle));
    const boundary = rotateMathPoint(boundaryLocal, center, animRotation(anim));
    const [ex, ey] = toCanvas(boundary.re, boundary.im);
    return Math.hypot(cx - ex, cy - ey);
  }
  return Infinity;
}

function segmentHitCandidate(anim, cx, cy) {
  if (!anim || !isAnimEffectivelyVisible(anim) || anim.inPlacementMode) return null;
  if (isPrimitiveAnim(anim)) {
    const dist = primitiveHitDistance(anim, cx, cy);
    return { dist, hit: { anim, segIdx: 0, primitive: true } };
  }
  if (isTextAnim(anim)) {
    const dist = textHitDistance(anim, cx, cy);
    return { dist, hit: { anim, segIdx: 0, text: true } };
  }
  let bestHit = null, bestDist = Infinity;
  for (let segIdx = 0; segIdx < anim.segments.length; segIdx++) {
    const seg = anim.segments[segIdx];
    if (!seg || !seg.compiled) continue;
    if (seg.visible === false && editModeAnimId !== anim.id) continue;
    const samples = sampleCompiledAdaptive(seg.compiled);
    const hit = polylineHitInfo(samples, cx, cy);
    if (hit.dist < bestDist) {
      bestDist = hit.dist;
      bestHit = { anim, segIdx, u: hit.u };
    }
  }
  return bestHit ? { dist: bestDist, hit: bestHit } : null;
}

function querySegmentHover(cx, cy) {
  const threshold = 8 * devicePixelRatio;
  const frontAnim = frontEditingAnim();
  const frontHit = segmentHitCandidate(frontAnim, cx, cy);
  if (frontHit && frontHit.dist <= threshold) return frontHit.hit;

  let bestHit = null, bestDist = Infinity;
  for (const anim of animations) {
    if (anim === frontAnim) continue;
    const candidate = segmentHitCandidate(anim, cx, cy);
    if (candidate && candidate.dist < bestDist) {
      bestDist = candidate.dist;
      bestHit = candidate.hit;
    }
  }
  return bestDist <= threshold ? bestHit : null;
}

function drawDot(anim) {
  const dpr = devicePixelRatio;
  const r = dotRadius(anim);
  const [x, y] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
  ctx.save();
  ctx.globalAlpha = animOutlineOpacity(anim);
  ctx.fillStyle = anim.color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function dotRadius(anim) {
  return (2 + anim.thickness * 0.5) * devicePixelRatio;
}

function textLines(anim) {
  const raw = anim?.text ?? '';
  const lines = String(raw).replace(/\r\n/g, '\n').split('\n');
  return lines.length ? lines : [''];
}

function textFont(anim) {
  const size = Math.max(1, anim?.fontSize ?? 36) * (scale / TEXT_BASE_SCALE) * devicePixelRatio;
  return `${size}px sans-serif`;
}

function textScreenFontSize(anim) {
  return Math.max(1, anim?.fontSize ?? 36) * (scale / TEXT_BASE_SCALE);
}

function textScaleX(anim) {
  const v = anim?.textScaleX;
  return isFinite(v) && Math.abs(v) > 1e-6 ? v : 1;
}

function textScaleY(anim) {
  const v = anim?.textScaleY;
  return isFinite(v) && Math.abs(v) > 1e-6 ? v : 1;
}

function textShearX(anim) {
  const v = anim?.textShearX;
  return isFinite(v) ? v : 0;
}

function textShearY(anim) {
  const v = anim?.textShearY;
  return isFinite(v) ? v : 0;
}

function transformTextLocalPoint(anim, lx, ly) {
  const sx = textScaleX(anim), sy = textScaleY(anim);
  const shx = textShearX(anim), shy = textShearY(anim);
  const x0 = lx * sx, y0 = ly * sy;
  const x = x0 + shx * y0;
  const y = y0 + shy * x0;
  const rot = -animRotation(anim);
  const cos = Math.cos(rot), sin = Math.sin(rot);
  return [x * cos - y * sin, x * sin + y * cos];
}

function textCanvasMetrics(anim) {
  if (!isTextAnim(anim) || !anim.anchors[0]) return null;
  const lines = textLines(anim);
  ctx.save();
  ctx.font = textFont(anim);
  let width = 1;
  for (const line of lines) width = Math.max(width, ctx.measureText(line || ' ').width);
  ctx.restore();
  const fontPx = textScreenFontSize(anim) * devicePixelRatio;
  const lineHeight = fontPx * 1.2;
  return { lines, width, height: Math.max(lineHeight, lines.length * lineHeight), fontPx, lineHeight };
}

function textCanvasCorners(anim) {
  const metrics = textCanvasMetrics(anim);
  if (!metrics) return [];
  const [cx, cy] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
  const local = [
    [-metrics.width * 0.5, -metrics.height * 0.5],
    [ metrics.width * 0.5, -metrics.height * 0.5],
    [ metrics.width * 0.5,  metrics.height * 0.5],
    [-metrics.width * 0.5,  metrics.height * 0.5],
  ];
  return local.map(([lx, ly]) => {
    const [x, y] = transformTextLocalPoint(anim, lx, ly);
    return [cx + x, cy + y];
  });
}

function textHitDistance(anim, cx, cy) {
  const pts = textCanvasCorners(anim);
  if (pts.length < 4) return Infinity;
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const xi = pts[i][0], yi = pts[i][1];
    const xj = pts[j][0], yj = pts[j][1];
    if (((yi > cy) !== (yj > cy)) && (cx < (xj - xi) * (cy - yi) / ((yj - yi) || 1e-9) + xi)) inside = !inside;
  }
  if (inside) return 0;
  let best = Infinity;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    best = Math.min(best, distPointToSegmentPx(cx, cy, a[0], a[1], b[0], b[1]));
  }
  return best;
}

function drawTextPatternFill(anim, metrics, style) {
  const color = animFillColor(anim);
  const opacity = animFillOpacity(anim);
  if (!color || opacity <= 0 || !metrics) return false;
  const bounds = selectedObjectCanvasBounds(anim);
  if (!bounds) return false;
  const fillCanvas = document.createElement('canvas');
  fillCanvas.width = canvas.width;
  fillCanvas.height = canvas.height;
  const fillCtx = fillCanvas.getContext('2d');
  if (style === 'circular') drawCircularFillRings(fillCtx, bounds, color, opacity);
  else if (style === 'radial') drawRadialFillRays(fillCtx, bounds, color, opacity);
  else return false;

  const maskCanvas = document.createElement('canvas');
  maskCanvas.width = canvas.width;
  maskCanvas.height = canvas.height;
  const maskCtx = maskCanvas.getContext('2d');
  const [cx, cy] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
  maskCtx.save();
  maskCtx.translate(cx, cy);
  maskCtx.rotate(-animRotation(anim));
  maskCtx.transform(1, textShearY(anim), textShearX(anim), 1, 0, 0);
  maskCtx.scale(textScaleX(anim), textScaleY(anim));
  maskCtx.fillStyle = '#000';
  maskCtx.font = textFont(anim);
  maskCtx.textAlign = 'left';
  maskCtx.textBaseline = 'alphabetic';
  const x = -metrics.width * 0.5;
  let y = -metrics.height * 0.5 + metrics.fontPx;
  for (const line of metrics.lines) {
    maskCtx.fillText(line || ' ', x, y);
    y += metrics.lineHeight;
  }
  maskCtx.restore();

  fillCtx.save();
  fillCtx.globalCompositeOperation = 'destination-in';
  fillCtx.drawImage(maskCanvas, 0, 0);
  fillCtx.restore();
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 1;
  ctx.drawImage(fillCanvas, 0, 0);
  ctx.restore();
  return true;
}

function drawTextAnim(anim) {
  if (!isTextAnim(anim) || !anim.visible || !anim.anchors[0]) return;
  const metrics = textCanvasMetrics(anim);
  if (!metrics) return;
  const [cx, cy] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-animRotation(anim));
  ctx.transform(1, textShearY(anim), textShearX(anim), 1, 0, 0);
  ctx.scale(textScaleX(anim), textScaleY(anim));
  ctx.font = textFont(anim);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.lineWidth = Math.max(0.5, anim.thickness ?? 1) * devicePixelRatio;
  const x = -metrics.width * 0.5;
  let y = -metrics.height * 0.5 + metrics.fontPx;
  if (animOutlineOpacity(anim) > 0 && ctx.lineWidth > 0) {
    ctx.strokeStyle = anim.color;
    ctx.globalAlpha = animOutlineOpacity(anim);
    for (const line of metrics.lines) {
      ctx.strokeText(line || ' ', x, y);
      y += metrics.lineHeight;
    }
  }
  if (animFillColor(anim)) {
    const fillStyle = animFillStyle(anim);
    if (fillStyle === 'circular' || fillStyle === 'radial') {
      drawTextPatternFill(anim, metrics, fillStyle);
    } else {
      ctx.fillStyle = fillStyleValue(animFillColor(anim), fillStyle) || animFillColor(anim);
      ctx.globalAlpha = animFillOpacity(anim);
      y = -metrics.height * 0.5 + metrics.fontPx;
      for (const line of metrics.lines) {
        ctx.fillText(line || ' ', x, y);
        y += metrics.lineHeight;
      }
    }
  }
  ctx.restore();
}

function ensureCanvasTextEditor() {
  if (canvasTextEditor) return canvasTextEditor;
  const editor = document.createElement('textarea');
  editor.id = 'canvas-text-editor';
  editor.spellcheck = false;
  editor.wrap = 'off';
  editor.addEventListener('mousedown', e => e.stopPropagation());
  editor.addEventListener('click', e => e.stopPropagation());
  editor.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      e.preventDefault();
      editor.blur();
    }
  });
  editor.addEventListener('input', () => {
    const anim = animations.find(a => a.id === canvasTextEditAnimId);
    if (!anim) return;
    anim.text = editor.value;
    updateSidebarTextInputs(anim);
    draw();
  });
  editor.addEventListener('focus', () => {
    const anim = animations.find(a => a.id === canvasTextEditAnimId);
    if (anim && activeTextEditUndoAnimId !== anim.id) {
      pushUndo();
      activeTextEditUndoAnimId = anim.id;
    }
  });
  editor.addEventListener('blur', () => {
    finishCanvasTextEdit();
  });
  canvas.parentElement.appendChild(editor);
  canvasTextEditor = editor;
  return editor;
}

function updateSidebarTextInputs(anim) {
  document.querySelectorAll(`[data-text-edit-anim-id="${anim.id}"]`).forEach(input => {
    if (document.activeElement !== input) input.value = anim.text ?? '';
  });
}

function updateCanvasTextEditorFromAnim(anim) {
  if (!canvasTextEditor || canvasTextEditAnimId !== anim.id) return;
  if (document.activeElement !== canvasTextEditor) canvasTextEditor.value = anim.text ?? '';
  positionCanvasTextEditor();
}

function beginCanvasTextEdit(anim, selectAll = false, rerender = true) {
  if (!isTextAnim(anim) || !isAnimEffectivelyVisible(anim) || !anim.anchors[0]) return;
  if (canvasTextEditAnimId !== anim.id) finishCanvasTextEdit(false);
  canvasTextEditAnimId = anim.id;
  selectedId = anim.id;
  editModeAnimId = anim.id;
  openColorMenuAnimId = null;
  anim.expanded = true;
  anim.activeSegments = new Set();
  anim.expandedArcs = new Set();
  anim.expandedAnchors = new Set();
  animations.forEach(a => {
    if (a.id !== anim.id) {
      a.expanded = false;
      a.expandedArcs = new Set();
      a.expandedAnchors = new Set();
    }
  });
  if (rerender) renderAnimList();

  const editor = ensureCanvasTextEditor();
  editor.value = anim.text ?? '';
  editor.style.display = 'block';
  positionCanvasTextEditor();
  draw();
  setTimeout(() => {
    if (canvasTextEditAnimId !== anim.id) return;
    editor.focus();
    if (selectAll) {
      editor.select();
    } else {
      const end = editor.value.length;
      editor.setSelectionRange(end, end);
    }
  }, 0);
}

function finishCanvasTextEdit(redraw = true) {
  if (canvasTextEditAnimId === null) {
    if (canvasTextEditor) canvasTextEditor.style.display = 'none';
    return;
  }
  const editor = canvasTextEditor;
  canvasTextEditAnimId = null;
  activeTextEditUndoAnimId = null;
  if (editor) {
    editor.style.display = 'none';
    if (document.activeElement === editor) editor.blur();
  }
  if (redraw) {
    draw();
  }
}

function positionCanvasTextEditor() {
  if (!canvasTextEditor || canvasTextEditAnimId === null || currentMode !== 'animations') return;
  const anim = animations.find(a => a.id === canvasTextEditAnimId);
  const metrics = textCanvasMetrics(anim);
  if (!anim || !metrics || !isAnimEffectivelyVisible(anim) || !anim.anchors[0]) {
    canvasTextEditor.style.display = 'none';
    return;
  }

  const dpr = devicePixelRatio;
  const [cx, cy] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
  const width = Math.max(1, metrics.width / dpr);
  const height = Math.max(1, metrics.height / dpr);
  canvasTextEditor.style.display = 'block';
  canvasTextEditor.style.left = `${cx / dpr}px`;
  canvasTextEditor.style.top = `${cy / dpr}px`;
  canvasTextEditor.style.width = `${width}px`;
  canvasTextEditor.style.height = `${height}px`;
  canvasTextEditor.style.fontSize = `${textScreenFontSize(anim)}px`;
  canvasTextEditor.style.lineHeight = '1.2';
  const editColor = animFillColor(anim) || anim.color || '#cdd6f4';
  const editOpacity = animFillColor(anim) ? animFillOpacity(anim) : animOutlineOpacity(anim);
  canvasTextEditor.style.color = editColor;
  canvasTextEditor.style.caretColor = '#f5e0dc';
  canvasTextEditor.style.opacity = Math.max(0.25, editOpacity);
  canvasTextEditor.style.transform = `translate(-50%, -50%) rotate(${-animRotation(anim)}rad) skew(${Math.atan(textShearX(anim))}rad, ${Math.atan(textShearY(anim))}rad) scale(${textScaleX(anim)}, ${textScaleY(anim)})`;
}

// Returns how far along unit direction (dx,dy) from (px,py) until the ray exits rect (rx,ry,rw,rh).
function rayExitRect(px, py, dx, dy, rx, ry, rw, rh) {
  let t = Infinity;
  if (Math.abs(dx) > 1e-9) {
    const tx = ((dx > 0 ? rx + rw : rx) - px) / dx;
    if (tx > 0) t = Math.min(t, tx);
  }
  if (Math.abs(dy) > 1e-9) {
    const ty = ((dy > 0 ? ry + rh : ry) - py) / dy;
    if (ty > 0) t = Math.min(t, ty);
  }
  return t === Infinity ? 0 : Math.max(0, t);
}

function getPlusPositions(anim) {
  if (isClosedPathAnim(anim)) return [];
  if (anim.anchors.length === 0) return [];
  if (anim.segments.length === 0) {
    const dpr = devicePixelRatio;
    const [ax, ay] = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
    return [{ end: 'A2', cx: ax, cy: ay - 22 * dpr, anchorIdx: 0, forward: true }];
  }
  const dpr = devicePixelRatio;
  const OFFSET = 17 * dpr;
  const result = [];
  const activeCount = anim.activeSegments?.size || 0;
  const showBackward = activeCount === 0 || anim.activeSegments.has(0);
  const showForward  = activeCount === 0 || anim.activeSegments.has(anim.segments.length - 1);

  if (showBackward && anim.segments[0]) {
    const A0cp = toCanvas(anim.anchors[0].re, anim.anchors[0].im);
    const h0cp = toCanvas(anim.segments[0].h0.re, anim.segments[0].h0.im);
    let dx0 = A0cp[0] - h0cp[0], dy0 = A0cp[1] - h0cp[1];
    if (Math.hypot(dx0, dy0) < 1e-9) {
      const A1cp = toCanvas(anim.anchors[1].re, anim.anchors[1].im);
      dx0 = A0cp[0] - A1cp[0]; dy0 = A0cp[1] - A1cp[1];
    }
    const l0 = Math.hypot(dx0, dy0) || 1;
    const ux = dx0 / l0, uy = dy0 / l0;
    result.push({ end: 'A0', cx: A0cp[0] + OFFSET * ux, cy: A0cp[1] + OFFSET * uy, anchorIdx: 0, forward: false });
  }
  if (showForward && anim.segments[anim.segments.length - 1]) {
    const lastSegIdx = anim.segments.length - 1;
    const A2cp = toCanvas(anim.anchors[lastSegIdx + 1].re, anim.anchors[lastSegIdx + 1].im);
    const h1cp = toCanvas(anim.segments[lastSegIdx].h1.re, anim.segments[lastSegIdx].h1.im);
    let dx1 = A2cp[0] - h1cp[0], dy1 = A2cp[1] - h1cp[1];
    if (Math.hypot(dx1, dy1) < 1e-9) {
      const A0cp2 = toCanvas(anim.anchors[lastSegIdx].re, anim.anchors[lastSegIdx].im);
      dx1 = A2cp[0] - A0cp2[0]; dy1 = A2cp[1] - A0cp2[1];
    }
    const l1 = Math.hypot(dx1, dy1) || 1;
    const ux = dx1 / l1, uy = dy1 / l1;
    result.push({ end: 'A2', cx: A2cp[0] + OFFSET * ux, cy: A2cp[1] + OFFSET * uy, anchorIdx: lastSegIdx + 1, forward: true });
  }
  return result;
}

function queryPlusHover(cx, cy) {
  if (!editModeAnimId) return null;
  const anim = animations.find(a => a.id === editModeAnimId);
  if (isPrimitiveAnim(anim) || isTextAnim(anim)) return null;
  if (!anim || anim.inPlacementMode || anim.anchors.length === 0) return null;
  const threshold = 14 * devicePixelRatio;
  for (const pp of getPlusPositions(anim)) {
    if (Math.hypot(cx - pp.cx, cy - pp.cy) < threshold)
      return { anim, end: pp.end, anchorIdx: pp.anchorIdx, forward: pp.forward };
  }
  return null;
}

function drawPlusSign(cx, cy, color, dpr, isHovered) {
  const arm = (isHovered ? 7 : 5) * dpr;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = (isHovered ? 2 : 1.5) * dpr;
  ctx.globalAlpha = isHovered ? 1 : 0.7;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - arm, cy); ctx.lineTo(cx + arm, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - arm); ctx.lineTo(cx, cy + arm); ctx.stroke();
  ctx.restore();
}

function getActiveHandleInfo(anim) {
  const active = anim.activeSegments;
  if (!active || active.size === 0) return { anchorSet: new Set(anim.anchors.map((_, i) => i)), handlePairs: [] };
  const anchorSet = new Set();
  const handleMap = new Map();
  for (const i of active) {
    if (i < 0 || i >= anim.segments.length || !anim.segments[i]) continue;
    anchorSet.add(i); anchorSet.add(i + 1);
    handleMap.set(`${i}-h0`, { segIdx: i, side: 'h0' });
    handleMap.set(`${i}-h1`, { segIdx: i, side: 'h1' });
    if (i > 0 && isAnchorLocked(anim, i) && !active.has(i - 1) && anim.segments[i - 1]) {
      handleMap.set(`${i-1}-h1`, { segIdx: i - 1, side: 'h1' });
    }
    if (i + 1 < anim.segments.length && isAnchorLocked(anim, i + 1) && !active.has(i + 1) && anim.segments[i + 1]) {
      handleMap.set(`${i+1}-h0`, { segIdx: i + 1, side: 'h0' });
      anchorSet.add(i + 2);
    }
  }
  return { anchorSet, handlePairs: [...handleMap.values()] };
}

function lockTogglePosition(anim, anchorIdx, activeArc) {
  const dpr = devicePixelRatio;
  const OFFSET = 17 * dpr;
  const [ax, ay] = toCanvas(anim.anchors[anchorIdx].re, anim.anchors[anchorIdx].im);
  if (activeArc !== null && activeArc + 1 < anim.anchors.length) {
    const seg = anim.segments[activeArc];
    if (!seg || !seg.compiled) return [ax, ay + OFFSET];
    // Tangent at this anchor in canvas space, pointing along the arc
    let tx, ty;
    if (anchorIdx === activeArc) {
      const [hx, hy] = toCanvas(seg.h0.re, seg.h0.im);
      tx = hx - ax; ty = hy - ay;
    } else {
      const [hx, hy] = toCanvas(seg.h1.re, seg.h1.im);
      tx = ax - hx; ty = ay - hy;
    }
    const tLen = Math.hypot(tx, ty);
    if (tLen < 1e-6) return [ax, ay + OFFSET];
    tx /= tLen; ty /= tLen;
    // Two candidate perpendiculars; pick the one pointing away from the arc midpoint
    const midMath = seg.compiled(0, 0.5, {});
    const [mx, my] = toCanvas(midMath.re, midMath.im);
    const toMidX = mx - ax, toMidY = my - ay;
    // (-ty, tx) is 90° CCW; (ty, -tx) is 90° CW
    const dot = (-ty) * toMidX + tx * toMidY;
    const px = dot < 0 ? -ty : ty;
    const py = dot < 0 ? tx : -tx;
    return [ax + px * OFFSET, ay + py * OFFSET];
  }
  return [ax, ay + OFFSET];
}

function queryLockHover(cx, cy) {
  if (!editModeAnimId) return null;
  const anim = animations.find(a => a.id === editModeAnimId);
  if (isPrimitiveAnim(anim) || isTextAnim(anim) || isPolylineAnim(anim)) return null;
  if (!anim || anim.inPlacementMode || anim.anchors.length < 3) return null;
  const { anchorSet } = getActiveHandleInfo(anim);
  const activeArc = activeArcIndex(anim);
  const threshold = 10 * devicePixelRatio;
  for (let i = 1; i < anim.anchors.length - 1; i++) {
    if (!anchorSet.has(i)) continue;
    if (activeArc !== null && i !== activeArc && i !== activeArc + 1) continue;
    const [lx, ly] = lockTogglePosition(anim, i, activeArc);
    if (Math.hypot(cx - lx, cy - ly) < threshold) return { anim, anchorIdx: i };
  }
  return null;
}

function drawLockToggle(lx, ly, locked, isHovered, color, dpr) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth   = (isHovered ? 1.8 : 1.3) * dpr;
  ctx.globalAlpha = isHovered ? 0.9 : 0.55;
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  const bW = 10 * dpr, bH = 7 * dpr, bR = 1.5 * dpr;
  const bTop = ly - bH / 2, bL = lx - bW / 2;

  // Body: rounded rectangle centered at (lx, ly)
  ctx.beginPath();
  ctx.moveTo(bL + bR, bTop);
  ctx.lineTo(bL + bW - bR, bTop);
  ctx.arcTo(bL + bW, bTop,      bL + bW, bTop + bR,      bR);
  ctx.lineTo(bL + bW, bTop + bH - bR);
  ctx.arcTo(bL + bW, bTop + bH, bL + bW - bR, bTop + bH, bR);
  ctx.lineTo(bL + bR, bTop + bH);
  ctx.arcTo(bL, bTop + bH,      bL, bTop + bH - bR,      bR);
  ctx.lineTo(bL, bTop + bR);
  ctx.arcTo(bL, bTop,           bL + bR, bTop,            bR);
  ctx.closePath();
  ctx.stroke();

  // Shackle: left arm up + semicircular arch + right arm
  const shR = 3 * dpr;
  const shArchCy = bTop - shR;

  ctx.beginPath();
  ctx.moveTo(lx - shR, bTop);
  ctx.lineTo(lx - shR, shArchCy);
  ctx.arc(lx, shArchCy, shR, Math.PI, 0, false);
  if (locked) {
    ctx.lineTo(lx + shR, bTop);
  } else {
    ctx.lineTo(lx + shR, bTop - shR);
  }
  ctx.stroke();

  ctx.restore();
}

function startExtendedPlacement(fromAnim, anchorIdx, forward) {
  pushUndo();
  exitEditMode();
  animations.forEach(a => {
    a.expanded = false;
    a.expandedArcs = new Set();
    a.expandedAnchors = new Set();
  });
  fromAnim.inPlacementMode = true;
  fromAnim.extensionAnchorIdx = anchorIdx;
  fromAnim.extensionForward = forward;
  fromAnim.extensionInsertAt = forward ? anchorIdx + 1 : anchorIdx;
  fromAnim.reversePlacement = !forward;
  // Compute tContinuation — the tangent the new arc must honour at the extension anchor
  let tCont = new Cx(0, -1); // fallback for dots
  const segs = fromAnim.segments, anch = fromAnim.anchors;
  if (forward && segs.length > 0 && anchorIdx > 0) {
    // Outgoing tangent at anch[anchorIdx] from the segment that ends there
    const seg = segs[anchorIdx - 1];
    if (seg) tCont = tangentAtBezierEnd(anch[anchorIdx], seg.h1);
  } else if (!forward && segs.length > 0) {
    // Start tangent at anch[anchorIdx] from the segment that begins there
    const seg = segs[anchorIdx];
    if (seg) {
      const dx = seg.h0.re - anch[anchorIdx].re, dy = seg.h0.im - anch[anchorIdx].im;
      const L = Math.hypot(dx, dy);
      if (L > 1e-9) tCont = new Cx(dx/L, dy/L);
    }
  }
  fromAnim.tContinuation = tCont;
  fromAnim.expanded = true;
  selectedId = fromAnim.id;
  renderAnimList(); draw(); updateCursor();
}

function hitTestCurve(cx, cy) {
  const threshold = 10 * devicePixelRatio;
  let bestHit = null, bestDist = Infinity;
  for (const anim of animations) {
    if (!isAnimEffectivelyVisible(anim) || anim.inPlacementMode) continue;
    if (isPrimitiveAnim(anim)) {
      const dist = primitiveHitDistance(anim, cx, cy);
      if (dist < bestDist) { bestDist = dist; bestHit = { anim, segIdx: 0, primitive: true }; }
      continue;
    }
    if (isTextAnim(anim)) {
      const dist = textHitDistance(anim, cx, cy);
      if (dist < bestDist) { bestDist = dist; bestHit = { anim, segIdx: 0, text: true }; }
      continue;
    }
    for (let segIdx = 0; segIdx < anim.segments.length; segIdx++) {
      const seg = anim.segments[segIdx];
      if (!seg || !seg.compiled) continue;
      const samples = sampleCompiledAdaptive(seg.compiled);
      const hit = polylineHitInfo(samples, cx, cy);
      if (hit.dist < bestDist) { bestDist = hit.dist; bestHit = { anim, segIdx }; }
    }
  }
  return bestDist <= threshold ? bestHit : null;
}

// ── Placement click handler ──
// Invariant for fresh placement: segs.length = anchors.length - 2 (pending arc not yet stored).
// Extensions use a different invariant (immediate commit, splice-based).
function primitivePlacementClickHandler(anim, snapped) {
  if (!anim || !isPrimitiveAnim(anim)) return;
  if (anim.anchors.length === 0) {
    pushUndo();
    anim.anchors.push(snapped);
    renderAnimList(); draw(); updateCursor();
    return;
  }
  pushUndo();
  anim.anchors[1] = snapped;
  finalizePrimitivePlacement(anim);
}

function textPlacementClickHandler(anim, snapped) {
  if (!anim || !isTextAnim(anim)) return;
  pushUndo();
  anim.anchors = [snapped];
  anim.segments = [];
  anim.inPlacementMode = false;
  anim.expanded = true;
  anim.activeSegments = new Set();
  anim.expandedArcs = new Set();
  anim.expandedAnchors = new Set();
  placementPreviewPos = null;
  selectedId = anim.id;
  editModeAnimId = anim.id;
  openColorMenuAnimId = null;
  animations.forEach(a => {
    if (a.id !== anim.id) {
      a.expanded = false;
      a.expandedArcs = new Set();
      a.expandedAnchors = new Set();
    }
  });
  renderAnimList(); draw(); updateCursor();
  beginCanvasTextEdit(anim, true, false);
  scrollToShowExpanded(anim.id);
  saveProject();
}

function nearestPlacementAnchorIndex(anim, mathX, mathY, threshold, snappedPoint = null) {
  if (threshold === undefined) threshold = (12 * devicePixelRatio) / scale;
  let nearIdx = -1;
  for (let i = anim.anchors.length - 1; i >= 0; i--) {
    const a = anim.anchors[i];
    const rawDist = Math.hypot(a.re - mathX, a.im - mathY);
    const snappedDist = snappedPoint ? Math.hypot(a.re - snappedPoint.re, a.im - snappedPoint.im) : Infinity;
    if (rawDist <= threshold || snappedDist <= 1e-7) { nearIdx = i; break; }
  }
  return nearIdx;
}

function insertPolylineExtensionAnchor(anim, target) {
  const anch = anim.anchors, segs = anim.segments;
  const pt = cloneCx(target);
  if (anim.extensionForward) {
    const srcIdx = anim.extensionInsertAt - 1;
    const src = anch[srcIdx];
    anch.splice(anim.extensionInsertAt, 0, pt);
    anim.anchorLocked.splice(anim.extensionInsertAt, 0, false);
    segs.splice(srcIdx, 0, makeStraightSegment(src, pt));
    anim.extensionInsertAt++;
  } else {
    const srcIdx = anim.extensionInsertAt;
    const src = anch[srcIdx];
    anch.splice(srcIdx, 0, pt);
    anim.anchorLocked.splice(srcIdx, 0, false);
    segs.splice(srcIdx, 0, makeStraightSegment(pt, src));
  }
  recompileAnim(anim);
}

function disconnectedPolylinePlacementClickHandler(anim, snapped, mathX, mathY) {
  if (lineConnectorChoice?.anim === anim) {
    const [cx, cy] = toCanvas(mathX, mathY);
    const hit = queryLineConnectorChoice(cx, cy);
    commitLineConnectorChoice(hit?.idx ?? 0);
    return;
  }

  const mode = currentLineToolMode();
  const anch = anim.anchors;
  const nearIdx = nearestPlacementAnchorIndex(anim, mathX, mathY, undefined, snapped);
  const target = nearIdx >= 0 ? cloneCx(anch[nearIdx]) : cloneCx(snapped);

  if (!polylineHasOpenDisconnectedStart(anim)) {
    pushUndo();
    addDisconnectedPolylineStart(anim, target);
    renderAnimList(); draw(); updateCursor();
    return;
  }

  const start = anch[anch.length - 1];
  if (mode === LINE_TOOL_MODE_CURVES) {
    lineConnectorChoice = {
      anim,
      start: cloneCx(start),
      end: target,
      choices: buildLineConnectorChoices(start, target),
    };
    lineConnectorChoiceHover = null;
    placementPreviewPos = null;
    renderAnimList(); draw(); updateCursor();
    return;
  }

  pushUndo();
  addDisconnectedPolylineConnector(anim, target, makeStraightSegment(start, target));
  renderAnimList(); draw(); updateCursor();
}

function polylinePlacementClickHandler(anim, snapped, mathX, mathY) {
  if (!anim || !isPolylineAnim(anim)) return;
  if (lineConnectorChoice?.anim === anim) {
    disconnectedPolylinePlacementClickHandler(anim, snapped, mathX, mathY);
    return;
  }
  if (anim.extensionAnchorIdx == null && lineToolModeForPlacement(anim) !== LINE_TOOL_MODE_POLYLINE) {
    disconnectedPolylinePlacementClickHandler(anim, snapped, mathX, mathY);
    return;
  }
  const anch = anim.anchors;
  const n = anch.length;
  const nearIdx = nearestPlacementAnchorIndex(anim, mathX, mathY, undefined, snapped);

  if (n === 0) {
    pushUndo();
    anch.push(snapped);
    anim.anchorLocked.push(false);
    renderAnimList(); draw(); updateCursor();
    return;
  }

  if (anim.extensionAnchorIdx != null) {
    const endIdx = anim.extensionForward ? anim.extensionInsertAt - 1 : anim.extensionInsertAt;
    const secondIdx = anim.extensionForward ? endIdx - 1 : endIdx + 1;
    if (nearIdx === endIdx || nearIdx === secondIdx) {
      finalizePolylinePlacement(anim);
      return;
    }
    if (nearIdx >= 0 && anch.length >= 3) {
      const oppositeIdx = anim.extensionForward ? 0 : anch.length - 1;
      pushUndo();
      insertPolylineExtensionAnchor(anim, anch[nearIdx]);
      if (nearIdx === oppositeIdx) anim.closed = true;
      renderAnimList(); draw(); updateCursor();
      return;
    }
    pushUndo();
    insertPolylineExtensionAnchor(anim, snapped);
    renderAnimList(); draw(); updateCursor();
    return;
  }

  if (n === 1) {
    if (nearIdx === 0) {
      finalizePolylinePlacement(anim);
      return;
    }
    pushUndo();
    addPolylineSegment(anim, snapped);
    renderAnimList(); draw(); updateCursor();
    return;
  }

  const lastIdx = n - 1;
  if (nearIdx >= 0) {
    const target = new Cx(anch[nearIdx].re, anch[nearIdx].im);
    const last = anch[lastIdx];
    if (last && Math.abs(target.re - last.re) < 1e-9 && Math.abs(target.im - last.im) < 1e-9) {
      finalizePolylinePlacement(anim);
      return;
    }
    pushUndo();
    addPolylineSegment(anim, target);
    if (nearIdx === 0 && n >= 3) anim.closed = true;
    renderAnimList(); draw(); updateCursor(); return;
  }

  pushUndo();
  addPolylineSegment(anim, snapped);
  renderAnimList(); draw(); updateCursor();
}

function placementClickHandler(anim, snapped, mathX, mathY) {
  const anch = anim.anchors, segs = anim.segments;
  const n = anch.length;
  const isExtension = anim.extensionAnchorIdx != null;
  const nearIdx = nearestPlacementAnchorIndex(anim, mathX, mathY, undefined, snapped);

  if (n === 0) { pushUndo(); anch.push(snapped); anim.anchorLocked.push(true); renderAnimList(); draw(); return; }
  if (n === 1) {
    if (nearIdx === 0) { finalizePlacement(anim); return; }
    pushUndo();
    anch.push(snapped); anim.anchorLocked.push(true);
    rebuildFreshPlacementSegments(anim);
    updatePlacementMatchCandidate(anim);
    renderAnimList(); draw(); return;
  }

  // Extension flow: splice-based, each click commits immediately
  if (isExtension) {
    const endIdx = anim.extensionForward ? anim.extensionInsertAt - 1 : anim.extensionInsertAt;
    if (nearIdx === endIdx) { finalizePlacement(anim); return; }
    const looping = nearIdx >= 0;
    const target = looping ? new Cx(anch[nearIdx].re, anch[nearIdx].im) : snapped;
    const built = buildExtensionSegment(anim, endIdx, target);
    const seg = built.seg;
    const aPos = anim.extensionInsertAt;
    const sPos = anim.extensionForward ? aPos - 1 : aPos;
    pushUndo();
    anch.splice(aPos, 0, target); anim.anchorLocked.splice(aPos, 0, true);
    segs.splice(sPos, 0, seg);
    if (anim.extensionForward) anim.extensionInsertAt++;
    anim.tContinuation = built.nextTangent;
    recompileAnim(anim);
    renderAnimList(); draw(); return;
  }

  // Fresh placement: rebuild the initial spline from the anchor sequence.
  const endIdx = n - 1;
  const looping = nearIdx >= 0;
  const target = looping ? new Cx(anch[nearIdx].re, anch[nearIdx].im) : snapped;

  // Clicking at the same position as the last placed anchor ends placement ("same anchor twice")
  if (looping) {
    const last = anch[endIdx];
    if (last && Math.abs(target.re - last.re) < 1e-9 && Math.abs(target.im - last.im) < 1e-9) {
      finalizePlacement(anim); return;
    }
  }

  pushUndo();
  anch.push(target); anim.anchorLocked.push(true);
  rebuildFreshPlacementSegments(anim);
  updatePlacementMatchCandidate(anim);
  renderAnimList(); draw(); return;
}

canvas.addEventListener('mousedown', e => {
  if (eyedropperTarget !== null && e.button === 0) {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const px = Math.round((e.clientX - rect.left) * devicePixelRatio);
    const py = Math.round((e.clientY - rect.top)  * devicePixelRatio);
    const pixel = ctx.getImageData(px, py, 1, 1).data;
    applyEyedropperColor('#' + [pixel[0], pixel[1], pixel[2]].map(v => v.toString(16).padStart(2, '0')).join(''));
    return;
  }
  if (openColorMenuAnimId !== null) { openColorMenuAnimId = null; renderAnimList(); }
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * devicePixelRatio;
  const cy = (e.clientY - rect.top)  * devicePixelRatio;
  const [mathX, mathY] = toMath(cx, cy);
  mouseDownClientX = e.clientX; mouseDownClientY = e.clientY;
  if (e.button === 2) {
    e.preventDefault();
    dragging = true;
    dragStartX  = e.clientX * devicePixelRatio;
    dragStartY  = e.clientY * devicePixelRatio;
    dragOriginX = originX; dragOriginY = originY;
    updateCursor();
    return;
  }
  if (e.button !== 0) return;

  // ── Match arc button (during placement) ──
  if (placementMatchCandidate?._btnX != null) {
    const { _btnX: bx, _btnY: by, _btnW: bw, _btnH: bh } = placementMatchCandidate;
    if (cx >= bx && cx <= bx + bw && cy >= by && cy <= by + bh) {
      e.preventDefault();
      const { anim: pAnim, segIdx: pSeg, candidate: pCand } = placementMatchCandidate;
      snapArcToMatch(pAnim, pSeg, pCand);
      placementMatchCandidate = null;
      renderAnimList(); draw(); return;
    }
  }

  // ── Placement mode ──
  const placingAnim = animations.find(a => a.inPlacementMode);
  if (placingAnim) {
    e.preventDefault();
    const snapped = new Cx(softSnap(mathX), softSnap(mathY));
    if (isPolylineAnim(placingAnim)) {
      polylinePlacementClickHandler(placingAnim, snapped, mathX, mathY);
      return;
    }
    if (isPrimitiveAnim(placingAnim)) {
      primitivePlacementClickHandler(placingAnim, snapped);
      return;
    }
    if (isTextAnim(placingAnim)) {
      textPlacementClickHandler(placingAnim, snapped);
      return;
    }
    placementClickHandler(placingAnim, snapped, mathX, mathY);
    return;
  }

  // ── Split arc mode ──
  if (splitArcMode !== null) {
    e.preventDefault();
    const splitHover = querySegmentHover(cx, cy);
    if (splitHover && splitHover.anim === splitArcMode.anim && splitHover.segIdx === splitArcMode.segIdx && typeof splitHover.u === 'number') {
      pushUndo();
      const { anim: sAnim, segIdx: sIdx } = splitArcMode;
      splitArcMode = null;
      splitSegmentAtT(sAnim, sIdx, splitHover.u);
      saveProject();
      renderAnimList(); draw();
    } else {
      splitArcMode = null;
      renderAnimList(); draw();
    }
    return;
  }

  // Canvas side buttons: duplicate / reflect / rotate
  const sideAction = querySideActionButtonHover(cx, cy);
  if (sideAction) {
    e.preventDefault();
    handleSideActionButtonPress(sideAction);
    return;
  }

  const activeRotateHit = (rotateHover && isRotationModeActiveForHit(rotateHover)) ? rotateHover : queryRotationWheelHover(cx, cy);
  if (activeRotateHit) {
    e.preventDefault();
    if (beginRotationDragFromHit(activeRotateHit, mathX, mathY)) {
      updateCursor(); draw();
    }
    return;
  }
  if (isRotationModeActive()) clearRotationMode();

  if (isGroupSelectionActive()) {
    const overSelectedGroupControl = queryFrameBorderHover(cx, cy) || queryResizeHandleHover(cx, cy);
    if (!overSelectedGroupControl) {
      if (drillIntoSelectedGroupAtPoint(cx, cy)) {
        e.preventDefault();
        renderAnimList(); draw(); updateCursor();
        return;
      }
      const memberFrame = queryGroupMemberFrameBorderHover(selectedGroupId, cx, cy);
      if (memberFrame) {
        e.preventDefault();
        beginObjectFrameDrag(memberFrame, mathX, mathY);
        renderAnimList(); draw(); updateCursor();
        return;
      }
      const memberHit = querySegmentHover(cx, cy);
      if (memberHit && drillIntoSelectedGroupAtPoint(cx, cy, memberHit.anim)) {
        e.preventDefault();
        renderAnimList(); draw(); updateCursor();
        return;
      }
    }
  }

  const fb = queryFrameBorderHover(cx, cy);
  if (fb) {
    e.preventDefault();
    pushUndo();
    if (fb.groupId != null) {
      frameDrag = {
        groupId: fb.groupId,
        startMathX: mathX, startMathY: mathY,
        origStates: allDescendantAnims(fb.groupId).map(cloneTransformState),
      };
      selectGroup(fb.groupId);
    } else if (fb.multi) {
      const ids = multiSelectionMembers().map(a => a.id);
      frameDrag = {
        multi: true,
        startMathX: mathX, startMathY: mathY,
        origStates: multiSelectionMembers().map(cloneTransformState),
      };
      selectTemporaryMultiSelection(ids);
    } else {
      frameDrag = {
        anim: fb,
        startMathX: mathX, startMathY: mathY,
        origAnchors: fb.anchors.map(cloneCx),
        origSegs: fb.segments.map(s => s ? ({ h0: cloneCx(s.h0), h1: cloneCx(s.h1) }) : null),
      };
      selectedGroupId = null;
      selectedId = fb.id;
    }
    updateCursor(); draw(); return;
  }

  // ── Resize / shear ──
  const resizeHit = queryResizeHandleHover(cx, cy);
  if (resizeHit) {
    e.preventDefault();
    pushUndo();
    if (resizeHit.anim) {
      const frame = selectionFrameMetrics(resizeHit.anim);
      if (frame) resizeDrag = {
        ...cloneTransformState(resizeHit.anim),
        handle: resizeHit.handle,
        startMathX: mathX, startMathY: mathY,
        origBounds: frameMathBounds(frame),
      };
    } else if (resizeHit.groupId != null) {
      const f = groupSelectionFrameMetrics(resizeHit.groupId);
      if (f) resizeDrag = {
        groupId: resizeHit.groupId,
        handle: resizeHit.handle,
        startMathX: mathX, startMathY: mathY,
        origBounds: frameMathBounds(f),
        origStates: allDescendantAnims(resizeHit.groupId).map(cloneTransformState),
      };
    } else if (resizeHit.multi) {
      const f = multiSelectionFrameMetrics();
      if (f) resizeDrag = {
        multi: true,
        handle: resizeHit.handle,
        startMathX: mathX, startMathY: mathY,
        origBounds: frameMathBounds(f),
        origStates: multiSelectionMembers().map(cloneTransformState),
      };
    }
    updateCursor(); draw(); return;
  }

  // ── Rotation wheel ──
  const rotateHit = (rotateHover && isRotationModeActiveForHit(rotateHover)) ? rotateHover : queryRotationWheelHover(cx, cy);
  if (rotateHit) {
    e.preventDefault();
    pushUndo();
    if (rotateHit.anim) {
      const wheel = selectionRotationWheel(rotateHit.anim);
      if (wheel) {
        const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
        rotateDrag = {
          ...cloneTransformState(rotateHit.anim),
          center: new Cx(cRe, cIm),
          startAngle: Math.atan2(mathY - cIm, mathX - cRe),
        };
      }
    } else if (rotateHit.groupId != null) {
      const wheel = groupSelectionRotationWheel(rotateHit.groupId);
      if (wheel) {
        const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
        rotateDrag = {
          groupId: rotateHit.groupId,
          center: new Cx(cRe, cIm),
          startAngle: Math.atan2(mathY - cIm, mathX - cRe),
          origStates: allDescendantAnims(rotateHit.groupId).map(cloneTransformState),
        };
      }
    } else if (rotateHit.multi) {
      const wheel = multiSelectionRotationWheel();
      if (wheel) {
        const [cRe, cIm] = toMath(wheel.cx, wheel.cy);
        rotateDrag = {
          multi: true,
          center: new Cx(cRe, cIm),
          startAngle: Math.atan2(mathY - cIm, mathX - cRe),
          origStates: multiSelectionMembers().map(cloneTransformState),
        };
      }
    }
    updateCursor(); draw(); return;
  }

  // ── Plus (extend placement) ──
  const plusHit = plusHover ?? queryPlusHover(cx, cy);
  if (plusHit) {
    e.preventDefault();
    startExtendedPlacement(plusHit.anim, plusHit.anchorIdx, plusHit.forward);
    return;
  }

  // ── Lock toggle ──
  const lockHit = lockHover ?? queryLockHover(cx, cy);
  if (lockHit) {
    e.preventDefault();
    pushUndo();
    setAnchorLocked(lockHit.anim, lockHit.anchorIdx, !isAnchorLocked(lockHit.anim, lockHit.anchorIdx));
    renderAnimList(); draw(); return;
  }

  // ── Anchor drag ──
  const anchorHit = anchorHover ?? queryAnchorHover(mathX, mathY);
  if (anchorHit) {
    e.preventDefault();
    pushUndo();
    const { anim: aHitAnim, anchorIdx } = anchorHit;
    const origAnchor = cloneCx(aHitAnim.anchors[anchorIdx]);
    const origH0 = aHitAnim.segments[anchorIdx] ? cloneCx(aHitAnim.segments[anchorIdx].h0) : null;
    const origH1 = anchorIdx > 0 && aHitAnim.segments[anchorIdx - 1] ? cloneCx(aHitAnim.segments[anchorIdx - 1].h1) : null;
    let linkedIdx = null, linkedOrigH0 = null, linkedOrigH1 = null;
    const loopRange = findLoopRange(aHitAnim);
    if (loopRange) {
      if (anchorIdx === loopRange.loopStart) {
        linkedIdx = loopRange.loopEnd;
        linkedOrigH0 = aHitAnim.segments[linkedIdx] ? cloneCx(aHitAnim.segments[linkedIdx].h0) : null;
        linkedOrigH1 = linkedIdx > 0 && aHitAnim.segments[linkedIdx - 1] ? cloneCx(aHitAnim.segments[linkedIdx - 1].h1) : null;
      } else if (anchorIdx === loopRange.loopEnd) {
        linkedIdx = loopRange.loopStart;
        linkedOrigH0 = aHitAnim.segments[linkedIdx] ? cloneCx(aHitAnim.segments[linkedIdx].h0) : null;
        linkedOrigH1 = linkedIdx > 0 && aHitAnim.segments[linkedIdx - 1] ? cloneCx(aHitAnim.segments[linkedIdx - 1].h1) : null;
      }
    }
    anchorDrag = {
      anim: aHitAnim, anchorIdx, startMathX: mathX, startMathY: mathY,
      origAnchor, origH0, origH1, linkedIdx, linkedOrigH0, linkedOrigH1,
    };
    updateCursor(); draw(); return;
  }

  // ── Handle drag ──
  const handleHit = handleHover ?? queryHandleHover(mathX, mathY);
  if (handleHit) {
    e.preventDefault();
    pushUndo();
    const { anim: hAnim, segIdx: hSegIdx, side: hSide } = handleHit;
    handleDrag = { anim: hAnim, segIdx: hSegIdx, side: hSide, anchorIdx: hSide === 'h0' ? hSegIdx : hSegIdx + 1 };
    updateCursor(); draw(); return;
  }

  // ── Segment hover ──
  const effectiveSegHover = segmentHover ?? querySegmentHover(cx, cy);
  if (effectiveSegHover) {
    e.preventDefault();
    const hitAnim = effectiveSegHover.anim;
    const hitSegIdx = effectiveSegHover.segIdx;
    if (isMultiSelectionActive() && multiSelectedIds.has(hitAnim.id)) {
      drillSelectObject(hitAnim);
      renderAnimList(); draw(); updateCursor();
      return;
    }
    if (groupSelectionMode) {
      toggleGroupCandidate(hitAnim);
      renderAnimList(); draw(); updateCursor();
      return;
    }
    if (objectGroupId(hitAnim) != null && selectedId !== hitAnim.id) {
      selectFromScene(hitAnim);
      renderAnimList(); draw(); updateCursor();
      return;
    }
    if (editModeAnimId !== hitAnim.id) {
      // First click selects the whole curve, not a specific arc
      enterEditMode(hitAnim, new Set());
      hitAnim.expanded = true;
      animations.forEach(a => {
        if (a.id !== hitAnim.id) {
          a.expanded = false;
          a.expandedArcs = new Set();
          a.expandedAnchors = new Set();
        }
      });
      hitAnim.expandedArcs = new Set();
      hitAnim.expandedAnchors = new Set();
      renderAnimList(); updateCursor();
      if (isTextAnim(hitAnim)) beginCanvasTextEdit(hitAnim, false, false);
      scrollToShowExpanded(hitAnim.id); return;
    }
    // Already in edit mode – update segment selection only; drag editing lives in the object window.
    if (!isTextAnim(hitAnim)) {
      hitAnim.activeSegments = new Set([hitSegIdx]);
      hitAnim.selectionGuideShear = null;
      resizeHover = null; rotateHover = null; frameHover = null;
      hitAnim.expanded = true;
      hitAnim.expandedArcs = new Set([hitSegIdx]);
      hitAnim.expandedAnchors = new Set();
      animations.forEach(a => {
        if (a.id !== hitAnim.id) { a.expanded = false; a.expandedArcs = new Set(); a.expandedAnchors = new Set(); }
      });
      renderAnimList(); scrollToShowExpanded(hitAnim.id);
    }
    updateCursor(); draw(); return;
  }

  const fillHit = queryFillHit(cx, cy);
  if (fillHit) {
    e.preventDefault();
    if (groupSelectionMode) {
      toggleGroupCandidate(fillHit);
    } else if (isGroupSelectionActive() && drillIntoSelectedGroupAtPoint(cx, cy, fillHit)) {
      // Selection handled by drillIntoSelectedGroupAtPoint.
    } else if (objectGroupId(fillHit) != null &&
               focusedGroupMemberGroupId() === objectGroupId(fillHit)) {
      drillSelectObject(fillHit);
    } else if (isMultiSelectionActive() && multiSelectedIds.has(fillHit.id)) {
      drillSelectObject(fillHit);
    } else {
      selectFromScene(fillHit);
    }
    renderAnimList(); draw(); updateCursor();
    return;
  }

  // ── Canvas background ──
  if (editModeAnimId !== null) {
